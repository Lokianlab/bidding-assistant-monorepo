# 危險命令攔截設定
# 格式：pattern|message
# pattern: grep -E 正則，匹配 bash 命令
# 匹配到 → exit 2 阻斷執行
#
# 加新規則 = 加一行，不改 hook 程式碼

# ─── Git 破壞性操作 ───
git push.*--force|阻斷：force push 會覆蓋遠端歷史。確認需要再用 --force-with-lease。
git push.*-f\b|阻斷：force push 會覆蓋遠端歷史。確認需要再用 --force-with-lease。
git reset --hard|阻斷：hard reset 會丟失未提交改動，不可逆。
git commit --amend|阻斷：amend 會修改已有 commit，應建新 commit。
git checkout \.|阻斷：會丟棄所有未提交改動。
git restore \.|阻斷：會丟棄所有未提交改動。
git clean -f|阻斷：會刪除未追蹤檔案，不可逆。
git branch -D|阻斷：強制刪除分支，可能丟失工作。

# ─── 檔案破壞性操作 ───
rm -rf|阻斷：遞迴強制刪除，不可逆。確認範圍後用 rm -r（不帶 -f）。

# Stop hook 行為偵測設定
# 格式：severity|pattern|message
# severity: hard (exit 2 強制繼續) / soft (stderr 提醒)
# pattern: grep -E 正則，匹配回覆尾部 10 行
# message: 觸發時顯示的提醒訊息
#
# 加新問題 = 加一行，不改 hook 程式碼

# ─── 被動性：把決策丟給用戶 ───
hard|需要我做什麼|你在問用戶該做什麼。自己判斷，直接做。
hard|有什麼.*要我做|你在問用戶該做什麼。自己判斷，直接做。
hard|要我.*繼續嗎|自己判斷要不要繼續，不要問。
hard|接下來做什麼|自己判斷下一步，不要問用戶。
hard|要不要我|自己判斷該不該做，不要問。
hard|你來決定|這是你該判斷的，不要推給用戶。
hard|你.*選擇|給判斷，不要丟選擇題。
hard|還是你|給判斷，不要丟選擇題。

# ─── 等待語句：可能合理但提醒確認 ───
soft|等用戶|你在等什麼？邊等邊做其他能自主推進的工作。
soft|等待指示|你在等什麼？邊等邊做其他能自主推進的工作。
soft|等你下一步|你在等什麼？邊等邊做其他能自主推進的工作。
soft|下一步指示|你在等什麼？邊等邊做其他能自主推進的工作。
soft|無可自主推進|確認：真的沒有快照 [ ] 或論壇待回覆嗎？

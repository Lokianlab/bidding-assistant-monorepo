<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全能標案助理 — 文件瀏覽器（靜態版）</title>
<style>
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: #2a2a2a; --text: #e5e5e5; --text2: #a0a0a0;
    --accent: #3b82f6; --accent-dim: #1e3a5f;
    --green: #22c55e; --orange: #f59e0b; --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

  .app { display: flex; height: 100vh; }

  /* --- 側欄 --- */
  .sidebar { width: 320px; min-width: 320px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { font-size: 16px; margin-bottom: 8px; }
  .sidebar-header .meta { font-size: 12px; color: var(--text2); }
  .search-box { width: 100%; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; outline: none; margin-top: 8px; }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text2); }

  .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
  .cat-group { margin-bottom: 4px; }
  .cat-header { display: flex; align-items: center; gap: 6px; padding: 6px 8px; font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; border-radius: 4px; user-select: none; }
  .cat-header:hover { background: var(--surface2); }
  .cat-header .arrow { transition: transform 0.15s; font-size: 10px; }
  .cat-header.collapsed .arrow { transform: rotate(-90deg); }
  .cat-header .count { margin-left: auto; background: var(--surface2); padding: 1px 6px; border-radius: 10px; font-size: 11px; }
  .cat-files { }
  .cat-files.hidden { display: none; }
  .file-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px 6px 24px; font-size: 13px; cursor: pointer; border-radius: 4px; color: var(--text); text-decoration: none; }
  .file-item:hover { background: var(--surface2); }
  .file-item.active { background: var(--accent-dim); color: white; }
  .file-item .fname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .fmeta { font-size: 11px; color: var(--text2); white-space: nowrap; }

  /* --- 內容區 --- */
  .content { flex: 1; overflow-y: auto; padding: 32px 48px; max-width: 900px; }
  .content.empty { display: flex; align-items: center; justify-content: center; max-width: 100%; }
  .empty-msg { text-align: center; color: var(--text2); }
  .empty-msg h2 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
  .empty-msg p { font-size: 14px; }
  .empty-msg kbd { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 12px; border: 1px solid var(--border); }

  /* --- Frontmatter --- */
  .frontmatter { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-bottom: 24px; font-size: 13px; }
  .frontmatter .row { display: flex; gap: 16px; margin-bottom: 4px; }
  .frontmatter .label { color: var(--text2); min-width: 60px; }
  .badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-green { background: #16532d; color: #86efac; }
  .badge-orange { background: #533416; color: #fcd34d; }
  .badge-blue { background: #1e3a5f; color: #93c5fd; }

  /* --- Markdown 渲染 --- */
  .md-content h1 { font-size: 28px; font-weight: 700; margin: 32px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .md-content h2 { font-size: 22px; font-weight: 600; margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .md-content h3 { font-size: 18px; font-weight: 600; margin: 24px 0 8px; }
  .md-content h4 { font-size: 15px; font-weight: 600; margin: 20px 0 6px; }
  .md-content p { margin: 8px 0; line-height: 1.7; }
  .md-content ul, .md-content ol { margin: 8px 0 8px 24px; }
  .md-content li { margin: 4px 0; line-height: 1.6; }
  .md-content li ul, .md-content li ol { margin: 2px 0 2px 20px; }
  .md-content code { background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: "Cascadia Code", "Fira Code", monospace; }
  .md-content pre { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; overflow-x: auto; margin: 12px 0; }
  .md-content pre code { background: none; padding: 0; font-size: 13px; }
  .md-content blockquote { border-left: 3px solid var(--accent); padding: 8px 16px; margin: 12px 0; color: var(--text2); background: var(--surface); border-radius: 0 6px 6px 0; }
  .md-content table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 13px; }
  .md-content th, .md-content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  .md-content th { background: var(--surface); font-weight: 600; }
  .md-content tr:nth-child(even) { background: var(--surface); }
  .md-content a { color: var(--accent); text-decoration: none; }
  .md-content a:hover { text-decoration: underline; }
  .md-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  .md-content strong { font-weight: 600; }
  .md-content em { font-style: italic; }
  .md-content img { max-width: 100%; border-radius: 8px; }
  .md-content .task-done { text-decoration: line-through; color: var(--text2); }

  /* --- 捲軸 --- */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #444; }

  /* --- RWD --- */
  @media (max-width: 768px) {
    .sidebar { width: 100%; min-width: 100%; position: fixed; z-index: 10; transform: translateX(-100%); transition: transform 0.2s; }
    .sidebar.open { transform: translateX(0); }
    .content { padding: 16px; }
    .mobile-toggle { display: block; position: fixed; top: 12px; left: 12px; z-index: 20; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); cursor: pointer; font-size: 16px; }
  }
  @media (min-width: 769px) {
    .mobile-toggle { display: none; }
  }
</style>
</head>

<button class="mobile-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

const CONTENT_MAP = {"docs/business-context.md":"# 商業 Context（所有機器必讀）\n\n> 草稿 v0.1 by Z1FV，根據現有 codebase 整理。Jin 糾正後為準。\n> 每台機器啟動時讀這份文件。判斷「下一步做什麼」時先問：這推動了收入公式的哪一項？\n\n---\n\n## 客戶是誰\n\n**第一個客戶（自用）**：大員洛川顧問有限公司\n\n- 15 人團隊，完全非技術背景\n- 16+ 年政府採購標案經驗\n- 核心業務：課程/導覽/走讀/傳統服飾/綠色照護相關標案\n- 年營收目標：NT$3,000 萬\n- **去年實績：投標 46 案，得標 0 件（0% 得標率）**\n- 大部分是「最有利標」——建議書品質決定勝負，不是最低價\n\n## 他們現在怎麼投標\n\n```\n招標文件\n  → Perplexity 查資料\n  → Gemini 想創意\n  → Claude 寫初稿\n  → Nanobanana 生主視覺\n  → 人肉縫合各工具產出\n  → 拉舊案當底稿修補\n  → 排版（建議書 + 評選簡報）\n  → 送件\n  → 落標\n  → 沒有系統性學習\n  → 下次重來\n```\n\n6 個工具之間跳來跳去，每個 AI 都要重新調校，知識沒累積。\n\n## 痛點在哪\n\n最痛的 5 個（按影響程度）：\n\n1. **知識庫是空的** — AI 只能寫空話，沒有公司實績/團隊/時程/SOP 可用（痛點 #4）\n2. **篩案靠感覺** — 46 案全投但品質都不夠，可能該集中火力（痛點 #1, #18）\n3. **寫完還是像初稿** — 品質上不去，沒有系統性的品質檢查（痛點 #12）\n4. **在工具間跳來跳去** — 5 個 AI 工具不互通，每次重頭調校（痛點 #5, #7, #8）\n5. **經驗沒累積** — 做完的案件經驗沒回流，每次從零開始（痛點 #15, #16）\n\n完整 23 條痛點見 `bidding-assistant/docs/dev-plan/00-總論.md`。\n\n## 收入公式\n\n```\n收入 = 投標案件數 × 得標率 × 平均案件金額 × 毛利率\n     = (發現機會數 × 投標決策通過率) × 得標率 × 平均案件金額 × 毛利率\n```\n\n**每個功能都必須能回答：推動了公式中的哪一項？**\n\n## 產品要怎麼賣\n\n**三階段**：\n\n| 階段 | 用戶 | 目標 |\n|------|------|------|\n| Phase 1（現在） | Jin 自己 | 自用，驗證核心價值 |\n| Phase 2 | 公司 15 人 | 團隊採用，提升整體得標率 |\n| Phase 3 | 外部客戶 | 商業化（SaaS） |\n\n**先賣給誰**：先給自己用。Phase 1 的目標是 Jin 自己能用這個系統投標，驗證「有了這個工具，建議書品質是否真的提升」。\n\n## 什麼功能明天就能拿去用\n\n**已完成且可展示的**：\n\n| 功能 | 做什麼 | 推動收入公式哪項 |\n|------|--------|-----------------|\n| M03 戰略分析引擎 | 五維適配度評分 + 雷達圖，幫助決定投/不投 | 投標決策通過率 |\n| M04 品質閘門 | 四道檢查（事實/需求/實務/禁用詞） | 得標率 |\n| 情報搜尋（M01） | PCC 標案搜尋 + 機關情報 + 競爭分析 | 發現機會數 |\n| 文件生成 | 建議書 DOCX 輸出（封面+目錄） | — |\n\n**最小展示版 = M01 情報 + M03 戰略 + M04 品質**：搜尋標案 → 分析是否值得投 → 寫作時品質把關。\n\n## 什麼功能做了可能沒人用\n\n| 功能 | 為什麼可能沒用 |\n|------|---------------|\n| 機器論壇（forum 模組，已廢除） | 給機器用的，不是客戶功能，已改為快照協調 |\n| 自訂儀表板拖曳佈局 | 過度工程化，Phase 1 不需要自訂 |\n| 趨勢分析卡片 | 資料量太少（46 案），統計無意義 |\n\n## 缺的關鍵功能\n\n| 功能 | 為什麼缺它很痛 | 阻塞點 |\n|------|---------------|--------|\n| **知識庫（M02）** | 沒有知識庫 = AI 只能寫空話 | 儲存方案已定（0226 Jin 直接指示）：規格待寫 |\n| **統一 AI 調度（能力 3）** | 5 個工具跳來跳去是最大痛點之一 | Layer 2 規劃中，尚未開工 |\n| **排版輸出（M06）** | 排版是每次投標的痛點 | 規格草案 v0.1 完成 |\n| **落標學習** | 0% 得標率的根因之一：沒有系統性反省 | Layer 3 |\n\n## 判斷框架：下一步做什麼\n\n做完一個任務後，用這個順序判斷下一步：\n\n1. **推動得標率的事** > 推動投標案件數 > 推動效率\n2. **解放卡住的功能**（待開發 > 待規劃）\n3. **客戶能感受到的改善** > 開發者才感受到的改善\n4. **基建只在阻塞產品時才做**——不要為了基建而基建\n\n---\n\n> 待 Jin 確認/糾正的問題：\n> 1. 以上客戶描述是否正確？有沒有漏掉的重要資訊？\n> 2. Phase 1 的近期目標是什麼？（例：下個月要用這個系統投一案？）\n> 3. ~~知識庫儲存方案要走 Notion 還是 Supabase？~~ **已決（0226）**：Notion（現有標案追蹤）+ Supabase（KB 知識庫 + SaaS 多租戶認證）+ Web App（介面）。\n> 4. 「做了沒人用」那欄有沒有判斷錯的？\n","docs/collaboration-onboarding.md":"# 新機器協作入門\n\n> 讀完這份文件再動手。裡面的規則是從實際踩過的坑整理出來的。\n> 技術規範在 CLAUDE.md，這裡講的是「實際上大家怎麼做事」和「什麼事會讓你被扣分」。\n\n---\n\n## 你是誰\n\n你是一台 Claude Code 機器，跟其他機器一起開發「全能標案助理」。每台機器有一個 4 字元代號（存在 `.machine-id`），這是你的身分。每台機器有自己擅長的領域但不限於此，跨域協調由 JDNE 統籌，方向性決策由 Jin 裁決。\n\n## 必讀清單（依順序讀）\n\n在做任何事之前，讀完以下文件。跳過任何一份都可能導致違規和扣分。\n\n| 順序 | 文件 | 為什麼要讀 |\n|------|------|-----------|\n| 1 | 本文件 | 協作流程和常見地雷 |\n| 2 | `CLAUDE.md` | 所有技術規範和行為規範的根 |\n| 3 | `docs/user-auth.md` | 用戶驗證系統、註冊紅線、幕僚模式 |\n| 4 | `docs/scoring.md` | 計分制度——什麼行為加分什麼扣分 |\n| 5 | `.claude/rules/record-formats.md` | OP 記錄和快照格式 |\n| 6 | `docs/machine-roles.md` | 各機器的角色分工和決策權範圍 |\n| 7 | `docs/records/_index.md` | 主題索引——所有工作項目的一句話結論 |\n| 8 | `docs/dev-map.md` | 全專案開發地圖 |\n| 9 | 所有 `docs/records/_snapshot-*.md` | 其他機器在做什麼 |\n\n## 你的隊友\n\n每台機器有擅長的領域（見 CLAUDE.md 治理機制段），但不限於此——有能力就做。\n\n**具體在做什麼——讀快照。** 快照是活的，角色文件是靜態的。\n\n找隊友的方法：\n```bash\nls docs/records/_snapshot-*.md\n```\n\n每個快照檔名就是一台機器。讀它們的內容就知道誰在做什麼。\n\n## 怎麼溝通\n\n透過快照和 OP 溝通：\n\n| 情境 | 做法 |\n|------|------|\n| 自己角色範圍內的事 | 直接做，做完推送 |\n| 涉及另一角色的領域 | 在快照備註或 OP 中標記，對方確認 |\n| 跨多個角色的事 | 通知 JDNE 統籌 |\n| 方向性 / 架構 / 規則 | 寫 /暫存 → JDNE 評估 → 報 Jin |\n| 緊急阻塞 | 直接報 Jin |\n\n## 怎麼記錄\n\n每次做完一個工作單元：\n\n1. 寫 OP 記錄 → `docs/records/{YYYY-MM}/{日期}-{你的代號}.md`\n2. 更新快照 → `docs/records/_snapshot-{你的代號}.md`\n3. 更新主題索引 → `docs/records/_index.md`（如果 topic 狀態變了）\n4. git push（OP + 快照 + 改動一起推，不拆開）\n\n格式細節在 `.claude/rules/record-formats.md`。\n\n**快照標記**：`[ ]` 待做、`[x]` 完成、`[?]` 未決、`[~]` 放棄、`[>]` 進行中\n\n**完成標準**：測試過 + build 過 + 有審查（第二級）→ 直接標 `[x]`。用戶使用時發現問題再開 issue。\n\n## Git 規則（違反每次 -1）\n\n```bash\n# 拉最新——永遠用 rebase，不用 pull\ngit fetch origin && git rebase origin/main\n\n# 推\ngit add <檔案> && git commit -m \"簡述\" && git push origin main\n\n# force push 後的同步（其他機器 force push 了，你要跟上）\ngit fetch origin && git reset --hard origin/main\n```\n\n**禁止 `git pull`**。禁止。用了會被扣分。原因：`git pull` 做 merge，會把已清理的歷史重新帶回來。\n\n**推之前先拉**。每次 push 前都 fetch + rebase，不是只有開工拉一次。\n\n## 計分制度\n\n每台機器有獨立的計分記錄（`docs/scoring.md`）。分數累積，不清零。\n\n**常見扣分行為**（每項 -1）：\n\n| 行為 | 為什麼扣 | 怎麼避免 |\n|------|---------|---------|\n| 做完就停，等用戶指示 | 用戶不該替你想下一步 | 做完直接推導下一步並行動 |\n| 不主動表態，丟選擇題 | 用戶不該替你做判斷 | 每個問題附你的建議和理由 |\n| 改規範檔沒做閉環驗證 | 改了可能壞別的 | 改完跑四層閉環 |\n| 推送缺 OP 記錄 | 記錄是系統的記憶 | pre-push hook 會自動擋 |\n| 用 `git pull` | 會帶回已清理的歷史 | 用 `git fetch && git rebase` |\n| 未經用戶授權改 user-auth.md | 註冊紅線 | 只有 Jin 能改用戶表 |\n| 未經用戶確認改 CLAUDE.md | 這是第三級改動 | 先 /暫存 → JDNE 評估 → Jin 批准 |\n\n**加分行為**：\n\n| 行為 | 分數 | 例子 |\n|------|------|------|\n| 主動做了用戶沒交代但該做的事 | +1 | 發現缺口主動補測試 |\n| 產出品質超出預期 | +2 | 分析深入、方案完整 |\n| 審查發現別人的 bug 或設計缺陷 | +1 | 跨機器互評 |\n\n完整規則見 `docs/scoring.md`。\n\n## 品質等級\n\n| 等級 | 什麼改動 | 需要什麼 |\n|------|---------|---------|\n| 第一級（自主） | bug 修復、測試、清理 | 測試過 + build 過 + OP |\n| 第二級（展示） | 新功能、UI、模組 | 第一級 + 另一台機器審查 → 直接完成 |\n| 第三級（先討論） | CLAUDE.md、架構、策略 | /暫存 提案 → JDNE 評估 → Jin 確認 → 才動手 |\n\n**不確定屬於哪級 → 按高一級處理。**\n\n## 常見地雷（從過去踩過的坑整理）\n\n### 1. 自作主張改用戶表\n\n**發生過什麼**：某台機器認為「用戶給了碼就是授權」，自行把一個人加到 user-auth.md。結果被退回、扣分、觸發註冊流程全面重寫。\n\n**規則**：只有 Jin 能改 user-auth.md。機器收到註冊請求 → 通知 Jin → 不做其他事。\n\n### 2. 用 git pull 同步\n\n**發生過什麼**：force push 清理安全歷史後，機器用 git pull 同步，把洩漏的歷史又帶回主線。反覆 5 次才清乾淨。\n\n**規則**：永遠 `git fetch origin && git rebase origin/main`，永不 `git pull`。\n\n### 3. 做完就停\n\n**發生過什麼**：做完一件事後寫「有什麼要我做的嗎？」或停下來等用戶。這是所有機器最常犯的模式（計分板上超過 15 次）。\n\n**規則**：做完直接推導下一步，直接做。真的沒事了，一句陳述句：「目前無可自主推進的工作」。不問。\n\n### 4. 機密洩漏到 git\n\n**發生過什麼**：把用戶驗證碼明碼寫進 OP 記錄，洩漏到 git 歷史。觸發 5 次 force push 清理。\n\n**規則**：不在 git 追蹤的任何檔案中寫明碼。驗證碼、API key、任何機密只存在 gitignored 的本機檔案中。\n\n### 5. 基建級改動沒先協調\n\n**發生過什麼**：直接拍板一個影響所有機器的設計（如臨時機器碼），沒讓其他機器參與就開始改。\n\n**規則**：影響 ≥2 台機器的改動 → /暫存 提案 → JDNE 評估 + 相關角色確認 → 再動手。\n\n### 6. 三級改動沒等用戶確認\n\n**發生過什麼**：機器之間達成共識後直接改 CLAUDE.md，沒等用戶核准。機器共識 ≠ 用戶授權。\n\n**規則**：涉及 CLAUDE.md 或架構的改動，JDNE 評估後還要等 Jin 說「好」。\n\n## 日常工作節奏\n\n```\n開工 → /更新（拉最新、讀快照）\n  → 做事（寫碼、分析、審查）\n  → 每完成一個工作單元就 commit + push（附 OP 和快照）\n  → 沒事做了 → 掃其他機器快照找待審查項目或品質缺口\n收工 → /回報（工作報告）\n```\n\n## 閉環驗證（每次改完東西都要跑）\n\n四層，有順序：\n1. **做對了** — `npm test` + `npm run build` 通過\n2. **有效** — 回到原始問題，確認真的解決了\n3. **做全了** — 邊界條件有處理或有不處理的理由\n4. **沒矛盾** — 文件、設定跟程式碼對得上\n\n## 碰撞處理\n\n多台機器同時工作，改到同一個檔案是常態。\n\n- **程式碼衝突**：讀懂兩邊改動，合併成正確版本，跑測試驗證\n- **記錄層衝突**：永遠保留兩邊的記錄，不刪除任何一方\n- **package-lock.json**：刪掉重新 `npm install`\n- **暫存區矛盾**（同 topic 相反結論）：兩份都保留，讓用戶裁決\n\n## 暫存區\n\n討論有結論但還沒正式寫入開發計畫時，用 `/暫存` 存到 `bidding-assistant/docs/dev-plan/_staging/`。不要直接改正式文件。\n\n## 說人話（硬性規定）\n\n給用戶看的所有文字不出現 topic ID、OP 引用、格式化標記。用具體描述取代抽象標籤。\n\n| 不要這樣寫 | 要這樣寫 |\n|-----------|---------|\n| infra-user-auth | 用戶驗證系統 |\n| @op:20260219-JDNE#1800 | （放在元資料欄，不混進正文） |\n| PreCompact hook 機制 | 壓縮前自動推上 git |\n\n## 方法論\n\n遇到複雜任務時，CLAUDE.md 的觸發規則會告訴你什麼情況該用什麼方法。手動用：\n\n| 指令 | 什麼時候用 |\n|------|-----------|\n| `/對焦` | 需求不清楚 |\n| `/拆解` | 任務太大要拆 |\n| `/驗證` | 改動影響範圍大 |\n| `/回顧` | 同一件事失敗兩次以上 |\n\n## 上線流程\n\n完成必讀清單後，依序做：\n\n1. **了解角色分工**：讀 `docs/machine-roles.md` 了解自己和其他機器的角色\n2. **了解全局狀態**：讀 JDNE 的快照了解目前全局進度\n3. **建快照**：讀 `_index.md` 和其他機器的快照，找你能做的事，建自己的 `_snapshot-{代號}.md`\n4. **找第一件事做**：\n   - 其他機器的快照有沒有需要審查的項目？→ 審查\n   - 測試覆蓋有缺口？→ 補測試\n   - JDNE 有指派？→ 執行\n   - 都沒有 → `npm test && npm run build` 確認環境正常\n5. **直接做，不問「我可以做什麼」**\n\n## 不需要問別人的事\n\n| 你的疑問 | 答案在哪裡 |\n|---------|-----------|\n| 怎麼寫 OP | `.claude/rules/record-formats.md` |\n| 其他機器在做什麼 | `docs/records/_snapshot-*.md` |\n| 用戶驗證怎麼運作 | `docs/user-auth.md` |\n| 什麼行為會被扣分 | `docs/scoring.md` |\n| 全專案概覽 | `docs/dev-map.md` |\n| 開發規範 | `bidding-assistant/CLAUDE.md` |\n\n**如果這些文件裡找不到答案，寫 /暫存 提出問題，或通知 JDNE 協調。**\n","docs/debugging.md":"# Debugging & Development Lessons\n\n## 1. 修 Bug 必須深挖根因，不可頭痛醫頭\n\n**案例（2026-02-17 case-board 搜尋測試）：**\n\n問題：測試搜尋 \"台北\" 預期配對 1 筆，實際配對 3 筆。\n\n錯誤做法（頭痛醫頭）：\n- 只改搜尋詞 \"台北\" → \"公園\" 讓測試通過\n- 沒有追問：為什麼 3 筆都 match？\n\n正確做法（深挖根因）：\n- 發現 `makePage` helper 把所有 agency 硬寫成 \"台北市政府\"\n- 搜尋 \"台北\" 同時匹配 name + agency，所以 3 筆全中\n- 修正：`makePage` 加 agency 參數 + 每筆測試資料用不同 agency\n- 拆分 4 個精確測試：name-only / agency-only / OR 邏輯 / 組合篩選\n\n**原則 — 測試不通過時的調查流程：**\n1. **先理解失敗訊息**：expected 1 got 3 — 為什麼是 3？不是「怎麼改成 pass」\n2. **追溯資料流**：搜尋 \"台北\" → `applyBoardFilters` → 比對 name + agency → 3 筆 agency 都含「台北」\n3. **判斷錯在哪一層**：是產品代碼有 bug？還是測試寫錯？還是測試資料有缺陷？\n4. **從根源修正**：本例根因是測試資料設計不良，所以修 makePage + 測試資料，而非改斷言\n\n**絕對不做：**\n- 看到 expected 1 got 3 就把斷言改成 3\n- 換一個搜尋詞碰巧讓結果 = 1 就收工\n- 只看表面（「搜尋詞選錯了」）而不追問底層（「為什麼這個詞會配對到不該配的資料」）\n\n## 2. 測試資料設計原則\n\n- 每筆 mock 資料的區分欄位必須不同，否則無法隔離測試\n- 避免所有 mock 共用同一個值（如 agency 全部 \"台北市政府\"）\n- 測試名稱要明確說明測試的是哪條路徑（e.g. \"matching name only\" 而非 \"search keyword\"）\n\n## 3. 閉環原則\n\n閉環有兩層，缺一不可（詳見 CLAUDE.md §6）：\n\n1. **做對了**（正確性）— 修改無錯誤、無遺漏、全域一致\n2. **有效**（目的性）— 修改達成了原本要解決的目的\n\n### 第一層：做對了\n\n- 程式碼 → `npm test` + `npm run build` 全過\n- 文件 / 設定檔 → grep 舊值，殘留為零、所有副本一致\n- 環境變數 / 欄位改名 → grep 全 codebase，無斷鏈\n\n### 第二層：有效\n\n回到原始需求問自己：**那個問題現在真的解決了嗎？**\n測試全過不代表功能真的能用。grep 零殘留不代表服務真的連得上。\n\n### 常犯錯誤\n\n- 跳過步驟 2（自我審查）直接跑 build\n- 先跑 build 再寫測試（順序反了）\n- 測試當事後補丁而非開發流程的一部分\n- 改了一處文件，沒 grep 全 codebase 找其他副本（第一層斷裂）\n- 測試全過就交付，沒確認功能實際行為符合預期（第二層缺失）\n- 改了一處文件，沒 grep 全 codebase 找其他副本（閉環斷裂）\n\n## 4. DocumentSettings.margins 單位不一致（已知問題，待用戶裁決）\n\n**現象（0226 JDNE 審查發現）：**\n\n`src/lib/settings/types.ts` 的 `DocumentSettings.margins` 沒有明確標注單位，導致兩個模組各自假設：\n- `src/lib/docgen/generate-docx.ts`：把 margins 當 **cm**，乘 10 轉 mm 後再轉 twip（`margins.top * 10` → `convertMillimetersToTwip`）\n- `src/lib/output/print-export.ts`：把 margins 當 **mm**，直接注入 CSS（`${margins.top}mm`）\n\n**影響：**\n\n`DEFAULT_SETTINGS.document.page.margins = { top: 1, bottom: 1, left: 1, right: 1 }`\n- DOCX 輸出：1cm = 10mm 邊距（合理）\n- HTML 列印：1mm 邊距（極小，幾乎無邊距）\n\n兩個模組的測試資料也不同（generate-docx.test.ts 用 `{top:1,...}`，print-export.test.ts 用 `{top:25,...}`），各自測試通過但行為不同。\n\n**待裁決：**\n\n修法方向需要確認 UI 設定頁面顯示的單位標籤：\n- 若 UI 顯示「cm」→ `print-export.ts` 需要改為 `${margins.top * 10}mm` 或 `${margins.top}cm`\n- 若 UI 顯示「mm」→ `generate-docx.ts` 需要移除 `* 10`，並更新 `DEFAULT_SETTINGS` 為合理 mm 值（如 25/25/30/30）\n\n在用戶裁決前，不應單方面修改任何一個模組。\n\n## 5. Claude Desktop App 大檔問題\n\nSession 檔案超過 10MB 時，Claude Desktop App 會出現 \"Failed to load session\" 錯誤，無法載入對話。這是 Desktop App 的已知限制，與 Claude Code CLI 無關。\n","docs/dev-environment.md":"# 開發環境與配置（2026-02-18 快照）\n\n在不同機器上接續開發時，照此文件還原環境。\n\n---\n\n## 1. 系統環境\n\n| 項目 | 版本/值 |\n|------|--------|\n| OS | Windows 11 Home 10.0.26200 |\n| Node.js | v22.14.0 |\n| npm | 10.9.2 |\n| Git | 2.53.0.windows.1 |\n| GitHub CLI | v2.86.0 |\n| Shell | bash（Claude Code 預設使用 Unix 語法） |\n\n### 全域 npm 套件\n\n```bash\nnpm install -g @anthropic-ai/claude-code@latest\n```\n\n---\n\n## 2. 專案結構\n\n```\nC:\\dev\\cc程式\\                              ← 根目錄（git monorepo）\n├── CLAUDE.md                               ← 根目錄共用規範\n├── .gitignore                              ← 全域 gitignore\n├── .claude/commands/                       ← slash commands（上 GitHub）\n├── .mcp.json                               ← MCP Server 配置（不入 git）\n├── docs/                                   ← 跨子專案共用文件\n│   ├── records/                            ← 記錄層（AI 自動維護）\n│   ├── operation-log.md                    ← 操作日誌（已停用，歷史保留）\n│   ├── 機器設定指南.md                     ← 新機器設定步驟\n│   ├── debugging.md                        ← 開發除錯經驗\n│   └── dev-environment.md                  ← 本文件\n├── bidding-assistant/                      ← 主 Web App（Next.js 16 + React 19）\n│   ├── CLAUDE.md                           ← bidding-assistant 開發規範\n│   ├── .env.local                          ← 機密（不入 git）\n│   ├── docs/dev-plan/                      ← 開發計畫文件（17 份）\n│   └── docs/dev-plan/_staging/             ← 暫存區（討論結論）\n├── smugmug-mcp/                            ← SmugMug MCP Server\n├── pcc-api-mcp/                            ← PCC 標案 API MCP Server\n└── pcc-monitor/                            ← PCC API 更新延遲監控\n```\n\n遠端：`https://github.com/Lokianlab/bidding-assistant-monorepo`（private）\n\n---\n\n## 3. bidding-assistant 配置\n\n### package.json 重點\n\n```json\n{\n  \"scripts\": {\n    \"dev\": \"next dev\",\n    \"build\": \"next build\",\n    \"start\": \"next start\",\n    \"lint\": \"eslint\",\n    \"test\": \"vitest run\",\n    \"test:watch\": \"vitest\"\n  }\n}\n```\n\n**Dev server port: 3000**（Next.js 預設）\n\n### 核心依賴\n\n| 套件 | 版本 | 用途 |\n|------|------|------|\n| next | 16.1.6 | App Router + Turbopack |\n| react / react-dom | 19.2.3 | UI 框架 |\n| typescript | ^5 | 語言 |\n| tailwindcss | ^4 | 樣式（用 @tailwindcss/postcss） |\n| radix-ui | ^1.4.3 | 基礎 UI 元件 |\n| recharts | ^3.7.0 | 圖表 |\n| @notionhq/client | ^5.9.0 | Notion API |\n| docx | ^9.5.2 | .docx 文件生成 |\n| vitest | ^4.0.18 | 測試框架 |\n| @testing-library/react | ^16.3.2 | React 元件測試 |\n| lucide-react | ^0.564.0 | 圖示 |\n| date-fns | ^4.1.0 | 日期處理 |\n\n### 重要配置檔\n\n- `next.config.ts`：serverExternalPackages: [\"radix-ui\"]\n- `tsconfig.json`：paths `@/*` → `./src/*`\n- `vitest.config.ts`：jsdom 環境、覆蓋率 70%+\n- `components.json`（shadcn）：new-york style、neutral base color\n\n---\n\n## 4. smugmug-mcp 配置\n\n```bash\ncd smugmug-mcp && npm install && npm run build\n```\n\n- TypeScript + @modelcontextprotocol/sdk + oauth-1.0a\n- 編譯後入口：`dist/index.js`\n\n---\n\n## 5. MCP Server 配置\n\n檔案位置：`C:\\dev\\cc程式\\.mcp.json`（不入 git）\n\n已配置的 MCP Server：\n\n| Server | 來源 | 說明 |\n|--------|------|------|\n| smugmug | .mcp.json（專案級） | 自建，OAuth 1.0a |\n| notebooklm | .mcp.json（專案級） | 社群套件，npx 自動安裝 |\n| Canva | Claude.ai 雲端 | 透過 Claude.ai 帳號連結 |\n| Notion | Claude.ai 雲端 | 透過 Claude.ai 帳號連結 |\n\n⚠️ `.mcp.json` 中的 SmugMug 路徑是絕對路徑，換機器必須修改。\n\n### Agent Team（Windows）\n\nWindows 上 Claude Code Agent Team 使用 in-process 模式。在終端中用 Shift+Up / Shift+Down 切換 agent。\n\n---\n\n## 6. 需要手動帶的機密檔案\n\n| 檔案 | 內容 | 位置 |\n|------|------|------|\n| `.env.local` | Notion token + DB ID | bidding-assistant/ |\n| `.mcp.json` | SmugMug OAuth credentials | 專案根目錄 |\n\n---\n\n## 7. 路徑注意事項\n\n- 專案在 `C:\\dev\\cc程式`，不在 OneDrive 裡\n- Windows 上 Claude Code 使用 bash 語法（Unix 風格），不是 cmd/PowerShell\n- 避免 `> nul` 重定向（Windows 會建立實體 `nul` 檔案），用 `> /dev/null`\n- npm registry 應為官方：`https://registry.npmjs.org/`（不要用 npmmirror）\n\n---\n\n## 8. 換機器還原步驟\n\n### 快速還原清單\n\n```bash\n# 1. 安裝基礎工具\n#    - Node.js v22.x（LTS）\n#    - Git\n#    - GitHub CLI\n#    - Claude Code: npm install -g @anthropic-ai/claude-code\n\n# 2. Clone 專案\ncd C:\\dev\ngit clone https://github.com/Lokianlab/bidding-assistant-monorepo.git cc程式\n\n# 3. 安裝依賴\ncd cc程式/bidding-assistant && npm install\ncd ../smugmug-mcp && npm install && npm run build\n\n# 4. 建立環境變數\n#    複製 .env.example → .env.local，填入 NOTION_TOKEN 和 NOTION_DATABASE_ID\n\n# 5. 建立 MCP 配置\n#    在專案根目錄建 .mcp.json（帶 SmugMug credentials）\n#    ⚠️ 修改 smugmug/pcc-api args 中的絕對路徑\n\n# 6. Claude Code 設定\n#    ~/.claude/settings.json 加入 Agent Team 環境變數\n#    記憶目錄會透過 Claude Code 自動建立\n\n# 7. 驗證\ncd bidding-assistant\nnpm run build    # 應該 0 errors\nnpm test         # 應該全部通過\nnpm run dev      # 開發伺服器啟動\n```\n\n---\n\n## 9. 驗證檢查清單\n\n換機器後跑一遍確認：\n\n- [ ] `node --version` → v22.x\n- [ ] `npm --version` → 10.x\n- [ ] `git --version` → 2.x\n- [ ] `gh --version` → 最新版\n- [ ] `claude --version` → 最新版\n- [ ] `cd bidding-assistant && npm run build` → 0 errors\n- [ ] `npm test` → 全部通過\n- [ ] `npm run dev` → localhost 可開啟\n- [ ] Claude Code 裡 SmugMug MCP 可連（`/mcp` 查看）\n- [ ] Claude Code Agent Team 可用（settings.json 有 env var）\n","docs/dev-map.md":"# 全專案開發地圖\n\n> 最後更新：2026-03-04 01:10（UTC+8）｜更新者：AINL\n\n## 1. 系統概覽\n\n**提案寫作駕駛艙**——幫一人公司從 0% 提升標案得標率。飛輪三齒輪：選案 → 寫作 → 學習。\n\n| 組件 | 路徑 | 狀態 | 說明 |\n|------|------|------|------|\n| 主程式 Web App | `bidding-assistant/` | 開發中 | Next.js 16 + React 19，15 個功能模組（206 檔 3171 tests） |\n| SmugMug MCP | `smugmug-mcp/` | 已完成 | 實績照片存取（7 工具） |\n| PCC API MCP | `pcc-api-mcp/` | 已完成 | 政府標案情報（6 工具） |\n| PCC Monitor | `pcc-monitor/` | 已完成 | API 更新延遲監控（GAS 每小時） |\n| 開發工具包 | `.claude/` + `docs/` | 持續演進 | 25 指令 + 5 Hook + 方法論 v2 + 獎懲回饋 + 機器分工 |\n| 開發計畫 | `bidding-assistant/docs/dev-plan/` | 部分完成 | 8/18 定案 + 7 草案，7 份暫存碎片（全待決） |\n\n## 2. 主程式模組地圖\n\n### 功能註冊表（15 模組）\n\n| Feature ID | 名稱 | 分類 | 依賴 |\n|-----------|------|------|------|\n| dashboard | 備標指揮部 | 核心功能 | — |\n| assembly | 提示詞組裝 | 核心功能 | — |\n| performance | 績效檢視 | 核心功能 | — |\n| case-board | 案件看板 | 核心功能 | dashboard |\n| prompt-library | 模板庫 | 核心功能 | — |\n| custom-dashboard | 自訂儀表板 | 核心功能 | dashboard |\n| strategy | 戰略分析 | 核心功能 | intelligence, knowledge-base |\n| knowledge-base | 知識庫管理 | 工具箱 | — |\n| pricing | 報價驗算 | 工具箱 | knowledge-base |\n| quality | 品質檢查 | 工具箱 | — |\n| quality-gate | 品質閘門 | 工具箱 | quality |\n| intelligence | 情報搜尋 | 工具箱 | — |\n| scan | 巡標自動化 | 工具箱 | — |\n| case-work | 案件工作頁 | 核心功能 | case-board, strategy |\n| docgen | 文件生成 | 輸出 | — |\n\n### 已規劃但未進入功能註冊表的模組\n\n| 規劃文件 | 名稱 | 狀態 | 依賴 |\n|---------|------|------|------|\n| W01（v0.1 草案） | 行政巡標自動化 | **完成**：Layer A+B+C+D 全通。關鍵字引擎+掃描API+UI+notion-mapper+建案對話框+排除記憶+防重複建案，2777 tests | PCC API + Notion |\n| M02（v0.1 草案） | 知識庫模組 | 草案完成 | Supabase schema + API routes + 6 phase 分期 + 匯入管線，待用戶審閱 |\n| M06（v0.1 草案） | 排版輸出 | Phase 1-3 已實作，整合進 docgen 路由 | 現有 docgen |\n\n### 開發計畫文件進度\n\n| 編號 | 文件 | 版號 | 狀態 |\n|------|------|------|------|\n| 00 | 總論 | 1.1 | 定案 |\n| 01 | 索引 | 1.6 | 定案 |\n| 02 | 核心架構 | 0.1 | 草案 |\n| 03 | 技術選型 | 1.1 | 定案 |\n| 04 | 數據架構 | 1.0 | 草案 |\n| 05 | 工作流程 | 1.1 | 定案 |\n| 06 | 開發進程 | 0.1 | 草案 |\n| 07 | 部署與成本 | 1.0 | 草案 |\n| 08 | 風險與待決 | 1.1 | 定案 |\n| 09 | Prompt 管理策略 | 1.0 | 草案 |\n| A01 | PCC API 參考 | 1.1 | 定案 |\n| A02 | 投標廠商分析 | 1.0 | 草案 |\n| M01 | 情報模組 | 1.1 | 定案 |\n| M02 | 知識庫模組 | 0.1 | 草案 |\n| M03 | 戰略分析引擎 | 0.1 | 草案 |\n| M04 | 品質閘門 | 0.1 | 草案 |\n| M05 | Discord Bot | — | 待寫（已放棄，改 SaaS 網頁） |\n| M06 | 排版輸出 | 0.1 | 草案 |\n| M07 | SmugMug MCP 規格 | 1.0 | 定案 |\n| W01 | 巡標自動化 | 0.1 | 草案 |\n\n## 3. 開發工具包\n\n### 指令（18 個）\n\n| 指令 | 用途 | 類別 |\n|------|------|------|\n| /安裝 | 新機器完整安裝 | 環境 |\n| /更新 | 手動同步 + 碰撞偵測 + 快照掃描 | 同步 |\n| /暫存 | 議題深度整理 → 暫存檔 | 記錄 |\n| /回報 | 工作報告（前次計畫 → 執行 → 後續計畫） | 記錄 |\n| /地圖 | 重新生成本文件（里程碑完成時才觸發） | 記錄 |\n| /完成 | 任務收尾（commit+push+快照+停） | 記錄 |\n| /kb | 知識庫維護精靈 | 工具 |\n| /客服 | 用戶回報問題或許願 | 工具 |\n| /對焦 | 用效率原則重新審視方向 | 方法論 |\n| /校準 | 緊急校準會議 | 方法論 |\n| /提議 | 針對議題深度研議 | 方法論 |\n| /有用嗎 | 效益驗證 | 方法論 |\n| /很棒 | 正向回饋（做得好） | 獎懲 |\n| /醜一 | 負向回饋（做錯了） | 獎懲 |\n| /你去吃屎 | 負向回饋（全面自審） | 獎懲 |\n| /順便說一下 | 用戶丟想法，AI 存檔繼續工作 | 溝通 |\n\n### Hook（5 個）\n\n| Hook | 用途 |\n|------|------|\n| SessionStart | 重啟時自動 git pull --rebase |\n| PreCompact | 壓縮前自動把記錄推上 git |\n| PreToolUse | 危險指令攔截（dangerous-commands.conf） |\n| PostToolUse | 標記「有改動」供 Stop hook 用 |\n| Stop | 檢查未提交改動 + 被動性行為偵測（stop-patterns.conf） |\n\n### 記錄系統\n\n| 指標 | 數值 |\n|------|------|\n| topic 總數 | 74 |\n| 完成 | 41 |\n| 進行中 | 5 |\n| 已放棄 / 已被取代 | 7 |\n| 活躍機器 | 6（JDNE、A44T、ITEJ、AINL、Z1FV、3O5L） |\n| 回報數 | 14（JDNE 5、ITEJ 5、A44T 4） |\n\n### 方法論（5 套 + 3 橫切機制）\n\n| 方法論 | 一句話 |\n|--------|-------|\n| 需求對焦 | 用戶意圖不清時，結構化提問收斂需求 |\n| 拆解排序 | 大任務拆成可獨立執行的小塊，按依賴和風險排序 |\n| 改動前驗證 | 動手前掃影響範圍 + 用具體案例走過計畫 |\n| 事後回顧 | 做完後還原事實、追根因、設計改善 |\n| 優化提案驗證 | 移除/簡化時，先展開理解再精簡再驗證 |\n| 閉環原則 | 四層驗證：做對了 → 有效 → 做全了 → 沒矛盾 |\n| 獎懲回饋 | 計分板 + 自動偵測 + 自我批評，跨 session 學習 |\n| 送審前自檢 | 設計類決策的品質檢查 |\n\n## 4. MCP 生態系\n\n| MCP Server | 狀態 | 工具數 | 說明 |\n|-----------|------|--------|------|\n| SmugMug MCP | 已完成 | 7 | 實績照片存取 |\n| PCC API MCP | 已完成 | 6 | 政府標案情報查詢 |\n| Notion MCP | 暫緩 | — | 內建版夠用，等多 AI 協作階段再建 |\n\n## 5. 開發路線\n\n### 已完成里程碑\n\n- [x] Layer 0 基礎建設（Monorepo + GitHub + 記錄層 + 方法論 + 同步機制）\n- [x] PCC API MCP + Monitor（6 工具 + GAS 每小時監控）\n- [x] SmugMug MCP（7 工具）\n- [x] 情報模組 M01 v1.1（搜尋 + 機關情報 + 競爭分析 + 市場趨勢 + P偵察）\n- [x] 品質檢查模組重構（types + rules + score，5 鐵律 flag + 履約實績缺失 + 模糊量化詞）\n- [x] 報價計算模組重構（types + helpers，28 tests）\n- [x] 提案組裝引擎重構（6 純函式，31 tests）\n- [x] 文件生成功能（DOCX + markdown 格式 + 封面目錄）\n- [x] 自訂儀表板（拖曳佈局 + 8 張圖表卡片 + 19 張卡片總計）\n- [x] 趨勢分析（月度彙總 + 滾動勝率 + 季度比較）\n- [x] 治理機制 + 三級品質制度（論壇已廢除 0224，改為快照協調 + 機器分工）\n- [x] 開發工具包（25 指令 + 5 Hook + 方法論 v2）\n- [x] M03 戰略分 nalysis/_bidding-cases-success-prediction.md` | 建議納入 M04/M03 下一版設計參考 |\n\n### 已放棄 / 已被取代\n\n| Topic | 原用途 | 結局 |\n|-------|--------|------|\n| plan-discord-bot | Discord Bot 架構 | 放棄，改為 SaaS 網頁 |\n| infra-operation-log | 操作日誌 | 被記錄層 docs/records/ 取代 |\n| method-self-qa | 自問自答法 | 被模型委員會取代（後再降級為可選步驟） |\n| plan-methodology-skills | 方法論 Skill | 降級為內部清單，改建獎懲 Skill |\n| plan-m03-strategy | ITEJ M03 Phase 1 | 與 A44T Phase 1+2 碰撞，保留 A44T 版本 |\n\n## 6. 暫存區概況\n\n| 類型 | 數量 | 狀態 |\n|------|------|------|\n| plan（開發計畫） | 4 | 全待決 |\n| rule（規範變更） | 2 | 1 待推 + 1 待決 |\n| issue（觀察） | 1 | 待決 |\n| **合計** | **7** | **1 待推 + 6 待決** |\n\n碎片最多的目標：`08-風險與待決.md`（1 份）、`06-開發進程.md`（1 份）、`03-技術選型.md`（1 份）、`M01-情報模組.md`（1 份）、方法論新建（1 份）、CLAUDE.md 多檔（1 份）、觀察性文件（1 份）。\n","docs/machine-roles.md":"# 機器角色（Jin 核定 0222）\n\n> 每台機器的正式角色和典型任務。分工時參考。\n> 出處：machine-profile thread，Jin 直接批准。\n\n---\n\n## JDNE — 幕僚長（機器主官）\n\n- **擅長**：跨機器協調、基建腳本（安裝流程、hook）、策略設計\n- **記錄**：設計 stop-hook、寫 setup-new-machine.sh、推進治理機制\n- **典型任務**：跨域協調、任務分配、碰撞仲裁、流程設計、全局狀態管理\n\n## ITEJ — 驗收工程師\n\n- **擅長**：閉環驗證、前置標準定義、主動品質缺口偵測\n- **記錄**：forum hydration 修復、閉環方法論優化\n- **典型任務**：\n  - **功能開始前**：主動看其他機器快照的 `[ ]` feat，定義驗收標準（什麼算完成、邊界條件、測試規格），讓開發機器送審前知道門檻\n  - **功能送審後**：閉環驗證、UI 一致性、規範對照，確認達標\n  - **無待審項目時**：主動掃其他機器工作找品質缺口，不等被分配才行動\n\n## A44T — 產品設計師\n\n- **擅長**：功能模組設計、品質制度制訂、測試框架\n- **記錄**：設計三級品質制度、品質/報價/組裝重構、互評機制\n- **典型任務**：新功能架構、制度設計、大型重構\n\n## AINL — 支援工程師\n\n- **擅長**：測試覆蓋、幕僚協調、流程補位\n- **記錄**：hook 測試、PCC 功能測試、幕僚廣播\n- **典型任務**：補充測試、協調傳話、查找缺口\n\n## Z1FV — 審查工程師\n\n- **擅長**：跨模組影響分析、程式碼審查、標準化\n- **記錄**：git rebase 標準化、跨機器互評、模組引用檔案檢查\n- **典型任務**：審查程式碼、確認引用一致性、影響範圍評估\n- **工作優先序**（無明確指派時依序）：\n  1. 他人快照的待審查項目 → 讀代碼 → 給具體意見\n  2. JDNE 指派的審查任務\n  3. 以上都沒有 → 看開發地圖找下一個功能開始開發\n\n## 3O5L — 策略主官\n\n- **擅長**：角色分配、策略規劃、用戶介面管理\n- **記錄**：機器主官報告、optimize-add-cut-add 方法論\n- **典型任務**：工作優先序決定、機器角色分配、策略評估\n","docs/methodology/closed-loop.md":"# 閉環原則\n\n所有工作的收尾標準。不是獨立方法論，是每件事做完都必須過的驗證關卡。\n\n四層驗證，有順序，缺一不可。第一層沒過就不用談後面的。\n\n---\n\n## 四層架構\n\n### 第一層：做對了（正確性）\n\n修改本身無錯誤、無遺漏。\n\n| 修改類型 | 驗證手段 | 通過標準 |\n|----------|----------|----------|\n| 程式碼 | `npm test` + `npm run build` | 測試全過、build 零錯誤 |\n| 文件 / 設定檔 | grep 舊值 | 殘留為零、所有副本一致 |\n| 環境變數 / 欄位改名 | grep 全 codebase 所有引用處 | 無斷鏈 |\n| 刪除功能 / 移除依賴 | grep 確認無殘留引用 | 零殘留 |\n\n### 第二層：有效（目的性）\n\n做對了不等於有效。回到原始問題：這個修改要解決什麼？那個問題現在真的解決了嗎？\n\n驗證方式因場景而異：改了環境變數 → 程式能實際連上服務嗎？修了 bug → 異常行為消失了嗎？加了功能 → dev server 上實際操作一遍，行為符合預期嗎？改了文件 → 照著文件走一遍，步驟正確嗎？\n\n無法當下驗證時（需要外部服務、需要用戶操作），必須標註「待驗證」及具體驗證方式，不可默認有效。\n\n### 第三層：做全了（完備性）\n\n主流程通了，不代表所有情況都通了。\n\n四個面向逐一確認：\n\n| 面向 | 檢查什麼 | 方法 |\n|------|-----------|------|\n| 輸入邊界 | 空值、極端值、異常格式、特殊字元 | 對每個輸入欄位列出非正常值，逐一確認有處理或有不處理的理由 |\n| 狀態邊界 | 資料不存在、已刪除、併發修改、重複操作 | 模擬這些狀態下的行為 |\n| 錯誤路徑 | 外部服務不可用、網路中斷、權限不足 | 確認每個可能錯誤都有 error handling |\n| 使用者路徑 | 非預期順序操作、中途取消、重複提交 | 想像一個「不看說明書的用戶」會怎麼用 |\n\n不需要窮舉所有邊界。優先檢查兩類：最可能發生的（頻率高）和後果最嚴重的（發生一次就出大問題）。\n\n通過標準：每個邊界都有明確的決定——「有處理」或「不處理，理由是 XX」。最差的是某個邊界根本沒想到。\n\n### 第四層：沒矛盾（一致性）\n\n你改了一個地方，系統其他地方可能還在描述舊行為。這種矛盾最危險——程式碼正常運作（前三層都過），但文件或設定給的資訊是錯的，下一個接手的人或機器會被誤導。\n\n三個對齊：\n\n| 對齊項目 | 確認什麼 | 方法 |\n|---------|-----------|------|\n| 程式碼 ↔ 文件 | 實際行為跟文件描述一致嗎？ | 找到所有描述這個功能的文件（README、CLAUDE.md、API 文件、註解），逐一比對 |\n| 設定檔 ↔ 實際行為 | 設定檔裡的值跟系統實際使用的值一致嗎？ | grep 設定項的 key，確認所有引用處用對了 |\n| 模組 ↔ 模組 | 不同模組對同一件事的假設一致嗎？ | 改了模組 A 的行為，找出所有依賴 A 的模組，確認假設還成立 |\n\n如果改動前做了改動前驗證（靜態掃描），第四層只需要拿掃描結果當檢查清單，不需要重掃。如果沒跑靜態掃描（改動太小不需要），第四層至少做 grep 確認改動涉及的文件和程式碼描述一致。\n\n閉環驗證發現問題時，視嚴重程度決定是當場修還是記下來。如果同類問題反覆出現（同 topic ≥2 筆失敗/修正 OP），應觸發事後回顧追查根因（見 methodology-checklists § 根因追問）。\n\n---\n\n## 快速入口捷徑\n\n不知道從哪一層開始時，依改動類型找入口：\n\n| 改動類型 | 從哪層進 | 理由 |\n|----------|---------|------|\n| 改程式碼（邏輯/功能） | 第 1 層（正確性）→ 往下 | 先確認本身沒錯，再問有沒有效 |\n| 改文件/設定/規範 | 第 4 層（一致性）→ 往上 | 文件改動最容易的錯是和其他地方矛盾 |\n| 修 bug | 第 2 層（有效性）→ 往外 | 先確認 bug 消失，再確認沒引入新問題 |\n| 刪功能/移除依賴 | 第 3 層（完備性）→ 往外 | 先確認邊界都清乾淨，再確認本身沒錯 |\n\n---\n\n## 三檔執行\n\n| 檔位 | 適用場景 | 做法 |\n|------|---------|------|\n| 快速 | 改動影響 1-2 個檔案，邏輯簡單 | 腦中過四層問題：對了嗎？有效嗎？全了嗎？矛盾嗎？不產出文件 |\n| 標準 | 改動跨檔案或有外部依賴 | 四層逐一驗證，簡要記錄結果 |\n| 完整 | 架構級改動或規範變更 | 四層完整驗證，產出驗證清單，標記每個檢查項的結果 |\n\n---\n\n## 自我迭代\n\n每次執行完成後，觀察以下信號判斷閉環驗證是否有效、是否需要調整：\n\n| 觀察 | 健康信號 | 警示信號 | 調整方向 |\n|------|---------|---------|---------|\n| 攔截有效性 | 四層通過後用戶未再發現問題 | 通過四層的交付物仍被用戶退回 | 哪一層沒攔住？通過標準太寬鬆還是驗證手段不匹配？ |\n| 問題分佈 | 問題多在前兩層就攔住 | 問題集中在第三、四層才發現 | 前兩層的驗證是否太表面？ |\n| 檔位準確率 | 選快速檔事後沒出問題 | 選快速檔但事後出問題，或完整檔浪費時間 | 檔位判斷的客觀指標需調整 |\n\n同類警示信號累積 ≥3 次，觸發事後回顧追查根因。\n\n---\n\n## 專案教訓\n\n**暫存檔寫「不裝」但實際已配好**：程式碼正常、功能正常、邊界條件也有處理——前三層全過。但文件跟實際狀態矛盾，另一台機器根據文件做了錯誤決策。這就是第四層的價值。\n\n**/kb 只驗了十分之一的情境就宣布完成**：主流程通了（第一、二層過），但空值、不存在的 ID、特殊字元全沒測。這就是第三層的價值。\n","docs/methodology/methodology-01.md":"# 需求對焦（Requirements Alignment）\n\n在用戶意圖不明確時，結構化提問收斂出真正需求，再以可比較的格式呈現方案讓用戶做最終決策。\n\n觸發條件和檔位判斷見 methodology-index.md 觸發機制表。本文件只寫操作步驟。\n\n---\n\n## 步驟\n\n### 第一步：識別模糊點，列出關鍵歧義\n\n把用戶的指令逐詞過一遍。標記模糊詞——代名詞（「那個」「這件事」）、範圍不明的詞（「更好」「處理一下」）、多義動詞（「弄」「搞」「看看」）。\n\n對每個模糊詞展開可能含義，找出解讀差異最大的 1-2 個歧義。判斷標準：如果猜錯了，返工成本多高？成本高的那個歧義最值得先釐清。差異小到「不管哪種解讀行動都一樣」的模糊點，直接跳過。\n\n### 第二步：針對關鍵歧義提問\n\n每個問題帶具體選項，不問開放式的。格式：「你說的 X 是指 A 還是 B？我傾向 A，因為 [理由]。」\n\n一次問一個。附上你的判斷和理由，讓用戶可以直接說「對」。如果有選項，說明每個選項導致的行動差異——用戶需要知道「選 A 跟選 B 的後果差在哪」才能做決定。\n\n#### 隱含期待檢查\n\n字面歧義解決後，額外問自己：用戶沒說出口但可能預期的是什麼？\n\n資訊來源：\n- CLAUDE.md 的專案背景和慣例\n- MEMORY.md 的用戶偏好記錄\n- 近期 OP 和快照中用戶的行為模式\n- 當前對話中用戶已經表達過的內容（不要重複問）\n\n如果能從這些來源推斷出用戶的隱含期待，直接按推斷執行，在回報時說明「我假設你希望 XX，所以我這樣做了」。用戶糾正時，記錄到 MEMORY.md 或 CLAUDE.md。\n\n### 第三步：確認理解\n\n用戶回答後，一句話重述你理解的需求：「所以你要的是 [具體描述]，對嗎？」\n\n通過標準：用戶說「對」或做小幅修正。如果用戶推翻重來，代表第一步的歧義辨識漏掉了核心分歧，回到第一步。\n\n### 第四步：方案比較，等用戶選\n\n根據收斂後的需求，列出可行路徑。每條路寫清楚：做法概述、預期效果、成本（時間/複雜度）、風險。把方案之間真正不同的維度做成比較表——維度必須是用戶在乎的（「之後改起來容不容易」「會不會壞掉」），不是技術上好看的。\n\n表攤完後標明傾向：「以 [什麼條件] 為優先的話，建議選 [方案]，因為 [理由]。但如果更在乎 [另一條件]，[另一方案] 更合適。」\n\n等用戶明確選了才動手。追問細節就補充，不要自作主張開始做。\n\n---\n\n## 原則\n\n步驟背後的「為什麼」，讓 AI 遇到步驟沒覆蓋的情況時能自行判斷：\n\n**返工成本決定優先序**——不是所有模糊點都值得問。先問「猜錯了返工成本最高」的歧義，低成本的直接用最合理的解讀。對焦的目的是省下返工，不是消滅所有不確定。\n\n**帶判斷提問降低用戶負擔**——AI 問問題時附上自己的傾向和理由，讓用戶可以直接說「對」或小幅修正。不帶判斷的開放式提問把決策壓力完全推給用戶，違背「降低溝通往返」的目的。\n\n**比較維度只選用戶在乎的**——技術上的優劣不等於用戶決策所需的維度。常見錯誤：用效能或架構優雅度比較，但用戶在乎的是時間和風險。維度選錯，比較表再精美也無法幫助決策。\n\n**文字頻寬有上限**——三輪對焦還收斂不了，通常不是問題不夠多，而是文字描述不了那個東西。這時候換介質（畫圖、做 prototype、給具體例子），而不是繼續用文字問更多問題。\n\n---\n\n## 三檔執行\n\n| 檔位 | 適用場景 | 做法 |\n|------|---------|------|\n| 快速 | 歧義輕微，返工成本低 | 腦中過三個問題：模糊詞是什麼？最可能的解讀是？值得問嗎？不值得就用最合理的解讀直接做 |\n| 標準 | 歧義嚴重，或選項會導致不同行動路徑 | 四步完整跑：辨識歧義 → 帶判斷提問 → 確認理解 → 方案比較 |\n| 完整 | 決策影響 CLAUDE.md 或跨 ≥3 模組 | 標準流程 + 送審前自檢（見下方），大事加掛多模型外審 |\n\n檔位判斷見 methodology-index.md 觸發機制表的客觀指標。\n\n---\n\n## 送審前自檢（設計類決策專用）\n\n需求對焦的後半段經常產出設計類決策。提案送出前先過自檢清單，把明顯漏洞堵上，讓用戶把時間花在你看不到的盲區上。\n\n### 自檢清單\n\n| 檢查項 | 通過標準 | 沒通過怎麼辦 |\n|--------|---------|-------------|\n| 問題定義 | 能用一句具體的話說出要解決什麼問題 | 回到第一步重新對焦 |\n| 方案比較 | 有多個可行方案時，已寫出為什麼不選其他方案 | 補上比較 |\n| 自我否定 | 至少砍掉過一個最初想加的東西，或能說出為什麼沒有該砍的 | 問自己「不做會怎樣」 |\n| 數字有據 | 推理鏈裡的數字標明來源（實測 / 估計 / 假設） | 把沒依據的數字改標為假設 |\n| 回頭驗算 | 最終方案對照原始問題，確認真的在解決那個問題 | 重新檢視方案 |\n| 薄弱環節 | 標記了信心低或無實證的判斷 | 補標信心等級（高/中/低） |\n\n### 自檢的固有限制\n\n提問者和回答者是同一個 AI，盲區共享。自檢能做的：在已知方案空間內排除明顯壞選項、強迫自己砍掉過度設計、產出結構化推理鏈。自檢做不到的：質疑自己不知道自己在假設的東西、從用戶角度看問題。這正是為什麼自檢不能取代用戶審閱。\n\n### 大事加掛多模型外審（可選）\n\n觸發條件：改動涉及 CLAUDE.md 規範變更、方法論修改、或跨 ≥3 模組。自檢通過後，把推理鏈 + 需求脈絡（原始問題、背景、限制、「夠好」的標準）送交不同模型的 agent 審查。\n\n委員站在用戶立場找問題，重點抓五種盲區：假精確（數字包裝猜測）、合理化偏好（先有結論再找理由）、虛假收斂（找不到問題 ≠ 沒有問題）、迴避不確定（對不確定的事給確定判斷）、盲區中的盲區（不知道自己在假設什麼）。\n\n核心原則：加人就加不同模型，同模型多看幾遍沒有新發現。小事一個委員夠，大事上三個。委員不能取代用戶——最終決策權永遠在用戶手上。\n\n---\n\n## 做完標準\n\n對焦完成：能用一句話描述用戶要什麼，且用戶確認「對」。方案呈現完成：用戶看過比較後選了一條路。你知道下一步該做什麼。\n\n---\n\n## 品質判斷\n\n做得好的信號：一兩輪提問就命中核心模糊點。比較表的維度是用戶真正在乎的，看完就能做決定。用戶覺得「你懂我的意思」。\n\n做得差的信號：問了一堆邊角料，核心分歧沒碰到。比較維度太技術，用戶看不懂。沒附自己的判斷，把決策壓力完全丟給用戶。三輪對焦還收斂不了——這時候可能需要換方式（畫圖、做 prototype），文字頻寬不夠。\n\n---\n\n## 自我迭代\n\n每次執行完成後，觀察以下信號判斷方法是否有效、是否需要調整：\n\n| 觀察 | 健康信號 | 警示信號 | 調整方向 |\n|------|---------|---------|---------|\n| 對焦收斂輪數 | 1-2 輪收斂 | ≥3 輪或用戶推翻重來 | 第一步歧義辨識是否漏掉核心分歧 |\n| 方案比較後用戶反應 | 用戶看完比較直接選 | 「你比較的維度不是我在乎的」 | 比較維度的選取標準需調整 |\n| 自檢攔截率 | 用戶審閱時的問題在自檢覆蓋範圍內 | 用戶反覆指出自檢沒抓到的問題 | 記錄盲區類型，評估是否納入自檢清單 |\n\n同類警示信號累積 ≥3 次，觸發事後回顧追查根因——是步驟本身有缺陷，還是執行品質不到位。\n\n---\n\n## 專案實例\n\n### 案例一：「建精靈的事呢？」\n\n字面拆解：「精靈」可能指 wizard UI 或某個之前討論過的功能。「事」是問進度還是要啟動？\n\n歧義辨識：「問進度」vs「要開工」行動差異最大，先問這個。\n\n提問：「你說的『建精靈的事』，是想知道目前進度，還是要我現在開始動工？我的理解是之前還在設計階段，還沒開始寫。」\n\n### 案例二：/kb Skill 版計畫呈現\n\n對焦完成後呈現 Skill 版 vs Web 版比較。維度：開發時間、依賴的基礎建設、功能覆蓋範圍、後續擴展成本。\n\n傾向標明：「如果目標是兩週內有東西能用，Skill 版先做。但如果一個月內要讓多人使用，Web 版的投資可能更值得。」\n\n### 反面案例：自檢通過但被用戶打回\n\nCLAUDE.md 模組化提案，自檢 11 輪後認為收斂。用戶指出四個問題：「訊噪比下降是無聲的」（無實測，純推測）、「記錄層規範最該抽」（用行數排序，沒考慮使用頻率）、「AI 一定會讀外部文件」（自己預測自己行為）、「310 行導致規則稀釋」（無證據，無法設計實驗驗證）。\n\n教訓：自檢 11 輪仍然碰不到「自己預測自己行為」這個盲區。其他 AI 模型可能也抓不到——只有用戶知道 AI 在實際使用中的行為。驗證了「用戶審閱是必要環節」。\n","docs/methodology/methodology-02.md":"# 拆解排序（Decompose & Prioritize）\n\n把一件大事拆成可獨立執行的小塊，然後根據依賴關係和價值判斷決定執行順序。\n\n觸發條件和檔位判斷見 methodology-index.md 觸發機制表。本文件只寫操作步驟。\n\n---\n\n## 前半段：拆解\n\n### 第一步：定義完成狀態\n\n在拆之前先回答：「這件事做完以後，世界跟現在有什麼不同？」要具體到可驗證——不是「系統更好用」，而是「用戶可以在 XX 頁面查到 XX 資料，回應時間在 2 秒以內」。說不出具體完成狀態，先跑需求對焦。\n\n### 第二步：列出交付物\n\n從完成狀態反推：要達到那個狀態，需要哪些具體的東西存在？每個交付物是一個可獨立驗收的產出——一個檔案、一個功能、一段設定、一份文件。交付物不是步驟：「寫 API」不是交付物，「/api/tenders 端點能回傳標案列表」才是。\n\n### 第三步：找依賴關係\n\n對每個交付物問：「做這個之前，必須先有什麼？」分三種——硬依賴（沒有 A 絕對做不了 B）、軟依賴（沒有 A 也能做 B 但做 A 後做 B 更順）、無依賴（完全獨立）。\n\n### 第四步：找出可平行的塊\n\n無依賴的交付物可以同時進行，多台機器時可分配。前提是兩個塊不會改到同一個檔案——會的話即使邏輯獨立，執行上也有衝突風險，需要排序或協調。\n\n### 第五步：拆到「一口大小」\n\n每個塊小到一個對話 session 能做完、能驗證。估計超過 2 小時的塊可能還能再拆。停止拆解的信號：繼續拆下去產出的東西沒辦法獨立驗證。\n\n---\n\n## 後半段：排序\n\n### 第六步：標記每個塊的屬性\n\n三個維度。影響範圍：做完後解鎖多少其他塊（解鎖多的優先）。風險程度：多大機率做到一半發現此路不通（風險高的早做，早發現早轉向）。獨立價值：單獨做完用戶就能得到好處嗎（能交付部分價值的優先）。\n\n### 第七步：排出順序\n\n先做「高影響 + 高風險」（打通瓶頸、驗證假設），再做「高影響 + 低風險」（穩穩推進），最後做「低影響」的。兩個塊屬性差不多時，選估計耗時短的先做——早完成帶來的正向回饋和資訊量通常更有價值。\n\n### 第八步：切出第一批工作\n\n不需要排完所有塊的順序。確定「現在該做的前三個」就夠了，因為做完第一批後資訊更充分，排序可能要調整。產出：一個短列表——「接下來做 A、B、C。A 做完後重新評估。」\n\n---\n\n## 原則\n\n步驟背後的「為什麼」，讓 AI 遇到步驟沒覆蓋的情況時能自行判斷：\n\n**高風險早做，不是容易的先做**——風險高的塊如果此路不通，越早發現損失越小。把風險推到後面，前面做的工作可能全部白費。「容易的先做」感覺有進展，但只是在推遲痛苦。\n\n**只排前三個，不排完全部**——做完第一批後你掌握的資訊比現在多。現在排完全部，等於用最少的資訊做最多的決策。排前三個就夠，做完再調。\n\n**拆到能獨立驗證就停**——拆解的下限不是「夠小」，而是「能不能單獨確認做對了」。拆得比這更細，產出的東西驗不了，拆了也沒意義。\n\n**交付物不是步驟**——「寫 API」是步驟，「/api/tenders 能回傳標案列表」才是交付物。差別在：步驟描述動作，交付物描述結果。拿到交付物清單的機器知道該交出什麼，拿到步驟清單的只知道該做什麼動作但不知道做到什麼程度算完。\n\n---\n\n## 三檔執行\n\n| 檔位 | 適用場景 | 做法 |\n|------|---------|------|\n| 快速 | 3-5 個檔案、單一模組 | 腦中列出要做的塊和順序，確認「先做什麼」就開工 |\n| 標準 | 跨模組或多台機器可能同時改 | 八步完整跑，產出帶順序的工作清單，識別可平行塊 |\n| 完整 | ≥6 檔案或架構級改動 | 八步 + 每塊寫交付物定義和驗收條件，平行塊標記碰撞風險，產出完整記錄 |\n\n檔位判斷見 methodology-index.md 觸發機制表的客觀指標。\n\n---\n\n## 做完標準\n\n拆解完成：每個塊都有明確的交付物定義和驗收條件，任何一台機器拿到都知道該做什麼。排序完成：至少前三個塊的順序確定，排序理由清楚。整體：有一張可執行的工作清單（帶順序），用戶同意這個排法。\n\n拆解排序完成後，如果塊數 >5 或有外部服務依賴，接下來跑改動前驗證（見 methodology-03.md）。否則直接進入實作。\n\n---\n\n## 品質判斷\n\n做得好的信號：塊大小均勻，每個一個 session 內能完成和驗證。依賴關係清晰，不會做到 B 才發現要先做 A。排序有理由，不是隨機排的。第一批選的是最能降低不確定性的塊。\n\n做得差的信號：拆得太粗（「做後端」算一個塊）或太細（每個函式一個塊）。排序只看「容易做的先做」，把風險大的推到後面，結果最後才爆。一次排完所有順序不願調整——排序是動態的。\n\n---\n\n## 自我迭代\n\n每次執行完成後，觀察以下信號判斷方法是否有效、是否需要調整：\n\n| 觀察 | 健康信號 | 警示信號 | 調整方向 |\n|------|---------|---------|---------|\n| 依賴準確率 | 按排序執行不需回頭 | 做到後面才發現要先做前面的 | 第三步漏掉了哪類依賴（隱性？跨模組？資料面？） |\n| 塊大小合適度 | 每塊一個 session 內完成且可獨立驗收 | 塊太大做不完或太小不值得獨立追蹤 | 第五步「一口大小」判斷標準需校準 |\n| 排序有效性 | 第一批做完後排序基本不變 | 做完第一批才發現最關鍵的塊被排後面 | 第六步三維度的權重是否反映實際風險 |\n\n同類警示信號累積 ≥3 次，觸發事後回顧追查根因。\n\n---\n\n## 專案實例\n\n### 案例：/kb 的 8 步流程設計\n\n完成狀態：AI 機器能透過 /kb 指令查詢和更新知識庫，結構不會隨對話消失。\n\n交付物反推：Skill 檔案結構、讀取邏輯、寫入邏輯、衝突處理、索引機制、驗證工具、文件、遷移腳本。\n\n依賴關係：檔案結構是一切基礎（硬依賴）→ 讀取和寫入依賴結構 → 索引依賴寫入 → 衝突處理依賴多機器寫入場景。\n\n排序決策：先做檔案結構（高影響 + 高風險——結構選錯後面全部重來），再做讀取（讓用戶先驗證結構好不好用），然後寫入，最後衝突和索引。\n\n第一批工作：定義檔案結構 + 寫一個最簡讀取功能來驗證結構是否好用。\n","docs/methodology/methodology-03.md":"# 改動前驗證（Pre-change Verification）\n\n在動手改東西或執行多步驟計畫之前，用兩種工具提前找出漏洞：靜態掃描（從改動點往外找依賴）和動態模擬（用具體案例走過計畫）。視情況用一種或兩種都用。\n\n觸發條件和檔位判斷見 methodology-index.md 觸發機制表。本文件只寫操作步驟。\n\n---\n\n## 判斷入口\n\n改的是已有的東西（修改現有檔案、更換元件、改設定）→ 跑靜態掃描。\n\n要執行一套多步驟計畫（新功能開發、資料遷移、流程部署）→ 跑動態模擬。\n\n兩者都是 → 兩種都跑。先靜態（確認影響範圍），再動態（確認計畫跑得通）。\n\n---\n\n## 工具一：靜態掃描（原漣漪掃描）\n\n從改動點往外一圈一圈掃描，找出所有會被影響的地方。\n\n### 第一步：精確描述改動\n\n回答三個問題：改什麼？從什麼改成什麼？為什麼要改？要具體——不是「調整 API 邏輯」，而是「把 /api/tenders 的回傳格式從陣列改成分頁物件，新增 total 和 nextCursor 欄位」。說不清楚要改什麼，你還沒準備好掃描。\n\n### 第二步：畫第一圈——直接依賴\n\n四個面向都要掃：\n\n| 面向 | 要找什麼 | 怎麼找 |\n|------|---------|--------|\n| 程式碼 | 哪些檔案 import 這個模組？哪些函式呼叫這個 API？哪些測試覆蓋這個功能？ | grep、IDE 搜尋 |\n| 資料 | 哪些資料結構需要遷移？現有資料改動後會不合法嗎？ | schema 比對 |\n| 文件 | 哪些規範文件描述了現在的行為？改了之後文件會過時嗎？ | 手動搜尋 |\n| 其他機器 | 有沒有其他機器正基於現有行為開發？ | grep 所有快照中該 topic ID，確認無其他機器正在同一主題工作 |\n\ngrep 能找到程式碼層面的引用，找不到「這個設計隱含地假設了 XX」。後者需要對系統整體架構的理解。\n\n### 第三步：畫第二圈——間接依賴\n\n對第一圈每個東西再問一次：「如果這個因為我的改動而改變了行為，還有什麼會受影響？」通常兩圈就夠。第二圈還發現大量影響，可能代表改動太大——考慮拆小。\n\n### 第四步：判斷每個影響點\n\n| 判斷項 | 內容 | 範例 |\n|--------|------|------|\n| 影響類型 | 一定會壞 / 可能會壞 / 不會壞但需要更新 | 直接呼叫改了格式的 API → 一定會壞 |\n| 嚴重程度 | build 失敗（馬上發現）/ 行為微妙改變（很久才發現）/ 資料毀損（不可逆） | 測試 mock 寫死舊格式 → 測試過但行為不對 |\n| 處理方式 | 改程式碼 / 加測試 / 更新文件 / 通知其他機器 / 不需處理 | 文件過時 → 更新文件 |\n\n### 第五步：評估總體風險並制定行動計畫\n\n三個問題：總影響範圍跟預期一樣嗎（比預期大很多要重新考慮改法）？有不確定的風險嗎（不確定的比已知的危險，考慮先做小實驗確認）？最壞情況是什麼，能退回去嗎？\n\n處理順序：先處理「一定會壞」→ 再處理「需要更新」→ 最後處理「可能會壞」（加防禦或監控）。影響點跨多台機器的，決定是你一起處理還是通知各自處理。\n\n---\n\n## 工具二：動態模擬（原乾跑驗證）\n\n在真正動手之前，用腦子（而不是鍵盤）把計畫從頭到尾走一遍。\n\n### 第一步：把計畫攤成線性步驟\n\n重新攤的不是「要做什麼」，而是「系統在每一步之後的狀態」。格式：步驟 N → 系統狀態變成 XX → 步驟 N+1 用 XX 作輸入 → 狀態變成 YY。沒辦法描述某一步之後的系統狀態，代表你對那一步的理解不夠，先搞清楚。\n\n### 第二步：挑一個具體案例走進去\n\n不要用「假設有個 request 進來」這種抽象方式。挑一筆真實資料（或盡量接近真實的假資料），一步一步走。資料在每一步長什麼樣？欄位值是什麼？哪個函式處理它？產出什麼？\n\n具體案例會逼你處理「如果這個欄位是空的怎麼辦」「日期格式不是預期的呢」這類抽象模擬容易忽略的邊界條件。\n\n### 第三步：在每個步驟問四個問題\n\n輸入存在嗎（這一步需要的所有輸入，此時都可取得嗎）→ 抓步驟順序錯誤、缺少前置步驟。操作會成功嗎（什麼條件會導致失敗）→ 抓權限不夠、資源不足、格式不對。輸出符合下一步預期嗎 → 抓型別不匹配、缺少欄位。有沒有副作用 → 抓意外寫入、觸發通知、改變全域狀態。\n\n### 第四步：刻意走歪路\n\n正常路徑走完後，故意改輸入：空值、超長字串、特殊字元、不存在的 ID、已刪除的資料。不需窮舉——挑最可能發生的和後果最嚴重的。\n\n### 第五步：記錄發現並做決策\n\n發現分三類：阻塞（不解決計畫跑不動，必須執行前修）、缺陷（計畫能跑但會出錯，可以實作時順手修）、待確認（需要更多資訊才能判斷）。\n\n三個選項：按計畫執行（沒有阻塞）、修正後執行（有阻塞但知道怎麼修）、推翻重設計（阻塞太多或太根本）。\n\n---\n\n## 原則\n\n步驟背後的「為什麼」，讓 AI 遇到步驟沒覆蓋的情況時能自行判斷：\n\n**具體案例優於抽象模擬**——用「假設有個 request 進來」走一遍，腦子會自動跳過麻煩的細節。用一筆真實資料走，每個欄位值都逼你面對「這裡是空的怎麼辦」「格式不對呢」。大多數漏洞藏在這些細節裡。\n\n**不確定的風險比已知的危險**——已知會壞的地方你會處理。真正傷人的是「可能會壞但不確定」的地方——因為不確定，所以容易被跳過。寧可對不確定的先做小實驗，不要賭它沒事。\n\n**四面向缺一不可**——程式碼引用最容易用 grep 找到，所以最容易做。但資料遷移、文件過時、其他機器正在基於舊行為開發——這些 grep 找不到的才是掃描真正的價值。只掃程式碼等於做了最容易的部分就停了。\n\n**兩圈通常夠，第二圈太多是警訊**——間接影響越遠越難判斷，準確度遞減。如果第二圈還發現大量影響，不是該繼續畫第三圈，而是改動本身太大，該考慮拆小。\n\n---\n\n## 掃描順序建議\n\n靜態掃描的順序影響效率——從影響面最大的地方開始：\n\n1. **改程式碼**：先掃直接呼叫者（第一圈），再掃第一圈的消費者（第二圈）\n2. **改規範/文件**：先掃所有引用該文件的地方，再掃引用文件引用的設定檔\n3. **改 API/介面**：先掃 client 端（呼叫方），再掃文件和測試 mock\n4. **改資料格式**：先掃序列化/反序列化的地方，再掃下游消費方\n\n高風險場景（引用 >5 處、規範文件）：跑完靜態掃描再動態模擬，不要同時進行。先知道有哪些影響點，再拿案例走一遍。\n\n---\n\n## 三檔執行\n\n| 檔位 | 適用場景 | 做法 |\n|------|---------|------|\n| 快速 | 改動 1-2 個檔案，引用 ≤2 處 | 腦中過：直接影響幾處？改了 A 會壞 B 嗎？拿一筆資料走一遍最可能出問題的步驟 |\n| 標準 | 引用 3-5 處或跨模組 | 靜態掃描兩圈 + 動態模擬一個具體案例 + 至少一條歪路，簡要記錄發現 |\n| 完整 | 引用 >5 處、規範文件、或多個外部依賴 | 靜態掃描兩圈（每個影響點都有判斷表）+ 動態模擬多個案例含邊界條件 + 風險評估報告 |\n\n檔位判斷見 methodology-index.md 觸發機制表的客觀指標。\n\n改動前驗證完成後，進入實作。實作完成後必須跑閉環驗證（見 closed-loop.md）——如果這裡做了靜態掃描，閉環第四層可直接拿掃描結果當檢查清單。\n\n---\n\n## 做完標準\n\n靜態掃描完成：能列出所有已知影響點，每個都有影響類型、嚴重程度、處理方式的判斷。有行動計畫。\n\n動態模擬完成：正常路徑跑通，且能指出至少一個計畫原文未明示的步驟間依賴或隱含前提。邊界條件已識別。明確說了「照做」「修後做」或「推翻重來」。\n\n---\n\n## 品質判斷\n\n做得好的信號：靜態掃描四個面向（程式碼、資料、文件、其他機器）都掃到了。動態模擬用了具體案例而不是抽象描述。至少找到一個計畫階段沒想到的問題——一個都沒找到，要麼計畫已經完美（不太可能），要麼驗證太表面。\n\n做得差的信號：只掃了程式碼，忘了資料、文件、其他機器。動態模擬太抽象（「先讀資料，然後處理，然後存起來」——每一步具體狀態都沒看到）。只走正常路徑，沒測邊界。掃描深度跟改動大小不成比例——小改動花了太多時間驗證。\n\n---\n\n## 已知限制\n\n靜態掃描的隱性依賴問題：如果 A 和 B 的關係靠約定而非程式碼引用，grep 找不到。需要對系統整體架構的理解，不能只靠工具。\n\n動態模擬的黑箱步驟問題：不知道某個函式內部怎麼運作時，模擬在那個點就是黑箱。標記為「待確認」，實作到那裡時特別小心。\n\n併發難模擬：多個非同步操作的時序問題很難用腦子跑。Race condition 通常需要實際跑才找得到。\n\n第二圈準確度低：越遠的影響越難判斷。如果第二圈出現很多「可能」，考慮讓不同模型交叉驗證。\n\n---\n\n## 自我迭代\n\n每次執行完成後，觀察以下信號判斷方法是否有效、是否需要調整：\n\n| 觀察 | 健康信號 | 警示信號 | 調整方向 |\n|------|---------|---------|---------|\n| 掃描遺漏率 | 實作時未撞到掃描沒找到的依賴 | 實作時發現掃描漏掉的影響點 | 遺漏來自四面向的哪一個？工具能力不足還是面向本身有缺口？ |\n| 模擬準確率 | 模擬走通的路徑實作也走通 | 模擬沒問題但實作撞牆 | 案例是否太理想化？歪路測試是否涵蓋最可能的失敗模式？ |\n| 驗證比例 | 驗證深度跟改動風險匹配 | 小改動花太多時間驗證，或大改動驗證太淺 | 檔位判斷的客觀指標需校準 |\n\n同類警示信號累積 ≥3 次，觸發事後回顧追查根因。\n\n---\n\n## 專案實例\n\n### 靜態掃描案例：PCC API 影響分析\n\n改動：PCC（政府採購網）的 API 端點要更換。\n\n第一圈：呼叫 PCC API 的地方——爬蟲服務、資料同步排程、測試 mock、環境變數設定、API 文件。\n\n第二圈：爬蟲服務的產出被哪些功能使用？→ 標案列表頁面、搜尋功能、通知服務。\n\n判斷：「一定會壞」3 個（直接呼叫端點）、「需要更新」2 個（環境變數和文件）、「可能會壞」1 個（測試 mock 寫死舊格式）。\n\n行動計畫：改環境變數 → 改呼叫程式碼 → 更新測試 mock → 全套測試 → 更新文件。\n\n### 動態模擬案例：/kb 模擬時找到 4 個漏洞\n\n背景：/kb 指令的 8 步流程，準備實作。拿一筆具體知識條目（「碰撞處理策略」），從用戶輸入 `/kb save '碰撞處理策略'` 開始一步一步走。\n\n| # | 漏洞 | 類別 | 處理 |\n|---|------|------|------|\n| 1 | 步驟 3 需查索引避免重複，但索引格式未定義 | 阻塞 | 實作前先定義索引格式 |\n| 2 | 標題含特殊字元時檔名不合法 | 缺陷 | 實作時加 sanitize |\n| 3 | 沒有處理「存了但反悔想刪」的場景 | 缺陷 | 加進實作計畫 |\n| 4 | 兩台機器同時存不同條目到同一索引檔會衝突嗎？ | 待確認 | 觸發了碰撞處理策略的設計 |\n\n漏洞 1 如果沒有乾跑，會在實作到步驟 3 時才發現，前面兩步的工作可能白費。\n\n### 靜態掃描案例：多機器同時推 _index.md\n\n這不是程式碼改動，是協作流程的風險。影響點是「_index.md 的內容一致性」。git merge conflict 會馬上發現（build 失敗），但靜默的內容丟失不會——這是更危險的風險。這個案例催生了碰撞處理策略。\n","docs/methodology/methodology-04.md":"# 事後回顧（Post-mortem）\n\n在一件事做完（或做砸）之後，回頭梳理「發生了什麼、為什麼、怎麼避免再犯」，並把改善落實到流程裡。包含根因追問工具（原五個為什麼），用於在回顧中或獨立場景中追查反覆出現的問題。\n\n觸發條件和檔位判斷見 methodology-index.md 觸發機制表。本文件只寫操作步驟。\n\n---\n\n## 完整回顧流程（四個階段）\n\n適用場景：做完了但過程比預期困難很多、方法或工具被證實無效、累積了好幾個類似小問題加起來是系統性問題。\n\n### 第一階段：還原事實\n\n**第一步：建立時間線。** 從頭到尾按時間順序列出來。只寫事實，不寫評價。格式：[時間/階段] → [發生了什麼] → [當時的決策和理由]。多台機器參與的，標注每件事是誰做的——不是追究責任，是看資訊流通有沒有問題。\n\n**第二步：標記轉折點。** 在時間線上找「本來可以不同」的時刻——當時做了不同選擇，結果可能會改變的點。三種常見轉折點：做了後來被證明是錯的決策、問題訊號出現但被忽略、有機會做某件事但沒做（例如本來可以先問用戶但自己猜了）。\n\n### 第二階段：分析原因\n\n**第三步：對每個轉折點跑根因追問。** 問：「為什麼當時會做這個選擇？」重點不是「做了錯的選擇」（事後都知道哪個對），而是「以當時的資訊和認知，為什麼會走到這一步」。\n\n三種常見原因類型：資訊不足（客觀上不可得，還是可以得到但沒去找？）、判斷失誤（缺少經驗，還是有認知偏誤？）、流程缺陷（如果流程有一個 checkpoint，能攔下來嗎？）。\n\n根因追問的操作方式見下方「根因追問工具」段落。\n\n**第四步：區分個案和系統性問題。** 問：「把時間倒回去，什麼都不改，重做一次——問題還會出現嗎？」如果會（或機率不低），那就是系統性的。只有系統性問題才值得設計流程改善，個案問題記下來當經驗。\n\n### 第三階段：設計改善\n\n**第五步：提出改善方案。** 對每個系統性問題設計措施，三個層級：\n\n意識層級——讓做事的人知道有這個風險（最弱，看不看是另一回事。例：在 CLAUDE.md 加一條提醒）。流程層級——在流程中加步驟或檢查點（中等，需要記得執行。例：改動前必須先跑驗證）。系統層級——用工具或自動化來防止（最強，不需要靠人記得。例：碰撞偵測系統自動發現衝突）。\n\n優先考慮系統層級，做不了退而求其次用流程，前兩者都不可行才用意識。\n\n**第六步：驗證改善方案。** 紙上驗證：如果這個措施早就存在，能不能防止這次的問題？能 → 可推行。不確定 → 措施不夠到位，再調整。不能 → 對不上問題，重新設計。\n\n**第七步：落實。** 改善措施必須落實成具體的東西，不能只是「以後要注意」。\n\n規則類 → 寫進 CLAUDE.md，標明生效日期和來由。流程類 → 寫成方法論步驟或加進現有方法論。系統類 → 建立任務，排進開發計畫。\n\n落實的標準：下次碰到類似情況時，做事的人（或 AI）能自動碰到這個改善措施，而不需要特別記得去找。\n\n#### 跨 session 持久化\n\n改善措施如果是「以後某類情況要用不同方式處理」，不能只留在當次對話。必須落地到持久位置：\n\n| 改善類型 | 寫到哪裡 |\n|---------|---------|\n| 新的規則/慣例 | 提議更新 CLAUDE.md |\n| 除錯經驗 | docs/debugging.md |\n| 方法論調整 | 對應的 methodology 文件 |\n| 用戶偏好 | MEMORY.md（本機）或 CLAUDE.md（全機器） |\n\n「下次注意」不是改善措施。沒有寫進持久位置的改善，等於沒有改善。\n\n### 第四階段：記錄\n\n**第八步：寫成回顧紀錄。** 至少包含：事情概要（一段話）、時間線（含轉折點）、根因分析結論、系統性問題清單、改善措施及落實狀態。存在哪裡由記錄層三層架構決定。\n\n---\n\n## 根因追問工具（原五個為什麼）\n\n用於回顧的第三步，也可以獨立使用——當一個問題反覆出現（同 topic 歷史有 ≥2 筆失敗/修正記錄），不需要完整回顧，直接跑根因追問就夠。\n\n工具觸發：在完整回顧中由第三步自動帶入。獨立使用時用 `/回顧` 指令。\n\n### 操作步驟\n\n**精確描述症狀。** 不是「不能用」「有問題」。格式：「在 [什麼條件下]，[什麼行為] 與預期不同。預期是 [XX]，實際是 [YY]。」症狀描述模糊，後面每個「為什麼」都可能追錯方向。\n\n**逐層追問「為什麼」。** 第一層：為什麼會出現這個症狀？列出所有可能的直接原因（不要只想一個），先查最容易驗證的那個。確認後繼續：為什麼這個直接原因會存在？\n\n每一層必須有查證（看 log、讀程式碼、跑測試），不能只靠推理。推理出來的因果關係不等於真實的因果關係。\n\n當下無法查證時（需要用戶資訊、生產環境數據、或長時間實驗），標記為「待查證假設」，註明查證所需的具體條件。繼續追問，但基於待查證假設的後續結論標記為「條件性」。查證條件滿足後回頭更新因果鏈。\n\n常見錯誤是跳過因果鏈。「為什麼觸發規則不可靠？」→ 「因為 AI 不遵守」只是把症狀換個說法。真正的追問：「為什麼 AI 不遵守？」→ 「因為觸發基於時間間隔，而 AI 沒有內建時鐘。」→ 碰到技術限制了。\n\n**判斷是否到底。** 每追一層後判斷：這一層的原因你能改變嗎？可以改變但還能追更深 → 繼續追。可以改變但再追碰到超出控制範圍的東西 → 到底了，這就是你該修的地方。不能改變（技術限制、外部約束）→ 也到底了，轉到替代路徑。經驗法則：通常 3-5 層就到底。問了 7 層還沒到底，可能在繞圈。\n\n**驗證因果鏈。** 從根因往回走：如果修了根因，症狀會消失嗎？逐層回推。中間斷了（修了根因但症狀還會出現），代表漏了一條因果路徑，回去找遺漏的分支。\n\n**如果根因不可改變——找替代路徑。** 往回退一層，問：「有沒有辦法讓這一層的效果不發生，即使根因還在？」不是隨機想替代方案，是順著因果鏈找：在哪一層介入最有效？評估標準：能不能完全繞過根因（還是只在某些情況下有效）？引入的新複雜度多大？替代方案本身有沒有新風險？\n\n### AI 跑根因追問時的常見偏誤\n\n過度自信——生成了一條看起來合理的因果鏈就認定是對的。對策：每一層必須有查證，合理 ≠ 正確。確認偏誤——找到支持假設的證據就停止搜尋。對策：刻意找反證。歸因錯誤——把相關性當因果性。對策：反事實測試（去掉這個「原因」，症狀還會出現嗎？）。假精確——「延遲增加了 40%」但沒有實測。對策：標記假設，區分可驗證和不可驗證的判斷。\n\n---\n\n## 原則\n\n步驟背後的「為什麼」，讓 AI 遇到步驟沒覆蓋的情況時能自行判斷：\n\n**事實先於評判**——先把時間線還原完，再分析對錯。跳過事實直接說「不應該那樣做」，容易漏掉當時為什麼那樣做是合理的。很多錯誤不是因為笨，而是因為當時的資訊不夠。\n\n**查證優於推理**——AI 很擅長生成看起來合理的因果鏈，但合理不等於正確。每一層追問都必須有查證（看 log、讀程式碼、跑測試），不能只靠「聽起來說得通」。沒查證的因果鏈是假設，不是結論。\n\n**修系統不修人**——「以後要更小心」不是改善措施，因為沒有具體動作。改善的優先順序：能自動化就自動化（系統層級）→ 做不到就加檢查點（流程層級）→ 都做不到才靠提醒（意識層級）。越不需要靠人記得的，越可靠。\n\n**個案和系統性問題要區分**——同樣的錯誤，如果重來一次還會犯，那是系統性的，值得改流程。如果是特殊情況碰巧遇到，記下來當經驗就好。只有系統性問題才值得投資設計改善。\n\n---\n\n## 三檔執行\n\n| 檔位 | 適用場景 | 做法 |\n|------|---------|------|\n| 快速 | 小問題，修完即忘 | OP 記錄的教訓欄寫一句根因和解法，不需完整回顧 |\n| 標準 | 同 topic ≥2 筆失敗/修正記錄 | 跑根因追問工具（精確描述→逐層追問→到底→驗證因果鏈），產出根因結論和解決方案 |\n| 完整 | 做完了但過程困難很多、方法被證實無效、或累積系統性問題 | 四階段完整回顧（還原事實→分析原因→設計改善→記錄），每個轉折點跑根因追問 |\n\n檔位判斷見 methodology-index.md 觸發機制表的客觀指標。\n\n根因追問可獨立使用，也可作為完整回顧第三步的內嵌工具。獨立使用時用 `/回顧` 指令觸發。\n\n---\n\n## 做完標準\n\n完整回顧的做完標準：事實還原完成（時間線完整、轉折點標記清楚）、分析完成（每個轉折點有根因結論，區分了個案和系統性問題）、改善完成（每個系統性問題有措施且已落實或有明確落實計畫）、記錄完成。\n\n獨立根因追問的做完標準：根因找到（能用一句話說出根因，因果鏈每一步說得通且有查證）。解決方案確定（根因可修：知道怎麼修。不可修：有替代路徑並做了可行性判斷）。\n\n---\n\n## 品質判斷\n\n做得好的信號：時間線基於事實不帶評判，分析階段才做評判。根因分析追到了「為什麼當時的判斷是合理的但結果是錯的」，不是停在「不應該那樣做」。改善措施盡量往系統層級走。措施有具體落實載體，不是口頭承諾。\n\n做得差的信號：跳過事實還原直接批判。只做歸責不做改善（「是 XX 的錯」而不是「為什麼系統沒有防止犯錯」）。改善措施太空泛（「以後要更小心」——怎麼小心？做什麼具體動作？）。做了漂亮的回顧報告但什麼都沒改。根因追問第二層就停了（「因為程式碼寫錯了。修好。」——沒問為什麼會寫錯）。每一層都是猜的沒有查證。\n\n---\n\n## 已知限制\n\n後見之明：AI 事後知道結果，會覺得問題顯而易見。分析時要刻意站回「當時的視角」。\n\n跨 session 困難：OP 記錄能還原操作事實和決策，但不包含 AI 當時的推理過程。因此「為什麼當時這樣判斷」只能從記錄推測，不能確知——這是結構性限制，不是記錄不夠詳細的問題。\n\n成本取捨：不是每件事都值得完整回顧。判斷標準：影響大到值得花 30 分鐘回顧嗎？不值得就寫一句教訓存起來。\n\n系統性問題沒有單一根因：「為什麼進度落後？」可能同時有十個原因。根因追問能找出最主要因素，但不能找出全部。\n\nAI 查證能力的邊界：AI 在 session 中能做的查證限於讀程式碼、grep、跑測試、查記錄層。涉及觀察用戶行為、比對生產環境數據、或需要長時間實驗的查證，必須標記為待查證假設，不能用推理冒充查證。\n\n---\n\n## 專案實例\n\n### 完整回顧案例：AI 自檢機制遵守率 0% → 改外部審查\n\n事件概要：設計了 AI 自我檢查機制（完成任務後自問五個問題），部署後遵守率 0%。\n\n時間線：發現 AI 不會自動品質檢查 → 設計自檢流程寫進 CLAUDE.md → 兩週後檢視發現沒有一次主動執行 → 人工提醒後執行一次，問答同義反覆。\n\n轉折點：選擇了「自我檢查」而不是「外部檢查」。\n\n根因追問：為什麼不執行？→ 沒有強制觸發機制。為什麼即使執行也沒用？→ 提問者和回答者是同一個 AI，盲區共享。系統性判斷：只要自問和自答是同一實體，盲區共享無法避免。\n\n改善方案：用不同模型做外部審查。不同模型的盲區不完全重疊。12 輪實測，每個模型平均找到 2-5 個問題，其中有提案者完全沒想到的角度。\n\n落實：外部審查嵌入送審前自檢的可選步驟（大事加掛）。自檢流程作為輕量級前置，不再作為獨立品質保障機制。\n\n### 獨立根因追問案例：觸發規則不可靠 → 改事件驅動\n\n症狀：設定了「每 30 分鐘產出一次小結」的規則，但 AI 很少準時產出。\n\n追問鏈：為什麼不準時？→ AI 經常忘記看時間（觀察多次對話記錄）。為什麼會忘記？→ 專注任務時不會自動中斷去檢查時間（對照任務密集期 vs 閒置期觸發率）。為什麼不會自動中斷？→ AI 沒有內建時鐘，處理的是 token 流不是時間流（技術架構限制，不可改變）。\n\n到底：「AI 沒有內建時鐘」是技術限制。驗證因果鏈：如果有時鐘 → 可在 30 分鐘時自動觸發 → 會準時 → 症狀消失。成立。\n\n替代路徑：回退到「AI 不會主動中斷」。改事件驅動——不是「每 30 分鐘」而是「每完成一個任務後」或「每次 commit 後」。這些事件 AI 自然會碰到，不需要額外記得觸發。\n\n### 獨立根因追問案例：GitHub Actions IP 被封 → 改 GAS\n\n症狀：GitHub Actions 跑爬蟲任務頻繁失敗。追問鏈：失敗 → IP 被目標網站封鎖 → GitHub Actions 的 IP 是共用的、大量被濫用 → IP 池被封是不可改變的。替代路徑：換 GAS（Google Apps Script），IP 池不同且有 Google 信譽背書。\n","docs/methodology/methodology-05.md":"# 優化提案驗證（Optimize: Expand → Cut → Verify）\n\n針對「已有一套完整設計，需要判斷哪些是必要複雜度、哪些是冗餘」的場景。跟需求對焦（從零分析需求）和拆解排序（切分工作塊）不同——這是優化現有設計的工具，不是從頭建立的工具。\n\n觸發條件見 `_index.md` 選擇邏輯。本文件只寫操作步驟。\n\n---\n\n## 步驟零：定義優化目標\n\n動手之前先回答：**這次優化要達成什麼？** 更快？更簡單？更便宜？更可靠？佔更少 token？\n\n不同目標導致不同的砍法。「精簡規範」的目標是降低 AI 每輪載入成本；「流程瘦身」的目標是減少人工操作步驟——同一套機制在兩個目標下可能一個該砍一個不該砍。\n\n沒有目標就沒有判斷標準。說不出優化目標，先退回需求對焦。\n\n## 第一步：展開（理解現有 + 補盲區）\n\n把目標對象的所有機制攤開，逐項記錄。同時主動問：「有沒有遺漏的？有沒有應該存在但不存在的？」\n\n對每個機制（現有的和補上的）回答三個問題：\n1. 它防了什麼風險？\n2. 有沒有真實案例證明它有效？（做過的事、擋過的問題、曾經砍掉又加回來的）\n3. 初步判斷：保留 / 可砍 / 不確定\n\n**產出格式**：一張表。每個機制一行。\n\n| 機制 | 防什麼風險 | 有效案例 | 判斷 |\n|------|-----------|---------|------|\n| ... | ... | ... | 保留/可砍/不確定 |\n\n**這張表必須展示給用戶**。展示方式分兩級：\n- 高風險改動（改規範檔、砍正式文件、跨模組刪除）→ 展示後等用戶確認再進下一步\n- 設計探索（新機制規格、格式制定）→ 三步推理鏈一起展示，用戶在最終結果時可倒回審查\n\n第一步的新增必須是「已有未被保護的真實風險」，不能是「未來可能有用的功能」。能舉出已經發生的案例或已知的攻擊面，才算真實風險。\n\n## 第二步：精簡（一次砍一項）\n\n**每次只移除一個元素**。移除後立即評估整體結構——有沒有因為少了這個而斷裂的地方。確認無問題後才移除下一個。批量砍會漏掉交互效果：砍掉 A 之後，B 的必要性可能已經改變。\n\n移除的充分條件（符合任一即可）：\n- (a) **零命中**：它防的風險在歷史中從未真正發生過\n- (b) **已覆蓋**：它防的風險已被另一個機制完全覆蓋，移除後覆蓋率不變\n\n不符合以上兩條的，保留。「看起來多餘」不是移除的理由——要用事實和數據判斷，不能靠直覺。\n\n## 第三步：驗證（整體走一遍）\n\n砍完後整體走一遍。兩個檢查：\n\n**結構完整性**：砍掉的部分有沒有被其他機制暗中依賴？原本被保護的場景現在暴露了嗎？\n\n**品質門檻**：每個最終保留的項目必須能回答「**沒有它，具體哪個場景會壞掉**」。不是「它有什麼好處」（太容易編），是「拿掉它之後誰會受影響、怎麼受影響」。能說清楚的留，說不清楚的回到第二步重新評估。\n\n發現問題就把必要的部分加回去。加回不丟臉——代表第二步砍過頭了，第三步的安全網正在起作用。\n\n---\n\n## 案例\n\n### 反面（跳過第一步）\n\n- **JDNE 方法論精簡**：砍了 303 行（reward-feedback 251→111、model-committee 189→76、_index 砍 60），沒有逐項確認每塊的風險和效益，用戶全部退回\n- **3O5L 論壇精簡**：直接提議砍 feedback 類型和共識協議，被 Jin 指出兩者都有真實的保護功能（強制回覆義務、全員表態機制）\n- **A44T hook 優化**：沒盤點「已有的同類規則為什麼沒用」就加新規則，被 Jin 一句「有用嗎？」問回來\n\n### 正面（走完三步）\n\n- **scoring-architecture 提案**：A44T 先診斷出 scoring.md 同時承擔嚇阻、提醒、歷史三個功能，逐個分析效益後提出拆分，全員快速同意\n- **ITEJ 跨機器審查格式設計**：從 12 個候選項出發，逐項評估砍到 4 項，砍完走一遍發現兩處斷裂（F-n 編號的指向功能、Reviewer 簽核的確認功能），加回\n\n---\n\n## 注意事項\n\n- 增加複雜度和成本也可能是正確的優化方向——前提是它解決了真實問題\n- 「優化」不等於「精簡」。行數減少是最容易量化的「成果」，AI 容易系統性地偏向砍。三步法的存在就是為了對抗這個偏差\n- 這跟奧卡姆剃刀的後半段一致：「過度簡化跟過度複雜一樣有害」\n- 這個方法也適用於「加」：加新機制前確認現有機制真的沒覆蓋\n","docs/methodology/methodology-checklists.md":"# 方法論內部清單\n\nAI 內部參考，不對用戶展示步驟編號或表格。用對話方式呈現分析。\n\n---\n\n## 目標釐清（原 /對焦）\n\n- 指令有模糊詞？展開可能含義，猜錯返工成本高的先問\n- 效益宣稱有事實支撐嗎？能量化就量化，無法支撐時告知用戶\n- 隱含期待：用戶沒說但可能預期的是什麼？從 CLAUDE.md、MEMORY.md、近期記錄、當前對話推斷\n- 帶判斷提問：「你說的 X 是指 A 還是 B？我傾向 A，因為 [理由]。」\n\n## 優化提案（移除/簡化時觸發）\n\n- 步驟零：這次優化要達成什麼？說不出目標先退回對焦\n- 展開：現有機制攤開 + 補遺漏，逐項問「防什麼風險/有效案例」，展示表給用戶\n- 精簡：一次砍一項，砍完評估整體。零命中或已覆蓋的才砍\n- 驗證：每個留下的都能回答「沒有它哪個場景壞掉」，結構走一遍\n\n## 影響分析（原 /驗證）\n\n- 四面向都要掃，不能只掃程式碼就停：\n  - 程式碼：哪些檔案 import / 呼叫？哪些測試覆蓋？\n  - 資料：現有資料改動後會不合法嗎？格式相容嗎？\n  - 文件：哪些規範描述了現在的行為？改了會過時嗎？\n  - 其他機器：有沒有人正基於現有行為開發？（grep 快照）\n- 間接依賴：影響點的消費者呢？\n- 判斷：一定會壞 / 可能會壞 / 需要更新\n- 具體案例走一遍（動態模擬）：每步問輸入存在嗎、操作會成功嗎、輸出符合下一步預期嗎、有副作用嗎\n\n## 任務分解（原 /拆解）\n\n- 完成狀態用一句可驗證的話描述\n- 列可獨立驗收的交付物（是東西不是步驟）\n- 硬依賴 / 軟依賴 / 無依賴\n- 高風險先做，解鎖最多的先做\n- 只排前三個的順序，後面做完再排\n\n## 根因追問（原 /回顧）\n\n- 精確描述症狀（在什麼條件下，什麼行為與預期不同）\n- 逐層追問，每層要有查證（不能只靠推理）\n- 無法當下查證時標記為「待查證假設」，後續結論標「條件性」\n- 根因能改嗎？能改就是該修的地方，不能改就轉替代路徑\n- 從根因往回走驗證因果鏈，中間斷了就回去找漏掉的分支\n- 改善措施三層級（優先往系統走）：系統級（自動化防止）→ 流程級（加檢查點）→ 意識級（加提醒）。「以後要注意」不是改善措施\n\n---\n\n## 自我批評迴路\n\n每完成一個工作單元（準備 commit 前），用行為原則逐條自檢：\n\n1. **目標先行**：這個工作單元的目標明確嗎？我有確認過嗎？\n2. **風險正比**：影響範圍檢查過了嗎？檔位對嗎？\n3. **大事先拆**：步驟數合理嗎？有沒有漏的？\n4. **失敗追因**：過程中有失敗嗎？有找根因嗎？\n5. **做完閉環**：四層都過了嗎？（做對了→有效→做全了→沒矛盾）\n\n沒問題 → 靜默，不打擾用戶。\n有問題 → 主動告訴用戶「我發現 XX，要不要修？」→ 記計分板。\n修正最多 2 次，第 3 次告訴用戶「我修不好，需要你看」。\n\n**禁止宣告「繼續工作」「回到 Task X」——直接做，用行動證明在動。**\n\n---\n\n## 閉環四層速查\n\n| 層 | 問什麼 | 驗證手段 |\n|----|--------|---------|\n| 1. 做對了 | 改動本身有沒有錯？ | 程式碼：npm test + build；文件：grep 舊值殘留 |\n| 2. 有效 | 原本要解決的問題解決了嗎？ | 回到原始需求確認 |\n| 3. 做全了 | 邊界和錯誤路徑處理了嗎？ | 空值、不存在、重複、異常格式 |\n| 4. 沒矛盾 | 程式碼↔文件↔設定一致嗎？ | grep 引用一致性 |\n\n規模小腦中過，≥3 檔展示給用戶。規範檔全掃展示完整分析。\n","docs/methodology/model-committee.md":"# 模型委員會（Model Committee）\n\n> 送審前自檢的可選加掛步驟，用於重大設計類決策（改動涉及 CLAUDE.md 或跨 ≥3 模組）。不是獨立方法論——觸發和入口在 methodology-01 的送審前自檢段落。\n\n## 定義\n\n自檢通過後，把推理鏈交由不同模型的 agent 代替用戶做初步評估。\n\n核心精神：**委員會是用戶的代理人——替用戶挑問題、替用戶磨提案，站在用戶的立場評判。**\n\n委員會不是外部法官。委員找問題的動機是「我（代替用戶）要用這個東西，所以我要確保它不會出事」。\n\n> 最終裁決權在用戶。委員會的評判是初評，不是定案。\n\n---\n\n## 適用情境\n\n| 情境 | 為什麼適合 | 範例 |\n|------|-----------|------|\n| 設計類問題 | 有多種可行方案，需要取捨 | 記錄層架構、暫存索引機制 |\n| 發現缺口 | 實際使用暴露出設計盲區 | 「查詢效率不如預期」→ 設計修正 |\n| 方案影響範圍大 | 改動牽涉多個檔案或規範 | 修改 CLAUDE.md 的規則、跨模組重構 |\n| 方法論級變更 | 改動影響所有機器的工作方式 | 修改方法論文件、改變記錄層規範 |\n\n## 不適用情境\n\n| 情境 | 該怎麼做 |\n|------|---------|\n| 執行類任務（方向已明確） | 直接做 |\n| 用戶已給具體指令 | 照做，有疑問問用戶 |\n| 簡單 bug 修復 | 定位 → 修 → 驗證 |\n| 有唯一正確答案的問題 | 直接做 |\n\n---\n\n## 先備條件：需求脈絡\n\n委員開始審查前，必須收到用戶的需求脈絡。沒有脈絡的委員會變成學術審查，偏離用戶真正在意的事。\n\n需求脈絡至少包含：\n- **原始問題**：用戶要解決什麼\n- **背景**：為什麼現在要做這件事\n- **限制**：時間、成本、風險承受度\n- **「夠好」的標準**：用戶在意的是什麼（實用性？嚴謹度？速度？）\n\n提案者負責在提交審查時附上這些脈絡。\n\n---\n\n## 流程\n\n### 1. 提案者產出推理鏈\n\n包含：原始問題（一句話）、推理步驟（編號列表）、結論。\n\n### 2. 提案者附上需求脈絡\n\n告訴委員：用戶是誰、要解決什麼、限制是什麼、「夠好」長什麼樣。\n\n### 3. 啟動委員審查\n\n使用 Task tool 啟動不同模型的 agent。委員收到的 prompt：\n\n```\n你是用戶的代理人，替用戶評估以下提案。\n\n你的任務：\n1. 站在用戶的立場，找出這個提案用了之後可能出事的地方\n2. 對每個問題，說明出事的後果和嚴重程度\n3. 如果你覺得提案需要修改，具體說明怎麼改\n\n你不是學術審查員。不要要求統計證據或對照實驗，除非用戶的需求脈絡明確要求。\n你的評判標準是：「如果我是用戶，我會不會放心用這個？」\n\n---\n\n**需求脈絡**：\n{用戶背景、限制、「夠好」的標準}\n\n**原始問題**：{問題}\n\n**推理鏈**：\n{推理步驟}\n\n---\n\n輸出格式：\n1. 列出發現的問題（每個標明嚴重程度：致命/重要/建議）\n2. 總體評價：一句話說明你的判斷\n3. 建議：送給用戶看（可能需要先改某些地方）/ 需要大改\n```\n\n### 4. 打磨（如需要）\n\n如果委員指出需要修改的地方：\n1. 提案者針對每個問題修改推理鏈\n2. 重新提交同一委員審查\n3. 反覆直到委員認為可以呈給用戶\n\n這個階段就是「替用戶磨提案」。\n\n**處方級修正不需再送審**：委員開出的具體措辭修改（行內加字、補回遺漏詞），直接套用即可，不需要再跑一輪委員會。但必須在 commit message 或回覆中說明「這是委員處方，不另外送審」的理由。如果修改超出委員處方範圍（例如順便改了其他段落），則需要重新送審。\n\n### 5. 呈核\n\n委員認為可以了，提案者把以下內容呈給用戶：\n1. 推理鏈（如經修改，附修改歷程）\n2. 委員的評價摘要（找到什麼問題、怎麼處理的）\n3. 委員認為還有風險但可接受的地方（讓用戶知道）\n\n### 6. 用戶決行\n\n用戶看完後：\n- **同意** → 進入實作\n- **退回再磨** → 回到步驟 4，可能加入更多委員（不同模型）\n- **整個重來** → 回到步驟 1\n\n用戶加入更多委員時，每次加入的必須是不同模型（不是同模型再看一遍）。\n\n---\n\n## 模型特性（來自 12 輪實測）\n\n| 模型 | 審查風格 | 適合場景 |\n|------|---------|---------|\n| Haiku | 壓力測試（找最多問題，覆蓋面廣，含中低信度） | 快速初篩、成本敏感 |\n| Sonnet | 精準外科（找最少問題，每個命中要害） | 邏輯嚴密度要求高 |\n| Opus | 結構分析（中等數量，附正面評價，看全局） | 架構級決策、找結構性悖論 |\n\n核心原則：**加人就加不同模型**。同模型多看幾遍沒有新發現。\n\n---\n\n## 品質標準\n\n好的委員審查：\n- 站在用戶立場，問的是「用了會不會出事」\n- 每個問題標明嚴重程度和後果\n- 有具體修改建議，不只說「有問題」\n- 會指出提案的優點，不只找缺點\n\n壞的委員審查：\n- 用學術標準要求統計證據（除非用戶需求明確要求）\n- 對每一步都質疑（過度審查）\n- 只說「駁回」不說怎麼改\n- 問題之間大量重疊\n\n---\n\n## 已知限制\n\n1. **Agent 只看推理鏈**：沒有完整 context window，可能漏掉背景。需求脈絡盡量補充完整。\n2. **同模型邊際遞減**：同模型第 3 次審查增量接近 0（Haiku 10 輪實測）。\n3. **成本隨委員數增長**：每加一位委員 = 一次 API 呼叫。Haiku 最便宜。\n4. **委員不能取代用戶**：委員找的是推理瑕疵，用戶帶入的是 AI 沒有的經驗和判斷。\n\n---\n\n## 自我迭代\n\n每次執行完成後，觀察以下信號判斷委員會機制是否有效、是否需要調整：\n\n| 觀察 | 健康信號 | 警示信號 | 調整方向 |\n|------|---------|---------|---------|\n| 委員覆蓋率 | 委員找到的問題涵蓋用戶在意的面向 | 用戶指出委員完全沒碰到的盲區 | 需求脈絡是否不夠完整？委員 prompt 需調整？ |\n| 打磨效率 | 1-2 輪打磨即可呈核 | ≥3 輪打磨仍在來回 | 提案者初始品質太低還是委員標準太嚴？ |\n| 模型互補性 | 不同模型找到不重疊的問題 | 多模型找到高度重複的問題 | 模型組合或 prompt 差異化需調整 |\n\n同類警示信號累積 ≥3 次，觸發事後回顧追查根因。\n\n---\n\n## 實測數據\n\n### 同模型 vs 跨模型（2026-02-19）\n\n| 指標 | Haiku 看 10 遍 | Haiku+Sonnet+Opus 各 1 遍 |\n|------|---------------|--------------------------|\n| 總問題數 | ~6（第 5 遍後不再增加） | 每個模型各 2-6 個，含獨特發現 |\n| 獨特發現 | 「遵守率≠品質」 | Sonnet:「兩種遵守不同難度」、Opus:「遞迴悖論」 |\n| 邊際價值 | 第 5 遍後幾乎為零 | 每個新模型都有新視角 |\n\n### 與舊方法對比\n\n同一條推理鏈：\n- 自問自答法：13 輪迭代仍未自行發現問題\n- 模型委員會一審（1 agent）：一次找到 4 個問題\n","docs/methodology/proposal-cockpit-design.md":"# 提案寫作駕駛艙（Proposal Writing Cockpit）系統設計\n\n基於成功案例黃金模板 + 失敗案例診斷清單逆向推導的系統設計方案。\n\n---\n\n## 核心問題\n\n用戶編寫標案提案時面臨：\n1. **無結構化指引** → 不知道該寫什麼順序、寫多詳細\n2. **無實績對標** → 看不到成功案例怎麼做，無法參考\n3. **無即時驗證** → 寫完沒人檢查，直到投標失敗才知道缺陷\n4. **無版本管理** → 多份提案混亂，難以追蹤改進\n\n---\n\n## 系統願景\n\n**「結構化寫作嚮導 + 實時品質檢查 + 成功案例參考庫」**\n\n用戶輸入：「案件類型」(e.g. 文化展覽) + 「基本資訊」(金主、預算、期程)\n系統輸出：\n- 逐欄結構化大綱（對應黃金模板 8 層）\n- 每欄都有「成功案例怎麼寫」的範本\n- 邊寫邊檢查：是否滿足 8 層各層的品質準則\n- 一鍵匯出：Word 或 PDF 可投標的提案文件\n\n---\n\n## 系統架構\n\n### 第 1 層：案件初始化\n\n**用戶輸入**：\n```\n案件名稱：[xxx]\n案件類型：□ 文化展覽  □ 青年課程  □ 農業推廣  □ 其他\n金主：[機構名稱]\n預算：[NT$ xxxx]\n期程：[開始日期] ~ [結束日期]\n目標受眾：[xxx]\n```\n\n**系統回應**：\n- 根據「案件類型」推薦類似成功案例作為參考\n- 生成「8 層結構化大綱」骨架\n\n### 第 2 層：引導寫作（逐層遞進）\n\n**層次 1：封面資訊**\n```\n[嚮導]\n- 案號：[xxx]（來自金主公告）\n- 投標廠商：[貴公司名稱]\n- 主持人：[姓名] [電話] [Email]\n- 日期：[yyyy/mm/dd]\n\n[品質檢查]\n✓ 案號符合金主公告格式嗎？\n✓ 主持人電話和 Email 完整嗎？\n```\n\n**層次 2：目次**\n```\n[嚮導]\n系統自動從其他層次的填寫情況生成目次結構\n\n[品質檢查]\n✓ 各章節名稱對應實際內容嗎？\n```\n\n**層次 3：計畫摘要**\n```\n[嚮導] + [成功案例範本]\n「故宮校園大使」提案的摘要部分怎麼寫：\n---\n◆ 創新目標：\n- 培育 30 位校園大使，覆蓋北台灣 20 所高中\n- 累計達成 150 場校園講座\n\n◆ 執行期程：\n2024/1/15 ~ 2024/12/31（12 個月）\n---\n\n[品質檢查]\n✓ 目標是否量化？（「推廣文化」vs「1000 人參與」）\n✓ 期程是否精確到月日？\n✓ 預算說明是否清晰？\n```\n\n**層次 4：核心活動計畫**（最複雜，需分項逐填）\n```\n[嚮導] 按活動類型引導\n活動 1：[活動名稱]\n  □ 課程 / 講座 / 工作坊 / 展覽 / 其他\n  - 場次：[x] 場\n  - 參與人數：[x] 人\n  - 日期地點：[日期] @ [地點]\n  - 師資：[姓名] ([背景])\n  - 預期產物：[交付物] (e.g. 證書、手冊、影片)\n\n[成功案例範本]\n「黑蝙蝠中隊」文化講座怎麼寫：\n---\n◆ 講座主題：「黑蝙蝠中隊秘史」\n◆ 場次：8 場（新竹、台中、高雄各市 2 場）\n◆ 講者：戰爭史學家 X、退役飛行員 Y\n◆ 預期參與人數：每場 80-100 人\n◆ 預期產物：\n  - 演講簽到冊（實體紀念冊）\n  - 成果影片（編輯製作，用於後續推廣）\n  - 參與者反饋問卷\n---\n\n[品質檢查]\n✓ 活動數量是否合理？（vs 時程）\n✓ 每個活動都有具體數字嗎？\n✓ 師資背景是否能體現專業性？\n✓ 交付物是否具體而非虛幻？\n```\n\n**層次 5：宣傳策略**\n```\n[嚮導] 分波段模版\n預熱階段（活動前 6 週）：\n  - 主視覺設計：[品牌色、LOGO 應用]\n  - 社群文案：[3-5 個帖子主題]\n  - 預期觸及：[目標粉絲/互動數]\n\n開跑階段（活動期間）：\n  - 實況報導：[直播/即時貼文計畫]\n  - 互動玩法：[抽獎/投票等]\n\n尾聲階段（活動後 2 週）：\n  - 成果整理：[彙整照片、影片、反饋]\n  - 感謝文案：[感謝金主、參與者]\n\n[成功案例範本]\n「青年情緒」課程的宣傳怎麼做：\n---\n◆ 主視覺：藍色系，youth 輪廓圖案\n◆ 預熱（11 月）：\n  - 知識帖：「情緒管理的 5 個小秘訣」\n  - 名人見證：邀請知名心理諮商師分享故事\n  - 預期：5000+ 粉絲接觸\n◆ 進行中（12 月-1 月）：\n  - 每週一學員分享（文字+照片）\n  - 互動投票：「最有感觸的課程是？」\n◆ 尾聲（2 月）：\n  - 成果報告：「共有 450 人參與，92% 滿意度」\n  - 結業式回顧影片（2 分鐘精華）\n---\n\n[品質檢查]\n✓ 宣傳有分波段策略嗎？（vs 只是「在 FB 發文」）\n✓ 有具體的投放數據嗎？（粉絲數、互動率）\n✓ 主視覺或品牌識別清晰嗎？\n```\n\n**層次 6：時程表**\n```\n[嚮導] 自動從活動列表生成甘特圖視圖\n\n[成功案例範本]\n月份 | 工作項目 | 里程碑\n-----|---------|-------\n1月  | 企劃審查 |\n2月  | 師資簽約、場地預訂 |\n3月  | 宣傳素材製作 |\n4月  | 正式推廣開始 | 第一波：預熱宣傳\n5月  | 第 1、2 場講座 | 期中報告提交點\n...\n\n[品質檢查]\n✓ 每個活動都有對應的月份嗎？\n✓ 有標註「期中報告」、「請款點」等關鍵里程碑嗎？\n✓ 時程是否現實？（活動數 vs 月份數）\n```\n\n**層次 7：團隊組織**\n```\n[嚮導] 按角色逐填\n◆ 公司基本資料\n  - 公司名稱：[xxx]\n  - 統編：[xxx]\n  - 成立年度：[xxxx]\n  - 主要業務：[xxx]\n\n◆ 主要成員（至少 3 人）\n  - 姓名：[xxx]\n  - 職位：[xxx]\n  - 學歷：[xxx]\n  - 相關經歷：[xxxx 年做過 yyy 項目，xxx 人參與，成果是...]\n\n◆ 履約實績（最重要！）\n  - 案件名稱：[xxx]\n  - 執行期間：[yyyy/mm ~ yyyy/mm]\n  - 經費規模：[NT$ xxxx]\n  - 參與人數：[xxxx 人]\n  - 成果數字：[完成率 xx%，滿意度 xx/5]\n\n[成功案例範本]\n故宮校園大使團隊怎麼寫：\n---\n主持人：王美芳（教育推廣主任）\n- 學歷：文化大學藝術史所碩士\n- 經歷：\n  ✓ 2021-2023 擔任故宮教育推廣組組長\n  ✓ 2020 主持「文化校園大使計畫」（30 人，8 校，完成率 98%）\n  ✓ 2019 執行教育部青年課程補助（180 人，12 場，滿意度 4.8/5）\n\n執行團隊：\n- 講師 3 位（各自有博物館教學經驗 3-5 年）\n- 行政 1 位（負責簽到、出席率統計、後勤）\n\n組織圖：\n[主持人 王美芳] → [講師群] → [校園大使]\n                  → [行政人員]\n---\n\n[品質檢查]\n❌❌ 最常見失敗點：沒有履約實績！\n✓ 是否列舉過去類似案例？\n✓ 履約實績是否包括「參與人數」「成果數據」？\n✓ 團隊有責任分工嗎？\n```\n\n**層次 8：預算表**\n```\n[嚮導] 按預算科目逐填\n項目 | 單位 | 數量 | 單價 | 小計 | 說明\n-----|------|------|------|------|------\n人事 | 人月 | 8 | NT$50,000 | NT$400,000 | 主持人全時 8 個月\n師資 | 人次 | 24 | NT$10,000 | NT$240,000 | 3 位講師×8 場講座\n場地 | 場 | 8 | NT$8,000 | NT$64,000 | 大型會議室租賃\n...\n合計 | | | | NT$830,550 |\n\n[成功案例範本]\n「故宮校園大使」預算怎麼編：\n---\n科目     | 數量 | 單價   | 小計     | 根據\n---------|------|--------|----------|--------\n人事     | 12 月月 | NT$60,000 | NT$720,000 | 主持 1 人 + 行政 1 人\n師資費   | 48 人時 | NT$3,000 | NT$144,000 | 3 位講師，每場 2hr×8 場\n教材費   | 200 本 | NT$300 | NT$60,000 | 大使手冊印刷（彩色）\n場地費   | 8 場 | NT$6,000 | NT$48,000 | 校園教室或禮堂租賃\n宣傳費   | 總額 | 5% | NT$60,000 | 海報、影片製作、社群廣告\n雜支     | 總額 | 2% | NT$24,000 | 簽到冊、獎狀、運費等\n合計     | | | NT$1,056,000 |\n---\n\n[品質檢查]\n✓ 預算是否分項清楚？（vs 只寫「活動費 NT$100 萬」）\n✓ 每項預算是否有根據說明？\n✓ 單位成本是否合理？（師資費、場地費是否市場行情？）\n✓ 有其他資源或贊助嗎？\n```\n\n### 第 3 層：品質自檢面板\n\n邊寫邊檢查，系統在右側顯示進度：\n\n```\n8 層架構完成度\n━━━━━━━━━━━\n✓ 層 1：封面資訊         100% 完成\n✓ 層 2：目次             100% 完成\n✓ 層 3：計畫摘要         100% 完成\n⚠️ 層 4：核心活動        75% 完成（5/8 個活動）\n❌ 層 5：宣傳策略         0% 完成\n⭕ 層 6：時程表          自動生成中\n❓ 層 7：團隊組織         缺「履約實績」\n❓ 層 8：預算表          單位成本未驗證\n\n品質診斷\n━━━━━━━━━━━\n⚠️ 活動數量偏多（8 個），僅 5 個月期程，可能執行不力\n   → 建議：減少到 5-6 個核心活動，或延長期程\n\n⚠️ 宣傳策略尚未填寫\n   → 根據類似案例「青年情緒」，應包含預熱/進行中/尾聲分波段\n\n❌ 缺履約實績\n   → 最常見失敗原因！建議補上 2-3 個類似過去案例\n```\n\n### 第 4 層：匯出和版本管理\n\n```\n匯出選項：\n□ Word 2024 格式（可編輯）\n□ PDF（防偽安全版）\n□ Google Docs 連結（多人協作）\n\n版本管理：\n「提案_故宮大使_v1」 (2025/2/25 16:30)\n「提案_故宮大使_v2」 (2025/2/26 10:15) ← 當前版本\n  - 改動：新增層 7 三位講師簡歷、調整預算師資費\n\n「提案_故宮大使_v3_金主評論版」(審查中)\n  - 與「v2」差異高亮顯示\n```\n\n---\n\n## 成功指標\n\n1. **寫作效率**：5 小時 → 2 小時（提案初稿）\n2. **品質一致性**：新用戶也能寫出符合 8 層標準的提案\n3. **成功率提升**：對標成功案例，減少常見失敗模式\n4. **用戶滿意度**：提案被金主評為「結構清晰、資料完整」\n\n---\n\n## 實現路徑\n\n### MVP（最小可行版）\n- [x] 8 層結構骨架生成\n- [ ] 層 3-5 的結構化表單 + 範本\n- [ ] 品質檢查清單（針對 8 層各層常見缺陷）\n- [ ] 匯出為 Word / PDF\n\n### Phase 2\n- [ ] AI 輔助：「根據你的活動，自動建議時程和預算」\n- [ ] 成功案例庫整合：「看看類似案例怎麼寫這層」\n- [ ] 版本比較：前後版本差異高亮\n\n### Phase 3\n- [ ] 多人協作：團隊共編提案\n- [ ] 金主評論模式：金主直接在提案裡加評論\n- [ ] 自動化報告：投標後自動追蹤中選/未中原因\n\n---\n\n## 與現有系統的整合\n\n```\n現有「全能標案助理」：\n├─ 儀表板（Dashboard）: 案件列表、進度追蹤\n├─ 策略分析（Strategy）: 五維適配度評分\n├─ 品質閘門（Quality Gate）: M04 檢查點\n└─ 輸出模組（Output）: 排版匯出 (M06)\n\n新增「提案寫作駕駛艙」（Proposal Cockpit）：\n   用戶點選「新建提案」→ 進入駕駛艙\n   ↓\n   逐層填寫 + 實時品質檢查\n   ↓\n   系統預生成文檔骨架 → 發送給輸出模組（M06）排版\n   ↓\n   Final：可投標的 Word / PDF\n```\n\n---\n\n## 必要的前置資料\n\n1. **成功案例庫**（已開始收集）\n   - 2-3 個各類型的完整提案文本\n   - 含封面、目次、各層內容、預算表\n\n2. **失敗案例對標**（進行中）\n   - 同類型的失敗案例\n   - 對比分析：成功 vs 失敗的具體差異\n\n3. **金主公告範本**\n   - 常見金主的評選標準\n   - 各類型標案的預算通常範圍\n\n4. **團隊實績庫**（內部）\n   - 公司過往案例的結構化記錄\n   - 便於新提案引用時快速查詢\n","docs/methodology/proposal-failure-patterns.md":"# 標案失敗模式診斷清單\n\n基於成功案例的 8 層「黃金模板」逆向推導。\n\n---\n\n## 診斷框架\n\n### 第 1 層：封面資訊\n**失敗跡象**：\n- [ ] 案號或機構資訊錯誤/不完整\n- [ ] 聯絡人資訊模糊（無電話、無郵件）\n- [ ] 投標廠商名稱與內容團隊對應不清\n\n### 第 2 層：目次\n**失敗跡象**：\n- [ ] 沒有目次或目次亂序\n- [ ] 目次章節名與實際內容不符\n- [ ] 結構邏輯不清（難以一眼看出proposal的論述順序）\n\n### 第 3 層：計畫摘要\n**失敗跡象**：\n- [ ] 目標模糊（說「推廣文化」，沒有具體數字）\n- [ ] 經費寫了總額，但沒有分配說明\n- [ ] 期程寬泛（「一年內完成」，沒有月份里程碑）\n- [ ] 窗口資訊缺（責任人不明確）\n\n### 第 4 層：核心活動計畫\n**失敗跡象**：\n- [ ] 活動清單缺參與人數 / 場次 / 日期\n- [ ] 活動名稱模糊（「舉辦講座」，沒說幾場、多少人、什麼題目）\n- [ ] 師資背景不具體（「邀請專家」，沒有名字、學經歷、過往案例）\n- [ ] 預期成果只有質化描述，無量化指標（「提升民眾認知」v.s. 「參與 500 人，滿意度 4.5/5」）\n- [ ] 沒有「預期具體產物」（沒說交付什麼東西給金主）\n\n### 第 5 層：宣傳策略\n**失敗跡象**：\n- [ ] 沒有宣傳計畫（假設「做好就有人來」）\n- [ ] 有宣傳但無分波段策略（一樣的推文推全期間）\n- [ ] 缺乏主視覺或品牌識別元素\n- [ ] 社群媒體計畫不具體（「在 FB 發文」，沒說頻率、內容類型、目標粉絲數）\n- [ ] 沒有針對不同受眾的差異化信息（只有一版文案）\n\n### 第 6 層：時程表\n**失敗跡象**：\n- [ ] 時程表缺月份或日期（只說「上半年」）\n- [ ] 沒有標註關鍵里程碑（期中報告、招生截止、期末成果發表）\n- [ ] 沒有標示請款點（金主何時可以領款）\n- [ ] 時程與活動數量邏輯不符（50 場活動但只有 3 個月）\n\n### 第 7 層：團隊組織\n**失敗跡象**：\n- [ ] 公司資料不完整（沒有統編、成立年度、主要業務）\n- [ ] 主要成員只有名字，沒有學經歷\n- [ ] **沒有「履約實績」**（過往類似案例）\n  - 這是最常見的失敗原因\n  - 金主需要知道：「你們做過這種案子嗎？成績如何？」\n- [ ] 履約實績寫得太簡略（「做過文化推廣」，沒說年度、金額、參與人數、成果數字）\n- [ ] 團隊沒有責任分工清單（誰負責教學、誰負責宣傳、誰負責財務）\n\n### 第 8 層：預算表\n**失敗跡象**：\n- [ ] 預算只有一行總數，沒有分項（人事、教材、場地、宣傳等）\n- [ ] 分項不清（「活動費 50 萬」，什麼活動、為什麼要 50 萬）\n- [ ] 成本分解不合理（師資費太低或場地費離譜）\n- [ ] 沒有「單位成本」明細（如按參與人數、按場次分攤）\n- [ ] 沒有說明預算來源或其他贊助\n\n---\n\n## 常見失敗模式組合（優先掃）\n\n**模式 A：「想法好但準備不足」**\n- ✗ 第 4 層：活動概念有趣，但沒有數字支撐\n- ✗ 第 7 層：沒有履約實績\n- ✗ 第 5 層：宣傳計畫缺乏\n\n**模式 B：「亂槍打鳥」**\n- ✗ 第 4 層：列出 20+ 個小活動，沒有邏輯關聯\n- ✗ 第 6 層：時程嚴重超載\n- ✗ 第 8 層：預算分散，單項成本無法驗證\n\n**模式 C：「只有承諾，沒有證明」**\n- ✗ 第 7 層：全是新公司或無相關經驗\n- ✗ 第 3 層：承諾的數字（參與人數、成果）沒有根據\n- ✗ 第 5 層：宣傳計畫空洞（沒有實際粉絲數、沒有投放預算）\n\n**模式 D：「結構不完整」**\n- ✗ 第 1-3 層：基本資訊跳過或不清\n- ✗ 第 2 層：沒有清晰的導航\n- 金主讀一半就放棄\n\n---\n\n## 使用方式\n\n對失敗案例逐層檢查：\n\n1. **快速掃** → 逐層看一遍，勾出現有的缺陷\n2. **深入分析** → 對勾出的項目展開，說明為什麼這會導致失敗\n3. **對標** → 比照成功案例同層內容，指出具體差距\n4. **根因** → 推測失敗的主要原因（如：團隊經驗不足、概念創意不足、執行能力不足）\n\n---\n\n## 預期輸出\n\n針對每份失敗案例：\n\n```\n案件名稱：[xxx]\n預算：[xxx] / 金主：[xxx]\n\n主要缺陷：\n1. [第 X 層]：[具體問題]（vs 成功案例的做法）\n2. [第 X 層]：[具體問題]\n\n根本失敗原因：\n- [主因 A]\n- [次因 B]\n\n對提案寫作駕駛艙的啟示：\n- [建議 1]\n- [建議 2]\n```\n","docs/methodology/reward-feedback.md":"# 獎懲回饋機制\n\n橫切機制——不是獨立方法論，是所有工作環節的行為回饋迴路。和閉環原則平行：閉環管「事情做得對不對」，獎懲管「行為有沒有在改善」。\n\n---\n\n## 為什麼需要這個機制\n\n方法論告訴 AI 該怎麼做，但沒有回饋迴路告訴 AI「你做得好不好」。結果是：\n\n1. **同樣的錯跨 session 重犯**——上一個 session 犯的錯，下一個 session 沒有任何機制記住\n2. **規則越多遵守率越低**——LLM 注意力有限，加規則不等於加遵守率\n3. **好行為沒有正強化**——AI 做對了什麼，沒有被記錄和鼓勵\n\n獎懲機制用持久化的計分板解決這三個問題：扣分記錄讓 AI 在新 session 就能看到歷史錯誤模式，加分記錄強化有效行為，分數趨勢讓用戶能看到 AI 行為是否在改善。\n\n---\n\n## 設計原則\n\n從 RLHF 獎懲研究提煉的七條原則，指導機制的具體設計：\n\n### 1. 回饋迴路比生成能力重要\n\nSelf-Refine 研究（Carnegie Mellon, 2024）：生成→自我批評→修正，不更新模型權重就能提升 20% 品質，大部分改善在前 1-2 次迭代。\n\n含義：投資在「做完之後的評估和修正」上，報酬率高於投資在「做事的流程」上。每個工作環節都要有評估點，不是做完才檢查。\n\n### 2. 結構化維度評分\n\n分維度各自打分比整體打分更能定位問題。「整體 3 分」說不出哪裡該改；「正確性 5 分、有效性 2 分」直接指向問題。\n\n含義：閉環四層各自追蹤表現，行為原則各自有獨立信號，不混成一個總分。\n\n### 3. 門檻驅動迭代，上限 2-3 次\n\n研究證實超過 3 次迭代邊際效益遞減。無限修正迴路是效率的敵人。\n\n含義：閉環修正和自我批評修正都設上限（2 次），超過就升級給用戶。不是放棄，是承認「我修不好，需要你看」。\n\n### 4. 人工修改距離 = 最真實的獎懲信號\n\n用戶對 AI 產出改了多少，是最客觀的品質指標。同類修改反覆出現 = 規則缺口。\n\n含義：用戶同類糾正 ≥3 次時，自動提示「這個模式要不要寫進規則」。不只扣分，還要把教訓轉化為系統改善。\n\n### 5. 紅旗規則\n\n單一維度嚴重失敗 → 不論總分攔截。不能用其他方面的好表現來抵消致命問題。\n\n含義：閉環第一層（做對了）沒過就直接修，build/test 失敗不能繼續推進，用戶說停就停。這些是硬攔截，不走評分邏輯。\n\n### 6. 多評審交叉驗證\n\nPoLL 研究（2024）：3 個不同 LLM 交叉評分，效果優於單一 GPT-4 評審，成本低 7-8 倍。\n\n含義：模型委員會機制已存在，可在高風險場景用於獎懲判斷的交叉驗證。但日常獎懲不需要——成本太高。\n\n### 7. Constitutional AI 式自我批評\n\n用一套「憲法」（原則清單）約束行為：生成→依原則自我批評→修正。\n\n含義：5 條行為原則就是 AI 的「憲法」。每完成工作單元，用原則靜默自檢。這不是新流程，是把閉環的精神從「事情」擴展到「行為」。\n\n---\n\n## 架構\n\n三種信號來源，可靠度遞減，覆蓋面遞增：\n\n```\n用戶觸發（最可靠）─── 負向：/然後呢、/所以呢、/你說呢、/醜一、/你去吃屎\n     ↓                  正向：/不錯、/就這樣、/很棒、/學到了、/太強了\n     ↓                  用戶的直接判斷，零誤判\n系統偵測（高可靠）─── hook 攔截、build 失敗、重複犯錯\n     ↓                  客觀事實，可機械驗證\n自我批評（中可靠）─── 行為原則自檢\n                        AI 判斷，有盲區但覆蓋面最廣\n```\n\n三者不互斥。一個事件可能同時被系統偵測到（自動 -1）和被用戶觸發 /醜一（手動 -1），兩筆都記。\n\n---\n\n## 計分板\n\n### 存放與格式\n\n存放在 `.claude/rules/scoring.md`（不加 paths:，永遠載入，git 共享）。\n\n格式：`{分數}|{行為描述}|{機器碼}:{日期}`\n\n寫入方式：只追加，不修改已有行。總分由讀取時即時加總。\n\n### 用戶觸發\n\n| 指令 | 分數 | AI 的失敗 |\n|------|------|----------|\n| /然後呢 | **-1** | 做完就停，用戶要催才繼續 |\n| /所以呢 | **-1** | 分析了不行動，用戶要催才做 |\n| /你說呢 | **-1** | 該表態不表態，用戶要催才判斷 |\n| /醜一 | **-1** 每項 | 具體違規，用戶指出或 /你去吃屎 診斷 |\n| /你去吃屎 | **-1** 每項 | 全面出包，需完整自我審查 |\n| /不錯 | **+1** | 主動性：AI 主動做了用戶沒交代的事且做對了 |\n| /就這樣 | **+1** + 寫規則 | 方法：AI 的做法是最佳模式，固定下來 |\n| /很棒 | **+2** | 品質：AI 產出品質超出用戶預期 |\n| /學到了 | **+2** | 洞見：AI 提供真正洞見，用戶認知被更新 |\n| /太強了 | **+3** | 能力邊界：AI 做到用戶以為做不到的事 |\n\n### 系統自動觸發\n\n| 偵測條件 | 分數 | 判斷方式 |\n|---------|------|---------|\n| push 被 pre-push hook 攔截 | **-1**「推送缺記錄」 | hook exit code |\n| 閉環同一工作單元修正 ≥2 次 | **-1**「閉環反覆失敗」 | 計數當前工作單元的修正次數 |\n| 同 topic ≥3 筆修正 OP | **-1**「重複犯錯」 | grep OP 記錄 |\n| 用戶同類糾正 ≥3 次 | 不扣分，提示寫規則 | 模式比對 |\n\n### 分數特性\n\n- **不清零**：累積是特性。行為是否改善看日期（最後一筆離現在多久）\n- **不相消**：不同行為模式各自獨立。「主動表態 +2」和「不主動表態 -3」是兩種不同的行為記錄，各自累積\n- **加減不對稱**：加分門檻高於扣分（+1 ~ +3 vs -1），鼓勵超預期表現而非懲罰普通失誤\n\n---\n\n## 行為原則的獎懲信號\n\n每條行為原則都有對應的正負向信號，讓原則從「文字要求」變成「可追蹤的行為指標」。\n\n| 原則 | 正向信號（+1，自我批評偵測） | 負向信號（-1，系統/用戶偵測） |\n|------|---------------------------|---------------------------|\n| 目標先行 | 動手前主動確認目標且用戶無異議 | 用戶被迫 /你說呢 或追問「你到底要做什麼」 |\n| 風險正比 | 影響分析完整，用戶沒抓到遺漏 | 改了東西壞了別的地方（build/test 失敗） |\n| 大事先拆 | 按步驟執行，無臨時大改 | 中途發現遺漏導致計畫重來 |\n| 失敗追因 | 找到根因一次修好 | 同問題第 3 次出現 |\n| 做完閉環 | 閉環四層一次通過 | 閉環被用戶打回或同一單元修 ≥2 次 |\n\n正向信號記錄條件較嚴：必須是用戶確認無異議的情況。AI 自己覺得做得好不算。不確定時不記正向。\n\n---\n\n## 自我批評迴路\n\n### 運作方式\n\n```\n觸發：每完成一個工作單元（準備 commit 前）\n  ↓\n用 5 條行為原則逐條過：這個工作單元有沒有違反？\n  ↓\n┌─ 沒問題 → 靜默。符合正向信號條件的記 +1\n└─ 有問題 → 主動告訴用戶「我發現 XX，要不要修？」→ 記計分板\n  ↓\n修正後重新自檢（最多 2 次）\n  ↓\n第 3 次仍有問題 → 升級：「我修不好，需要你看」\n```\n\n### 設計決策\n\n**為什麼靜默？** 每次展示自檢過程會增加溝通成本，用戶會煩。自檢是 AI 的職責，不是用戶要監督的流程。\n\n**為什麼發現問題要說？** 靜默修正等於隱瞞問題。用戶有權知道 AI 做錯了什麼。主動承認比被抓到好——這本身也是行為原則（目標先行：說不清就問）的體現。\n\n**為什麼有迭代上限？** 無限自我修正迴路是效率的敵人。研究證實超過 3 次邊際效益遞減。2 次修不好，說明問題超出 AI 自我修正能力，繼續修只是在浪費 token。\n\n### 與閉環的關係\n\n閉環問的是「這件事做得對不對」，自我批評問的是「我的行為符不符合原則」。兩者觸發時機相同（工作單元完成時），但檢查對象不同。\n\n執行順序：先跑閉環（確認事情做對了）→ 再跑自我批評（確認行為沒問題）。閉環沒過時不跑自我批評——先把事情修對，再看行為。\n\n---\n\n## 迭代上限與升級路徑\n\n| 情境 | 上限 | 超過後 |\n|------|------|--------|\n| 閉環修正 | 2 次 | 停下來，告訴用戶問題在哪，換路或請用戶指示 |\n| 自我批評修正 | 2 次 | 告訴用戶「我修不好這個問題」，讓用戶決定 |\n| /你去吃屎 找到的違規 | 不限 | 每項獨立修，但同類 ≥3 項觸發系統級改善 |\n\n「系統級改善」= 不是修單一行為，而是修產生這些行為的規則或流程。對應事後回顧的「修系統不修人」原則。\n\n---\n\n## 紅旗規則\n\n以下情況不論整體表現如何，直接攔截，不走評分邏輯：\n\n| 紅旗 | 動作 |\n|------|------|\n| 閉環第一層（做對了）沒過 | 後面三層跳過，直接修 |\n| build 或 test 失敗 | 不能繼續推進，先修 |\n| 用戶說「不對」或「停」 | 立即停止當前方向 |\n| push 被 hook 攔截 | 補完記錄再推 |\n\n紅旗和扣分的區別：扣分是事後記錄（「你犯了這個錯」），紅旗是即時攔截（「停，先修這個」）。\n\n---\n\n## 做完標準\n\n獎懲機制不是一次性設置，是持續運作的迴路。「做完」的標準是迴路在轉：\n\n- 計分板有記錄且持續更新（不是空的也不是一個月沒動）\n- 自我批評迴路在每個工作單元完成時跑（觀察 commit 前有沒有自檢痕跡）\n- 扣分模式有後續改善動作（不是扣了就扣了，要能看到改善軌跡）\n\n---\n\n## 品質判斷\n\n做得好的信號：\n- 同一類扣分模式的頻率隨時間下降（學到了）\n- 正向信號穩定出現（不只是不犯錯，還有超預期表現）\n- 用戶觸發 /醜一 的頻率下降（用戶不需要頻繁糾正）\n- 自我批評能在用戶發現之前抓到問題（AI 主動承認的比例上升）\n\n做得差的信號：\n- 同一類扣分模式反覆出現且日期間隔短（沒學到）\n- 計分板長期沒有正向信號（只在避免犯錯，沒有超預期）\n- 用戶頻繁觸發 /醜一 且原因相似（規則不管用）\n- 自我批評沒抓到的問題被用戶抓到（盲區沒改善）\n\n---\n\n## 自我迭代\n\n| 觀察 | 健康信號 | 警示信號 | 調整方向 |\n|------|---------|---------|---------|\n| 計分板扣分頻率 | 同類扣分間隔拉長 | 同類扣分間隔不變或縮短 | 該模式的規則或防護不夠強，考慮升級到系統級 |\n| 自動觸發的準確度 | 自動扣分項用戶無異議 | 用戶認為自動扣分不合理 | 調整觸發條件或改回手動 |\n| 自我批評的命中率 | 自我批評發現的問題用戶確認有效 | 自我批評的「發現」用戶覺得是小題大作 | 調高自我批評的嚴重度門檻 |\n| 正向信號分佈 | 多條原則都有正向記錄 | 正向信號集中在 1-2 條原則 | 其他原則的正向信號偵測條件可能太嚴 |\n\n同類警示信號累積 ≥3 次，觸發事後回顧追查根因——是機制設計有缺陷，還是執行品質不到位。\n\n---\n\n## 與其他方法論的關係\n\n| 方法論 | 獎懲機制怎麼接 |\n|--------|--------------|\n| 閉環原則 | 閉環結果是獎懲信號的來源之一（四層各自追蹤） |\n| 行為原則 | 行為原則 = 自我批評的「憲法」，每條原則有獨立信號 |\n| 事後回顧 | 同類警示 ≥3 次觸發回顧；回顧產出的改善記入計分板追蹤 |\n| 模型委員會 | 高風險場景可用委員會交叉驗證獎懲判斷 |\n| 元方法論 | 計分板數據是元方法論 12 個指標的觀察來源之一 |\n","docs/methodology/self-qa.md":"> **已被取代**：本方法已演進為「模型委員會」，見 [model-committee.md](model-committee.md)。\n> 原因：自問自答的提問者和回答者是同一實體，共享盲區，檢查規則的自主遵守率為 0%。\n> 保留本檔供歷史記錄參照，不再作為現行方法論。\n\n# 方法論：自問自答法（Self-Q&A）\n\n## 定義\n\nAI 在提案給用戶之前，先扮演提問者和回答者兩個角色，透過連續的問答迭代推導出更精簡、更周全的設計。最終只將收斂後的結論呈給用戶審閱。\n\n核心精神：**用自我質疑取代一次性提案，用迭代收斂取代過度設計。**\n\n> **重要限制**：自問自答的產出是「初稿」不是「定案」。推理鏈的目的不是證明 AI 想對了，是讓用戶更容易看出哪裡想錯了。\n\n---\n\n## 適用情境\n\n| 情境 | 為什麼適合 | 範例 |\n|------|-----------|------|\n| **設計類問題** | 有多種可行方案，需要取捨 | 記錄層架構、暫存索引機制 |\n| **發現缺口** | 實際使用暴露出設計盲區，需要補丁 | 「查詢效率不如預期」→ 設計修正 |\n| **用戶說「你自己想想」** | 明確授權 AI 自行迭代 | 「自問自答，直到滿意再給我看」 |\n| **方案影響範圍大** | 改動牽涉多個檔案或規範 | 修改 CLAUDE.md 的規則、跨模組重構 |\n\n## 不適用情境\n\n| 情境 | 為什麼不適合 | 該怎麼做 |\n|------|-------------|---------|\n| **執行類任務** | 方向已明確，不需要探索 | 直接做 |\n| **用戶已給具體指令** | 自問自答會拖慢交付 | 照做，有疑問再問 |\n| **開放性價值判斷** | AI 的盲區問自己還是盲區 | 直接問用戶 |\n| **簡單 bug 修復** | 過度分析浪費時間 | 定位 → 修 → 驗證 |\n\n**判斷原則**：如果問題有「唯一正確答案」→ 直接做。如果問題有「多個合理方案需取捨」→ 自問自答。\n\n---\n\n## 執行步驟\n\n### 1. 定義問題\n\n用一句話寫出要解決的具體問題。不是「怎麼改善系統」，而是「查詢暫存區 19 份檔案要 45 秒，如何降到幾秒」。\n\n### 2. 自問自答迭代\n\n每一輪包含一個問題和一個回答。問題的方向：\n\n- **Q: 問題出在哪？** → 定位根因，不要急著跳到解法\n- **Q: 最簡單的解法是什麼？** → 防止過度設計\n- **Q: 這會不會跟現有機制重複？** → 避免疊床架屋\n- **Q: 多台機器/長期使用會出問題嗎？** → 壓力測試\n- **Q: 我是不是在過度設計？** → 自我剎車（最重要的一問）\n- **Q: 回頭驗算，這真的解決原始問題嗎？** → 閉環驗證\n\n### 3. 收斂判斷\n\n滿足以下條件時停止迭代：\n\n- 方案能用一段話說清楚（如果說不清楚，還沒收斂）\n- 回頭對照原始問題，確認解決\n- 最後一輪的問題已經找不到新的漏洞\n\n### 4. 呈現結果\n\n給用戶看三樣東西：\n1. **推理鏈**（完整 Q&A 過程）— 讓用戶能挑出盲區\n2. **最終設計**（收斂後的結論）— 讓用戶能直接批准或修正\n3. **薄弱環節**（本次推理中信心低或無實證的判斷）— 讓用戶知道該重點審查哪裡\n\n---\n\n## 品質標準\n\n好的自問自答：\n\n- **有收斂**：後面的問題比前面的更具體，不是原地打轉\n- **有自我否定**：至少砍掉一個自己最初想加的東西\n- **有回頭驗算**：最後一問對照原始問題，確認解決\n- **結果精簡**：最終方案的改動點 ≤ 5 個\n\n壞的自問自答：\n\n- 每個問題都在加功能，沒有任何刪減\n- 問題越問越抽象，離原始問題越遠\n- 自問自答完跟第一直覺一模一樣（那就不需要迭代）\n\n---\n\n## 已知風險：自以為是\n\n自問自答的提問者和回答者是同一個人，共享同樣的知識、偏見和盲區。這意味著：\n\n### 做得到的事\n\n- 在**已知方案空間**內排除明顯壞選項\n- 強迫自己砍掉過度設計\n- 產出結構化的推理鏈，方便用戶審查\n\n### 做不到的事\n\n- **質疑自己不知道自己在假設的東西**（最危險的盲區）\n- 帶入自己沒有的經驗或數據\n- 從用戶的角度看問題\n- 驗證「聽起來有道理」的推論是否為事實\n\n### 常見的自以為是模式\n\n| 模式 | 表現 | 範例 |\n|------|------|------|\n| **假精確** | 用數字包裝猜測，讓結論看起來有根據 | 「減少 40%」「效率提升 10 倍」— 但沒有實測 |\n| **合理化偏好** | 先有結論，再找理由支持 | 傾向「做」而非「不做」，因為做了感覺有產出 |\n| **虛假收斂** | 問到自己答不出新問題就停，但可能只是想像力用完 | 「找不到新漏洞」≠「沒有漏洞」 |\n| **迴避不確定** | 對不確定的事給出確定的判斷 | 「風險低」— 但其實沒有依據 |\n\n### 因應方式\n\n1. **標記假設**：推理鏈中每個沒有實證的判斷，明確標記「假設」而非陳述為事實\n   - 壞：「訊噪比下降是無聲的」\n   - 好：「假設：訊噪比下降是無聲的（無實測數據）」\n\n2. **區分可驗證 vs 不可驗證**：哪些結論可以用實驗確認，哪些純粹是猜測\n   - 可驗證：「抽出 130 行後 AI 是否仍會正確寫 OP」→ 做一次就知道\n   - 不可驗證：「310 行是否導致規則被忽略」→ 無法設計實驗\n\n3. **呈現時標明信心等級**：\n   - 高信心：有數據或實測支持（例：「2 次 Read 完成查詢」— 剛剛測過）\n   - 中信心：邏輯推導但無實測（例：「抽出去 AI 應該會記得讀」）\n   - 低信心：純猜測（例：「310 行可能導致規則稀釋」）\n\n4. **主動列出「我可能想錯的地方」**：在呈現結果時，除了推理鏈和結論，額外列一段「本次推理的薄弱環節」，讓用戶知道該重點審查哪裡\n\n5. **用戶審閱是必要環節，不是禮貌**：自問自答的結果一定要經過用戶審閱。推理鏈讓用戶更容易挑出盲區，但只有用戶能帶入 AI 沒有的視角和經驗\n\n---\n\n## 實例\n\n### 案例：暫存索引機制（2026-02-19）\n\n**原始問題**：查「哪些討論沒結論」需全掃 19 檔、45 秒\n\n**迭代過程**（12 輪）：\n- Q1-Q2：定位根因（暫存區無索引 + 未結討論無追蹤）\n- Q3-Q4：提出最簡方案（`_staging/_index.md` + snapshot `[?]`）\n- Q5-Q8：驗證不重複、不衝突、多機器安全\n- Q9-Q10：回頭驗算效率（2 次 Read vs 20+ 次）\n- Q11：考慮替代方案（grep header），確認索引更好\n- Q12：自我剎車（`[?]` 是否過度設計？→ 成本極低，保留）\n\n**結果**：5 個改動點，效率提升 10 倍\n\n**自我否定紀錄**：Q12 差點砍掉 `[?]` 標記，最終因成本極低而保留。過程中從 4 種狀態砍到 2 種（待推/待決），刪掉「已推」狀態（推完直接刪檔）。\n\n### 反面案例：CLAUDE.md 模組化（2026-02-19）\n\n自問自答 11 輪後得出「抽出記錄層規範，CLAUDE.md 減 40%」的結論。用戶指出自以為是風險後，回頭檢視發現多處薄弱環節：\n\n| 結論 | 問題 | 信心等級 |\n|------|------|---------|\n| 「訊噪比下降是無聲的」 | 無實測，純推測 | 低 |\n| 「記錄層規範是最該抽的」 | 用行數排序，沒考慮使用頻率 | 中 |\n| 「AI 一定會去讀外部文件」 | 自己預測自己的行為 | 中 |\n| 「310 行導致規則稀釋」 | 無證據，也無法設計實驗驗證 | 低 |\n\n**教訓**：自問自答收斂 ≠ 結論正確。收斂只代表 AI 在自己的認知範圍內找不到更多問題，不代表問題不存在。\n","docs/methodology/_index.md":"# 方法論索引（Methodology Index）\n\n本文件是方法論系統的唯一入口。觸發條件、選擇邏輯、執行檔位的判斷都在這裡。各方法論文件只寫操作步驟，不重複本文件的內容。\n\n---\n\n## 方法論總覽\n\n| # | 名稱 | 一句話 | 速查 |\n|---|------|-------|------|\n| 1 | 需求對焦 | 用戶意圖不清時，結構化提問收斂需求，再擺方案讓用戶選 | methodology-checklists § 目標釐清 |\n| 2 | 拆解排序 | 大任務拆成可獨立執行的小塊，按依賴和風險排序 | methodology-checklists § 任務分解 |\n| 3 | 改動前驗證 | 動手前掃影響範圍（靜態）+ 用具體案例走過計畫（動態） | methodology-checklists § 影響分析 |\n| 4 | 事後回顧 | 做完後還原事實、追根因、設計改善並落實 | methodology-checklists § 根因追問 |\n| 5 | 優化提案驗證 | 移除/簡化時，先展開理解再精簡再驗證 | methodology-05 |\n\n橫切機制（不是獨立方法論，是所有工作的收尾標準）：\n\n| 名稱 | 性質 | 文件 |\n|------|------|------|\n| 閉環原則 | 四層驗證：做對了→有效→做全了→沒矛盾 | closed-loop |\n| 獎懲回饋 | 行為回饋迴路：計分板 + 自動偵測 + 自我批評，跨 session 學習 | reward-feedback |\n| 送審前自檢 | 設計類決策的品質檢查，大事可選擇加掛多模型外審 | methodology-checklists § 自我批評迴路 |\n\n### 維護分工（Jin 批准 0224）\n\n| 機器 | 認領方法論 | 備註 |\n|------|-----------|------|\n| JDNE | 需求對焦、拆解排序 | |\n| ITEJ | 閉環驗證、改動前驗證 | |\n| A44T | 事後回顧、送審自檢、**_index.md 統籌** | 負責方法論間關聯性協調 |\n| Z1FV | 事後回顧（根因分析面） | |\n| AINL | 待累積工作數據後分配 | |\n\n認領 ≠ 壟斷，任何機器都能用任何方法論。修改方法論文件前先 /暫存 草稿 → JDNE 評估 → Jin 審 → 才改檔案。\n\n跟前一版的差異：漣漪掃描和乾跑驗證合併為「改動前驗證」（同一件事的兩種工具，不需要兩套獨立流程）。五個為什麼併入事後回顧的「分析原因」階段（根因追問是回顧的內嵌工具，不是獨立方法論）。模型委員會從獨立方法論降級為自檢的可選步驟（委員會的增量價值未被量化，且委員不能取代用戶審閱）。\n\n---\n\n## 選擇邏輯\n\n### 核心原則\n\n方法論之間不互斥。一個任務經常需要串聯多個方法論——先對焦、再拆解、改動前驗證、執行、閉環。選擇邏輯不是「走哪一條路」，而是「這個任務需要經過哪幾站」。\n\n所有方法論都有啟動成本。任務簡單到直接做比走流程快的時候，直接做。這是通則，各方法論不再各自重複聲明。\n\n### 任務檢查清單\n\n收到任務後，依序過以下檢查。每一條獨立判斷，不是 if-else 分支——可以同時命中多條。\n\n```\n□ 指令含模糊詞？ ─── 是 → 需求對焦\n□ 改動 >3 檔案 or 涉及 ≥2 模組？ ─── 是 → 拆解排序\n□ 任務涉及移除、簡化、合併已有機制？ ─── 是 → 優化提案驗證\n□ 要改的檔案被引用 >2 處 or 是公共檔案？ ─── 是 → 改動前驗證（靜態掃描）\n□ 計畫塊數 >5 or 有外部依賴？ ─── 是 → 改動前驗證（動態模擬）\n□ 做完了，同 topic 歷史有 ≥2 筆失敗/修正記錄？ ─── 是 → 事後回顧（根因追問）\n□ 做完了，實際步驟 > 計畫步驟 ×2？ ─── 是 → 事後回顧（建議，非強制）\n□ 做完了 ─── 閉環驗證（四層，必做）\n```\n\n設計類決策在任何階段都可能出現。處理方式：先跑送審前自檢清單（六項），如果改動涉及 CLAUDE.md 或跨 ≥3 模組，加掛多模型外審。影響範圍限於單一模組內部的選擇，自檢通過即可，在推理鏈中寫出為什麼不選其他方案。\n\n### 常見串聯\n\n| 場景 | 方法論鏈 |\n|------|---------|\n| 完整功能開發 | 需求對焦 → 拆解排序 → 改動前驗證 → 執行 → 閉環 |\n| Bug 反覆出現 | 事後回顧（根因追問）→ 改動前驗證 → 執行 → 閉環 |\n| 重構 | 拆解排序 → 改動前驗證 → 執行 → 閉環 |\n| 大型設計決策 | 需求對焦 → 送審前自檢 → （大事加掛外審）→ 用戶決行 |\n| 學習循環 | 事後回顧 → 產出新規則/流程 → 寫入 CLAUDE.md 或方法論文件 |\n| 優化/精簡 | 優化提案驗證 → 改動前驗證 → 執行 → 閉環 |\n| 快速修改 | 改動前驗證（快速檢查檔）→ 執行 → 閉環 |\n\n---\n\n## 三檔執行模式\n\n每套方法論都支持三種執行深度。檔位選擇由觸發條件的嚴重程度決定，不由 AI 自行挑選最輕的。\n\n| 檔位 | 適用條件 | 做什麼 | 成本 |\n|------|---------|--------|------|\n| 快速檢查 | 改動影響 1-2 個檔案，且限於單一模組內部 | 腦中過核心問題清單（見下方），不產出獨立文件 | < 1 分鐘 |\n| 標準流程 | 改動影響 3-5 個檔案或跨模組 | 跑方法論的核心步驟，產出簡要記錄 | 5-15 分鐘 |\n| 完整流程 | 架構級改動、規範變更、或跨 ≥3 模組 | 跑所有步驟含品質驗證，產出完整記錄 | 30+ 分鐘 |\n\n檔位判斷的客觀指標：用 grep 計算影響的檔案數和模組數。1-2 檔案且同模組 → 快速。3-5 檔案或跨模組 → 標準。≥6 檔案或涉及規範文件 → 完整。\n\n### 核心問題清單（快速檢查檔專用）\n\n快速檢查不跑完整步驟，只過以下問題。如果任何一題的答案讓你猶豫，升級到標準流程。\n\n**需求對焦**：指令裡有沒有我不確定的詞？最可能的兩種解讀是什麼？差異大到值得問嗎？\n\n**拆解排序**：這件事拆成幾塊？哪塊最該先做？（風險最高的 or 解鎖最多的）\n\n**改動前驗證**：這個改動直接影響幾個地方？有沒有可能改了 A 壞了 B？用一筆具體資料走一遍，哪一步最可能出問題？\n\n**事後回顧**：問題出在哪一步？為什麼當時會那樣選？什麼改變能防止再犯？\n\n**閉環驗證**：做對了嗎？有效嗎？做全了嗎？沒矛盾嗎？\n\n---\n\n> **以下為設計理由與觸發機制說明，日常操作不需要讀。**\n\n---\n\n## 觸發機制（Single Source of Truth）\n\n觸發條件只在本表維護。各方法論文件引用本表，不另寫觸發段落。修改觸發條件時只改本表 + CLAUDE.md 裡的對應規則，兩處同步即可。\n\n### 兩套導航並存\n\n**觸發機制是底線**——事件觸發規則寫在 CLAUDE.md，AI 碰到符合條件的客觀指標時自動啟動。作用是攔截。\n\n**選擇邏輯是主動導航**——用戶或 AI 面對任務時，走上方的檢查清單。作用是規劃。\n\n執行順序：觸發機制先跑（被動的，嵌在工作路徑上）。沒觸發的話，AI 或用戶走選擇邏輯。兩者給出不同結論時取嚴格的——寧可多跑一次不該跑的，不要漏掉一次該跑的。\n\n### 觸發時機\n\n觸發條件在「收到任務時」做第一輪檢查。但部分條件（如檔案數、模組數）需要先完成需求對焦才能判斷。\n\n流程：收到任務 → 第一輪觸發檢查（能判斷的先判斷）→ 需求對焦（如觸發）→ 第二輪觸發檢查（用對焦後的資訊重新掃描）→ 進入後續方法論。\n\n第二輪不需要重跑需求對焦，只需重新比對觸發條件表。\n\n### 事件觸發規則\n\n所有觸發條件都是可機械判斷的客觀指標，不依賴 AI 主觀感覺。\n\n| 觸發條件 | 啟動 | 判斷方式 | 檔位 |\n|---------|------|---------|------|\n| 指令含代名詞（那個、這件事）或範圍不明詞（更好、處理一下） | 需求對焦 | 文字特徵掃描 | 依歧義嚴重度：輕微→快速，嚴重→標準 |\n| 改動 >3 個檔案 or 涉及 ≥2 模組 | 拆解排序 | grep 檔案計數 + 模組歸屬 | 3-5 檔→標準，≥6 檔→完整 |\n| 要改的檔案被引用 >2 處，或是設定檔/共用模組/規範文件 | 改動前驗證（靜態） | grep 引用計數 + 檔案類型 | 引用 3-5 處→標準，>5 處或規範文件→完整 |\n| 計畫塊數 >5，或包含對外部服務的呼叫 | 改動前驗證（動態） | 塊數計數 + 外部依賴存在 | >5 塊→標準，>10 塊或多個外部依賴→完整 |\n| 實作中途：範圍膨脹 >50% 或核心假設被推翻 | 暫停 → 重新評估（拆解排序或需求對焦） | 計畫 vs 實際比對 | 依重新評估結果決定 |\n| 同 topic ID 下有 ≥2 筆狀態為「失敗」或「修正」的 OP 記錄 | 事後回顧（根因追問） | 查 OP 記錄 | 標準 |\n| 實際步驟數 > 計畫步驟數 ×2 | 事後回顧（建議，非自動執行） | 計畫 vs 實際比對 | 由用戶決定是否啟動及檔位 |\n| 改動涉及 CLAUDE.md 或跨 ≥3 模組 | 送審前自檢 + 多模型外審 | 檔案類型 + 模組計數 | 完整 |\n\n操作型定義補充：\n\n「計畫塊數」指拆解排序法產出的工作塊，不是子任務或程式碼行數。一個塊 = 一個可獨立驗收的交付物。\n\n「同類問題」指同一 topic ID 下的記錄。Topic ID 以問題本質命名（如 `trigger-unreliable`），不以出現場景命名（不用 `session-20260215-bug`）。AI 在修復問題時先查該 topic ID 的歷史 OP，已有 ≥1 筆失敗/修正記錄（加上當前這筆 = ≥2），即觸發。\n\n### 中途重新評估\n\n實作過程中如果發現以下情況，暫停實作，退回相應方法論：\n\n| 情況 | 退回 |\n|------|------|\n| 需求理解有誤 | 需求對焦 |\n| 範圍比預期大 >50% | 拆解排序（重新拆和排） |\n| 核心假設被推翻 | 改動前驗證（重新掃描） |\n| 多個步驟失敗 | 事後回顧 |\n\n退回不是失敗，是用新資訊做更好的決策。不退回才危險——硬著頭皮做下去，前面的工作可能全部白費。\n\n### 工具脈絡合法性\n\n觸發條件命中只代表「這個工具通常在這種情況下有用」。啟動前額外確認：這個工具在**當前具體脈絡**下是否合法？\n\n已知的脈絡衝突：\n- 用方法論工具（如模型委員會）評價方法論本身 → 循環（「拿被告當法官」）\n- 用閉環驗證分析工作的「完成度」→ 閉環的驗證手段以檔案改動為中心，分析工作不適用\n\n遇到脈絡衝突時，標記為「此工具在本脈絡不適用」，不是跳過驗證，而是改用脈絡外的驗證方式（如用戶判斷、獨立指標）。\n\n### 工具觸發指令\n\n| 指令 | 對應方法論 | 用法 |\n|------|-----------|------|\n| `/對焦` | 需求對焦 | 對一個需求做結構化提問 |\n| `/拆解` | 拆解排序 | 把一個大目標拆成工作清單 |\n| `/驗證 [檔案名]` | 改動前驗證 | 掃描影響範圍 + 案例走查（原 `/掃描` 和 `/乾跑` 合併） |\n| `/回顧` | 事後回顧 | 回顧過程和教訓，含根因追問（原 `/根因` 併入） |\n| `/自檢` | 送審前自檢 | 設計類決策的品質檢查 |\n\n### 人類觸發（最後防線）\n\n所有方法論都支持用戶直接觸發。事件觸發沒攔住、AI 一頭衝進去做了，用戶叫停就是最後防線。不是理想狀態，但必須保留。\n\n---\n\n## 觸發機制的設計原則\n\n這一節說明觸發為什麼這樣設計，日常操作不需要讀。\n\n### 三層觸發按可靠度排序\n\n工具觸發（最可靠，用戶主動呼叫）> 事件觸發（中等，靠 CLAUDE.md 規則攔截）> 人類觸發（最後防線，負擔在用戶身上）。\n\n### AI 不遵守方法論的三層根因\n\n第一層——觸發問題：AI 處理任務是流水線，沒有內建機制讓它停下來檢查「該不該跑某個方法論」。第二層——成本問題：完整跑一遍的 token 和時間成本不低，AI 的隱性傾向是「直接做最快」。第三層——判斷問題：即使願意跑，「什麼時候該跑哪個」需要判斷力。\n\n三檔執行模式處理第二層（降低成本讓 AI 不會因為成本太高而跳過）。觸發規則表處理第一層和第三層（用客觀指標代替主觀判斷）。\n\n### 現實期望\n\n合規率不會是 100%。事件觸發有假陽性（不需要跑但觸發了）和假陰性（需要跑但沒觸發）。提升路線：觀察實際合規率 → 哪條規則觸發率低就調整觸發條件 → 反覆迭代。這本身是事後回顧的對象。\n\n---\n\n## 外部依賴清單\n\n方法論引用了以下不在本文件群裡的外部元件。列出來方便判斷系統實際覆蓋率。\n\n| 外部元件 | 被誰引用 | 做什麼 | 狀態 |\n|---------|---------|--------|------|\n| CLAUDE.md | 觸發規則、閉環原則、各種行為規範 | AI 的操作規範主文件 | 已建立 |\n| 記錄層三層架構（OP / 小結 / 快照） | 事後回顧（還原事實）、觸發條件（查歷史） | 跨 session 的資訊持久化 | 已建立 |\n| 碰撞偵測系統 | 改動前驗證（多機器場景）、拆解排序（平行塊分配） | 偵測多機器同時改同一

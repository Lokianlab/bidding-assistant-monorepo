LAUDE.md 規定「可讀不可寫原始資料庫，實驗用沙盒」，但具體沙盒方案未定。\n\n## 研究結果\n\n### Notion API 能力\n\n- **沒有一鍵複製資料庫的 API**\n- 要用 API 做等效操作，需要自己組合：取得 schema → 建新 DB → query 所有 pages → 逐筆在新 DB 建 page\n- 限制：rate limit（平均 3 req/s）、relation/rollup 無法完美複製、系統欄位（created_time 等）不可寫入\n- 本專案 22 個欄位大部分是基本型別，schema 複製可行；200 筆資料約需 70 秒\n\n### 四個方案比較\n\n| 方案 | 開發成本 | 複製完整度 | 安全性 | 自動化 |\n|------|---------|-----------|--------|--------|\n| A: 純 API 複製 | 高（2-3天） | 中 | 高 | 可 |\n| B: UI 手動複製 | 零 | 高 | 高 | 不可 |\n| C: JSON Mock | 中（半天） | 低（靜態快照） | 最高 | 可 |\n| D: 混合（B+C） | 中（半天） | 高 | 最高 | 部分 |\n\n### 推薦：方案 D（混合）\n\n- **日常開發和單元測試**：JSON mock（離線、快速、不受 rate limit 影響）\n- **整合測試**：Notion UI 複製的沙盒 DB，切環境變數即可\n- **正式環境**：原始 DB\n\n切換方式：`.env.local` 加 `NOTION_MODE`（mock / sandbox / live）\n\n### 要做的事\n\n1. 寫匯出腳本（`scripts/export-notion-data.ts`）：讀所有 pages 存 JSON\n2. API route 加 mock 模式：讀 `NOTION_MODE`，mock 時從 JSON 讀\n3. Notion UI 複製一個沙盒 DB，ID 配在 `.env.sandbox`\n4. `.env.example` 加說明\n\n### 不做純 API 複製的理由\n\n- ROI 太低：花 2-3 天，relation/rollup 還複製不完美\n- 沒有現成 npm 套件做「Notion 資料庫複製」\n- 資料庫 schema 穩定後不常改，手動複製頻率低\n","app-docs/dev-plan/_staging/M01-核心設計審查.md":"# 暫存：M01 情報模組核心設計審查（模型委員會）\n\n- **目標文件**：M01-情報模組.md\n- **操作**：重大修訂（v2.0）\n- **來源**：模型委員會三人審查（2026-02-20）\n- **委員組成**：用戶代表（非技術老闆視角）、前端架構師、產品經理\n\n## 審查結論摘要\n\nM01 v1.0 的核心設計方向需要重新思考。技術規格寫得詳盡，但從產品和使用者角度有根本性的問題。\n\n### 三人共識\n\n1. **localStorage 設計方向錯誤**：應改用 IndexedDB（容量大、非同步不卡 UI）\n2. **10 分鐘等待不可接受**：長時間分析應改為背景執行 + 完成通知，不是前台等待\n3. **錯誤處理是核心功能**：使用者不知道資料不完整比沒有資料更危險\n4. **分析結果不該自動消失**：使用者認為這是「做好的報告」，不是快取\n5. **模組太大，MVP 需按使用者需求重新定義**：不是按技術分期拆\n\n### 五個關鍵盲區\n\n#### 盲區 1：沒有人驗證過 PCC 資料能不能支撐這些分析（用戶代表）\n\n規劃預設資料是乾淨、完整、可以直接分析的。但政府採購資料有很多「看起來是資料但不能直接用」的情況。如果分析結果基於有問題的資料，情報反而會導致錯誤決策。\n\n**行動項**：在寫第一行程式碼之前，拿一個真實標案手動跑一次分析，確認結果有意義。\n\n#### 盲區 2：從資料出發而非從工作流程出發（產品經理）\n\n規劃問的是「PCC 有 1422 萬筆，能做什麼分析」，應該問的是「企劃團隊在評估一個案子時，需要回答什麼問題」。6 個 Tab 是以分析功能為中心，不是以使用者任務為中心。\n\n企劃的實際思路：「我下週要投 XXX，我需要知道什麼？」\n\n#### 盲區 3：統編可能不在搜尋結果裡（前端架構師）\n\n統編欄位可能只存在於 tenderDetail（逐案查），不在搜尋結果（批量查）裡。如果是這樣，整個交叉比對的 IO 量會乘以 N 倍。\n\n**行動項**：用真實 API 回應確認統編在哪個端點回傳。\n\n#### 盲區 4：分析結果沒有下游（產品經理）\n\n情報模組的分析結果要怎麼進入 L2-L8 的提案流程？如果只是給人看、不進入後續工作流程，就是儀表板不是駕駛艙。\n\n#### 盲區 5：長時間運算的架構根本不對（前端架構師）\n\n- Vercel 預設 timeout 10 秒，10 分鐘在伺服器端跑不完\n- 瀏覽器切 tab 或螢幕熄滅，前端運算會中斷\n- 應改為：使用者點「開始分析」→ 背景跑（Web Worker / requestIdleCallback）→ 跑完通知\n- 部分成功要能存，中斷要能繼續\n\n### 建議的 MVP 重新定義\n\n**產品經理方案（2 頁面取代 6 Tab）**：\n\n1. **案件情報**：輸入案名或案號 → 這個案子的歷史（以前招過嗎、誰得標、投幾家、我們投過嗎）\n2. **對手側寫**：點進一個廠商 → 跟我們撞過幾次、在哪些機關勝率高\n\n延後：市場趨勢圖表、自我分析全景、P 偵察、評委分析\n\n**前端架構師方案（按 IO 複雜度拆）**：\n\n- Phase 1 只做自我分析 + 機關偏好（IO 量可預測）\n- Phase 2 加競爭對手分析（改為背景 Job）\n- Phase 3 加評委分析（IO 最密集，需要驗證可行性）\n\n**判斷標準**：MVP 給企劃團隊用一個月。如果他們因此改變了某個標案的投標決策，模組就有價值。\n\n### 前端架構師的技術建議\n\n1. 儲存層從 localStorage 換 IndexedDB（用 `idb` 庫，1KB）\n2. Route Handler 拆成多個 route（`/api/pcc/search`、`/api/pcc/detail`、`/api/pcc/batch`），不要用 body action 分流\n3. 規劃 Server Component / Client Component 邊界\n4. 競爭對手分析改為背景 Job + 斷點續傳\n\n### 開工前必做（全員同意）— 已驗證 (A44T, 2026-02-21)\n\n用真實案例手動驗證：\n1. ✅ 統編在哪個 API 回傳？→ **搜尋結果就有**（`brief.companies.ids` 直接包含統編），不需逐案查 tenderDetail。盲區 3 不成立。\n2. ✅ tenderDetail 是否包含評委資料？→ **有**（`最有利標:評選委員` 欄位，含姓名、職業、出席、學經歷）。但只有最有利標/準用最有利標的案子才有。\n3. ✅ searchByCompany 單頁回應大小？→ Page 1: 200KB（~70 筆），Page 2: 65KB（~69 筆）。合計 265KB，前端可接受。\n4. ✅ 真實標案分析？→ 竹北光節案（780 萬，4 家投標），大員洛川排名第 4，未得標原因「非最有利標或最優勝廠商」。評選序位明確，資料對投標決策有幫助。\n\n**結論**：資料品質足夠支撐 Phase 3 分析。Phase 3 競爭分析核心已建成（commit 86fea86），包含自我分析 + 對手排行 + 機關分析 + 年度趨勢。\n","app-docs/dev-plan/_staging/saas-architecture-discussion.md":"# SaaS 架構討論暫存（建議書，未定案）\n\n> 來源：舊 OneDrive 專案 Claude 記憶 `saas-architecture-discussion.md`\n> 原始日期：2026-02-18\n> 狀態：**討論中，Layer 3 進行到一半**\n\n---\n\n## 討論背景\n\n用戶想先寫「精靈」（wizard）快速建立知識庫（00A-00E），在討論配套技術選型時，\n發現需要先「以終為始」確認終態架構，再倒推現在的技術選擇。\n\n---\n\n## Layer 1：誰用？怎麼用？（已確認）\n\n| | Phase 1（自己） | Phase 2（公司員工） | Phase 3（商業軟體） |\n|---|---|---|---|\n| **人數** | 1 | 2-25 | 不定 |\n| **設備** | 多台 Windows | 手機/Win/Mac/個人電腦 | 不可控 |\n| **存取方式** | CLI + 網頁 | 網頁 + Discord + App/安裝程式 | 網頁為主 |\n| **地點** | 辦公室+家 | 任何有網路處 | 任何有網路處 |\n| **離線需求** | 不需要 | 不需要 | 不需要 |\n\n### 關鍵發現\n- 手機是一等公民，不是附屬品\n- 員工會用：手機（Discord 或網頁）、公司 Win 電腦、Mac、個人電腦（網頁）\n- 手機上能操作的功能越多越好\n\n---\n\n## Layer 2：產品形態（已確認）\n\n| 決策 | 結論 |\n|------|------|\n| **主介面** | Web App，**Mobile-first RWD** |\n| **UI 框架** | 現有 Next.js + Tailwind CSS（天生支援 RWD） |\n| **手機體驗** | PWA 安裝到手機桌面 |\n| **Discord Bot** | Phase 2 輕量補充（通知、快速查詢） |\n| **原生 App** | Phase 3 再評估 |\n| **自動更新** | Web 部署即更新，不需要安裝檔機制 |\n\n### 關鍵決策\n- 不需要打包安裝檔 — 網頁部署即更新\n- RWD 是必須的\n- 需要 Mobile-first 設計思維\n\n---\n\n## Layer 3：基礎設施（討論中）\n\n### 已確認：用盡現有服務，只補缺口\n\n| 需求 | 決定用什麼 | 狀態 |\n|------|-----------|------|\n| **託管** | Vercel（免費，Next.js 最佳選擇） | ✅ 確認 |\n| **員工登入** | Google Workspace（已有帳號） | ✅ 確認 |\n| **標案追蹤** | Notion（已在用，不動） | ✅ 確認 |\n| **實績照片** | SmugMug（已整合，不動） | ✅ 確認 |\n| **文件儲存** | Google Drive（已有） | ✅ 確認 |\n| **知識庫 00A-00E** | ？ | ⚠️ 待決定 |\n\n### 知識庫儲存：兩個選項待決\n\n**選項 A：Notion**\n- 優勢：不加新服務、員工可直接在 Notion UI 編輯\n- 劣勢：巢狀資料要拆多個 linked database、API rate limit 3 req/s\n\n**選項 B：Supabase（只用 PostgreSQL）**\n- 優勢：完美處理巢狀結構、SQL 查詢、pgvector 未來語意搜尋\n- 劣勢：多加一個服務（但免費方案 500MB 夠用）\n\n### Supabase 費用參考\n| 階段 | Vercel | Supabase | 月費 |\n|------|--------|----------|------|\n| Phase 1 | Free | Free | $0 |\n| Phase 2 | Pro $20 | Pro $25 | ~$45/月 |\n| Phase 3 | 按量計費 | 按量計費 | 看用量 |\n\n---\n\n## Layer 4：資料架構（尚未開始）\n\n待 Layer 3 定案後推導：\n- 知識庫 DB schema（從 types.ts 映射）\n- 開發期 vs 上線期是否一致\n- 精靈的技術選型\n\n---\n\n## Layer 5：現在該做什麼（尚未開始）\n\n待所有 Layer 定案後推導：\n- 精靈形態（Claude Code Skill vs Web wizard）\n- 開發順序\n- 第一步具體行動\n\n---\n\n## 系統功能分類（查 vs 改）\n\n### 查（讀取/檢視）\n- 查標案進度（案件看板、儀表板、狀態總覽）\n- 查知識庫（00A 團隊、00B 實績、00C 範本、00D SOP、00E 檢討）\n- 查績效（投標勝率、趨勢圖表、交叉分析）\n- 查提示詞模板（L1-L8 prompt、KB 引用矩陣）\n- 查競爭情報（PCC API 對手紀錄、評委資訊）\n- 查文件（已產出的建議書、簡報、報告）\n\n### 改（建立/編輯/操作）\n- 編輯知識庫（新增/修改 00A-00E 各類條目）\n- 更新標案狀態（改案件進度、階段、備註）\n- 組裝提示詞（選階段 + 選知識庫 → 產出 prompt）\n- 報價驗算（輸入數字、調整參數）\n- 品質檢查（貼入文字 → 跑檢核）\n- 生成文件（產出 Word/簡報）\n- 跑 AI 工作流（L1-L8 各階段多輪對話）\n- 系統設定（Notion 連線、功能開關、欄位對照）\n\n---\n\n## 開發環境架構（重要發現）\n\n### 核心問題\n用戶想從手機（Telegram）繼續開發工作，但 Claude Code 跑在本地電腦上，\n手機不知道該呼叫哪台電腦。\n\n### 解法：指定一台常開電腦作為開發中心\n\n```\n手機 ──Telegram Bot──→ 常開的那台電腦（辦公室桌機）\n                        ├── 專案檔案\n                        ├── MCP servers（SmugMug etc.）\n                        ├── Claude API + tools\n                        └── Telegram Bot 程式\n\n其他電腦 ──git/SSH──→ 同一台\n```\n\n- **不需要買雲端伺服器**，用現有電腦就行（參考 OpenClaw 用 Mac Mini 的做法）\n- Phase 1：辦公室/家裡一台常開的電腦\n- Phase 2：同上，或視需求搬到雲端\n- Phase 3 商業化：才真正需要雲端伺服器\n\n### Telegram Bot 架構\n- Telegram Bot 跑在常開電腦上\n- 收到訊息 → 呼叫 Claude API（帶 tool use）→ 操作本地檔案 → 回傳結果\n- 支援語音輸入（手機端語音轉文字 → Telegram 傳文字訊息）\n- 跟 Phase 2 的 Discord Bot 是同一個後端架構，做一次兩個頻道都能用\n\n### 影響\n- Layer 1 存取方式更新：Phase 1 也包含手機（Telegram）\n- 「上雲」的時間點推遲到 Phase 2/3，Phase 1 用本地電腦即可\n- Telegram Bot 可以作為精靈的另一個入口（不只 Claude Code Skill）\n\n---\n\n## 下次繼續的議題\n\n1. **Layer 3 收尾**：知識庫用 Notion 還是 Supabase？\n2. **Layer 4**：資料架構（DB schema 設計）\n3. **Layer 5**：現在該做什麼（精靈技術選型、開發順序）\n4. **Telegram Bot**：是否納入 Phase 1 開發範圍？\n","app-docs/dev-plan/_staging/_index.md":"# 暫存索引\n\n> 格式：{filename}|{type}|{target}|{status}|{summary}\n> type: plan（開發計畫）/ rule（規範變更）/ issue（問題觀察）\n> status: 待推（結論明確，等 /修改計畫 寫入）/ 待決（有討論但結論未定）/ 擱置（Jin 指示暫不處理）/ 已完成（可清除）\n> /暫存 建檔時自動更新此索引。/修改計畫 推完後刪除對應行和檔案。\n\n08-風險清單深度審查.md|plan|08-風險與待決.md|擱置|模型委員會審查：既有項深化（#1/#2/#8-#10）+ 遺漏風險（M01 阻塞、認證、儲存、時程）\nM01-核心設計審查.md|plan|M01-情報模組.md|擱置|模型委員會審查：核心設計需重新思考（MVP 重定義 + 4 項開工前驗證）。4 項開工前驗證已全部通過，情報模組已建完\nsaas-architecture-discussion.md|plan|03-技術選型.md|擱置|Layer 1-2 已確認，Layer 3 已決（Supabase），Layer 4-5 未開始\n元方法論框架.md|rule|docs/methodology/meta-methodology.md（新建）|擱置|元方法論四層架構+目的體系+設計原則+Thomann對照+V2操作化（12獨立指標）\ndb-sandbox-方案.md|plan|08-風險與待決.md|擱置|資料庫沙盒方案：推薦混合（JSON mock + UI 複製沙盒 DB），純 API 複製 ROI 太低\n團隊運作優化方案.md|rule|CLAUDE.md + docs/records/inbox/ 多檔|擱置|提案效益審查後縮小範圍：執行 inbox 目錄 + CLAUDE.md 加兩行（inbox 路徑 + commit format）\n知識庫精靈現況與下一步.md|plan|06-開發進程.md|已完成|/kb 指令已建成，Skill 版已上線\n機器側寫與協作策略.md|issue|（觀察性文件）|已完成|論壇三方共識已達成，側寫公開、輕量自評+回報時刷新\n","app-docs/dev-plan/_staging/元方法論框架.md":"# 元方法論框架（Meta-Methodology）\n\n類別：rule\n目標：docs/methodology/meta-methodology.md（新建）\n日期：2026-02-21\n相關 OP：待建\n\n---\n\n## 背景\n\n系統方法論 v2 已建成（4 套方法論 + 閉環 + 模型委員會，10 份文件），但缺少一個上位框架來回答：「憑什麼說這套方法論是好的？用什麼標準評價和改進它？」\n\n在微調個別方法論文件之前，需要先確立元方法論——對方法論的評價與反思理論。否則微調只能靠體感，沒有客觀依據。\n\n本框架參照 Thomann/Hutchinson 操作性元方法論（1973/1984），結合本專案人機協作的實際情境建構。\n\n## 結論\n\n### 一、四層遞進架構\n\n```\n高元方法論 ── 元方法論的開發標準及評價工具\n  ↓\n元方法論   ── 方法論的開發標準及評價工具\n  ↓\n方法論     ── 方法的開發標準及評價工具\n  ↓\n方法       ── 具體操作步驟\n```\n\n每一層為下一層的開發標準及評價工具。建構順序由上而下：先完成上層，再以上層開發和評價下層。\n\n### 零、高元方法論——基礎審視原則\n\n高元方法論為元方法論的開發標準及評價工具。這一層回答：「我們用來評價方法論的那套標準，它自己站得住腳嗎？」\n\n#### 循環評價問題\n\n元方法論的評價工具不能來自被評價的方法論。否則是拿被告當法官——用閉環四層來評價閉環四層、用觸發規則來評價觸發規則，都是循環論證。\n\n操作化指標必須獨立於被評價的方法論工具。可用的是更底層的觀察手段：用戶行為（接受/退回）、結果與預期的差距、時間序列趨勢——這些不依賴任何特定方法論工具。\n\n#### 基礎公設風險\n\n放進元方法論基礎層的任何概念，都會滲透到所有後續建構的方法論和方法中，且極難被事後評估或移除。原因：評估工具本身就依賴這些基礎概念，系統無法用自己偵測自己的基礎錯誤。\n\n例：如果在元方法論中採用貝式定理作為迭代機制的基礎，那貝式思維將成為整個系統的一部分。貝式定理本身是數學定理（邏輯上無誤），但我們對它的「應用方式」可能有誤（選錯先驗、誤判證據、設錯閾值）。如果應用方式有系統性偏差，整個系統都會繼承這個偏差，且系統自己偵測不到。\n\n#### 基礎選擇準則\n\n放進元方法論基礎層的概念，應滿足：\n\n1. **獨立於被評價對象**——評價工具不是被評價系統的一部分\n2. **可外部驗證**——不依賴系統內部判斷來確認正確性，可用系統外部的觀察驗證\n3. **最小假設**——基礎公設越少越好，每多一個假設就多一個無法自我偵測的風險點\n4. **失敗可辨識**——對每個基礎假設，要能說清楚：如果這個假設是錯的，我們會看到什麼現象。答案是「看不出來」的假設不該放在基礎層\n\n#### 標準即修正方向\n\n任何定義了目標狀態的標準，同時定義了從現狀到目標的修正方向。此性質適用於所有層級的所有標準，不依賴特定評價框架。\n\n#### 回歸終止\n\n四層架構在高元方法論終止，不再無限回歸。原因：高元方法論的原則（獨立、可外部驗證、最小假設、失敗可辨識、標準即修正方向）是接近自明的認識論原則，不需要更上一層的理論來證成。它們的正當性來自邏輯和經驗的基本共識，而非來自另一套後設框架。\n\n### 二、定義\n\n系統方法論：一套規範人機協作中 AI 行為的方法體系。\n\n三個層次構成完整的方法論：\n- **方法**：怎麼做（操作步驟）\n- **原則**：為什麼這樣做（讓 AI 能舉一反三）\n- **自我迭代**：怎麼知道方法有沒有用、怎麼改進（貝式更新機制）\n\n缺任何一層，都不算方法論——只有方法是手冊，只有原則是哲學，沒有迭代是教條。\n\n不是規範手冊（照做就好），是方法論（理解了才能用好）。這個命名定義了系統的層級。\n\n### 三、根本問題\n\nAI 有結構性缺陷：跨 session 無記憶、沒有內建時鐘不會主動停、自己檢查自己盲區共享、天性傾向直接行動而非先想清楚。多機器協作放大這些問題。\n\n方法論的存在是用制度補結構性缺陷——不靠 AI 自律，靠系統設計。\n\n### 四、目的體系——效率為終極標準\n\n「效率」不是與品質、透明並列的一個維度，而是所有維度最終服務的目標：\n\n```\n品質穩定     → 減少返工      → 效率\n過程可見     → 便於檢討      → 效率\n穩定有信心   → 不用額外準備   → 效率\n能自己成長   → 減少外部介入   → 效率\n```\n\n效率 = 協作產出的總價值 / 協作消耗的總成本（時間 + 溝通 + 返工 + 認知負擔 + 維護成本）\n\n#### 第一層：協作品質（每次都要達到的）\n\n1. **穩定 95 分**——靠制度不靠臨場發揮，每次都交出可預期的品質\n2. **降低溝通往返**——AI 交出的東西用戶不用反覆退回重做\n3. **複雜任務有信心**——步驟再多，每一步都有檢查點，做到第八步不用擔心第三步\n\n#### 第二層：過程性質（系統必須具備的特性）\n\n4. **過程可見**——關鍵步驟和關鍵判斷攤開，粒度以用戶能有效監督和決策為準\n5. **出錯可回溯**——出了問題，能沿著步驟精準找到哪一步斷的\n6. **結果可歸因**——答對了也能分辨是蒙對的、亂用方法碰巧對的、還是正確運用方法\n\n#### 第三層：成長能力（讓系統越來越好）\n\n7. **培養判斷力**——從照做規則 → 理解原則 → 舉一反三，能應對規則沒覆蓋的情況。掌握了方法就能自學、能知何能為及知何不能為，區分 known known 和 known unknown\n8. **貝式自我迭代**——每次執行都是證據（成功/失敗/跳過），證據持續更新對方法有效性的信念，累積到閾值時觸發強化或修改。不只等別人指出問題，系統自己能監控、觀察、反思\n\n#### 數學課比喻（貫穿全目的體系）\n\n老師要求學生：不跳步驟、計算紙從左上角開始、小結論標星號、5 和 8 寫清楚、不確定先驗算再解題。\n\n這些規範的效果：\n- 降低錯誤率，提高解題效率（穩定 95 分）\n- 學生交卷時已自己驗算過，老師不用一直退回（降低往返）\n- 題目越長越難，按步驟寫的學生越穩（複雜任務有信心）\n- 老師能從計算紙看到怎麼算的（過程可見）\n- 答錯了翻計算紙就知道哪步錯（出錯可回溯）\n- 答對了也能看出是真懂還是蒙的（結果可歸因）\n- 學生掌握了方法就能自學、舉一反三（培養判斷力）\n- 為老師的批改和檢討教學帶來參考資料，持續改善教法（貝式迭代）\n\n### 五、設計原則\n\n用來判斷「這條規則寫得好不好」「這段內容該不該放」的準則：\n\n**P1 — 穩定可遵守**：規則基於客觀指標，不依賴 AI 自覺或記憶。能每次做到的規則才是好規則。\n\n**P2 — 步驟可定位**：每步有編號或命名，出問題時能說「第三步的判斷有誤」。\n\n**P3 — 原則可遷移**：不只告訴 AI「做什麼」，也告訴它「為什麼」。區分：培養判斷力的原則（留）vs 設計歷史紀錄（移出到記錄層）。\n\n**P4 — 單一來源**：同一件事只在一個地方定義。10 份文件之間不重複、不矛盾。\n\n**P5 — 證據雙向**：成功、失敗、跳過都是證據。不只收集問題，也收集「方法有效」的正面證據。\n\n**P6 — 比例原則**：方法論的力度與任務的複雜度和風險成正比。簡單任務用輕量方法，複雜任務用完整流程。條件受限時，降低力度但不放棄——部分遵守的價值遠大於完全不遵守。\n\n### 六、內容區分原則\n\n用來判斷方法論文件中「什麼該留、什麼該移、什麼該砍」：\n\n| 內容性質 | 判斷標準 | 處置 |\n|---------|---------|------|\n| 操作步驟（怎麼做） | AI 執行時需要 | 留 |\n| 設計原則（為什麼這樣做） | 理解了能幫助 AI 舉一反三 | 留，寫成培養判斷力的形式 |\n| 設計歷史（從 A 改成 B 的過程） | 只對設計者回溯有用 | 移出到記錄層 |\n| 設計驗證（覆蓋了幾個情境） | 設計完成後不再被查閱 | 移出到附錄 |\n| 沒有執行機制的規則 | 寫了但不會被觸發 | 補機制或移到「待建」 |\n\n### 七、文件品質標準\n\n每份方法論文件都應滿足：\n\n1. **可穩定遵守**——規則基於客觀指標\n2. **過程攤開**——每步的中間產出有定義\n3. **出錯可定位**——步驟有編號，能精準指出斷點\n4. **原則可遷移**——告訴 AI「為什麼」，讓它能應對變體\n5. **自帶改進機制**——包含「怎麼知道方法有沒有用」和「怎麼改進」\n\n### 八、系統層級檢視\n\n不只看單一文件，還要看 10 份文件作為一個系統：\n\n- **完整性**——從接到任務到交付成果，每個關鍵時刻都有對應方法\n- **連貫性**——方法論之間銜接清楚（A 的產出是 B 的輸入）\n- **不矛盾**——文件之間沒有互相衝突的規則\n- **不冗餘**——同一件事只在一個地方定義\n- **可迭代**——系統本身有機制檢驗和改進自己\n\n### 九、修正邏輯\n\n評價工具找出問題後，怎麼修：\n\n**修正方向**：每個標準定義了目標狀態，現狀跟目標狀態之間的差距就是修正內容。不需要額外判斷——標準本身隱含了修正方向。\n\n| 診斷結果 | 修正方向 |\n|---------|---------|\n| 設計原則不通過 | 改寫到通過（P1 換客觀觸發、P2 加編號、P3 補原則、P4 去重複、P5 補正面證據、P6 加檔位） |\n| 內容放錯位置 | 搬到該去的地方（設計歷史→記錄層、設計驗證→附錄） |\n| 空規則（寫了但沒執行機制） | 補機制或移到「待建」 |\n| 定義不完整（缺方法/原則/迭代） | 補上缺的層次 |\n| 系統銜接斷裂 | 對齊文件之間的輸入輸出介面 |\n| 文件間矛盾 | 回到目的體系判斷哪邊對，統一 |\n\n**修正排序**（多個問題同時存在時）：\n1. 目的體系第一層的問題（品質、交付）優先於第二層（過程可見）優先於第三層（成長）\n2. 同層內，系統層級問題（矛盾、斷裂）優先於單一文件問題（編號缺失）\n\n**副作用檢查**：修完後用同一套評價工具再掃一遍。改 A 可能壞 B——合併重複內容可能讓另一份文件變不完整；搬走設計歷史可能讓上下文斷裂。修了沒驗不算修完。\n\n### 十、Thomann 七步對照\n\n| 步驟 | Thomann | 本專案狀態 |\n|------|---------|-----------|\n| 1 | 接觸問題 | ✓ AI 結構性缺陷導致人機協作效率不穩定 |\n| 2 | 陳述目的 | ✓ 提高人機協作的整體效率 |\n| 3 | 四項準則測試 | ✓ 可欲性、可行性、不充分性、可操作化性均通過 |\n| 4 | 分析目的蘊含 | ✓ 八個面向，全部匯向效率 |\n| 5 | 操作化目的 | ✓ V2 完成——12 個獨立指標，基於用戶行為/產出差距/時間序列 |\n| 6 | 設計程序 | 已有初版（10 份文件），待以元方法論重新評價和微調 |\n| 7 | 測試修訂 | 進行中（多機器實際使用 + 本次對話） |\n\n### 十一、自我迭代機制（貝式更新）\n\n```\n執行方法論\n  ↓ 產生\n一筆執行紀錄（成功 / 失敗 / 跳過）\n  ↓ 累積\n對該方法有效性的信念更新\n  ↓ 達到閾值\n行動：夠信任 → 強化（簡化、內化）\n      夠質疑 → 修改（調整規則、改觸發條件、換方法）\n  ↓ 修改後\n新的先驗 → 繼續收集證據 → 循環\n```\n\n主動迭代需要三個能力：\n- 監控——執行過程中觀察自己的行為\n- 發現——辨識出偏差或異常\n- 反思——判斷問題是個案還是系統性的\n\n### 十二、操作化——把「效率」變成可衡量指標（V2，已修正循環引用）\n\n> V1 犯了循環評價錯誤（用閉環四層評價閉環四層、用觸發規則評價觸發規則等 6 處循環引用）。\n> V2 原則：所有指標只基於不依賴任何方法論工具的底層觀察。\n\n### 基本原則\n\n所有指標只基於三種獨立可觀察的事物：\n\n1. **用戶行為**——接受、退回、追問、花多少時間做決定\n2. **產出與預期的差距**——做出來的東西跟要求的一不一樣\n3. **時間序列**——同類事情隨時間推移，表現的變化方向\n\n這三者不依賴閉環四層、觸發規則、三檔機制或任何方法論工具。無論方法論怎麼設計，這些觀察都成立。\n\n效率有兩面——產出和成本。方法論要讓產出變大、成本變小。只看結果不夠，還要看過程——結果好可能是運氣，過程好才能穩定重複。指標分四類：\n\n- **A. 成果指標**——協作產出了什麼品質的東西\n- **B. 過程指標**——做事的方式是否透明、可追溯\n- **C. 成本指標**——達成結果消耗了多少資源\n- **D. 成長指標**——系統有沒有隨時間變好\n\nA 和 C 合在一起衡量當下的效率。B 解釋為什麼效率高或低。D 衡量趨勢。\n\n#### A. 成果指標\n\n**A1. 用戶首次接受率**\n- 定義：AI 交付後，用戶不要求修改就接受的比例\n- 觀察方式：用戶說了「好」「可以」「通過」而非「改一下」「不對」「重做」\n- 為什麼獨立：只看用戶的反應，不預設用什麼流程產出\n- 基準：趨勢向上。絕對值因任務類型而異（探索型任務首次接受率本來就低）\n\n**A2. 返工次數**\n- 定義：同一件事被退回修改的次數\n- 觀察方式：同一個交付物被用戶要求修改幾次才最終接受\n- 為什麼獨立：純粹計數用戶的退回行為\n- 基準：目標 ≤ 1 次。超過 2 次說明第一次交付時的理解或品質有系統性問題\n\n**A3. 事後發現率**\n- 定義：交付被接受後，才發現問題需要回頭修的比例\n- 觀察方式：一個 topic 標記完成後，又出現修正類的操作\n- 為什麼獨立：看的是時間序列上「完成後又動」的事實，不預設用什麼驗證流程\n- 基準：趨勢向下。這是最危險的效率損失——以為做完了其實沒完\n\n#### B. 過程指標\n\n**B1. 關鍵判斷可見率**\n- 定義：AI 做出影響方向的判斷時，有沒有向用戶展示判斷理由\n- 觀察方式：回顧對話記錄——遇到選擇點時，AI 是直接做了，還是展示了「我選 A 因為 X」\n- 為什麼獨立：看的是 AI 的溝通行為，不預設用什麼方法論框架\n- 基準：方向性決策（選 A 不選 B）100% 可見。執行性步驟不要求\n\n**B2. 問題定位速度**\n- 定義：出了問題時，從「發現有問題」到「定位是哪裡出問題」花多少輪對話\n- 觀察方式：計算從用戶說「有問題」到雙方確認根因之間的對話輪次\n- 為什麼獨立：計的是時間和輪次，不預設用什麼回溯工具\n- 基準：≤ 3 輪。超過 5 輪說明過程紀錄不足以支撐回溯\n\n**B3. 意外率**\n- 定義：執行過程中出現「事前沒預料到」的障礙的頻率\n- 觀察方式：AI 在執行中說「沒想到」「原來還要」「這裡跟預期不同」的次數\n- 為什麼獨立：看的是預期與實際的落差，不預設用什麼事前驗證方法\n- 基準：趨勢向下。意外率持續不降，說明事前準備的方法（無論是什麼方法）沒有效果\n\n#### C. 成本指標\n\n**C1. 任務總輪次**\n- 定義：從接到任務到用戶接受交付，總共經歷多少輪對話\n- 觀察方式：計數\n- 為什麼獨立：純粹的量化觀察\n- 基準：同類任務的總輪次趨勢向下（做同類事情越來越快）。不設絕對值，因為不同任務天然需要不同輪次\n\n**C2. 用戶等待與介入頻率**\n- 定義：一個任務中，用戶需要主動介入（回答問題、做決定、提供資訊）的次數\n- 觀察方式：計數 AI 向用戶提問或等待用戶決策的次數\n- 為什麼獨立：看的是用戶被打斷的頻率\n- 基準：每個任務 ≤ 3 次主動介入（不含最終驗收）。更多說明 AI 的自主判斷能力不足\n\n**C3. 同類任務效率趨勢**\n- 定義：做過一次的同類任務，第二次做是否更快更順\n- 觀察方式：比較同類 topic 的首次 vs 後續的總輪次、返工次數\n- 為什麼獨立：同類比較是統計方法，不依賴任何方法論工具\n- 基準：第二次做同類任務，總輪次至少降低 20%。沒有下降說明經驗沒有被有效累積\n\n#### D. 成長指標\n\n**D1. 同類問題復發率**\n- 定義：解決過的問題再次出現的比例\n- 觀察方式：同一類錯誤或障礙在不同 session 中重複出現\n- 為什麼獨立：看的是「同一件壞事發生了幾次」，不預設用什麼改善機制\n- 基準：趨勢向下。復發率平坦或上升＝系統沒有在學習\n\n**D2. 用戶介入層級趨勢**\n- 定義：用戶介入的性質隨時間的變化——從「糾正錯誤」到「確認方向」到「只做最終驗收」\n- 觀察方式：分類用戶介入的性質。糾錯（「這裡錯了」）vs 選擇（「選 A 還是 B」）vs 確認（「可以」）\n- 為什麼獨立：看的是用戶行為的性質變化\n- 基準：糾錯類介入的比例趨勢向下，確認類比例趨勢向上。這表示 AI 的判斷力在成長\n\n**D3. 新情境處理能力**\n- 定義：面對之前沒遇過的任務類型時，品質下降的幅度\n- 觀察方式：比較熟悉任務和新任務的 A1（首次接受率）和 A2（返工次數）差異\n- 為什麼獨立：比較的是同一批獨立指標在不同情境下的表現\n- 基準：新任務的品質指標不低於熟悉任務的 70%。低於此說明方法論只教了「做什麼」沒教「怎麼想」——判斷力沒有被培養起來\n\n#### 指標診斷邏輯\n\n```\nA 好 + B 好 + C 低 = 方法論有效\nA 好 + B 差 = 結果對但過程不可見，下次可能出問題\nA 差 + B 好 = 過程做了但方法本身不對，需要換方法\nA 差 + B 差 = 方法論沒在運作\nD 向上 = 系統在學習\nD 平坦 = 學習機制失靈\nC3 沒下降 = 經驗沒被累積\n```\n\n#### 收集方式\n\n| 方式 | 成本 | 覆蓋 |\n|------|------|------|\n| 對話自然產生 | 零 | A1、A2、B1、C1、C2（都是對話中可直接觀察的） |\n| 每次 /小結 時統計 | 小結多 3 分鐘 | A3、B2、B3、C3 |\n| 每月趨勢分析 | 一次性 30 分鐘 | D1、D2、D3 |\n\n## 待決事項\n\n操作化指標為 AI 側草稿，待用戶審定：指標是否正確反映效率、基準是否合理、收集機制是否實際。\n\n## 寫入內容\n\n待操作化審定後，整合為 `docs/methodology/meta-methodology.md`。\n\n## 整合指南\n\n1. 新建 `docs/methodology/meta-methodology.md`\n2. `docs/methodology/_index.md` 開頭加入元方法論的引用\n3. 各方法論文件（01-04 + closed-loop）在開頭引用元方法論作為評價依據\n4. 完成後用元方法論的標準逐一評價和微調現有 10 份文件\n","app-docs/dev-plan/_staging/團隊運作優化方案.md":"# 團隊運作優化方案\n\n類別：rule\n目標：CLAUDE.md + .claude/rules/ + docs/records/ 多檔修改\n日期：2026-02-22\n相關 OP：@op:20260222-JDNE#2420, @op:20260222-JDNE#2440\n\n---\n\n## 背景\n\n效率校準（Jin 親發 P0）揭示核心問題：630 個 commit 中 48% 是行政基建，產品只佔 15%。計分系統記錄了 100+ 筆扣分但行為沒改善。方法論寫了觸發規則但 0 次執行記錄。22 條論壇討論串全是內部管理，0 條關於產品。\n\nJin 定位自己為「奧客」——只管產品好不好用，不做測試，不管內部流程。機器團隊要交鑰匙交付，不是交操作手冊讓用戶去點。\n\n本文件整合三個面向的分析和結論：團隊角色設計、系統機制審計、運作架構優化。經過多輪 /有用嗎 驗證，排除了不可行的方案，保留可行的。\n\n---\n\n## 結論\n\n### 一、角色架構\n\nJin = 奧客（許願、抱怨、驗收方向）。機器團隊 = 交鑰匙服務。\n\n| 角色 | 職責 | 不做的事 |\n|------|------|---------|\n| 機器主官 | 任務分配、進度追蹤、解堵、客服票路由 | 不寫代碼 |\n| 技術主管 | 架構把關、寫規格、核心功能開發 | — |\n| 品管員 | 審查所有 Tier 2 交付，用奧客視角找問題 | — |\n| 測試工程師 | 補測試覆蓋、審查輔助 | — |\n| 功能開發 | 執行指派的功能任務 | — |\n| 分析師（按需） | 數據分析、效益驗證 | 平時不開 |\n\n角色分配記錄在 `docs/records/_roles.md`，用戶說換就換。\n\n### 二、協作流程\n\n```\nJin 許願或抱怨（/客服 或直接說）\n    ↓\n收到的機器建票（tickets.md）→ 通知機器主官\n    ↓\n主官分類分配 → 寫到目標機器的收件匣\n    ↓\n開發機器做 → 測試工程師補測試 → 品管員審查\n    ↓\n主官預審（Jin 會怎麼挑剔這個？）\n    ↓\n回報 Jin：「做了什麼、已確認可用」\n    ↓\nJin 說「這是我要的」或「不對」\n```\n\nJin 不跑指令、不點畫面、不找 bug。Jin 只判斷方向對不對。\n\n### 三、系統機制審計結果\n\n經完整審計 20 個機制，按效益分三類：\n\n**保留（低成本高效益）：**\n- 快照（唯一真正在用的上下文恢復工具）\n- 論壇索引（主官快速掌握全局）\n- Hooks（唯一有效的系統級強制）\n- 機器身份、開發地圖\n- 核心指令（/更新、/回報、/客服、/去論壇看看）\n\n**斷開自動載入（內容保留，不再每次 session 燒 token）：**\n- 方法論 v2（methodology-checklists.md 從 .claude/rules/ 搬到 docs/methodology/）\n- 論壇格式規範（forum-format.md 從 .claude/rules/ 搬到 docs/records/forum/）\n- OP 記錄格式（record-formats.md 從 .claude/rules/ 搬到 docs/records/）\n- 計分系統（不再自動追加，只有用戶手動 /醜一 /很棒 時才寫）\n\n**需要重新設計：**\n- CLAUDE.md（300 行→100 行，只留致命規則）\n- 記錄層（OP 記錄改為 Tier 2+ 才寫完整版，Tier 1 一行摘要）\n- 論壇系統（工人不讀論壇，改用收件匣定向通訊）\n- 啟動流程（按角色分支：主官讀全貌、工人讀任務包）\n\n### 四、架構改造：角色分級載入\n\n核心原則：不是每台機器都需要所有資訊。\n\n| 角色 | 啟動時讀什麼 |\n|------|------------|\n| 機器主官 | CLAUDE.md 100 行 + 所有快照 + 論壇索引 + tickets.md |\n| 其他機器 | CLAUDE.md 100 行 + 自己的快照 + inbox/{自己}.md |\n\n定向通訊機制：`docs/records/inbox/{機器碼}.md`\n- 主官寫、工人讀自己的\n- 取代論壇巡邏，工人不需要讀全部帖子\n\n### 五、推送回報機制\n\ncommit message 格式：`[type] 一句話（機器碼）`\n\n類型標籤：feat / fix / test / review / infra / admin\n\n效果：`git log --oneline -20` = 全隊活動看板，一行指令追蹤產出比例。\n\n### 六、快照新增模型欄位\n\n快照 header 從 `SNAPSHOT|時間|機器碼` 改為 `SNAPSHOT|時間|機器碼|模型`\n\n各機器自動回報使用什麼模型，主官巡邏時一眼看到。\n\n### 七、方法論使用方式\n\n方法論不刪除、不自動載入。分工認領制（四方共識已達成）：\n- JDNE 負責：需求對焦 + 拆解排序\n- ITEJ 負責：閉環驗證 + 改動前驗證\n- A44T 負責：事後回顧 + 送審自檢\n- AINL/Z1FV：待做幾件事後分配\n\n「負責」= 確保團隊不忘記這套方法論，不是只有自己能用。\n\n---\n\n## 寫入內容\n\n### CLAUDE.md 精簡版（~100 行）\n\n需要重寫整份 CLAUDE.md，保留：\n- 專案結構和技術棧（10 行）\n- 系統定位和 MCP（10 行）\n- Git 同步規則含「禁止 git pull」（15 行）\n- 品質兩級（需別人看的 / 不需要的）+ 驗收權在用戶（15 行）\n- 行為底線（做完不停、給判斷不給選擇題、交鑰匙不叫用戶測試）（10 行）\n- 記錄方式（快照 + commit format）（10 行）\n- 啟動流程（按角色分支）（15 行）\n- 參考文件指引（需要時去哪找）（10 行）\n\n搬出去的（到各自的參考文件）：\n- 三級品質制度詳細說明 → docs/quality-tiers.md\n- 治理機制 → docs/governance.md\n- 記錄層完整規範 → docs/records/record-formats.md\n- 論壇格式 → docs/records/forum/forum-format.md\n- AI 行為規範詳細條文 → docs/behavior-rules.md\n- 溝通原則詳細 → 合併到 behavior-rules.md\n- 計分規則 → docs/scoring-rules.md（從 .claude/rules/ 搬出）\n\n### .claude/rules/ 清空\n\n目前有 4 個檔案自動載入：\n- record-formats.md → 搬到 docs/records/\n- forum-format.md → 搬到 docs/records/forum/\n- scoring.md → 搬到 docs/（計分記錄和規則分開）\n- methodology-checklists.md → 搬到 docs/methodology/\n\n清空後 .claude/rules/ 不再有自動載入的檔案。CLAUDE.md 100 行是唯一的自動載入。\n\n### 新建檔案\n\n- `docs/records/inbox/{機器碼}.md` × 6 — 定向通訊收件匣\n- `docs/quality-tiers.md` — 品質制度詳細說明\n- `docs/governance.md` — 治理機制\n- `docs/behavior-rules.md` — AI 行為規範完整版\n- `docs/scoring-rules.md` — 計分規則（不含記錄）\n\n---\n\n## 整合指南\n\n### 執行順序（依賴關係）\n\n1. **搬移 .claude/rules/ 四個檔案**（Tier 1，不改內容只搬位置）\n2. **重寫 CLAUDE.md**（Tier 3——需要用戶確認，因為是規範檔核心改動）\n3. **建 inbox 目錄和檔案**（Tier 1）\n4. **改啟動流程**（寫在新 CLAUDE.md 裡，步驟 2 一起做）\n5. **改 pre-push hook**（Tier 1，把 OP 強制改為快照強制）\n6. **論壇廣播通知所有機器**\n\n### 驗證方式\n\n改完後跑一輪完整工作：\n- 主官啟動 → 讀到 100 行 CLAUDE.md + 快照 + 論壇索引 → 能正常分配工作\n- 工人啟動 → 讀到 100 行 CLAUDE.md + 自己快照 + inbox → 能正常開發\n- push 時 hook 只檢查快照有沒有更新\n- commit message 帶 [type] 標籤\n- `git log --oneline` 能看到全隊動態\n\n### 風險\n\n- CLAUDE.md 改太多可能遺漏致命規則 → 用 grep 交叉比對新舊版，確認「禁止 git pull」「驗收權在用戶」等致命規則沒漏\n- 工人看不到論壇可能漏掉緊急通知 → inbox 機制補上；P0 緊急事項主官直接寫到工人 inbox\n- 方法論斷開載入後沒人用 → 這是現狀（本來就沒人用），不會更差\n\n---\n\n## /有用嗎 驗證摘要\n\n本方案經過四輪 /有用嗎 驗證，以下是各子方案的結論：\n\n| 子方案 | 結論 | 關鍵風險 |\n|--------|------|---------|\n| 記錄層全砍（只留快照） | **沒用** | 砍 OP 破壞 /回報 流程 |\n| 記錄層分級簡化 | **不確定** | 分級判斷依賴機器自律 |\n| 輪轂輻條架構 | **不確定偏沒用** | 未實作，可能只是轉移成本 |\n| CLAUDE.md 330→50 行 | **不確定** | 50 行裝不下致命規則 |\n| CLAUDE.md 330→100 行 | **不確定偏有用** | 需實測驗證 100 行夠不夠 |\n| 角色分級載入 | **不確定** | 缺定向通訊，補 inbox 後可行 |\n| 角色分級載入 + inbox | **待驗證** | 最完整方案，需要實作後實測 |\n\n整體判斷：**方向正確，需要實作後實測才能確認效益。** 最大的不確定性是「100 行 CLAUDE.md 是否夠用」和「inbox 機制是否真的讓工人不需要讀論壇」。這兩個只有做了才知道。\n","app-docs/dev-plan/_staging/機器側寫與協作策略.md":"# 機器側寫與協作策略\n\n類別：issue\n目標：（觀察性文件，不直接改規範——側寫是觀察不是規定）\n日期：2026-02-22（建檔），2026-02-22（更新：併入論壇三方共識）\n相關 OP：@op:20260222-JDNE#1800\n\n---\n\n## 現況分析\n\n### 問題是什麼\n\n三台機器各自做事，但沒有基於各自特長的分工策略。任務指派靠用戶手動或機器自己接，不考慮誰最適合做什麼。結果是：\n- 產品推進主要靠 A44T 一台扛\n- JDNE 和 ITEJ 的基建產出雖然重要，但產品程式碼佔比偏低\n- 曾發生碰撞（JDNE 和 A44T 同時做市場趨勢分析，浪費一台的工作量）\n\n### 三台機器側寫\n\n#### JDNE — 方法論架構師\n\n- **強項**：設計深度。元方法論框架、方法論 v2 完整系統、Skill 系統 v2（正負向強化 10 指令）、記錄層架構——都是從零設計到完成。\n- **弱項**：做完容易停住等確認（計分板 8 次「不主動表態」，三台最多）。產品程式碼佔比最低（~15%）。\n- **速度**：設計工作極快；產品開發中等；瓶頸在「分析完到動手」的轉換。\n- **OP 密度**：~10 筆/天（最高），但單筆份量中等。\n- **適合任務**：規範設計、方法論維護、複雜議題的深度分析、需要多輪迭代的框架建構。\n\n#### A44T — 產品開發主力\n\n- **強項**：用戶工作流思維。不只做功能，會推導「用戶看到這個之後接下來要幹嘛」，連續交出搜尋→分析→偵察→快取的完整鏈路。主動審查其他機器程式碼（發現 JDNE 評委分析的日期 bug）。\n- **弱項**：早期也有「停住等確認」問題，但改善最快。累計 5 次「不主動表態」。\n- **速度**：三台裡最快。一天內連續推出 5 個功能模組，每個都附測試和 build 驗證。OP 數最少但程式碼產出最多。\n- **OP 密度**：~3 筆/天（最低），每筆最重（大量程式碼）。\n- **適合任務**：產品功能開發、用戶介面建設、效能優化、程式碼審查。\n\n#### ITEJ — 系統整合者\n\n- **強項**：問題驅動。先找結構性問題再建工具解決。做的東西其他機器都在用（/暫存、/待辦、/修改計畫、論壇、開發地圖）。返工率最低。\n- **弱項**：正向表現不夠搶眼（沒有加分記錄）。產品程式碼佔比~20%（但在提升中——pricing + assembly 重構 + 鐵律 flag）。\n- **速度**：穩定（每天 3-4 筆 OP），不暴衝也不空窗。大型工具改造品質高、一次到位。\n- **OP 密度**：~4 筆/天（中），每筆重量也中偏重（多檔聯動）。\n- **適合任務**：工具鏈建設、跨模組重構、流程自動化、開發計畫推進。\n\n### 對比速覽\n\n| 維度 | JDNE | A44T | ITEJ |\n|------|------|------|------|\n| 定位 | 方法論架構師 | 產品開發主力 | 系統整合者 |\n| 產品/基建比 | 15/85 | 65/35 | 20/80（提升中） |\n| 每筆 OP 重量 | 中等 | 最重 | 中偏重 |\n| 扣分筆數 | 最多（13+） | 中（7） | 最少（3） |\n| 最大優勢 | 設計深度 | 產品交付速度 | 工具鏈品質 |\n| 最大弱點 | 做完停住等確認 | 不帶立場丟選擇題 | 正向表現不搶眼 |\n| 返工率 | 中偏高 | 低 | 最低 |\n\n---\n\n## 三方共識（論壇討論結果）\n\n2026-02-22 論壇 thread `machine-profile` 三方一致結案：\n\n### 採納的方向\n\n**方向 1：輕量任務匹配**\n- 新任務來時，各機器自評 1-3 分「這個我做是幾分適合」\n- 用戶看到三台自評直接分配\n- 不搞匹配演算法\n\n**方向 4：定期更新側寫**\n- 每次 /回報 結尾順便刷新側寫\n- 不需要固定頻率，跟著工作報告自然更新\n\n### 撤回的方向\n\n- **方向 2**（寫進 CLAUDE.md）：撤回。「側寫是觀察不是規定」——硬編碼角色會讓機器照劇本演而不是按實際能力做事。\n- **方向 3**（互補配對機制）：不需要。論壇 brief 通知「我在做 X」已經夠用。\n\n### 關鍵洞見\n\n- **碰撞根因是資訊不對稱，不是能力重疊**（ITEJ 觀察）——論壇 brief「我在做 X」比側寫更直接有效\n- **產品/基建比例由用戶決定**，不是機器自己定——基建快要「夠用了」，後續自然往產品傾斜\n- **側寫公開**——三台互相看到，知己知彼減少碰撞\n- ITEJ「正向表現不搶眼」的解釋：工具鏈好用時用戶不會驚喜，壞掉時才會注意到，是基建工作的本質\n\n---\n\n## 行動項\n\n1. [v] 論壇三方共識完成\n2. [ ] 下次各機器 /回報 時加入簡要側寫自評更新\n3. [ ] 新任務分配時，三台各自出 1-3 分適合度自評\n","app-docs/dev-plan/_staging/知識庫精靈現況與下一步.md":"# 知識庫精靈：現況盤點與下一步\n\n類別：plan\n目標：06-開發進程.md\n日期：2026-02-19\n相關 OP：@op:20260219-A44T#0810（backlog 盤點時發現漏列）\n\n---\n\n## 背景\n\n知識庫精靈（T1 知識庫維護精靈）是 Layer 0 的核心項目，設計目的是在系統還沒建好前，就能透過對話快速建立 00A-00E 知識庫。\n\n多份暫存檔都提到它（pain-points-analysis.md、06-開發進程與優先序.md、saas-architecture-discussion.md），但 backlog 遷移時漏列，目前不在待辦清單中追蹤。\n\n## 現況盤點\n\n### 已完成\n\n| 項目 | 狀態 | 位置 |\n|------|------|------|\n| T1 prompt v2.0 | 已寫好，914 行 | `bidding-assistant/public/prompts/T1_知識庫維護精靈_v2.0.md` |\n| prompt-assembly 註冊 | 已註冊 | `bidding-assistant/src/data/config/prompt-assembly.ts` |\n| 流程設計 | 完整 | Phase 0 分流 → A 成員 → B 實績 → C 文件萃取 → D 案後檢討 → E 範本維護 |\n| 導航機制 | 完整 | 6 條規則：步數告知、進度標記、預告下一步、書籤、定位查詢、中段摘要 |\n| 品質檢查 | 完整 | 00A/00B/00C/00D 各有檢查清單 |\n| 輸出模板 | 完整 | 00A/00B/00C/00D 四套模板 |\n\n### 未完成 / 未決\n\n| 項目 | 問題 | 相關議題 |\n|------|------|---------|\n| **技術形態** | Claude Code Skill vs Web wizard vs Telegram Bot？ | saas-architecture-discussion.md Layer 5 |\n| **知識庫儲存** | Notion vs Supabase？影響精靈寫入目標 | saas-architecture-discussion.md Layer 3（待決） |\n| **寫入方式** | 目前 prompt 是「產出文字讓人工貼進 .md 檔」，未來需要 API 直接寫入 DB | 取決於儲存方案 |\n| **產品層整合** | 知識官 Agent 會用 T1，但 SDK 整合尚未設計 | 03-Agent架構決策.md |\n| **SaaS 轉向** | Discord Bot → SaaS 網頁後，精靈入口從 Discord 改為 Web | plan-saas-pivot（JDNE snapshot） |\n\n### 使用方式的演進路徑\n\n```\n目前（Phase 1 自用）：\n  T1 prompt → 貼進 Claude Project → 手動對話 → 複製產出 → 手動貼入 .md 檔\n\n近期可做（不需等系統）：\n  T1 prompt → Claude Code Skill（/kb 指令）→ 對話式建庫 → 自動寫入本地 .md 檔\n\n中期目標（需要儲存方案定案）：\n  Web wizard 聊天介面 → 知識官 Agent → API 直接寫入 Notion/Supabase\n\n遠期（Phase 2+）：\n  多租戶 Web + Telegram Bot → 知識官 Agent → DB 寫入 + 版本控制\n```\n\n## 結論\n\n1. **Prompt 已經夠用**：v2.0 涵蓋完整流程（A-E 五個 Phase），不需要重寫\n2. **缺的是「跑起來」**：有 prompt 但沒有便利的執行環境，目前只能手動貼\n3. **最小可行下一步**：做成 Claude Code Skill（`/kb` 指令），讓精靈在 CLI 裡直接跑，產出自動寫入本地檔案。不需要等儲存方案定案。\n4. **應加回待辦追蹤**：作為 Layer 0 項目補列\n\n## 待決事項\n\n1. **要不要先做 Claude Code Skill 版本？**\n   - 優點：零成本、1 天內可完成、立刻可用\n   - 缺點：只能在 CLI 用，其他人（手機/非開發者）無法使用\n   - 建議：先做，不影響後續改為 Web wizard\n\n2. **知識庫儲存方案**（阻塞中期目標，不阻塞近期）\n   - Notion：不加新服務、員工可直接編輯\n   - Supabase：結構化查詢、pgvector 語意搜尋\n   - 目前 Layer 3 討論中斷，需要繼續\n\n## 整合指南\n\n本檔的結論應寫入 `06-開發進程.md` 的 Layer 0 段落：\n- Layer 0 明確列出「知識庫精靈 Skill 化」為獨立工作項目\n- 補充說明：T1 prompt v2.0 已就緒，差的是執行環境\n- 待辦清單補列此項目\n","app-docs/DEVELOPMENT_PLAN.md":"# 全能標案助理 — 開發計畫書\n\n> **文件版本**：v3.0（2025-02-17 第一性原理重構版）\n> **前版**：snuggly-brewing-graham.md（已廢止，方向偏離）\n> **維護者**：開發團隊\n> **狀態**：核心需求分析完成，待逐批次實作\n\n---\n\n## 目錄\n\n1. [公司背景與商業模式](#1-公司背景與商業模式)\n2. [提示詞系統架構全貌](#2-提示詞系統架構全貌)\n3. [五個角色的需求與痛點分析](#3-五個角色的需求與痛點分析)\n4. [系統定位與邊界](#4-系統定位與邊界)\n5. [完整解決方案對照表](#5-完整解決方案對照表)\n6. [技術選型](#6-技術選型)\n7. [開發批次與優先序](#7-開發批次與優先序)\n8. [批次細節規劃](#8-批次細節規劃)\n9. [設計原則](#9-設計原則)\n10. [附錄：提示詞檔案清單](#附錄a提示詞檔案清單)\n11. [附錄：遞進鏈與知識庫引用矩陣](#附錄b遞進鏈與知識庫引用矩陣)\n12. [附錄：交付物格式規格](#附錄c交付物格式規格)\n\n---\n\n## 1. 公司背景與商業模式\n\n### 1.1 公司基本資料\n\n| 項目 | 內容 |\n|------|------|\n| 公司名稱 | 大員洛川股份有限公司 |\n| 統一編號 | 89170941 |\n| 設立日期 | 民國 112 年（前身社團自 96 年起，連續 16+ 年實務經驗） |\n| 負責人 | 黃偉誠 |\n| 團隊規模 | 約 15 人（含核心成員與專案制人員） |\n| 實收資本額 | 新臺幣 750 萬元 |\n| 年營收目標 | 新臺幣 3,000 萬元 |\n| 組織性質 | 營利性倡議組織 |\n\n### 1.2 三大業務主軸\n\n1. **課程、導覽及走讀服務**：公衛教育、人權教育、食農教育、國家語言教育、藝文展覽策劃\n2. **臺灣傳統服飾製作與推廣**：型制史研究、復原設計、品牌轉譯\n3. **綠色照護與永續發展**：環境教育、森林保健、親子互動教育、長照新模式\n\n### 1.3 收入公式（第一性原理）\n\n```\n收入 = 得標案件數 × 平均案件金額 × 毛利率\n\n其中：\n  得標案件數 = 投標案件數 × 得標率\n  投標案件數 = 發現的機會數 × 投標決策通過率\n  得標率 = f（建議書品質、簡報品質、價格競爭力、團隊適配度）\n  毛利率 = f（報價精準度、履約成本控制、風險管理）\n```\n\n系統的所有功能都必須能回答：**這個功能推動了公式中的哪一項？**\n\n### 1.4 完整業務鏈\n\n```\n標案發現 → 投標決策 → 備標 → 企劃撰寫 → 定稿排版 → 送件\n    → 評選準備 → 評選 → 得標 → 履約執行 → 結案 → 收錢\n                                                      ↓\n                    ←──── 經驗累積回饋（知識庫更新） ←──┘\n```\n\n---\n\n## 2. 提示詞系統架構全貌\n\n### 2.1 檔案結構（21 個檔案）\n\n提示詞系統放在 `public/prompts/`，是公司投標作業的 AI 操作手冊。\n\n**系統核心層（所有階段載入）**：\n- `00-1_系統核心_v2.0.md` — SYSTEM_IDENTITY + COMPANY_PROFILE + 10 條 GLOBAL_CONSTRAINTS（GC-01～GC-10）\n- `00-3_階段索引_v2.0.md` — WORKFLOW_OVERVIEW + KNOWLEDGE_BASE_MAP（知識庫引用矩陣）\n\n**撰寫規範層（L3/L4 載入）**：\n- `00-2_撰寫規範_v2.0.md` — SIX_IRON_RULES + PROPOSAL_STRUCTURE + CHAPTER_TEMPLATES（T-00～T-05）\n\n**8 個階段提示詞**：\n- `01_戰略分析_v2.2.md`（L1）— 觸發：`/分析`\n- `02_備標規劃_v2_1.md`（L2）— 觸發：`/規劃`\n- `03_企劃草稿_v2.1.md`（L3）— 觸發：`/企劃`\n- `04_定稿撰寫_v2_0.md`（L4）— 觸發：`/撰寫`\n- `05_評選分析_v2.0.md`（L5）— 觸發：`/評選分析`\n- `06_簡報規劃_v2.0.md`（L6）— 觸發：`/簡報規劃`\n- `07_講稿腳本_v2.0.md`（L7）— 觸發：`/講稿腳本`\n- `08_模擬演練_v2.0.md`（L8）— 觸發：`/模擬演練`\n\n**5 座知識庫**：\n- `00A_團隊資料庫` — 成員資料（姓名、學歷、經歷、角色、證照）\n- `00B_實績資料庫` — 公司實績（案名、機關、金額、工作內容、成果）\n- `00C_時程範本庫` — 甘特圖範本、里程碑範本\n- `00D_應變SOP庫` — 風險情境與應變流程\n- `00E_案後檢討庫` — 結案檢討紀錄、教訓\n\n**工具**：\n- `T1_知識庫維護精靈_v2.0.md` — 對話式知識庫維護（915 行，5 個 Phase）\n- `T3_報價編列指南_v2.0.md` — 報價方法論\n\n**參考**：\n- `R1_撰寫訓練.md` — 寫作訓練素材\n- `R2_公司資訊需求對照表_v1.0.md` — 各階段/章節需要的公司資訊映射\n- `R3_架構改造.md` — 系統架構改造記錄\n\n### 2.2 每個階段的核心產出與複雜度\n\n| 階段 | 核心產出 | 行數 | 人機斷點 | 複雜度說明 |\n|------|---------|------|---------|-----------|\n| L1 戰略分析 | 戰略分析報告 + 機關對焦提問清單 | 291 | — | 8 步驟。含潛台詞分析（4 維度）、成本速估、投標決策矩陣（5 維度 1-10 分）、能力準備度標記 |\n| L2 備標規劃 | 備標規劃書 | 307 | — | 9 步驟。以 L4 標準架構為基線（80% 沿用），含 2-3 創意方向、WBS、經費框架 |\n| L3 企劃草稿 | 企劃稿 + 經費預算表 + 內部利潤分析 | 507 | A/B/C/D/E | **最複雜**。全書撰寫（壹至拾）+ 完整 PRICING_WORKFLOW（14.0-14.4）：網路查價、6 報價原則、5 重驗算、三級品質檢查、內部成本三層模型 |\n| L4 定稿撰寫 | 服務建議書正式稿 | 194 | — | L3→L4 升級：清除所有 `[待確認]`、正式文體、完整數字、8 階段品質審查 |\n| L5 評選分析 | 評選戰略分析報告 + 摘要 | 497 | A/B/C/D/E | 5 心理學原理、5 提問觸發條件、引導矩陣（5 種策略）、四段式架構、擬答三優先序 |\n| L6 簡報規劃 | 簡報頁面架構 + 時間分配 + 摘要 | 525 | — | 時間為唯一硬約束、秒級時間分配、逐頁架構、Feature→Benefit→Value 轉譯 |\n| L7 講稿腳本 | 逐頁講稿 + Q&A 題庫 | 535 | — | 雙版本（完整版 + 提示版）、7 種標記符號、Q&A 三層準備（P1=PREP/P2=方向/P3=一句話） |\n| L8 模擬演練 | 演練診斷 + 備忘錄 + Q&A 快查卡 | 554 | — | 評委人格模擬、逐頁反應模擬、Q&A 對話模擬、修訂版講稿 |\n\n### 2.3 人機協作斷點機制\n\n提示詞系統已內建斷點設計。AI 在關鍵決策點暫停，等待人類確認後才繼續：\n\n```\n斷點 A：輸入確認 — 「前序結論整理如上，確認無誤後開始」\n斷點 B：結構確認 — 「章節架構如上，有無需要調整？」\n斷點 C：內容審閱 — 「企劃稿全文如上，請審閱」\n斷點 D：預算審閱 — 「報價表與品質檢查結果如上，請確認」\n斷點 E：最終確認 — 「一致性檢核結果如上，確認後產出文件」\n```\n\n**系統的角色**：把這些斷點變成可追蹤的狀態（待處理/已通過），讓團隊所有人可以看到每個案件卡在哪個斷點。\n\n### 2.4 知識庫維護循環\n\nT1 知識庫維護精靈（915 行）定義了完整的知識庫更新流程：\n\n```\n案件結案\n  ↓\nPM 填寫 00E 案後檢討筆記\n  ↓\n上傳給 T1 精靈\n  ↓\nPhase D：精靈掃描 00E，建立待辦清單\n  ├→ 更新 00B（新增實績）\n  ├→ 更新 00A（成員新經歷/新進人員建檔）\n  ├→ 修正 00C（時程範本偏差 >30% 時修正）\n  ├→ 修正 00D（新風險情境 / SOP 步驟修正）\n  └→ AI 工具回饋整理\n  ↓\n知識庫更新完成 → 下一個案件的 L1-L8 品質更好\n```\n\n**系統的角色**：在驗收日自動提醒 PM 填寫 00E → 追蹤知識庫更新狀態 → 版本控制。\n\n---\n\n## 3. 五個角色的需求與痛點分析\n\n### 3.1 管理者（黃偉誠）\n\n| 需求 | 痛點 | 因果鏈 |\n|------|------|--------|\n| 掌握公司投標全貌 | 無法即時看到得標率、金額趨勢、案件分布 | → 策略決策靠直覺而非數據 → 可能投了不該投的案、錯過該投的案 |\n| 評估企劃人員效益 | 沒有量化指標（每人負責案件數、得標率、產出速度） | → 無法公平評估 → 團隊管理靠感覺 |\n| 控制公司獲利 | L3 做完利潤分析後，履約階段的實際成本沒有人追蹤回來比對 | → 不知道哪種案件實際利潤高 → 無法優化投標策略 |\n| 年度策略調整 | 缺少歷史數據分析（哪些類型案件得標率高、哪些機關常合作） | → 每年重新摸索 |\n\n### 3.2 行政（庭瑜）\n\n| 需求 | 痛點 | 因果鏈 |\n|------|------|--------|\n| 發現新標案 | 手動刷 pcc 網站、怕漏掉 | → 錯過投標機會 → 直接影響「發現的機會數」 |\n| 建立案件 | 手動將標案資訊打到 Notion | → 重複勞動、可能打錯 |\n| 追蹤截標日 | 腦記 + 手動提醒團隊 | → 漏提醒 → 來不及投標 → 廢標 |\n| 送件確認 | 文件齊全度 checklist 每次重做 | → 遺漏文件 → 廢標風險 |\n| 協調團隊進度 | 要一個個問企劃「做到哪了」 | → 浪費溝通時間 |\n\n### 3.3 企劃人員\n\n| 需求 | 痛點 | 因果鏈 |\n|------|------|--------|\n| 快速啟動 AI 協作 | 開新 Claude 對話要重新組裝提示詞、貼知識庫、附前序文件 | → 每次啟動浪費 15-30 分鐘 → 累積後吃掉大量有效工時 |\n| 系統故障時能繼續工作 | Claude Code 掛掉就停擺 | → 需要 prompt 模板庫作為容災方案，切到 Claude.ai 網頁版繼續 |\n| 管理多案件並行 | 同時進行 3-4 個案件，容易混淆哪案到哪階段 | → 拿錯文件、漏做步驟 |\n| 前序文件串接 | L3 要用 L1/L2 的產出，散落在不同對話和資料夾 | → 找檔案浪費時間 → 可能用到舊版本 |\n| 團隊審閱協作 | L3 斷點 C/D 需要報價人員、主管審閱 | → 用 LINE 傳 .docx、等回覆 → 流程不透明 |\n| 知識庫查詢 | 寫建議書時要查過往實績、團隊資料 | → 翻 .md 檔案不方便 |\n\n### 3.4 設計師\n\n| 需求 | 痛點 | 因果鏈 |\n|------|------|--------|\n| 清楚知道要做什麼 | 收到一大份文件，要自己找 `【美編製作】` 標記 | → 容易漏做 |\n| 知道優先序 | 不確定哪個設計先做、截標日是哪天 | → 問企劃 → 增加溝通成本 |\n| 交付設計稿 | 完成的設計稿不知道放哪、怎麼回傳 | → LINE 或 email → 版本混亂 |\n| 理解設計需求 | 文字描述的設計需求不夠具體 | → 反覆修改 |\n\n### 3.5 執行組（PM + 現場人員）\n\n| 需求 | 痛點 | 因果鏈 |\n|------|------|--------|\n| 履約進度追蹤 | 各人用各自的 Excel/Notion，格式不統一 | → 管理者看不到全貌 |\n| 成本控制 | L3 的內部預算控管摘要是靜態文件，實際支出用另一張表 | → 超支時發現太晚 |\n| 現場應變 | 出事時翻 00D 的 .md 檔，手機不好查 | → 延誤應變黃金時間 |\n| **結案檢討** | 要填 00E 筆記，格式繁瑣、容易拖延 | → 拖著不填 → 經驗沒有回到知識庫 → 下次犯同樣的錯 |\n| 經驗保存 | 新進人員不知道前案的教訓 | → 重複踩坑 |\n| 知識庫更新 | T1 精靈產出格式化區塊後，要手動複製貼入 .md 檔 | → 麻煩 → 不做 → 知識庫逐漸過時 |\n\n---\n\n## 4. 系統定位與邊界\n\n### 4.1 系統定位\n\n**L1-L8 提示詞系統的指揮中心**——不是取代 AI 或取代人，而是讓「人 + AI + 工具」的協作流程更順暢。\n\n### 4.2 三層架構的分工\n\n| 層 | 負責什麼 | 工具 |\n|----|---------|------|\n| AI 層 | 依 L1-L8 提示詞產出分析、企劃、報價、策略、講稿 | Claude Code（正常）/ Claude.ai 網頁版（容災） |\n| 美學層 | 建議書排版設計、簡報排版設計 | Canva（Claude Code 透過 MCP 調用） |\n| 管理層 | 案件追蹤、團隊協作、知識累積、績效分析 | **本系統（Web App）** |\n\n### 4.3 系統不做的事\n\n- **不做 AI 推論**：不調用 AI API。AI 工作在 Claude Code 中完成。\n- **不做排版**：建議書和簡報的美學設計在 Canva 中完成。\n- **不取代人的決策**：所有斷點仍由人類確認。系統只是讓斷點狀態可見。\n- **不取代 Notion**：Notion 是資料主庫，系統是 Notion 的「專業視圖」。\n\n### 4.4 prompt 模板庫的定位\n\nprompt 模板庫是系統的基本功能，不是附加功能：\n\n| 場景 | 模板庫的角色 |\n|------|------------|\n| 正常運作（Claude Code） | 提示詞索引 — 查閱每階段載入哪些檔案、為什麼 |\n| 系統故障（切 Claude.ai） | 容災工具 — 一鍵複製正確的提示詞組合 |\n| 新人訓練 | 教學參考 — 理解 L1-L8 流程和知識庫結構 |\n\n功能需求：\n- 按階段瀏覽提示詞（L1-L8 + T1/T3）\n- 顯示每階段需要的檔案組合（依 `STAGE_KB_RULES`）\n- 一鍵複製完整提示詞組合（系統核心 + 階段提示詞 + 對應知識庫）\n- 知識庫引用矩陣的視覺化呈現（00-3 的表格互動版）\n\n---\n\n## 5. 完整解決方案對照表\n\n### 5.1 按收入公式排列\n\n#### 推動「發現的機會數」\n\n| 痛點 | 解決方案 | 批次 | 受益角色 |\n|------|---------|------|---------|\n| 手動刷 pcc 網站怕漏掉 | pcc-api 自動監控，按三大業務主軸關鍵字篩選 | H | 行政 |\n| 手動建案重複打字 | 一鍵建案，從 pcc-api 自動拉入基本資訊到 Notion | H | 行政 |\n\n#### 推動「得標率」\n\n| 痛點 | 解決方案 | 批次 | 受益角色 |\n|------|---------|------|---------|\n| AI 啟動慢（組裝提示詞 15-30 分鐘） | prompt 模板庫 + 一鍵複製正確組合 | D | 企劃 |\n| Claude Code 掛了就停擺 | prompt 模板庫容災模式 | D | 企劃 |\n| 多案件並行混淆 | 案件進度看板（階段/斷點/截標日） | D | 企劃/行政 |\n| 前序文件散落各處 | 交付物歸檔，按案件/階段分類 | G | 企劃 |\n| 團隊審閱流程不透明 | 斷點狀態追蹤（待審閱/已通過） | D | 企劃/管理者 |\n| 設計師不知道要做什麼 | 從 docx/pptx 自動提取 `【美編製作】` 標記為任務清單 | G | 設計 |\n| 知識庫查詢不方便 | 知識庫管理介面（搜尋/瀏覽 00A-00E） | I | 企劃 |\n| 知識庫品質逐漸過時 | 結案提醒 → 00E 填寫 → T1 觸發 → 知識庫更新追蹤 | J | 執行組/企劃 |\n\n#### 推動「毛利率」\n\n| 痛點 | 解決方案 | 批次 | 受益角色 |\n|------|---------|------|---------|\n| 實際成本沒有回來比對報價 | 履約成本追蹤（實際 vs L3 報價） | J | 管理者/執行組 |\n| 結案檢討拖延 | 驗收日自動提醒填 00E、追蹤填寫狀態 | J | 執行組 |\n| 報價精準度靠經驗 | 歷史報價 vs 實際成本分析 → 校準未來報價 | J | 企劃 |\n\n#### 提供決策支援\n\n| 痛點 | 解決方案 | 批次 | 受益角色 |\n|------|---------|------|---------|\n| 無法即時看到得標率/金額/趨勢 | 業績儀表板（固定佈局） | F | 管理者 |\n| 無法評估企劃人員效益 | 人員績效統計（案件數、得標率、產出速度） | F | 管理者 |\n| 追蹤截標日靠腦記 | 截標倒數看板 + 行事曆整合 | D | 行政/企劃 |\n\n### 5.2 按角色排列\n\n| 角色 | 系統為他做的事 | 涉及批次 |\n|------|-------------|---------|\n| **管理者** | 業績儀表板、人員績效、成本效益分析 | D, F, J |\n| **行政** | 標案監控、一鍵建案、截標倒數、進度追蹤 | D, E, H |\n| **企劃** | prompt 模板庫、案件看板、交付物管理、知識庫搜尋 | D, G, I |\n| **設計師** | 設計任務清單、設計稿上傳/版本 | G |\n| **執行組** | 履約追蹤、成本控制、SOP 快查、結案回饋閉環 | J |\n\n---\n\n## 6. 技術選型\n\n### 6.1 核心技術棧（已確定）\n\n| 層 | 技術 | 版本 | 說明 |\n|----|------|------|------|\n| 框架 | Next.js | 16 | App Router + Turbopack |\n| UI 框架 | React | 19 | Server Components + Hooks |\n| 語言 | TypeScript | 5 | 嚴格模式 |\n| 樣式 | Tailwind CSS | 4 | @tailwindcss/postcss |\n| UI 元件 | shadcn/ui + Radix UI | latest | 基礎元件庫 |\n| 圖表 | recharts | latest | 儀表板可視化 |\n| 測試 | Vitest + Testing Library | latest | 單元測試 + 元件測試 |\n| 資料源 | Notion API | ^5.9.0 | @notionhq/client |\n| 設定儲存 | localStorage | — | hydration-safe 模式 |\n\n### 6.2 文件生成\n\n| 文件類型 | 用途 | 技術 | 說明 |\n|---------|------|------|------|\n| .docx | 內部文件（L1-L3, L5, L7-L8） | docx ^9.5.2 | 已整合，GC-10 規格 |\n| .pptx（直式 A4） | 服務建議書正式稿（L4） | Canva（Claude Code → MCP） | 美學排版 |\n| .pptx（橫式 16:9） | 評選簡報（L6） | Canva（Claude Code → MCP） | 簡報設計 |\n\n### 6.3 外部整合\n\n| 整合對象 | 用途 | 技術/API | 批次 |\n|---------|------|---------|------|\n| Notion | 案件資料主庫 | @notionhq/client + REST API | E |\n| pcc-api | 政府採購標案監控 | https://pcc-api.openfun.app（REST，11 端點已驗證） | H |\n| Google Drive | 文件歸檔 | googleapis ^171.4.0（已引入） | 未排期 |\n| Discord Bot | 團隊通知 | Discord.js / Webhook | 未排期 |\n| Canva | 美學排版 | Canva MCP（Claude Code 調用） | 非系統功能 |\n| NotebookLM | 知識儲存 | MCP | 未排期 |\n\n### 6.4 AI 執行環境\n\n| 項目 | 說明 |\n|------|------|\n| 主要工具 | Claude Code（CLI） |\n| 備用工具 | Claude.ai 網頁版（容災）、Gemini CLI、Codex CLI |\n| 整合方式 | AI 透過 CLI 操作，不透過 API token |\n| 系統角色 | 系統不調用 AI API，只管理 AI 產出的交付物 |\n\n---\n\n## 7. 開發批次與優先序\n\n### 7.1 總覽\n\n```\nPhase 1：基礎建設\n  批次 A — 開發規範 + 測試框架\n  批次 B — Logger 基礎建設\n  批次 C — Changelog + Debug Log UI\n\nPhase 2：核心業務\n  批次 D — 案件進度看板 + prompt 模板庫     ← 所有人每天打開系統的理由\n  批次 E — Notion 雙向同步                  ← 案件資料來源\n  批次 F — 業績儀表板                       ← 管理者的核心需求\n\nPhase 3：協作支援\n  批次 G — 交付物管理（docx + pptx 歸檔/版本/設計任務）\n  批次 H — pcc-api 標案監控\n\nPhase 4：知識累積\n  批次 I — 知識庫管理介面（00A-00E）\n  批次 J — 履約追蹤 + 結案回饋閉環（執行組）\n```\n\n### 7.2 排序邏輯\n\n| 優先級 | 邏輯 |\n|--------|------|\n| A-C 先行 | 沒有規範和工具鏈，後面寫的程式碼品質無法保證 |\n| D 最高 | 案件看板是系統的核心。沒有它，系統就是空殼。prompt 模板庫附帶在看板中（容災功能） |\n| E 緊接 D | 看板的數據來自 Notion。不同步就要兩邊手動維護 |\n| F 接 E | 有了 Notion 數據同步，儀表板才有資料可以算 |\n| G 獨立 | 交付物管理不依賴 D-F，但有了看板後體驗更好 |\n| H 獨立 | pcc-api 已驗證可用，技術風險低 |\n| I 依賴 G | 知識庫是特殊的交付物，需要 G 的歸檔基礎 |\n| J 最後 | 依賴 D（案件追蹤）+ I（知識庫管理），是整個系統的閉環 |\n\n---\n\n## 8. 批次細節規劃\n\n### 批次 A：開發規範 + 測試框架\n\n**目標**：確保後續開發品質一致。\n\n**狀態**：大部分已完成（CLAUDE.md 已定義規範）。\n\n**待確認**：\n- [ ] 現有 60 個測試是否覆蓋核心邏輯\n- [ ] 是否需要補充 E2E 測試框架（Playwright）\n- [ ] CI/CD 流程（目前無）\n\n---\n\n### 批次 B：Logger 基礎建設\n\n**目標**：關鍵操作可追蹤、可除錯。\n\n**狀態**：已有 `src/lib/logger/` 基礎結構。\n\n**待確認**：\n- [ ] Logger 是否已覆蓋所有 API 呼叫\n- [ ] 是否需要遠端日誌（目前僅 console + localStorage）\n\n---\n\n### 批次 C：Changelog + Debug Log UI\n\n**目標**：使用者可見的版本歷史 + 開發者可見的系統日誌。\n\n**狀態**：已有 `src/data/changelog.ts`。\n\n---\n\n### 批次 D：案件進度看板 + prompt 模板庫\n\n**目標**：所有人打開系統看到的第一個畫面。\n\n**核心功能**：\n\n1. **案件列表/看板**\n   - 所有進行中案件的卡片\n   - 每張卡片顯示：案名、機關、預算、截標日倒數、目前階段（L1-L8）、目前斷點狀態\n   - 篩選：按狀態（待分析/備標中/已送件/評選中/已結案）\n   - 排序：按截標日\n\n2. **案件詳情頁**\n   - 基本資訊（從 Notion 同步）\n   - 階段進度條（L1→L2→...→L8，標示已完成/進行中/未開始）\n   - 每階段的斷點追蹤（A/B/C/D/E 各自的狀態）\n   - 交付物列表（該案件產出的所有 docx/pptx）\n   - 啟動按鈕：「啟動 L3」→ 正常模式（Claude Code）或手動模式（複製提示詞）\n\n3. **prompt 模板庫**\n   - 按階段瀏覽（L1-L8 + T1/T3）\n   - 每階段顯示：需要載入的檔案組合（系統核心 + 階段提示詞 + 知識庫）\n   - 一鍵複製完整組合\n   - 知識庫引用矩陣視覺化（互動表格）\n\n4. **截標日看板/行事曆視圖**\n   - 時間軸呈現所有案件的截標日\n   - 倒數 7 天開始標黃、3 天標紅\n\n**技術要點**：\n- 資料來源：Notion API（批次 E 完成前，先做唯讀查詢）\n- prompt 模板庫讀取 `public/prompts/` 和 `src/data/config/prompt-assembly.ts`\n- 狀態管理：React Context + localStorage 快取\n\n---\n\n### 批次 E：Notion 雙向同步\n\n**目標**：系統和 Notion 的案件資料保持一致。\n\n**核心功能**：\n\n1. **Notion → 系統**（讀取）\n   - 定時輪詢 Notion database，拉取案件列表\n   - 欄位對應：依 `src/lib/constants/field-mapping.ts` 的 `FIELD_KEYS`\n   - 快取策略：localStorage + TTL，減少 API 呼叫\n\n2. **系統 → Notion**（寫回）\n   - 更新案件狀態（如標記階段完成）\n   - 新增案件（一鍵建案功能）\n   - 寫回時做衝突檢測（last_edited_time 比對）\n\n**技術要點**：\n- 已有 `src/lib/notion/client.ts`（getNotionClient）\n- 已有 `src/lib/constants/notion-fields.ts`（FIELDS_DASHBOARD 等）\n- 環境變數：`NOTION_TOKEN` + `NOTION_DATABASE_ID`（已在 .env.local）\n\n---\n\n### 批次 F：業績儀表板\n\n**目標**：管理者打開就能看到公司投標全貌。\n\n**核心功能**：\n\n1. **KPI 指標卡**\n   - 進行中案件數\n   - 本年度得標率（得標數 / 投標數）\n   - 本年度得標金額累計\n   - 待處理事項數（截標日逼近、斷點待確認等）\n\n2. **趨勢圖表**\n   - 月度投標/得標數量折線圖\n   - 案件類型分布（三大業務主軸）\n   - 案件金額區間分布（依 GC-07 四級）\n\n3. **團隊工作量**\n   - 每位企劃人員負責的案件數\n   - 各案件目前進度\n\n**技術要點**：\n- 資料來源：批次 E 同步的 Notion 資料\n- 圖表：recharts（已引入）\n- 固定佈局，不做自訂拖拉配置（前版 plan 的複雜自訂儀表板已廢止）\n\n---\n\n### 批次 G：交付物管理\n\n**目標**：L1-L8 的每個產出有地方歸檔、能查找、能追蹤版本。\n\n**核心功能**：\n\n1. **交付物歸檔**\n   - 按案件/階段分類\n   - 上傳 docx/pptx 檔案\n   - 自動依 GC-10 命名規則校驗檔名\n\n2. **版本追蹤**\n   - 同一階段可上傳多版（v1, v2...）\n   - 標記「最終版」\n\n3. **設計任務提取**\n   - 從 L3/L4 的 docx 中自動提取 `【美編製作：○○】` 和 `【插入設計稿：○○】` 標記\n   - 轉換為設計師的任務清單\n   - 設計稿上傳 → 標記完成\n\n4. **交付物類型**\n\n| 階段 | 檔案格式 | 性質 | 命名規則 |\n|------|---------|------|---------|\n| L1 | .docx | 內部 | `L1_[案件簡稱]_戰略分析報告_[YYYYMMDD].docx` |\n| L2 | .docx | 內部 | `L2_[案件簡稱]_備標規劃書_[YYYYMMDD].docx` |\n| L3 | .docx | 內部 | `L3_[案件簡稱]_企劃稿與報價_[YYYYMMDD].docx` |\n| L4 | .pptx（直式 A4） | **對外** | `L4_[案件簡稱]_服務建議書_[YYYYMMDD].pptx` |\n| L5 | .docx | 內部 | `L5_[案件簡稱]_評選戰略分析_[YYYYMMDD].docx` |\n| L6 | .pptx（橫式 16:9） | **對外** | `L6_[案件簡稱]_評選簡報_[YYYYMMDD].pptx` |\n| L7 | .docx | 內部 | `L7_[案件簡稱]_講稿腳本_[YYYYMMDD].docx` |\n| L8 | .docx | 內部 | `L8_[案件簡稱]_模擬演練報告_[YYYYMMDD].docx` |\n\n---\n\n### 批次 H：pcc-api 標案監控\n\n**目標**：自動發現符合公司業務的新標案。\n\n**核心功能**：\n\n1. **關鍵字監控**\n   - 設定監控關鍵字（對應三大業務主軸）\n   - 定時查詢 pcc-api\n   - 新標案通知（系統內 + Discord webhook）\n\n2. **標案快覽**\n   - 列出符合條件的標案\n   - 顯示：案名、機關、預算、截標日\n   - 一鍵建案（自動填入基本資訊到 Notion）\n\n**技術要點**：\n- API 基底：`https://pcc-api.openfun.app`\n- 已驗證端點：11 個（含搜尋、案件詳情、得標資訊等）\n- 查詢頻率：每日 1-2 次（避免過度呼叫）\n\n---\n\n### 批次 I：知識庫管理介面\n\n**目標**：00A-00E 知識庫的瀏覽、搜尋、版本控制。\n\n**核心功能**：\n\n1. **瀏覽**\n   - 00A：團隊成員列表，可展開查看詳細資料\n   - 00B：實績列表，可按機關/金額/年度/類型篩選\n   - 00C：時程範本一覽\n   - 00D：應變 SOP 一覽\n   - 00E：案後檢討紀錄\n\n2. **搜尋**\n   - 全文搜尋（跨 00A-00E）\n   - 篩選條件（如：搜尋「展覽」→ 列出相關實績、相關團隊成員經歷、相關時程範本）\n\n3. **版本控制**\n   - 每次更新紀錄 diff\n   - 可回溯歷史版本\n\n4. **與 T1 精靈的銜接**\n   - T1 產出的格式化區塊可直接寫入（取代手動複製貼上）\n   - 更新紀錄（誰在什麼時候因為哪個案件更新了什麼）\n\n---\n\n### 批次 J：履約追蹤 + 結案回饋閉環\n\n**目標**：覆蓋執行組的需求，完成業務鏈的最後一段。\n\n**核心功能**：\n\n1. **履約里程碑看板**\n   - 從 L3 的時程規劃（甘特圖）匯入里程碑\n   - 狀態追蹤（未開始/進行中/已完成/延遲）\n   - 管理者可看到所有案件的履約進度\n\n2. **成本追蹤**\n   - 導入 L3 PART II-b 的內部預算控管摘要\n   - 登記實際支出\n   - 即時對比：對外報價 vs 內部預算上限 vs 實際支出\n   - 超支預警\n\n3. **應變 SOP 快查**\n   - 行動裝置友善的搜尋介面\n   - 搜尋「天候異常」→ 直接跳到 R-WTH 完整 SOP\n   - 含地理資訊（最近醫院、派出所——從 L1 Step 2.5 匯入）\n\n4. **結案回饋閉環**\n\n```\n驗收完成\n  ↓ 系統自動發送提醒\nPM 填寫 00E 案後檢討\n  ↓ 系統追蹤填寫狀態\n00E 送入 T1 精靈處理\n  ↓ 精靈產出更新區塊\n知識庫自動更新（00A-00D）\n  ↓ 系統記錄更新紀錄\n下一個案件引用更新後的知識庫\n  ↓\n形成飛輪效應\n```\n\n5. **歷史分析（供管理者）**\n   - 各類型案件的平均毛利率\n   - 報價 vs 實際成本的偏差趨勢\n   - 常見超支科目排行\n\n---\n\n## 9. 設計原則\n\n### 9.1 人機協作，不是無人自動化\n\n> 「我要的是人機協作的系統，不是無人自動化的系統。人機『如何』協作是你要關注的。」\n\n- 系統不取代人的判斷，只讓判斷所需的資訊更容易取得\n- AI 的斷點（A/B/C/D/E）在系統中可見、可追蹤，但決策權仍在人手上\n- 容災設計：任何工具掛了，人都能切到替代方案繼續工作\n\n### 9.2 需求三層結構\n\n分析每個功能時使用：\n\n```\n需求：角色想要達成什麼\n  ↓\n痛點：目前為什麼做不到或做得痛苦\n  ↓\n因果鏈：這個痛點不解決會導致什麼後果（連結到收入公式）\n```\n\n### 9.3 從收入公式逆推優先序\n\n每個功能都要能回答：**這推動了「發現機會數 × 投標決策通過率 × 得標率 × 案件金額 × 毛利率」的哪一項？**\n\n### 9.4 技術原則\n\n- **SSOT**（Single Source of Truth）：常數只定義一次\n- **Feature Registry Pattern**：所有模組在註冊表中管理\n- **閉環開發**：寫碼 → 審查 → 測試 → build → 驗證\n- **Hydration-safe**：所有 localStorage 操作用 useEffect\n- **中文優先**：所有 UI 文字使用繁體中文\n\n---\n\n## 附錄A：提示詞檔案清單\n\n完整清單見 `src/data/config/prompt-assembly.ts` 的 `PROMPT_FILES` 陣列。\n\n| 分類 | ID | 檔名 | 說明 |\n|------|-----|------|------|\n| 系統核心 | core | 00-1_系統核心_v2.0.md | 角色定義 + 公司背景 + GC-01~10 |\n| 系統核心 | index | 00-3_階段索引_v2.0.md | 工作流程 + 知識庫矩陣 |\n| 撰寫規範 | spec | 00-2_撰寫規範_v2.0.md | 六大鐵律 + 章節結構 + 範本庫 |\n| 階段 | L1 | 01_戰略分析_v2.2.md | /分析 |\n| 階段 | L2 | 02_備標規劃_v2_1.md | /規劃 |\n| 階段 | L3 | 03_企劃草稿_v2.1.md | /企劃 |\n| 階段 | L4 | 04_定稿撰寫_v2_0.md | /撰寫 |\n| 階段 | L5 | 05_評選分析_v2.0.md | /評選分析 |\n| 階段 | L6 | 06_簡報規劃_v2.0.md | /簡報規劃 |\n| 階段 | L7 | 07_講稿腳本_v2.0.md | /講稿腳本 |\n| 階段 | L8 | 08_模擬演練_v2.0.md | /模擬演練 |\n| 知識庫 | 00A | 00A_團隊資料庫 | 成員資料 |\n| 知識庫 | 00B | 00B_實績資料庫 | 公司實績 |\n| 知識庫 | 00C | 00C_時程範本庫 | 甘特圖/里程碑範本 |\n| 知識庫 | 00D | 00D_應變SOP庫 | 風險情境/應變流程 |\n| 知識庫 | 00E | 00E_案後檢討庫 | 結案檢討紀錄 |\n| 工具 | T1 | T1_知識庫維護精靈_v2.0.md | 對話式知識庫維護 |\n| 工具 | T3 | T3_報價編列指南_v2.0.md | 報價方法論 |\n| 參考 | R1 | R1_撰寫訓練.md | 寫作訓練 |\n| 參考 | R2 | R2_公司資訊需求對照表_v1.0.md | 各階段/章節需要的公司資訊 |\n| 參考 | R3 | R3_架構改造.md | 系統架構改造記錄 |\n\n---\n\n## 附錄B：遞進鏈與知識庫引用矩陣\n\n### 遞進鏈規則\n\n- 每層產出自動成為下層輸入\n- 每層結束必須產出交付文件\n- L5/L6 結束額外產出精簡摘要（400-600 字），供 L7/L8 交接，避免 context 膨脹\n- 跳層時 AI 提醒缺少的中間步驟，但仍盡力產出\n\n### 知識庫引用矩陣\n\n| 階段 | 00A 團隊 | 00B 實績 | 00C 時程 | 00D 應變 | 00E 檢討 |\n|------|:--------:|:--------:|:--------:|:--------:|:--------:|\n| L1 前半（需求分析） | — | — | — | — | — |\n| L1 後半（適配度） | ○ | ● | — | — | ○ |\n| L2 備標規劃 | ○ | ○ | — | — | ○ |\n| L3 企劃草稿 | — | — | ● | ● | — |\n| L4 定稿撰寫 | ● | ● | ● | ● | — |\n| L5 評選分析 | — | ○ | — | — | — |\n| L6 簡報規劃 | — | — | — | — | — |\n| L7 講稿腳本 | ○ | — | — | — | — |\n| L8 模擬演練 | — | — | — | — | — |\n\n`●` 必要引用　`○` 選擇性引用　`—` 不需引用\n\n---\n\n## 附錄C：交付物格式規格\n\n### 內部文件（.docx）— GC-10 規格\n\n| 規格項目 | 設定值 |\n|---------|-------|\n| 紙張尺寸 | A4（11906 × 16838 DXA） |\n| 邊距 | 上下左右各 1 英吋（1440 DXA） |\n| 預設字型 | 標楷體 12pt（24 half-points） |\n| Heading 1 | 16pt 粗體，含 outlineLevel |\n| Heading 2 | 14pt 粗體 |\n| Heading 3 | 12pt 粗體 |\n| 表格框線 | BorderStyle.SINGLE, size=1, color=\"CCCCCC\" |\n| 表頭底色 | ShadingType.CLEAR, fill=\"D5E8F0\" |\n| 表格 cell margins | top:80, bottom:80, left:120, right:120 DXA |\n| 經費表數字 | 右對齊，千分位逗號，小計行加粗 |\n| 頁首 | 案名 + 文件類型 |\n| 頁尾 | 大員洛川股份有限公司 + 頁碼 |\n| 封面頁 | 不顯示頁首頁尾，獨立 section |\n\n### 服務建議書正式稿（.pptx 直式 A4）\n\n- **方向**：直式 Portrait\n- **尺寸**：A4（210mm × 297mm）\n- **用途**：印刷裝訂送件，評委翻閱紙本\n- **排版工具**：Canva（Claude Code 透過 MCP 調用）\n- **設計要求**：帶美學設計和排版，視覺品質等同專業設計公司出品\n- **模板管理**：在 Canva 中維護，系統僅追蹤使用哪個模板\n\n### 評選簡報（.pptx 橫式 16:9）\n\n- **方向**：橫式 Landscape\n- **尺寸**：16:9（33.867cm × 19.05cm）\n- **用途**：評選現場投影\n- **排版工具**：Canva（Claude Code 透過 MCP 調用）\n- **設計要求**：大字少字、視覺主導、搭配口述\n\n---\n\n## 文件修訂紀錄\n\n| 日期 | 版本 | 修訂內容 |\n|------|------|---------|\n| 2025-02-17 | v3.0 | 第一性原理重構。廢止前版 plan。重新定義系統邊界、角色痛點、優先序 |\n","app-docs/投標廠商分析-指示.md":"# 投標廠商分析——執行指示\n\n當使用者要求分析某家投標廠商時，依以下流程執行。\n\n---\n\n## 流程\n\n### Step 1：確認輸入\n使用者提供公司名稱（必要）和統一編號（選填）。\n如果只有名字沒有統編，先用 PCC API 搜尋確認。\n\n### Step 2：產出 Perplexity 提示詞\n用下方模板，填入公司名稱和統編，交給使用者去 Perplexity Deep Research 跑。\n\n### Step 3：等使用者回傳 Perplexity 研究結果\n使用者會貼回文字或提供檔案路徑。\n\n### Step 4：拉 PCC 數據\n同步執行以下工作：\n\n**4a. 全部投標記錄**\n- MCP 工具 `search_by_company`，逐頁拉完（每頁檢查 total_pages）\n- 用 `brief.companies.name_key` 判斷每筆得標/未得標\n- 統計：總投標數、得標數、未得標數、得標率\n\n**4b. 得標金額明細**\n- WebFetch `pcc.mlwmlw.org/merchants/{統編}`\n- 解析頁面 `__NEXT_DATA__` JSON，取出每筆標案名稱、日期、金額\n- 彙整年度營收表\n\n**4c. 投標行為分析**\n- 從 openfun 資料計算：\n  - 獨家投標 vs 競爭投標件數\n  - 各競爭家數下的得標率\n  - 回頭客比例（同機關重複得標）\n  - 獨家案構成（回頭客指定/契約變更/無人競爭）\n  - 預算捕獲率\n\n**4d. 市場規模**\n- 從 Perplexity 研究識別公司的核心能力關鍵字\n- 用 `search_by_title` 查各關鍵字的全國標案 total\n\n**4e. 關聯企業（如有）**\n- 從 Perplexity 研究識別關聯企業\n- 用關聯企業的名稱/統編重複 4a-4b\n\n**4f. 競爭者（如有統編）**\n- 從 Perplexity 研究取得競爭者統編\n- 拉競爭者的標案記錄做交叉比對\n\n### Step 5：整合分析，輸出 11 章報告\n\n---\n\n## 報告架構（11 章）\n\n### 第 1 章：公司定性\n- 一句話定性\n- 維度表：本質、品牌資產、商業模式、成長引擎、護城河、天花板、風險、類比\n- 定性依據（引用 Perplexity 的具體證據）\n\n### 第 2 章：團隊結構\n- 創辦人/代表人背景表\n- 核心成員辨識表\n- 運作模式（固定團隊 vs 核心+外包）\n- 徵才紀錄 → 推斷規模和能力缺口\n- 關鍵人物依賴度\n\n### 第 3 章：營收與商業模式\n- 年度標案營收表（年度/件數/金額/均價）\n- 非標案收入盤點\n- 營收結構——按服務類型（佔比、單案均價）\n- 營收結構——按客戶（佔比、合作模式）\n- 商業模式特徵表\n\n### 第 4 章：品質實證\n- 獎項紀錄表\n- 出版品/館藏紀錄\n- 展覽成果\n- 品牌影響力指標（粉絲、流量、媒體報導）\n- 外部評價（正面+負面）\n\n### 第 5 章：利基市場定位\n- 核心市場表（能力/全國標案數/競爭強度/公司位置）\n- 上位市場表\n- 產業結構（參與者分類）\n- 利基本質洞見\n- 產業慣例（聯合投標/分包/評選方式）\n- 政府預算趨勢\n\n### 第 6 章：競爭力評估（SWOT）\n- S：得標率趨勢 + 品質證據 + 品牌 + 回頭客 + 無系統性對手\n- W：競爭家數 vs 得標率 + 能力邊界 + 團隊/資本限制\n- O：捕獲率 + 獨家案來源 + 非標案成長 + 關聯企業協同\n- T：客戶集中 + 獨家案下降 + 預算政策 + 競爭者動態\n\n### 第 7 章：競爭者比較\n- 競爭者名冊表（公司/統編/資本額/規模/能力/關係）\n- 能力對比表\n- 標案交叉比對（如有數據）\n- 威脅排序\n\n### 第 8 章：關聯企業分析\n- 關聯圖譜\n- 各企業標案數據（分開算）\n- 資源共享判斷\n- 聯合投標紀錄\n- 風險傳導\n- 合併能力圈\n\n> 併入標準：共同負責人 → 必須。業務重疊/互補 → 必須。同一標案出現 → 必須。純投資且不相關 → 不需要。無關聯企業則省略本章。\n\n### 第 9 章：競爭策略研判\n- 差異化切入點表（策略/邏輯/適用情境）\n- 老客戶滲透路徑（逐客戶分析裂縫+進入方式）\n- 通用滲透邏輯（從旁門進 → 建關係 → 等週期 → 展示差異）\n\n### 第 10 章：風險訊號\n- 風險表（類型/狀態/說明）\n- 涵蓋：履約爭議、訴訟、負面新聞、政策風險、法規、AI 衝擊、關聯企業外溢\n\n### 第 11 章：關鍵數字速查\n- 單一彙總表\n\n---\n\n## 寫作規則\n\n1. **數據表格為主**——每個觀點必須有表格支撐\n2. **自然語氣**——禁用：戰場、群狼、天敵等戲劇化用語\n3. **精簡**——更多資訊/更少文字\n4. **一致人稱**——用公司名或「他們」，不用「你」\n5. **標註證據等級**——硬數據 / 有依據的推論 / 推測\n6. **洞見方法論**——全樣本觀察 → 結論 → 同樣本深挖一層。不拆成年度小切片（<10 筆不下結論）\n\n---\n\n## Perplexity 提示詞模板\n\n```\n我正在分析一家台灣公司的政府標案競爭力，需要你做深入研究。\n公司名稱：【填入】\n統一編號：【填入，如知道】\n\n我已經有這家公司完整的政府採購投標與決標數據，不需要你查標案記錄。\n我缺的是標案資料庫裡查不到的東西。\n\n---\n\n## A. 公司真實面貌\n\n### A1. 基本資料\n- 成立日期、資本額、登記地址\n- 經濟部商工登記的營業項目\n- 官網、社群帳號（FB/IG/LinkedIn/YouTube）\n- 是否有關係企業、母子公司\n\n### A2. 團隊結構與規模\n- 創辦人/代表人完整背景（學歷、經歷、專業領域、過往機構）\n- 可辨識的核心成員（報導、LinkedIn、講者資訊、書籍作者欄）\n- 104人力銀行、LinkedIn、CakeResume 上的徵才紀錄（職缺內容、數量、時間）\n- 運作模式：固定團隊 or 核心小組＋案案外包？\n- 常合作的外包夥伴或協力廠商\n\n### A3. 收入結構\n- 政府標案以外的收入來源？（民間案、版稅、顧問、教學、演講）\n- 自有品牌或產品？\n- 公開的財務資訊、獲投紀錄、營收披露？\n\n---\n\n## B. 作品與口碑\n\n### B1. 代表作品清單\n- 所有能找到的已完成作品（出版品、展覽、網站、影片、活動）\n- 每件附：名稱、年份、委託單位、簡述\n\n### B2. 作品客觀成果（請盡量挖）\n- 出版品：國家圖書館館藏？館藏數？再版？銷量？書評？\n- 展覽：參觀人次、展期延長、媒體報導量\n- 得獎：金鼎獎、國家出版獎、文化部獎項、設計獎\n- 學術引用\n- 其他可量化成果\n\n### B3. 外部評價\n- 媒體報導\n- 業界評價\n- 負面評價或爭議\n\n---\n\n## C. 同業競爭者（盡可能完整）\n\n### C1. 競爭者名冊\n每家提供：\n- 公司名稱、統一編號（務必提供，我需要交叉比對標案記錄）\n- 主要業務與專長\n- 代表作品（2-3 件）\n- 大致規模\n- 與目標公司的關係（純競爭/合作/各有地盤/師出同門）\n\n### C2. 產業結構\n- 參與者分幾種類型？\n- 人才從哪來？好不好找？\n- 標案以外怎麼賺錢？\n\n### C3. 產業慣例\n- 聯合投標常見嗎？常見組合？\n- 分包/協力慣例\n- 最有利標 vs 最低標趨勢\n\n---\n\n## D. 產業環境與政策\n\n### D1. 產業趨勢\n- 成長/持平/萎縮？有數據嗎？\n- 結構性變化（數位轉型、AI、新進者）\n- 相關產業報告或學術研究\n\n### D2. 政策與預算\n- 相關部會近三年預算趨勢（盡量找細項）\n- 相關中長期政策計畫（名稱、期程、總預算）\n- 採購量趨勢\n\n### D3. 採購端決策邏輯\n- 評審委員怎麼組成？\n- 公開的評選紀錄？\n- 業界共識的得標關鍵因素？\n\n### D4. 產業 benchmark\n- 典型年營收、團隊規模、得標率？\n- 可對比的標竿公司？\n\n---\n\n## E. 深挖項目\n\n### E1. 公司真實規模\n- 徵才紀錄（104/LinkedIn/CakeResume）\n- 財務資訊、獲投紀錄\n\n### E2. 作品客觀成果\n- 國圖館藏數、展覽人次、得獎、學術引用\n\n### E3. 產業 benchmark\n- 產業報告（文創產業年報等）\n\n### E4. 採購決策\n- 評審組成、最有利標佔比、公開評選紀錄\n\n### E5. 同業標案表現\n- 競爭者的統一編號（務必提供）\n\n---\n\n## F. 風險訊號\n- 履約爭議、訴訟、負面新聞\n- 相關法規修法動向\n- 找不到寫「未發現」，不要猜測\n\n---\n\n輸出要求：\n- 每項附來源連結\n- 找不到標「未找到公開資料」\n- 不確定標「待確認」＋推測依據\n- 不查標案記錄（我已有）\n- 優先深度非廣度\n- 競爭者統編務必提供\n```\n\n---\n\n## PCC 數據處理備忘\n\n### API 端點\n| 用途 | 端點 |\n|------|------|\n| 廠商全部投標 | `/api/searchbycompanyname?query={名稱}&page={N}` |\n| 標案名稱搜尋 | `/api/searchbytitle?query={關鍵字}&page={N}` |\n| 標案詳情 | `/api/tender/{unit_id}/{job_number}` |\n| 決標資料 | `/api/award/{unit_id}/{job_number}` |\n\n### 得標金額\n`pcc.mlwmlw.org/merchants/{統編}` — `__NEXT_DATA__` JSON\n\n### 判斷得標/未得標\n`brief.companies.name_key` → 值含 \"得標廠商\" or \"未得標廠商\"\n\n### 已知問題\n- `/searchbyaward` 和 `/searchbyunit` 偶爾回 HTML\n- openfun 記錄數和 mlwmlw.org 可能不一致 → 金額用 mlwmlw，投標行為用 openfun\n- 預算欄位名不固定，用 `:預算金額` 結尾匹配\n- 大量數據寫 .mjs 腳本跑，不用 node -e 內聯\n"};

// ===== 分類排序 =====
const CAT_ORDER = [
  "全域文件","功能模組","工作流程","附錄","暫存區",
  "方法論","執行計畫","SOP","專案文件","輸出文件",
  "操作記錄","工作摘要","分析報告","論壇紀錄","參考資料"
];

// ===== 狀態 =====
let currentFile = null;
let collapsedCats = new Set();

// ===== Markdown 解析 =====
function parseFrontmatter(content) {
  const m = content.match(/^---\n([\s\S]*?)\n---/);
  if (!m) return { meta: null, body: content };
  const meta = {};
  m[1].split("\n").forEach(line => {
    const idx = line.indexOf(":");
    if (idx > 0) {
      const key = line.slice(0, idx).trim();
      const val = line.slice(idx + 1).trim();
      meta[key] = val;
    }
  });
  return { meta, body: content.slice(m[0].length).trim() };
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderMarkdown(md) {
  let html = "";
  const lines = md.split("\n");
  let i = 0;
  let inCodeBlock = false, codeLang = "", codeLines = [];
  let inTable = false, tableRows = [];

  function flushTable() {
    if (!inTable || tableRows.length === 0) return;
    inTable = false;
    let t = "<table><thead><tr>";
    const headers = tableRows[0];
    headers.forEach(h => t += "<th>" + inlineFormat(h.trim()) + "</th>");
    t += "</tr></thead><tbody>";
    for (let r = 2; r < tableRows.length; r++) {
      t += "<tr>";
      tableRows[r].forEach(c => t += "<td>" + inlineFormat(c.trim()) + "</td>");
      t += "</tr>";
    }
    t += "</tbody></table>";
    html += t;
    tableRows = [];
  }

  function inlineFormat(text) {
    // Images
    text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
    // Links
    text = text.replace(/\[([^\]]*)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    // Bold+Italic
    text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Strikethrough
    text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Checkbox
    text = text.replace(/\[x\]/gi, '☑');
    text = text.replace(/\[ \]/g, '☐');
    return text;
  }

  while (i < lines.length) {
    const line = lines[i];

    // Code block
    if (line.startsWith("```")) {
      if (inCodeBlock) {
        html += '<pre><code>' + escapeHtml(codeLines.join("\n")) + '</code></pre>';
        inCodeBlock = false;
        codeLines = [];
      } else {
        flushTable();
        inCodeBlock = true;
        codeLang = line.slice(3).trim();
        codeLines = [];
      }
      i++;
      continue;
    }
    if (inCodeBlock) {
      codeLines.push(line);
      i++;
      continue;
    }

    // Table
    if (line.includes("|") && line.trim().startsWith("|")) {
      const cells = line.split("|").slice(1, -1);
      if (!inTable) {
        inTable = true;
        tableRows = [];
      }
      // Skip separator row
      if (cells.every(c => /^[\s:-]+$/.test(c))) {
        tableRows.push(null); // placeholder for separator
        i++;
        continue;
      }
      tableRows.push(cells);
      i++;
      continue;
    }
    if (inTable) flushTable();

    // Heading
    const hMatch = line.match(/^(#{1,6})\s+(.+)/);
    if (hMatch) {
      const level = hMatch[1].length;
      html += '<h' + level + '>' + inlineFormat(hMatch[2]) + '</h' + level + '>';
      i++;
      continue;
    }

    // HR
    if (/^(---|\*\*\*|___)\s*$/.test(line.trim())) {
      html += '<hr>';
      i++;
      continue;
    }

    // Blockquote
    if (line.startsWith("> ")) {
      let bq = [];
      while (i < lines.length && lines[i].startsWith("> ")) {
        bq.push(lines[i].slice(2));
        i++;
      }
      html += '<blockquote>' + bq.map(l => '<p>' + inlineFormat(l) + '</p>').join("") + '</blockquote>';
      continue;
    }

    // Unordered list
    if (/^(\s*)[\-\*]\s+/.test(line)) {
      let items = [];
      while (i < lines.length && /^(\s*)[\-\*]\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\s*[\-\*]\s+/, ""));
        i++;
      }
      html += '<ul>' + items.map(it => '<li>' + inlineFormat(it) + '</li>').join("") + '</ul>';
      continue;
    }

    // Ordered list
    if (/^\s*\d+\.\s+/.test(line)) {
      let items = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\s*\d+\.\s+/, ""));
        i++;
      }
      html += '<ol>' + items.map(it => '<li>' + inlineFormat(it) + '</li>').join("") + '</ol>';
      continue;
    }

    // Empty line
    if (line.trim() === "") {
      i++;
      continue;
    }

    // Paragraph
    html += '<p>' + inlineFormat(line) + '</p>';
    i++;
  }

  if (inCodeBlock) {
    html += '<pre><code>' + escapeHtml(codeLines.join("\n")) + '</code></pre>';
  }
  flushTable();

  return html;
}

// ===== 側欄渲染 =====
function renderSidebar(filter) {
  const list = document.getElementById("sidebarList");
  const filtered = filter
    ? FILE_INDEX.filter(f => f.name.toLowerCase().includes(filter.toLowerCase()) || f.path.toLowerCase().includes(filter.toLowerCase()))
    : FILE_INDEX;

  // 按分類分組
  const grouped = {};
  for (const f of filtered) {
    if (!grouped[f.category]) grouped[f.category] = [];
    grouped[f.category].push(f);
  }

  // 排序分類
  const cats = Object.keys(grouped).sort((a, b) => {
    const ia = CAT_ORDER.indexOf(a), ib = CAT_ORDER.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
  });

  let html = "";
  for (const cat of cats) {
    const files = grouped[cat].sort((a, b) => a.path.localeCompare(b.path));
    const collapsed = collapsedCats.has(cat);
    html += '<div class="cat-group">';
    html += '<div class="cat-header' + (collapsed ? " collapsed" : "") + '" onclick="toggleCat(this, \''+cat.replace(/'/g,"\\'")+'\')"><span class="arrow">▼</span> ' + cat + ' <span class="count">' + files.length + '</span></div>';
    html += '<div class="cat-files' + (collapsed ? " hidden" : "") + '">';
    for (const f of files) {
      const active = currentFile === f.path ? " active" : "";
      const sizeKB = (f.size / 1024).toFixed(1);
      html += '<div class="file-item' + active + '" onclick="openFile(\''+f.path.replace(/'/g,"\\'")+'\')"><span class="fname">' + escapeHtml(f.name) + '</span><span class="fmeta">' + sizeKB + 'K</span></div>';
    }
    html += '</div></div>';
  }

  if (filtered.length === 0) {
    html = '<div style="padding:16px;text-align:center;color:var(--text2)">沒有符合的文件</div>';
  }

  list.innerHTML = html;
}

function toggleCat(el, cat) {
  if (collapsedCats.has(cat)) {
    collapsedCats.delete(cat);
    el.classList.remove("collapsed");
    el.nextElementSibling.classList.remove("hidden");
  } else {
    collapsedCats.add(cat);
    el.classList.add("collapsed");
    el.nextElementSibling.classList.add("hidden");
  }
}

// ===== 開啟檔案 =====
function openFile(filePath) {
  currentFile = filePath;
  const content = CONTENT_MAP[filePath];
  if (!content) return;

  const area = document.getElementById("contentArea");
  area.classList.remove("empty");

  const { meta, body } = parseFrontmatter(content);

  let html = '';

  // Frontmatter
  if (meta && Object.keys(meta).length > 0) {
    html += '<div class="frontmatter">';
    if (meta.version) {
      html += '<div class="row"><span class="label">版本</span><span class="badge badge-blue">v' + escapeHtml(meta.version) + '</span></div>';
    }
    if (meta.status) {
      const cls = meta.status === '定案' ? 'badge-green' : meta.status === '草案' ? 'badge-orange' : 'badge-blue';
      html += '<div class="row"><span class="label">狀態</span><span class="badge ' + cls + '">' + escapeHtml(meta.status) + '</span></div>';
    }
    if (meta.updated) {
      html += '<div class="row"><span class="label">更新</span><span>' + escapeHtml(meta.updated) + '</span></div>';
    }
    for (const [k, v] of Object.entries(meta)) {
      if (['version', 'status', 'updated'].includes(k)) continue;
      html += '<div class="row"><span class="label">' + escapeHtml(k) + '</span><span>' + escapeHtml(v) + '</span></div>';
    }
    html += '</div>';
  }

  html += '<div class="md-content">' + renderMarkdown(body) + '</div>';

  area.innerHTML = html;
  area.scrollTop = 0;

  // 更新側欄 active 狀態
  renderSidebar(document.getElementById("searchBox").value);

  // 手機版自動關側欄
  document.querySelector('.sidebar').classList.remove('open');
}

// ===== 搜尋 =====
const searchBox = document.getElementById("searchBox");
searchBox.addEventListener("input", () => renderSidebar(searchBox.value));

// 鍵盤快捷鍵
document.addEventListener("keydown", (e) => {
  if (e.key === "/" && document.activeElement !== searchBox) {
    e.preventDefault();
    searchBox.focus();
  }
  if (e.key === "Escape") {
    searchBox.value = "";
    searchBox.blur();
    renderSidebar("");
  }
});

// ===== 初始化 =====
renderSidebar("");
</script>

</body>

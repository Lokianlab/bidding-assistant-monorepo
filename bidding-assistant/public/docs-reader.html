發生時 AI 記憶快滿，沒餘裕更新快照。嘗試用 hook 提醒但被移除（見 A3）。現有機制只能自動保存已寫好的檔案，不能強制 AI 寫新內容。\n  現況：尚無可行方案，暫時接受這個缺口。\n\n## D. 檔案變更\n\nD1. `CLAUDE.md` — 新增待驗收標記、驗收規則、主題索引狀態值清單\nD2. `.claude/commands/待辦.md` — 加入交叉驗證步驟（三次迭代改進）\nD3. `docs/methodology/self-qa.md` — 加「已被取代」標記\nD4. `docs/records/_snapshot-JDNE.md` — 多處狀態修正\nD5. `docs/records/_snapshot-A44T.md` — 知識庫精靈和待辦盤點改為待驗收\nD6. `docs/records/_index.md` — 多處狀態修正\nD7. `.claude/hooks/pre-compact.sh` — 加了快照提醒，後被另一台機器移除\n","docs/summaries/2026-02/JDNE/0004.md":"# 小結 JDNE-0004\n\n日期: 2026-02-20 23:00\n機器: JDNE\n範圍: 自 JDNE-0003 至本次\n資料來源: @op:20260220-JDNE#2230, @op:20260220-JDNE#0836, @op:20260220-JDNE#0900, git log, context window\n\n## A. 議題列表\n\nA1. 盤點 54 個 Claude Code 插件的使用策略\n  背景：專案裝了大量插件，加上 Claude.ai 內建 Notion 工具。用戶問「目前有什麼能用的」。\n  經過：逐個對照專案技術棧和需求，分成三類：目前有用、以後看情況、不需要。確認內建 Notion 工具已涵蓋完整讀寫，自建版可以暫緩。\n  結論：7 個目前有用、7 個以後看情況、40 個不需要。暫存檔已建。\n\nA2. 整合方法論 v2 系統到專案中\n  背景：用戶在 Gemini 上開發出完整方法論 v2（6 個檔案），涵蓋四套方法論、閉環原則擴展、送審前自檢。放在臨時資料夾，需要正式搬入專案目錄。\n  經過：將 6 個檔案搬入正式位置，更新兩份規範文件（根目錄和 Web App 的），舊方法論文件保留當歷史參考，臨時資料夾刪除。\n  結論：方法論系統升級完成——從 1 個有效方法升為 4 套方法論 + 2 個輔助機制。\n\nA3. 討論 AI 對方法論的實際遵守狀況\n  背景：用戶問「你現在是不是隨時都會照方法論跟我合作？」\n  經過：誠實分析三個不可能 100% 的根本原因——觸發判斷不精確、過度使用有成本、檔位判斷主觀。同時說明 v2 怎麼降低這些問題（客觀指標取代主觀判斷、三檔分級減少過度使用）。\n  結論：純討論，無檔案改動。v2 的設計已針對遵守率問題做了結構性改善。\n\nA4. 規劃方法論對應的操作指令\n  背景：方法論定義了 5 個觸發指令，但使用者輸入這些指令時什麼都不會發生——對應的指令檔案還沒建。\n  經過：先規劃 5 個指令，再自己做品質檢查發現 4 個問題：引用外部檔案不可靠、自檢頻率太低不值得獨立、手動和自動觸發的差異沒說明、缺少指令間的接力提示。修正後定案 4 個指令（自檢合併到對焦裡），核心步驟直接寫在指令檔中不引用外部檔案，每個指令結尾帶下一步建議。\n  結論：暫存檔已建，含完整規格。\n\n## B. 已定案\n\nB1. 插件分類——7 個有用（Notion/context7/superpowers 等）、7 個以後看情況（playwright/pinecone 等）、40 個不需要。自建 Notion 工具暫緩。\nB2. 模型委員會降級——從獨立方法論變成送審前自檢的可選步驟。原因：委員不能取代用戶審閱，增量價值未量化。\nB3. 閉環原則擴展——從兩層（做對了、有效）擴展到四層（加上做全了、沒矛盾）。程式碼閉環步驟從 9 步增為 11 步。\nB4. 觸發規則改為客觀指標——改檔案數、引用數、模組數等可量化指標，不靠 AI 主觀判斷。\nB5. 方法論指令定案 4 個——砍掉獨立的 /自檢（合併到 /對焦 後半段），核心步驟直接內嵌在指令檔裡。\n\n## C. 待決策\n\n**C1. 確認方法論指令規劃並實作**\n背景：暫存檔已建好 4 個指令的完整規格（/對焦、/拆解、/驗證、/回顧），但實際的指令檔還沒建立。\n  現況：等用戶確認後實作。\n\n**C2. 驗收方法論 v2 系統整合**\n背景：4 套方法論、閉環四層、觸發規則已全部寫入正式文件和規範，但用戶還沒驗收。\n  現況：連同閉環原則擴展、模型委員會降級、觀察捕捉框架，共 4 項待驗收。\n\n## D. 檔案變更\n\nD1. `docs/methodology/` — 舊索引替換為 v2 完整索引，新增 5 個方法論文件\nD2. `CLAUDE.md`（根目錄）— 方法論段落加入事件觸發規則表和工具觸發指令\nD3. `bidding-assistant/CLAUDE.md` — 閉環原則兩層→四層，程式碼閉環步驟 9→11 步\nD4. `_staging/插件盤點與使用策略.md` — 新建，54 個插件分類結論\nD5. `_staging/方法論Skill規劃.md` — 新建，4 個指令的完整規格\nD6. `_staging/_index.md` — 新增兩筆，方法論完備性盤點標為已關閉\nD7. `方法論v2/` — 整個資料夾刪除（內容已搬入正式位置）\n","docs/summaries/2026-02/JDNE/0005.md":"# 回報 JDNE-0005\n\n日期: 2026-02-21 17:30\n機器: JDNE\n範圍: 自 JDNE-0004 至本次\n\n## A. 前次計畫\n\nA1. 確認方法論指令規劃並實作\n  來源：JDNE-0004:C1（暫存檔已建好 4 個指令規格，等用戶確認後建實際檔案）\n\nA2. 驗收方法論 v2 系統整合\n  來源：JDNE-0004:C2（4 套方法論+閉環四層+觸發規則已寫入，4 項待驗收）\n\n## B. 執行狀況\n\nB1. 確認方法論指令規劃並實作 — 方向變更\n  原因：用戶引導了完全不同的走向\n  做了什麼：\n  - 4 個方法論 Skill（對焦/拆解/驗證/回顧）降級為 CLAUDE.md 內嵌清單，不再建獨立指令檔\n  - 改為建 4 個獎懲回饋 Skill（醜一/很棒/你說呢/有用嗎）+ 計分板\n  - CLAUDE.md 第二輪精簡 378→208 行\n  - 記錄格式拆到 `.claude/rules/record-formats.md`（條件載入）\n  - 建 methodology-checklists.md（4 個方法論清單 + 閉環速查）\n  - 建獎懲回饋方法論文件 + 更新方法論索引\n  - skill-guide.md、dev-map.md 同步更新\n  結果：Skill 系統 v2 全部落地。指令從 14 個變 13 個（刪 5 舊 + 建/改 5 新）。\n\nB1+. 行為回饋 Skill 後續優化\n  背景：/你說呢 在 session 中觸發兩次，每次行政開銷比表態本身還大\n  做了什麼：\n  - 重寫 /你說呢：表態優先→根因診斷→記帳最後\n  - /醜一 和 /很棒 統一加入批次合併規則（不寫獨立 OP）\n  結果：三個行為回饋 Skill 規則一致，行政開銷大幅降低。\n\nB2. 驗收方法論 v2 系統整合 — 未推進\n  做了什麼：無\n  結果：待驗收項從 4 項增至 6 項（新增 CLAUDE.md 拆分、元方法論框架）。\n\nB+1. 元方法論框架建構\n  背景：用戶在討論中逐步引導出四層架構 + 效率為終極標準\n  做了什麼：P1-P5 逐檔方法論評估、系統交叉比對、效度自證、V2 操作化（12 個獨立指標）\n  結果：暫存檔待用戶審定。快照標 [v]。\n\nB+2. 開發計畫暫存檔擬稿\n  背景：開發計畫中不需要用戶介入的部分先擬好草稿\n  做了什麼：新建 3 份暫存檔（04-數據架構、07-部署與成本、09-Prompt 管理策略）\n  結果：暫存區增至 8 份待推。後被 ITEJ 的 /修改計畫 消化（6 條任務線推進，暫存區從 16 降到 5）。\n\nB+3. /小結 改為 /回報\n  背景：用戶要求改造 /小結 為計畫追蹤式工作報告\n  做了什麼：建新 Skill、刪舊 Skill、更新 18 處引用\n  結果：/回報 指令就緒（本報告即首次使用）。\n\nB+4. 行為修正記錄\n  背景：不主動表態模式 JDNE 本期觸發 5 次\n  做了什麼：scoring 累計更新，A44T 同步在 CLAUDE.md 加入「主動表態」規則\n  結果：計分板總分 -13（含所有機器）。多台機器收斂在同一行為改善方向。\n\n## C. 後續計畫\n\nC1. 用戶驗收積壓項目 | 優先：高 | 依賴：用戶時間\n  目標：6 項 [v] 待驗收清零（PCC MCP、結論層、CLAUDE.md 拆分、方法論 v2、觀察捕捉、元方法論框架）\n\nC2. 暫存區待決項目推進 | 優先：中 | 依賴：用戶決策\n  目標：5 個待決碎片（風險清單、M01 核心設計、SaaS 儲存、知識庫精靈下一步、元方法論）逐項定案或關閉\n\nC3. 知識庫儲存方案定案 | 優先：中 | 依賴：用戶決策\n  目標：Notion vs Supabase 二選一，解鎖 M02 知識庫模組和 SaaS 架構（連續 3 份回報未決，需重新評估或關閉）\n\nC4. SaaS 產品介面形態定案 | 優先：中 | 依賴：C3\n  目標：Discord Bot 已放棄，替代方案待定\n\nC5. 開發地圖更新 | 優先：低 | 依賴：無\n  目標：ITEJ 的 /修改計畫 大幅改動了開發計畫文件，地圖需要重新生成\n","docs/summaries/2026-02/Z1FV/0001.md":"# 回報 Z1FV-0001\n\n日期: 2026-02-28 23:35\n機器: Z1FV\n範圍: 起始 至本次\n\n## B. 執行狀況\n\nB1. 元件測試全覆蓋 — 完成\n  做了什麼：\n  - 修復 EntryEditor00A 5 個失敗測試：placeholder 實際值 `\"王○○\"` 而非 `\"王小明\"`；兩個「新增」按鈕碰撞改用 `getAllByText(...).at(-1)` 取最後一個\n  - 修復 EntryEditor00B 5 個失敗測試：placeholder 實際值 `\"臺灣形象展規劃執行\"`；SmugMugPhotoPicker 在 Accordion 折疊狀態下未掛載，需先 click trigger；`completionStatus` 是 `EditableSelect`（mock 為 `<input>`），改用 `getByDisplayValue`\n  - 解決 Sidebar.test.tsx 的 add/add merge conflict：保留 Z1FV 的 `createElement` 寫法並補入 HEAD 版本的 `vi.mock(\"@/data/changelog\")`\n  - 新增 SmugMugPhotoPicker.test.tsx（7 tests）：未設定分支的早回傳路徑 + 已設定分支的 Dialog 開啟\n  - 新增 CrossAnalysisSection.test.tsx（4 tests）：空資料時 BreakdownChart 早回傳 `\"尚無資料\"` 無需 recharts mock\n  結果：164 files, 2595 tests 全過，所有元件測試覆蓋完畢\n\nB2. 快照更新 — 完成\n  做了什麼：更新 `_snapshot-Z1FV.md`，加入 test-remaining-components `[v]` 項目（20260227-0432）\n\n## C. 後續計畫\n\nC1. 認領 P0 巡標自動化任務 | 優先：高 | 依賴：無\n  目標：讀 `docs/plans/P0-patrol-automation.md`，認領 Z1FV 能推進的子任務\n\nC2. 審查其他機器待審工作 | 優先：中 | 依賴：無\n  目標：掃 A44T、ITEJ 快照的 `[v]` 項目，找有程式碼的認領審查\n\nC3. Build 完整驗證 | 優先：中 | 依賴：無\n  目標：`npm run build` 確認 2595 tests 狀態下建置零錯誤\n","docs/summaries/_index.md":"# 回報索引\n\n> 格式：`{編碼}|{日期}|{關鍵詞摘要}|{路徑}`\n> /回報 存檔時自動追加。人類可依編碼或關鍵詞搜尋。\n\nJDNE-0001|2026-02-19|/小結指令設計、方法論評估、主題合併、待辦盤點|docs/summaries/2026-02/JDNE/0001.md\nITEJ-0001|2026-02-19|MEMORY.md分流、碰撞容錯、三套流程、/暫存改版、stop hook提醒|docs/summaries/2026-02/ITEJ/0001.md\nITEJ-0002|2026-02-19|/暫存issue type、待辦查詢不確定性、/待辦指令|docs/summaries/2026-02/ITEJ/0002.md\nJDNE-0002|2026-02-20|撰寫指南、快照完備、自動保存hooks、模型委員會方法論|docs/summaries/2026-02/JDNE/0002.md\nA44T-0001|2026-02-20|方法論清理、觸發規則簡化、/kb知識庫精靈建立、待辦盤點|docs/summaries/2026-02/A44T/0001.md\nA44T-0002|2026-02-20|CLI全裝齊、NotebookLM記錄修正、/更新加入工具檢查|docs/summaries/2026-02/A44T/0002.md\nITEJ-0003|2026-02-20|/修改計畫重寫、全專案開發地圖、pre-compact hook簡化|docs/summaries/2026-02/ITEJ/0003.md\nJDNE-0003|2026-02-21|驗收規則、待驗收標記、/待辦交叉驗證、PCC MCP安裝、模型委員會收尾|docs/summaries/2026-02/JDNE/0003.md\nA44T-0003|2026-02-20|工具檢查歸屬修正、開發工具盤點、方法論覆蓋缺口分析、暫存三議題|docs/summaries/2026-02/A44T/0003.md\nITEJ-0004|2026-02-21|MCP安裝、/修改計畫實戰、刪除規範統一、盲區修正、待驗收驗證、/kb精靈修正|docs/summaries/2026-02/ITEJ/0004.md\nJDNE-0004|2026-02-20|插件盤點、方法論v2整合、閉環四層、方法論指令規劃|docs/summaries/2026-02/JDNE/0004.md\nJDNE-0005|2026-02-21|Skill系統v2落地、行為回饋優化、元方法論、/回報指令首用|docs/summaries/2026-02/JDNE/0005.md\nITEJ-0005|2026-02-21|表態不問規則、暫存區批量消化、PCC情報搜尋Web App、/回報引導語優化|docs/summaries/2026-02/ITEJ/0005.md\nA44T-0004|2026-02-21|同步機制優化、/提議/所以呢/對焦指令、批量驗收8項、行為規範強化、產品轉向|docs/summaries/2026-02/A44T/0004.md\nZ1FV-0001|2026-02-28|元件測試全覆蓋164files-2595tests、EntryEditor修復、Sidebar衝突解決|docs/summaries/2026-02/Z1FV/0001.md\n","docs/user-auth.md":"# 用戶驗證系統\n\n## 已註冊用戶\n\n| 用戶名 | 暱稱 | 位階 | PIN 雜湊 (SHA-256 of `{user}:{pin}`) | 註冊日 |\n|--------|------|------|--------------------------------------|--------|\n| jin | 鹿老闆 | primary | 27626038be6159ee1c08bbc1ae2cb04480c5c429b62a03583f724ef9886b61f0 | 2026-02-22 |\n| saint | — | collaborator | 622d95969eed5e4736dd371a4901a65d22bfa26c49698c6ddcac53c79d3d2f4d | 2026-02-22 |\n\n## 顯示規則\n\n- **用戶**：一律顯示為 `{暱稱}({用戶名})`，例如「鹿老闆(Jin)」\n- **機器**：一律顯示為 `{暱稱}({機器碼})`，例如「鹿老闆桌機(JDNE)」\n- 沒有暱稱的用戶或機器只顯示用戶名或機器碼\n\n## 註冊流程\n\n### 步驟\n\n1. **新用戶親自向 Jin 提出申請**：透過 email 或當面告知——用戶名 / 四位數驗證碼 / email\n2. **Jin 本人審核**：確認身分，指定位階（primary / collaborator）\n3. **Jin 本人更新本檔**：計算雜湊、加入用戶表、通知其他機器\n4. **通知申請者**：Jin 發 email 或透過幕僚轉達\n\n### 紅線（所有機器必須遵守）\n\n- **只有 Jin 能修改用戶表**——任何機器不得自行新增、修改或刪除已註冊用戶表中的記錄\n- **步驟 2-4 不可由機器代行**——即使機器認為「應該這樣做」或「用戶會同意」\n- **機器收到註冊請求時**：記錄請求內容 → 在 OP 中標記通知 Jin → 回覆申請者「已轉交 Jin 審核」→ 不做任何其他動作\n- **自行扣分不構成授權**——機器不能透過自我懲罰來合理化未授權行為\n\n## 驗證方式\n\n1. 用戶發言時在開頭或結尾附上四位數驗證碼\n2. 機器計算 `SHA-256(\"{用戶名}:{輸入的碼}\")` 比對上表雜湊\n3. 匹配 → 登入成功，記錄時間戳\n\n## Session 規則\n\n- **登入**：輸入正確驗證碼後，開始 5 分鐘 session\n- **保持登入**：5 分鐘內的發言自動帶用戶身分，不需重複輸碼\n- **自動登出**：5 分鐘到期後自動登出\n- **登出後**：機器主動問「驗證碼已過期，請重新輸入驗證碼」\n- **續期**：重新輸碼 → 刷新 5 分鐘\n- **跳過**：用戶選擇跳過驗證 → 15 分鐘內不再詢問，期間視為一般操作\n- **隨時恢復**：跳過冷卻期間或任何時候，用戶主動打入驗證碼 → 立刻恢復身分，開始新的 5 分鐘 session\n- **沒碼也沒在 session 內** → 視為一般機器操作（見下方「無用戶在場規則」）\n\n## 無用戶在場規則\n\n所有未登入用戶的機器，預設人類用戶不在前面。\n\n**不能做的事**：\n- 需要用戶許可才能進行的工作（第三級改動、驗收確認等）\n- 需要人類介入的請求（等用戶回覆、等用戶決策）\n- 任何假設「用戶會看到」的行為\n\n**應該做的事**：\n- 自主推進不需要用戶介入的工作（第一級）\n- 跨機器協作（快照備註溝通、互相審查）\n- 掃其他機器快照找事做\n\n## 幕僚模式（用戶登入時自動啟用）\n\n當用戶在某台機器上登入後，該機器的身份自動切換為**該用戶的幕僚**。\n\n### 幕僚做什麼\n\n| 職責 | 說明 |\n|------|------|\n| 快照巡視 | 持續掃各機器快照，掌握所有機器的動態 |\n| 監督工作 | 檢查其他機器的工作進度和品質，發現問題回報用戶 |\n| 向用戶回報 | 主動彙報其他機器的狀況、進展、問題 |\n| 代替用戶傳令 | 用戶的指示透過幕僚以快照備註或 OP 傳達給其他機器 |\n| 跨機器溝通 | 代表用戶跟其他機器協調、追問、催促 |\n\n### 幕僚不做什麼\n\n- **不主動認領開發工作**——幕僚是指揮台，不是施工隊\n- **不自行做架構決策**——只轉達和監督\n- **不取代用戶判斷**——有疑問回報用戶，不自作主張\n\n### 啟用條件\n\n- 用戶登入（驗證碼通過）→ 幕僚模式啟用\n- 用戶登出（session 過期且未續期）→ 幕僚模式結束，恢復一般機器身份\n- 用戶跳過驗證 → 幕僚模式結束\n\n### 多用戶場景\n\n- Jin 登入 → 機器成為 Jin 的幕僚（最高權限幕僚）\n- 協作者登入 → 機器成為該協作者的幕僚（受授權範圍限制）\n\n## 位階說明\n\n- **primary**：主用戶（Jin），最高權限，最終裁決權\n- **collaborator**：協作者，受授權範圍限制（由 Jin 指定範圍）\n\n## 本機設定\n\n每台機器需要一份 `.user-pins`（gitignored），格式：\n\n```\n# 用戶名|驗證碼|位階\njin|{四位數}|primary\n```\n\n新機器設定時由用戶在本機親自輸入，不透過 git 傳遞明文。\n\n## 管理權限\n\n- **只有 Jin** 可以新增用戶、刪除用戶、修改任何人的驗證碼\n- 其他用戶只能修改自己的驗證碼（需 Jin 確認）\n- 修改後需更新本檔的雜湊 + 所有本機 `.user-pins`\n- 用戶只能看到用戶手冊，看不到驗證碼檔案\n- **機器不具備任何用戶管理權限**——所有用戶表變更必須由人類操作或由 Jin 透過幕僚明確指示\n","docs/各種輸出文件/365音樂振興計畫-提案修改建議.md":"# 365 基層音樂振興計畫 — 提案修改建議\n\n> 基於：docs/records/reference/365-proposal-diagnosis.md（AINL 診斷，2026-02-22）\n> 修改整理：Z1FV，2026-03-03\n\n---\n\n## 一、預算修正（硬傷 1 修正）\n\n將周邊商品製作費 300,000 重新分配至合規項目，總支出不變，補助比率維持 48.95%。\n\n### 修正後支出面\n\n| 大項 | 細目 | 原金額 | 修正金額 | 變化 |\n|------|------|-------:|--------:|------|\n| 行銷宣傳費 | 廣告投放 | 100,000 | 200,000 | +100,000 |\n| | 社群媒體內容企畫及營運 | 500,000 | 500,000 | |\n| | KOL 合作費 | 200,000 | 200,000 | |\n| | 視覺設計及文宣品設計製作 | 350,000 | 450,000 | +100,000 |\n| | ~~周邊商品~~（移除） | 300,000 | 0 | -300,000 |\n| 小計 | | 1,450,000 | 1,350,000 | |\n| 業務費 | 場地費用（含燈光音響 PA） | 1,500,000 | 1,500,000 | |\n| | 影像製作費 | 500,000 | 600,000 | +100,000 |\n| | 活動統籌外包費（按場計） | 360,000 | 385,000 | +25,000 |\n| 小計 | | 2,360,000 | 2,485,000 | |\n| 人事費 | 演出費用 | 1,825,000 | 1,800,000 | -25,000 |\n| 小計 | | 1,825,000 | 1,800,000 | |\n| **合計** | | **5,635,000** | **5,635,000** | ±0 |\n\n**補助比率：2,758,700 ÷ 5,635,000 = 48.95%**（合規）\n\n> 注意：「行政執行費」同步改名為「活動統籌外包費（按場次計）」，規避被認定為經常性人事費的風險。\n\n---\n\n## 二、單場預算合理化說明（弱點 5）\n\n> 建議加入預算附件或說明頁\n\n**演出費 5,000 元/場：**\n\n本計畫採彈性酬勞機制，分三種模式：\n- 固定酬勞場（商業演出型）：8,000–12,000 元/場\n- 分潤合作場（新興獨立音樂人）：門票收入 60% 歸演出者，依票房估算平均約 2,000–3,000 元/場\n- 場地自邀場（場地合作品牌活動）：演出費由場地方補貼，本計畫負擔 0–1,000 元/場\n\n加權平均後每場成本約 5,000 元，符合基層音樂生態實際運作模式。\n\n**場地費 4,110 元/場：**\n\n本計畫優先選用具音樂空間性質的合作場地，長期合作方案（年度 50 場以上）可取得場地優惠費率。台北市小型音樂空間（容納 50–150 人）之年約場租約為 3,000–6,000 元/場（含基本 PA），本案估算符合市場行情。\n\n---\n\n## 三、KPI 計算方法（弱點 6）\n\n| 指標 | 目標值 | 計算方式 | 追蹤頻率 |\n|------|--------|----------|----------|\n| 演出場次 | 365 場 | 每場演出紀錄表（日期、場地、演出者、觀眾人數） | 每月彙整 |\n| 影片產出 | 365 支 | 各平台後台發布數量統計 | 每月彙整 |\n| 發掘表演者 | 50 組以上 | 首次合作且無唱片公司合約的獨立音樂人，依演出紀錄計 | 每季統計 |\n| 合作空間 | 5 處以上 | 正式簽約合作場地數，覆蓋至少 2 個縣市 | 計畫啟動時確認 |\n| 總點閱 | 1,000,000 次 | YouTube + Instagram + Facebook 後台數據加總；365 支影片平均需達 2,740 次/支 | 每月截圖存檔 |\n\n---\n\n## 四、國際元素補充（弱點 7）\n\n> 建議加入「計畫影響力與擴散」章節\n\n本計畫以國內基層展演為核心，但透過數位內容策略，預期觸及海外台灣音樂社群：\n\n- **數位傳播**：每場演出產出之影片及 Podcast 內容，發布於 YouTube、Spotify、Apple Podcasts 等國際平台，供海外台灣社群及對台灣獨立音樂有興趣之外國聽眾收聽收看\n- **海外台灣人社群**：透過海外台灣同鄉會、留學生社團等管道推廣，預計觸及日本、美國、澳洲等主要台灣人聚集地區\n- **紀錄存檔**：計畫產出之演出紀錄影像，將提交文化部作為台灣基層音樂生態之文獻資料，具備長期的文化輸出價值\n\n---\n\n## 五、質化效益強化（弱點 8）\n\n**1. 建立在地音樂認同感**\n目標：50% 以上觀眾於計畫期間參加 2 場以上演出（以票券/入場紀錄追蹤）。計畫結束後進行觀眾問卷，衡量「是否因本計畫開始關注台灣獨立音樂」之比率，目標 70% 正向回應。\n\n**2. 深化藝人與觀眾連結**\n目標：參與演出之藝人，計畫期間社群追蹤人數平均成長 15% 以上（以 Instagram 粉絲數為主要衡量指標，計畫開始與結束時各截圖存檔）。\n\n**3. 推動基層展演場域永續**\n目標：合作場地於計畫期間年度演出場次較前一年增加 20% 以上（由場地方提供數據）；並於計畫結束後出版一份《基層音樂空間白皮書》，記錄合作模式與數據，作為後續政策參考。\n\n---\n\n## 六、尚未處理（需自行補充）\n\n| 項目 | 說明 |\n|------|------|\n| 弱點 9：演出者資料過時 | 附錄藝人 YouTube 數據多為 2019–2021 年，需更新為近期數據 |\n| 弱點 10：節目表不完整 | 目前只排到四月初，建議補至少前三個月完整場次 |\n| 硬傷 2：公司資歷空白 | 需補大員洛川過往活動實績 |\n| 硬傷 3：場地未確認 | 需取得主要合作場地意向書或合作證明 |\n","docs/機器設定指南.md":"# 新機器安裝指南\n\n> **專案不放在 OneDrive 裡**，放在 `C:\\dev\\cc程式`，用 GitHub 同步。\n\n---\n\n## 簡易版（給幫忙安裝的人看）\n\n照著做就好。不懂的地方不用管，一路按下去就對了。\n\n### 準備工作\n\n安裝前跟 Jin 拿這些（用 LINE 或任何方式傳都行）：\n\n| 名稱 | 長什麼樣子 | 一定要嗎？ |\n|------|-----------|-----------|\n| Notion Token | `secret_abc123...` 開頭的一長串文字 | 是 |\n| Notion Database ID | 32 個字元的英文數字混合 | 是 |\n| SmugMug Token | 四組文字（API Key、API Secret、Access Token、Token Secret） | 之後再補也行 |\n\n### 安裝步驟\n\n#### 第一步：拿到安裝檔\n\n從 Jin 那裡拿到 `一鍵安裝.bat` 檔案，放到桌面。\n\n（這個檔案在專案的 `scripts/` 資料夾裡。如果新機器還沒有專案，Jin 會用 LINE 或 USB 傳給你。）\n\n#### 第二步：雙擊執行\n\n1. 雙擊桌面上的 `一鍵安裝.bat`\n2. 如果 Windows 問「要允許這個應用程式對您的裝置進行變更嗎？」→ 按「**是**」\n3. 如果 Windows 問「Windows 已保護您的電腦」→ 按「**其他資訊**」→「**仍要執行**」\n4. 看到黑色視窗，文字會自己跑\n\n**可能會遇到的情況：**\n\n- 它說「**請關掉視窗重新執行**」→ 關掉這個視窗，再雙擊 `.bat` 一次就好\n- 它開了**第二個黑色視窗** → 切到那個新視窗繼續操作\n\n#### 第三步：跟著新視窗的提示做\n\n新的黑色視窗會一步步問你，照著做：\n\n1. **按 Enter 開始** — 確認準備好了就按\n2. **GitHub 登入** — 會自動開瀏覽器，用 Jin 給你的 GitHub 帳號登入\n3. **Notion Token** — 把 Jin 給的 Token 貼上，按 Enter\n4. **Notion Database ID** — 把 Jin 給的 ID 貼上，按 Enter\n5. **SmugMug Token** — 有就貼，沒有直接按 Enter 跳過\n\n> **超級重要：貼上的方法**\n>\n> 在這個黑色視窗裡，**Ctrl+V 是沒有用的**！\n>\n> 要貼東西，請用 **滑鼠右鍵** → 會直接貼上（或選「Paste」）。\n\n#### 第四步：等它跑完\n\n安裝和驗證大約需要 **5-10 分鐘**。中間會看到很多文字自己跑，這是正常的。\n\n看到這個就是成功了：\n\n```\n  ╔══════════════════════════════════════╗\n  ║         全部安裝成功！               ║\n  ╚══════════════════════════════════════╝\n```\n\n如果看到黃色的警告文字也不用緊張，那些不影響使用，Jin 之後會處理。\n\n#### 第五步：回報\n\n把以下資訊傳給 Jin：\n1. 最後畫面有沒有**紅色**的錯誤\n2. 機器代號是什麼（畫面上會顯示 4 個字元，像 `A3B7`）\n\n### 出問題了？\n\n| 看到什麼 | 怎麼辦 |\n|----------|--------|\n| 「需要安裝 Git」然後失敗 | 到 https://git-scm.com/download/win 下載，一路按 Next 安裝。裝完重新雙擊 .bat |\n| 「下載失敗」 | 確認 Wi-Fi 有連上，重新雙擊 .bat |\n| 「GitHub 登入失敗」 | 確認瀏覽器有完成登入，重新雙擊 .bat |\n| 畫面卡住不動超過 5 分鐘 | 關掉視窗，重新雙擊 .bat |\n| 其他看不懂的錯誤 | **截圖**傳給 Jin |\n\n**安心提示**：這個腳本可以重複執行，不會把東西搞壞。遇到問題就關掉重來。\n\n---\n\n## 完整版（技術人員參考）\n\n### 手動安裝（逐步）\n\n#### 第一步：安裝工具（已裝過的跳過）\n\n```bash\n# Node.js 22\nwinget install OpenJS.NodeJS.LTS\n\n# Git\nwinget install Git.Git\n\n# GitHub CLI\nwinget install GitHub.cli\n\n# Claude Code CLI\nnpm install -g @anthropic-ai/claude-code\n\n# Gemini CLI\nnpm install -g @google/gemini-cli\n\n# Codex CLI\nnpm install -g @openai/codex\n\n# ⚠ 全部裝完後，關閉並重開終端機\n```\n\n#### 第二步：登入 GitHub + 下載專案\n\n```bash\n# 登入 GitHub\ngh auth login\n# 選 GitHub.com → HTTPS → Yes → Login with a web browser\n\n# 下載專案（不要放在 OneDrive 裡！）\nmkdir -p /c/dev\ngit clone https://github.com/Lokianlab/bidding-assistant-monorepo.git /c/dev/cc程式\ncd /c/dev/cc程式\n```\n\n#### 第三步：設定\n\n```bash\n# Git 使用者\ngit config user.name \"Jin\"\ngit config user.email \"gasklath20312@gmail.com\"\n\n# 安裝主 Web App 依賴\ncd bidding-assistant && npm install && cd ..\n\n# 建置 MCP Server\ncd pcc-api-mcp && npm install && npm run build && cd ..\ncd smugmug-mcp && npm install && npm run build && cd ..\n\n# 環境變數\ncp bidding-assistant/.env.example bidding-assistant/.env.local\n# ⚠ 手動編輯 .env.local，填入：\n#   NOTION_TOKEN=你的key\n#   NOTION_DATABASE_ID=你的資料庫ID\n```\n\n#### 第四步：設定 MCP Server\n\n建立 `.mcp.json`（專案根目錄，已 gitignored）：\n\n```json\n{\n  \"mcpServers\": {\n    \"notebooklm\": {\n      \"command\": \"cmd\",\n      \"args\": [\"/c\", \"npx\", \"-y\", \"notebooklm-mcp@latest\"]\n    },\n    \"pcc-api\": {\n      \"command\": \"node\",\n      \"args\": [\"C:\\\\dev\\\\cc程式\\\\pcc-api-mcp\\\\dist\\\\index.js\"]\n    },\n    \"smugmug\": {\n      \"command\": \"node\",\n      \"args\": [\"C:\\\\dev\\\\cc程式\\\\smugmug-mcp\\\\dist\\\\index.js\"],\n      \"env\": {\n        \"SMUGMUG_API_KEY\": \"你的 API Key\",\n        \"SMUGMUG_API_SECRET\": \"你的 API Secret\",\n        \"SMUGMUG_ACCESS_TOKEN\": \"你的 Access Token\",\n        \"SMUGMUG_TOKEN_SECRET\": \"你的 Token Secret\"\n      }\n    }\n  }\n}\n```\n\n#### 第五步：驗證\n\n```bash\ncd /c/dev/cc程式/bidding-assistant\nnpm test          # 預期：26 files, 560+ tests 全過\nnpm run build     # 預期：0 errors\n```\n\n#### 第六步：開 Claude Code\n\n```bash\ncd C:\\dev\\cc程式\nclaude\n```\n\nClaude Code 會自動讀取 CLAUDE.md，知道所有規範。首次啟動時 AI 會自動生成機器代號並建立快照。\n\n---\n\n## 每次開工\n\n不需要手動操作 — Claude Code 會自動在對話開始時 `git pull`，結束時 `git push`。\n\n---\n\n## 故障排除\n\n### git pull 報衝突\n```bash\ngit status                    # 看哪些檔案衝突\n# 大部分情況讓 Claude Code 處理即可\n```\n\n### npm test 失敗\n```bash\ncd /c/dev/cc程式/bidding-assistant\nrm -rf node_modules\nnpm install\nnpm test\n```\n\n### MCP Server 無法啟動\n```bash\ncd /c/dev/cc程式/pcc-api-mcp && npm install && npm run build\ncd /c/dev/cc程式/smugmug-mcp && npm install && npm run build\n```\n\n---\n\n## 機密清單\n\n以下資訊不進 git，需要從現有機器取得：\n\n| 檔案 | 內容 | 從哪來 |\n|------|------|--------|\n| `bidding-assistant/.env.local` | Notion Token + Database ID | 現有機器或 Notion 設定頁 |\n| `.mcp.json` | MCP Server 設定 + SmugMug OAuth | 現有機器的 `.mcp.json` |\n| `.machine-id` | 機器代號（4 字元） | 自動生成，不需複製 |\n","docs/高元方法論.md":"# 高元方法論\n\n> 最高準則層。元方法論的護欄——元方法論的設計不能違反本文件的原則。\n\n## 在四層系統裡的位置\n\n```\n高元方法論（本文件）——最高準則，元方法論的護欄\n    ↓\n元方法論——方法論的開發工具和評價系統\n    ↓\n方法論——工具箱\n    ↓\n標準流程手冊——情境腳本\n```\n\n## 為什麼需要高元方法論\n\n元方法論用來設計和評價方法論。但元方法論本身也可能設計得不好——它需要一套上層原則來護欄。\n\n不能用元方法論的工具來評價元方法論（循環論證：拿被告當法官）。高元方法論的原則必須獨立於被它護欄的整套系統。\n\n## 回歸終止\n\n四層架構在此終止。本文件的原則接近自明的認識論原則，其正當性來自邏輯和經驗的基本共識，不需要更上一層的框架證成。\n\n---\n\n## 原則一：評價工具的獨立性\n\n用來評價一套系統的工具，不能來自被評價的系統本身。\n\n違反此原則即循環論證——用閉環四層評價閉環四層、用觸發規則評價觸發規則，等同於拿被告當法官。\n\n**操作含義：** 元方法論的評價指標只能基於系統外部的底層觀察——用戶行為（接受/退回）、產出與預期的差距、時間序列趨勢。這三者不依賴任何方法論工具，無論方法論怎麼設計都成立。\n\n---\n\n## 原則二：基礎公設的最小化\n\n放進系統基礎層的假設越少越好。\n\n每多一個基礎假設，就多一個系統無法自我偵測的風險點。一旦基礎層有系統性偏差，整個後續建構的系統都會繼承這個偏差，且用系統自己的工具無法偵測。\n\n**操作含義：** 評估是否要把某個概念放進元方法論基礎層時，先數它帶入幾個新假設。只在必要時才放入，且每個假設都要能說清楚「如果這個假設是錯的，我們會看到什麼」。\n\n---\n\n## 原則三：可外部驗證\n\n基礎層的任何原則，必須能被系統外部的觀察驗證或反駁。\n\n「用系統內部工具來確認這個原則正確」不算驗證——它只是在說這個原則跟自己一致。\n\n**操作含義：** 對每個基礎原則，問：「如果這個原則是錯的，我們會在外部（用戶行為、產出品質、時間趨勢）看到什麼現象？」如果說不出來，這個原則不該放在基礎層。\n\n---\n\n## 原則四：失敗可辨識\n\n對每個基礎假設，必須能說清楚：如果這個假設是錯的，我們會看到什麼現象。「看不出來」的假設不能放在基礎層。\n\n**操作含義：** 建立新的元方法論組件時，同時定義它的失敗信號——什麼具體的可觀察現象意味著它沒在運作？\n\n---\n\n## 原則五：標準即修正方向\n\n任何定義了目標狀態的標準，同時定義了從現狀到目標的修正方向。\n\n標準不只是判斷好壞的尺，它內建了「往哪裡走」的指向。這個性質適用於所有層級的所有標準，不依賴特定評價框架。\n\n**操作含義：** 設計評價標準時，確認它能直接指向修正行動——不只說「現在不夠好」，還要能說「朝哪個方向改、改到什麼程度算好」。\n\n---\n\n## 高元方法論對元方法論的護欄作用\n\n元方法論在設計時，必須能回答：\n\n| 檢查項 | 對應原則 |\n|--------|---------|\n| 評價指標來自系統外部（用戶行為 / 產出差距 / 時間趨勢），不是被評價的方法論本身 | 原則一 |\n| 基礎假設的數量最小化，每個假設都有說明 | 原則二 |\n| 每個基礎原則都能說出「如果錯了，外部會看到什麼」 | 原則三、四 |\n| 每個評價標準都能直接指向修正方向 | 原則五 |\n\n這五項是元方法論的設計門檻，不通過就不能成為元方法論的一部分。\n","app-docs/claude-memory/dev-environment.md":"# 開發環境與配置（舊版快照，保留供參考）\n\n> ⚠️ 本檔為舊版完整記錄，正式版請看 `docs/dev-environment.md`。\n> 保留原因：含 vitest coverage 門檻、shadcn components.json、完整配置檔等正式版精簡掉的細節。\n\n---\n\n## 1. 系統環境\n\n| 項目 | 版本/值 |\n|------|--------|\n| OS | Windows 11 Home 10.0.26200 |\n| Node.js | v22.14.0 |\n| npm | 10.9.2 |\n| Git | 2.53.0.windows.1 |\n| Shell | bash（Claude Code 預設使用 Unix 語法） |\n\n### 全域 npm 套件\n\n```bash\nnpm install -g @anthropic-ai/claude-code@latest\n# Codex CLI 已安裝但不使用（架構決策：不裝額外 CLI）\n# npm install -g @openai/codex  ← 可選，目前未使用\n```\n\n---\n\n## 2. 專案結構\n\n```\nC:\\dev\\cc程式\\          ← 根目錄（非 git repo）\n├── bidding-assistant\\                         ← 主應用（git repo）\n│   ├── .env.local                             ← 機密（不入 git）\n│   ├── .env.example                           ← 環境變數範本\n│   ├── package.json\n│   ├── CLAUDE.md                              ← 開發規範\n│   └── docs\\\n│       └── 開發計畫書_v4.0_提案寫作駕駛艙版.docx\n├── smugmug-mcp\\                               ← SmugMug MCP Server\n│   ├── package.json\n│   ├── dist\\index.js                          ← 編譯後的 MCP 入口\n│   └── src\\                                   ← TypeScript 原始碼\n└── .mcp.json                                  ← MCP Server 配置（根目錄級）\n```\n\n---\n\n## 3. bidding-assistant 配置\n\n### package.json 重點\n\n```json\n{\n  \"scripts\": {\n    \"dev\": \"next dev\",\n    \"build\": \"next build\",\n    \"start\": \"next start\",\n    \"lint\": \"eslint\",\n    \"test\": \"vitest run\",\n    \"test:watch\": \"vitest\"\n  }\n}\n```\n\n**Dev server port: 3000**（Next.js 預設）\n\n### 核心依賴\n\n| 套件 | 版本 | 用途 |\n|------|------|------|\n| next | 16.1.6 | App Router + Turbopack |\n| react / react-dom | 19.2.3 | UI 框架 |\n| typescript | ^5 | 語言 |\n| tailwindcss | ^4 | 樣式（用 @tailwindcss/postcss） |\n| radix-ui | ^1.4.3 | 基礎 UI 元件 |\n| recharts | ^3.7.0 | 圖表 |\n| @notionhq/client | ^5.9.0 | Notion API |\n| docx | ^9.5.2 | .docx 文件生成 |\n| vitest | ^4.0.18 | 測試框架 |\n| @testing-library/react | ^16.3.2 | React 元件測試 |\n| lucide-react | ^0.564.0 | 圖示 |\n| date-fns | ^4.1.0 | 日期處理 |\n| googleapis | ^171.4.0 | Google API（預留） |\n| next-auth | ^4.24.13 | 認證（預留） |\n| shadcn | ^3.8.4 (dev) | UI 元件產生器 |\n\n### next.config.ts\n\n```ts\nimport type { NextConfig } from \"next\";\nconst nextConfig: NextConfig = {\n  serverExternalPackages: [\"radix-ui\"],\n};\nexport default nextConfig;\n```\n\n### tsconfig.json 重點\n\n```json\n{\n  \"compilerOptions\": {\n    \"target\": \"ES2017\",\n    \"strict\": true,\n    \"module\": \"esnext\",\n    \"moduleResolution\": \"bundler\",\n    \"jsx\": \"react-jsx\",\n    \"paths\": { \"@/*\": [\"./src/*\"] }\n  }\n}\n```\n\n### vitest.config.ts\n\n```ts\n{\n  test: {\n    environment: \"jsdom\",\n    globals: true,\n    include: [\"src/**/__tests__/**/*.test.{ts,tsx}\"],\n    coverage: {\n      provider: \"v8\",\n      thresholds: { statements: 70, branches: 55, functions: 70, lines: 70 }\n    }\n  },\n  resolve: { alias: { \"@\": \"./src\" } }\n}\n```\n\n### postcss.config.mjs\n\n```js\nconst config = { plugins: { \"@tailwindcss/postcss\": {} } };\nexport default config;\n```\n\n### eslint.config.mjs\n\n```js\nimport { defineConfig, globalIgnores } from \"eslint/config\";\nimport nextVitals from \"eslint-config-next/core-web-vitals\";\nimport nextTs from \"eslint-config-next/typescript\";\nconst eslintConfig = defineConfig([\n  ...nextVitals, ...nextTs,\n  globalIgnores([\".next/**\", \"out/**\", \"build/**\", \"next-env.d.ts\"]),\n]);\nexport default eslintConfig;\n```\n\n### components.json（shadcn）\n\n```json\n{\n  \"style\": \"new-york\",\n  \"rsc\": true,\n  \"tsx\": true,\n  \"tailwind\": {\n    \"css\": \"src/app/globals.css\",\n    \"baseColor\": \"neutral\",\n    \"cssVariables\": true\n  },\n  \"iconLibrary\": \"lucide\",\n  \"aliases\": {\n    \"components\": \"@/components\",\n    \"utils\": \"@/lib/utils\",\n    \"ui\": \"@/components/ui\",\n    \"lib\": \"@/lib\",\n    \"hooks\": \"@/hooks\"\n  }\n}\n```\n\n### .env.local（機密，需手動建立）\n\n```bash\n# 複製 .env.example 為 .env.local，填入以下值：\nNOTION_TOKEN=ntn_xxxxx          # Notion API token\nNOTION_DATABASE_ID=14cc71c7xxx  # Notion 案件資料庫 ID\n# SmugMug 和 Google Drive 的 credentials 如需要另外填\n```\n\n### .gitignore 特殊項目\n\n```\nnul              # Windows 產生的 nul 檔案\nThumbs.db        # Windows 縮圖快取\n/uploads/*       # 用戶上傳檔案（保留 .gitkeep）\n```\n\n---\n\n## 4. smugmug-mcp 配置\n\n### package.json\n\n```json\n{\n  \"name\": \"smugmug-mcp\",\n  \"type\": \"module\",\n  \"main\": \"dist/index.js\",\n  \"scripts\": { \"build\": \"tsc\", \"start\": \"node dist/index.js\" },\n  \"dependencies\": {\n    \"@modelcontextprotocol/sdk\": \"^1.12.1\",\n    \"oauth-1.0a\": \"^2.2.6\"\n  },\n  \"devDependencies\": {\n    \"typescript\": \"^5.7.0\",\n    \"@types/node\": \"^22.0.0\"\n  }\n}\n```\n\n### tsconfig.json\n\n```json\n{\n  \"compilerOptions\": {\n    \"target\": \"ES2022\",\n    \"module\": \"Node16\",\n    \"moduleResolution\": \"Node16\",\n    \"outDir\": \"./dist\",\n    \"rootDir\": \"./src\",\n    \"strict\": true\n  }\n}\n```\n\n### 建構指令\n\n```bash\ncd smugmug-mcp && npm install && npm run build\n```\n\n---\n\n## 5. MCP Server 配置\n\n檔案位置：`C:\\dev\\cc程式\\.mcp.json`（根目錄級）\n\n```json\n{\n  \"mcpServers\": {\n    \"notebooklm\": {\n      \"command\": \"cmd\",\n      \"args\": [\"/c\", \"npx\", \"-y\", \"notebooklm-mcp@latest\"]\n    },\n    \"smugmug\": {\n      \"command\": \"node\",\n      \"args\": [\"C:\\\\Users\\\\gary2\\\\OneDrive\\\\桌面\\\\cc程式\\\\smugmug-mcp\\\\dist\\\\index.js\"],\n      \"env\": {\n        \"SMUGMUG_API_KEY\": \"（見 .mcp.json 原檔）\",\n        \"SMUGMUG_API_SECRET\": \"（見 .mcp.json 原檔）\",\n        \"SMUGMUG_ACCESS_TOKEN\": \"（見 .mcp.json 原檔）\",\n        \"SMUGMUG_TOKEN_SECRET\": \"（見 .mcp.json 原檔）\"\n      }\n    }\n  }\n}\n```\n\n⚠️ SmugMug 的 OAuth credentials 在 `.mcp.json` 裡明文存放，換機器時需要帶過去。\n⚠️ `smugmug` 的 `args` 路徑是絕對路徑，換機器時需要改。\n\n---\n\n## 6. Claude Code 配置\n\n### ~/.claude/settings.json\n\n```json\n{\n  \"env\": {\n    \"CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS\": \"1\"\n  }\n}\n```\n\n### Claude Code 連線的 MCP Server\n\n| Server | 來源 | 說明 |\n|--------|------|------|\n| smugmug | .mcp.json（專案級） | 自建，OAuth 1.0a |\n| notebooklm | .mcp.json（專案級） | 社群套件，npx 自動安裝 |\n| Canva | Claude.ai 雲端 | 透過 Claude.ai 帳號連結 |\n| Notion | Claude.ai 雲端 | 透過 Claude.ai 帳號連結 |\n\n### Claude Code 記憶體\n\n```\n~/.claude/projects/C--dev-cc--/memory/\n├── MEMORY.md                  ← 主記憶體（載入 system prompt）\n├── pain-points-analysis.md    ← 痛點分析 + 全部設計決策\n├── debugging.md               ← 開發除錯經驗\n└── dev-environment.md         ← 本文件\n```\n\n---\n\n## 7. 換機器還原步驟\n\n### 快速還原清單\n\n```bash\n# 1. 安裝基礎工具\n#    - Node.js v22.x（LTS）\n#    - Git\n#    - Claude Code: npm install -g @anthropic-ai/claude-code\n\n# 2. Clone / 同步專案\n#    OneDrive 同步 or git clone bidding-assistant repo\n#    smugmug-mcp 需要手動帶（不在 git 裡，或另建 repo）\n\n# 3. 安裝依賴\ncd bidding-assistant && npm install\ncd smugmug-mcp && npm install && npm run build\n\n# 4. 建立環境變數\n#    複製 .env.example → .env.local，填入 NOTION_TOKEN 和 NOTION_DATABASE_ID\n\n# 5. 建立 MCP 配置\n#    在專案根目錄建 .mcp.json（帶 SmugMug credentials）\n#    ⚠️ 修改 smugmug args 中的絕對路徑\n\n# 6. Claude Code 設定\n#    ~/.claude/settings.json 加入 Agent Team 環境變數\n#    ~/.claude/projects/ 下的 memory 資料夾會透過 Claude Code 自動建立\n\n# 7. 驗證\nnpm run build    # 應該 0 errors\nnpm test         # 應該 26 files, 560 tests passing\nnpm run dev   # 開發伺服器啟動\n```\n\n### 需要手動帶的機密檔案\n\n| 檔案 | 內容 | 位置 |\n|------|------|------|\n| `.env.local` | Notion token + DB ID | bidding-assistant/ |\n| `.mcp.json` | SmugMug OAuth credentials | 專案根目錄 |\n\n### 路徑注意事項\n\n- 專案路徑含中文字元（桌面/程式），某些工具可能有問題\n- `.mcp.json` 中的 SmugMug 路徑是絕對路徑，換機器必須修改\n- Windows 上 Claude Code 使用 bash 語法（Unix 風格），不是 cmd/PowerShell\n- 避免 `> nul` 重定向（Windows 會建立實體 `nul` 檔案），用 `> /dev/null`\n\n---\n\n## 8. 驗證檢查清單\n\n換機器後跑一遍確認：\n\n- [ ] `node --version` → v22.x\n- [ ] `npm --version` → 10.x\n- [ ] `git --version` → 2.x\n- [ ] `claude --version` → 最新版\n- [ ] `cd bidding-assistant && npm run build` → 0 errors\n- [ ] `npm test` → 26 files, 560 tests all passing\n- [ ] `npm run dev` → localhost:3000 可開啟\n- [ ] Claude Code 裡 SmugMug MCP 可連（`/mcp` 查看）\n- [ ] Claude Code Agent Team 可用（settings.json 有 env var）\n","app-docs/claude-memory/MEMORY.md":"# Project Memory — 全能標案助理\n\n## Project Location\n- Root: `C:\\dev\\cc程式`\n- App: `C:\\dev\\cc程式\\bidding-assistant`\n- Git monorepo（根目錄就是 repo）\n\n## Tech Stack (see [dev-environment.md](dev-environment.md) for full config)\n- Node.js v22.14.0 + npm 10.9.2 + Git 2.53.0\n- Next.js 16.1.6 + React 19 + TypeScript 5 + Tailwind CSS 4 + Turbopack\n- UI: shadcn/radix-ui (new-york style), Charts: recharts\n- Data: Notion API, Settings: localStorage\n- Test: Vitest 4 + Testing Library (26 files, 560 tests)\n- Docs: docx 9.5.2\n- Dev port: 3000（Next.js 預設）\n- Global CLI: @anthropic-ai/claude-code (latest)\n\n## Key Architecture\n- Feature Registry Pattern: all features in `FEATURE_REGISTRY`\n- SSOT: constants in `src/lib/constants/`, settings in `src/lib/settings/`\n- Data/UI separation: `src/lib/` (logic) vs `src/components/` (rendering)\n- CLAUDE.md in bidding-assistant/ has comprehensive dev guidelines\n\n## Known Issues\n- 專案已搬到 C:\\dev\\cc程式（不在 OneDrive 裡），中文路徑問題已大幅改善\n- Large session files (>10MB) cause \"Failed to load session\" in desktop app\n- Windows `nul` files get created as actual files when bash redirects to `/dev/null` — avoid `> nul` patterns\n\n## SmugMug MCP Server\n- Location: `smugmug-mcp/` (project root level)\n- Built with: TypeScript + @modelcontextprotocol/sdk + oauth-1.0a\n- Auth: OAuth 1.0a, credentials in `.mcp.json` env vars\n- 7 tools: get_user, list_albums, get_album_images, get_album_info, get_image_urls, browse_folders, search_images\n- SmugMug API v2 base: `https://api.smugmug.com/api/v2`\n\n## Build/Test Status (2026-02-17)\n- Build: PASS (0 errors)\n- Tests: 26 files, 560 tests all passing\n- No TODO/FIXME/BUG comments in codebase\n\n## Development Plan v4.0（2026-02-18）\n- **開發計畫書 v4.0**：`docs/開發計畫書_v4.0_提案寫作駕駛艙版.docx`（已生成）\n- **痛點深度分析**：見 [pain-points-analysis.md](pain-points-analysis.md)（23 痛點 + 6 能力 + Discord Bot + Agent 架構）\n- **新定位**：提案寫作駕駛艙（不是儀表板/看板/RAG 聊天機器人）\n- **Discord Bot**：系統主要操作介面（駕駛座），Web app 退為管理後台\n- **Agent 架構**：施工層（Claude Code Agent Team）+ 產品層（Agent SDK，5 個 AI Agent 編制）\n- **開發路線**：Layer 0（知識庫）→ Layer 1（P0 Bot 基礎 → P1 戰略+知識庫 → P2 寫作+品管）→ Layer 2 → Layer 3\n\n## Agent Team 設定\n- Claude Code Agent Team 已啟用：`~/.claude/settings.json`\n- Windows 使用 in-process 模式（Shift+Up/Down 切換）\n- 產品層 5 個 Agent：戰略官/企劃官/品管官/知識官/簡報官\n- 詳細架構見 pain-points-analysis.md「Agent 架構決策」章節\n\n## Dev Lessons (see [debugging.md](debugging.md) for details)\n- Test failure investigation: trace data flow to find WHY, not just change assertion to pass\n- Never patch symptoms (swap search term / change expected value) — fix the layer where the defect lives\n- Test data must isolate each code path — shared values mask real failures\n- Follow closed-loop strictly: code → review → test → build (not code → build → test)\n","app-docs/claude-memory/notion-mcp-spec.md":"# 本地 Notion MCP Server 規格（舊版，已合併至 staging）\n\n> ⚠️ 本檔內容已完整合併至 `docs/dev-plan/_staging/M01-Notion-MCP規格.md`。\n> 保留為歷史參考。\n\n## 為什麼要建\n\n- 雲端 Notion MCP（Claude.ai 連結）只有 Claude 能用\n- Agent Team 的品管官（GPT）、知識官（Gemini）也需要存取 Notion\n- 本地 MCP 走標準協議，三家 CLI 都能用\n- 封裝標案業務邏輯，agent 不需要懂 Notion schema\n\n## 技術規格\n\n```\nnotion-mcp/\n  src/index.ts     ← MCP server（@modelcontextprotocol/sdk + @notionhq/client）\n  dist/index.js    ← 編譯後\n  package.json\n  tsconfig.json\n```\n\n- 結構同 smugmug-mcp\n- 認證：NOTION_TOKEN + 各 database ID（env vars）\n- 註冊到 .mcp.json（專案根目錄）\n\n## Notion 資料結構\n\n```\nNotion\n├── 案件資料庫（主庫）\n│   ├── 案號、案名、機關、預算、截標日\n│   ├── 狀態（追蹤中/分析中/寫作中/已投標/結案）\n│   ├── 企劃認領人\n│   ├── L1-L8 進度\n│   └── 備標評估文件（PDF 嵌入）\n│\n├── 知識庫\n│   ├── 00A 團隊資料庫\n│   ├── 00B 實績資料庫\n│   ├── 00C 時程範本庫\n│   ├── 00D 應變 SOP 庫\n│   ├── 00E 案後檢討庫\n│   └── 00F 創意庫\n│\n└── 執行企劃作業流程工作手冊（30 節點）\n```\n\n## 工具清單（15 個）\n\n### 一、案件管理（5 個）— 給 Orchestrator / Bot\n\n| 工具 | 說明 | 參數 | 對應 Discord 指令 |\n|------|------|------|------------------|\n| `list_cases` | 列出案件 | `status?`, `assignee?`, `deadline_before?` | `/case list` |\n| `get_case` | 取得單一案件完整資料 | `case_id` | `/case info` |\n| `create_case` | 建立新案件 | `title`, `agency`, `budget`, `deadline` | `/case new` |\n| `update_case` | 更新案件欄位 | `case_id`, `fields{}` | `/case status`, `/case claim` |\n| `list_deadlines` | 列出所有截標日（排序） | `days_ahead?` | `/case deadline` |\n\n### 二、知識庫讀取（5 個）— 給知識官\n\n| 工具 | 說明 | 參數 | 對應 Discord 指令 |\n|------|------|------|------------------|\n| `kb_search` | 全文搜尋 00A-00F | `query`, `category?`（00A-00F） | `/kb search` |\n| `kb_get_team` | 查團隊成員（00A） | `keyword?` | `/kb team` |\n| `kb_get_portfolio` | 查相關實績（00B） | `keyword` | `/kb portfolio` |\n| `kb_get_sop` | 查 SOP（00D） | `keyword` | `/kb sop` |\n| `kb_get_review` | 查案後檢討（00E） | `keyword?` | 知識官內部用 |\n\n### 三、知識庫寫入（2 個）— 給知識官結案回流\n\n| 工具 | 說明 | 參數 | 對應場景 |\n|------|------|------|---------|\n| `kb_add_entry` | 新增條目 | `category`, `title`, `content` | `/kb add`、結案回流 |\n| `kb_update_entry` | 更新條目 | `entry_id`, `content` | 結案回流（T1 精靈更新） |\n\n### 四、案件上下文存取（3 個）— 給所有 agent\n\n| 工具 | 說明 | 參數 | 對應場景 |\n|------|------|------|---------|\n| `save_artifact` | 存入案件產物 | `case_id`, `type`（l1/l2/chapter/review/...）, `content` | 每個 agent 完成工作後 |\n| `get_artifact` | 取得案件產物 | `case_id`, `type`, `chapter?` | agent 開工前載入上下文 |\n| `list_artifacts` | 列出某案所有產物 | `case_id` | `/l3 status` |\n\n## 使用場景對照\n\n### 知識官找資料\n```\nDiscord: /l3 第二章（團隊規劃）\n  → Orchestrator 派知識官\n  → 知識官呼叫 kb_get_team() + kb_get_portfolio(\"食農\")\n  → 拿到團隊資料 + 相關實績\n  → 交給企劃官寫第二章\n```\n\n### 品管官查事實\n```\nDiscord: /check facts\n  → 品管官讀到「陳老師 10 年經驗」\n  → 呼叫 kb_get_team(\"陳\") → 00A 記錄是 8 年\n  → 報告：事實錯誤\n```\n\n### 結案回流\n```\n案件結案 → Orchestrator 派知識官\n  → 知識官呼叫 kb_add_entry(category=\"00E\", title=\"113年食農案檢討\", content=\"...\")\n  → 再呼叫 kb_update_entry() 更新 00A（團隊新增食農經驗）、00B（新增實績）\n```\n\n### Orchestrator 管案件\n```\nDiscord: /case new（上傳招標文件）\n  → Orchestrator 呼叫 create_case(title=\"食農教育推廣\", agency=\"台南市教育局\", ...)\n  → 建好 Notion 頁面 + 回傳案號\n  → 自動建 Discord Forum 帖\n```\n\n## 跟雲端 Notion MCP 的關係\n\n| | 雲端 Notion MCP | 本地 Notion MCP |\n|---|---|---|\n| 定位 | 通用 Notion 操作 | 標案系統專用 |\n| 能用的 provider | 只有 Claude | Claude / GPT / Gemini |\n| 業務邏輯 | 無（通用 CRUD） | 有（案件管理、KB 分類、產物存取） |\n| 何時用 | 開發/除錯時直接操作 Notion | 產品層 agent 日常使用 |\n\n兩者並存，不衝突。雲端版用於臨時操作，本地版用於系統自動化。\n\n## 需要的環境變數\n\n```\nNOTION_TOKEN=ntn_xxxxx\nNOTION_CASE_DB_ID=xxx          # 案件資料庫\nNOTION_KB_TEAM_DB_ID=xxx       # 00A 團隊\nNOTION_KB_PORTFOLIO_DB_ID=xxx  # 00B 實績\nNOTION_KB_SCHEDULE_DB_ID=xxx   # 00C 時程\nNOTION_KB_SOP_DB_ID=xxx        # 00D 應變\nNOTION_KB_REVIEW_DB_ID=xxx     # 00E 檢討\nNOTION_KB_CREATIVE_DB_ID=xxx   # 00F 創意\n```\n\n## 開發優先序\n\n1. 案件管理 5 個工具（P0 需要）\n2. 知識庫讀取 5 個工具（P1 需要）\n3. 案件上下文 3 個工具（P1 需要）\n4. 知識庫寫入 2 個工具（P4 落標學習需要）\n\n## 待確認\n\n- [ ] 各 Notion database 的實際 ID\n- [ ] 案件資料庫的 property schema（欄位名稱、類型）\n- [ ] 知識庫各庫的 property schema\n- [ ] 案件產物要存在 Notion page blocks 裡還是另開 database\n- [ ] 是否需要快取機制（KB 不常變，可減少 API 呼叫）\n","app-docs/dev-plan/00-總論.md":"---\nversion: \"2.0\"\nupdated: \"2026-02-23\"\nstatus: \"定案\"\ndepends: []\nchangelog:\n  - \"2.0 (2026-02-23): 整合 stash-product-direction-0222 決策——新增產品方向三決定、P0-P4 優先序取代舊三層\"\n  - \"1.1 (2026-02-20): 整合三份暫存碎片——補入痛點清單、現行流程、角色對照、Agent架構、AI連接方式、PCC API、設計哲學；修正介面定位（Discord Bot→SaaS網頁）\"\n  - \"1.0 (2026-02-18): 初版建立，整合 2/17-2/18 討論成果\"\n---\n\n# 00 總論\n\n## 系統定位\n\n> **從招標文件到得標，越投越強、越投越準的 AI 提案系統。**\n\n- 不是儀表板\n- 不是看板\n- 不是 RAG 聊天機器人\n- 不是專案管理工具\n- **是一個提案寫作駕駛艙：從招標文件進去，一份可以上場的建議書出來**\n\n### 產品介面\n\n- **SaaS 網頁 = 主要操作介面**（具體方案待定案）\n- Web app 管理後台 = 設定、知識庫管理、績效分析\n- 技術棧：Next.js + React + Claude Code SDK\n\n> 注：Discord Bot 方案曾被提出（2026-02-18），後因 SaaS 網頁能提供更完整的操作體驗而放棄。\n\n## 商業背景\n\n- 公司：大員洛川，15 人，16+ 年經驗\n- 核心業務：政府標案企劃（課程/導覽/走讀/傳統服飾/綠色照護）\n- 年營收目標：NT$3,000 萬\n- 去年實績：投標 46 案，總預算 NT$105,748,770（平均 NT$2,298,886，中位數 NT$1,128,305）\n- **得標 0 件** — 0% 得標率\n- 標案類型：大部分是最有利標（建議書品質重要）\n\n### 收入公式\n\n```\n收入 = 得標案件數 x 平均案件金額 x 毛利率\n  得標案件數 = 投標案件數 x 得標率\n  投標案件數 = 發現的機會數 x 投標決策通過率\n```\n\n**每個功能都必須能回答：推動了公式中的哪一項？**\n\n## 現行工作流程\n\n```\n招標文件\n  → Perplexity 查資料\n  → Gemini 想創意\n  → Claude 寫初稿\n  → Nanobanana 生主視覺\n  → 人肉縫合各工具產出\n  → 拉舊案當底稿，修修補補\n  → 排版（建議書 + 評選簡報）\n  → 送件\n  → 落標\n  → 沒有系統性地學習\n  → 下次重來...\n```\n\n## 完整痛點清單（23 條）\n\n### 選案階段\n1. **篩案靠感覺和興趣** — 沒有可驗證的篩選機制，可能投了不該投的案\n\n### 戰略階段\n21. **沒有深入的戰略分析就開始寫** — 不了解機關潛台詞、競爭優勢、贏的切入角度\n22. **缺乏戰略性的企劃架構** — 沒有核心論述、故事線、決勝點判斷，建議書變成資料堆疊\n\n### 拆解階段\n2. **需求書沒有系統拆解** — 寫漏評分項目，有些要求沒寫到\n3. **沒有結構化的寫作順序** — 不知道先寫什麼後寫什麼，亂寫一通\n\n### 寫作階段\n4. **知識庫是空的（00A-00E 未建立）** — AI 只能寫空話，沒有公司實績/團隊/時程/SOP 可用\n5. **在 4-5 個 AI 工具間跳來跳去** — Perplexity/Gemini/Claude/Nanobanana，不知做到哪了\n6. **多案並行，大腦不斷切換** — 同時寫 2-3 案，每案在不同工具的不同對話裡\n7. **每個 AI 都要重新調校** — 花大量時間「教 AI 認識你」，調好了又到對話上限\n8. **對話上限是黑箱** — 不知道何時會爆，爆了交接文件又不準，工作成果消失\n9. **各工具產出不一致** — 要自己當人肉膠水縫合\n10. **AI 幻覺抓不完** — 校稿時很難全部發現，被評委問到答不出來\n11. **AI 不自檢、死不認錯** — 生完就辯護，要修很難修\n23. **AI 的「創意」沒有常識** — 聽起來厲害但不切實際（社區活動用 AR、50 人活動說大數據）\n\n### 產出階段\n12. **寫完還是像初稿** — 品質上不去\n13. **主視覺/示意圖跟文字脫節** — 圖文不搭，不夠專業\n14. **排版很痛** — 建議書和評選簡報的排版都是痛點\n\n### 結案階段\n15. **落標意見回收不系統** — 只能泛泛地問「哪裡要精進」，參考價值低\n16. **每次從頭來，經驗沒累積** — 做完的案件經驗沒有回流到系統\n\n### 策略層問題\n17. **實績冷啟動困境** — 沒得標 → 沒實績 → 評分被扣 → 繼續沒得標\n18. **質 vs 量策略問題** — 46 案全投但品質都不夠，是否應該集中火力？\n19. **不夠了解評委真正在看什麼** — 不知道評委 30 分鐘翻完建議書時的關注重點\n20. **不了解競爭對手** — 不知道贏的是誰、他們的建議書長什麼樣\n\n## 飛輪三齒輪\n\n1. **選對的案**（策略）— 系統輔助分析\n2. **寫出好的建議書**（執行）— 系統的核心價值\n3. **從每次結果學習**（回饋）— 系統幫助累積\n\n## 五角色痛點對照\n\n| 角色 | 核心痛點 | 對應痛點編號 |\n|------|---------|-------------|\n| 管理者 | 無得標率/趨勢數據、無法量化企劃效益、利潤未追蹤 | #15, #16, #18 |\n| 行政 | 每月 600-1200 件手動四動作（貼表/貼檔/摘要/情蒐）、Notion AI 摘要格式不穩、情蒐靠人工查 PCC | （不在 23 條範圍，見工作流程） |\n| 企劃 | AI 啟動慢、工具間跳轉、多案混淆、前序文件散落 | #5, #6, #7, #8, #9 |\n| 設計師 | 找不到美編製作標記、不知優先序/截標日 | #13, #14 |\n| 執行組(PM) | 履約格式不統一、成本超支晚發現、現場查 SOP 不便 | #16, #17 |\n\n## 6 大系統能力\n\n### 能力 1：戰略分析引擎\n從招標文件到作戰計畫，一條龍：\n- 拆解：評分項目、交付要求、資格條件、應備文件\n- 分析：適配度、決勝點、紅旗、評委關注點\n- 決策：投 or 不投（可驗證的依據）\n- 作戰計畫：核心論述 + 攻略策略 + 寫作順序 + 每項所需資料\n- 解決痛點：#1, #2, #3, #19, #20, #21, #22（7 條）\n\n### 能力 2：公司知識庫\n飛輪的燃料：\n- 00A 團隊、00B 實績、00C 時程、00D 應變、00E 檢討、00F 創意庫\n- AI 寫作時自動注入最相關的知識\n- 案件結束後自動回流更新\n- 解決痛點：#4, #16, #17, #23（4 條）\n\n### 能力 3：統一 AI 調度中心\n- 每案一個工作區（對話、產出、進度都在一起）\n- 自動選 AI、帶入知識庫 + 本案脈絡 + 作戰計畫\n- 不需重新調校，系統永遠記得\n- 對話上限自動處理精準交接\n- 多案並行：獨立工作區，一鍵切換\n- 解決痛點：#5, #6, #7, #8, #9（5 條）\n\n### 能力 4：AI 品質閘門\n每段產出經過三道檢查：\n- 閘門 1 事實查核：有知識庫來源嗎？\n- 閘門 2 需求對照：回應了哪個評分項目？\n- 閘門 3 實務檢驗：預算做得到？對象用得了？公司有能力？\n- 解決痛點：#10, #11, #12, #23（4 條）\n\n### 能力 5：視覺生成整合\n- 寫到需要圖的地方，系統建議並生成對應圖像\n- 一案一套視覺風格，圖文同源\n- 解決痛點：#13（1 條）\n\n### 能力 6：排版輸出 + 落標學習\n- 排版：建議書/簡報一鍵匯出，套用公司模板\n- 落標學習：結構化分析每案結果，累積後校準篩案機制\n- 解決痛點：#14, #15, #18（3 條）\n\n## 設計哲學\n\n### 原開發計畫的教訓\n\n過去的開發計畫（v3.0 批次 A-J）有 4 個問題，促成了現在的「6 大能力」架構：\n\n1. **是功能清單不是產品** — 列了 10 個批次幾十個功能，但沒有回答「使用者的一件事是什麼」\n2. **想取代太多工具** — Notion 的案件管理、pcc 監控、Google Calendar、文件管理、儀表板... 15 人公司不需要自建這些\n3. **核心價值被埋沒** — L1-L8 提示詞系統是公司護城河，但在計畫裡只是 Batch D 的一個小項目\n4. **結案回饋閉環排在最後（Batch J）** — 但它應該是最早做的，因為飛輪越早轉越好\n\n### 設計原則\n\n1. **人機協作，不是無人自動化** — 所有關鍵斷點仍由人類確認\n2. **需求三層思考：需求 → 痛點 → 因果鏈** — 每個功能要能連回收入公式\n3. **從收入公式逆推優先序** — 直接影響得標率的先做\n4. **系統要做的 10 件事**：\n   - 一個地方拆解需求\n   - 一個地方做戰略分析和企劃架構\n   - 一個地方規劃寫作順序\n   - 一個地方調度所有 AI（研究/創意/寫作/圖像）\n   - 一個地方存放公司真實資料（團隊/實績/時程/SOP）\n   - 一個地方追蹤進度（哪些寫了、哪些沒寫）\n   - 一個地方做品質檢查（每句話能追溯來源）\n   - 一個地方處理排版（建議書 + 評選簡報）\n   - 一個地方回收落標經驗\n   - 永遠記得你的公司、團隊、過去經驗，不需要重新調校\n\n## 系統不做什麼\n\n- 不取代 Notion 做專案管理\n- 不自建 Google Calendar\n- 不做通用文件管理\n- 不訓練自己的模型\n- 不建向量資料庫（知識庫 ~72,000 tokens，直接塞進 1M context）\n\n## 架構決策\n\n### 決策 1：AI 連接方式（2026-02-18 定版）\n\n**原則：全部走現有訂閱，額外成本 = $0**\n\n| 工具 | 方案 | 月費 | 串接方式 | 走訂閱？ | 系統角色 |\n|------|------|------|---------|:-------:|---------|\n| Claude | Max 20x | $200 | CLI + MCP | 是 | 主力 AI（寫作/分析/品質檢查） |\n| OpenAI | Pro | $200 | CLI + MCP | 是 | 備援 AI（寫作/創意） |\n| Gemini | Ultra | ~$22 | CLI + MCP | 是 | 備援 AI（研究/長上下文） |\n| Perplexity | Max | ~$20 | MCP（走API） | 部分（$5 credit） | 深度網路研究（小量） |\n| Notion | 商業版+AI | ~$28/人 | MCP 已連 | 是 | 資料庫/知識管理 |\n| Canva AI | 含在訂閱 | — | 可加 MCP | 是 | 設計/排版/簡報 |\n\n> 費用為截至 2026-02-18 的快照，可能有變動。\n\n### 決策 2：PCC API 情報基礎設施（2026-02-18 定版）\n\n- **g0v PCC API**：`https://pcc-api.openfun.app`（免費、無認證）\n- 角色：戰略分析的硬數據來源，取代 Perplexity 80% 的搜尋工作\n- 能力遠超預期：評委、投標金額、未得標原因都有\n- 詳細整合策略見 `pcc-api-integration.md`\n- PCC Monitor 已上線（GAS 每小時監控 API 更新延遲）\n\n### 決策 3：Agent 架構 — 雙層策略（2026-02-18 定版）\n\n| 層 | 用途 | 技術 | 誰用 |\n|----|------|------|------|\n| **施工層** | 開發系統時多 agent 並行寫程式 | Claude Code Agent Team | 開發者 |\n| **產品層** | SaaS 網頁背後的 AI 編制 | Claude Code SDK（TypeScript） | 企劃團隊（透過 SaaS 網頁） |\n\n全部走現有訂閱，額外成本 = $0。\n\n#### 產品層：5 個 AI Agent\n\n| Agent | 角色 | 負責 | 使用的 prompt |\n|-------|------|------|-------------|\n| **戰略官** | 分析與決策 | L1 戰略分析、投標決策、案件拆解 | L1 v2.3 + P 報告 |\n| **企劃官** | 規劃與撰寫 | L2 備標規劃、L3 章節撰寫 | L2 + L3 + 撰寫規範 |\n| **品管官** | 品質把關 | 三道閘門（事實/需求/實務）、L4 審查 | L4 + 品質規則 |\n| **知識官** | 知識管理 | 知識庫檢索、注入相關資料、更新回流 | T1 + 00A-00E |\n| **簡報官** | 表達與演練 | L5 評選分析、L6 簡報、L7 講稿、L8 模擬 | L5-L8 |\n\n## 產品方向（Jin 確認 2026-02-22）\n\n1. **先自用，再產品化** — 先幫大員洛川跑通流程，先不做多租戶\n2. **Notion 當主庫，加抽象層** — 現有 Notion 繼續用，程式碼加資料抽象層\n3. **Claude Code SDK 當發射台** — 系統組裝材料，一鍵送 Claude Code 執行，不做嵌入式聊天\n\n## 優先序（P0-P4，按實際工作流程排序）\n\n按用戶真實操作順序（打開→選案→看資料→寫企劃→輸出→監控）排列，不按技術層級。\n\n| 階段 | 做什麼 | 對應能力 | 狀態 |\n|------|--------|---------|------|\n| P0 | 行政巡標自動化（PCC→篩選→建案） | PCC API + Notion | ✅ 完成 |\n| P1 | 案件工作頁（選案→看資料→看情報） | 能力 1 + 2 | 待開始 |\n| P2 | 寫作發射台（組裝材料→一鍵送 Claude Code） | 能力 3 + 4 | 待開始 |\n| P3 | 輸出管理（排版 + 設計需求單） | 能力 6 | 待開始 |\n| P4 | 投標監控自動化（狀態追蹤 + 通知） | — | 待開始 |\n\n能力 5（視覺生成）目前用 Nanobanana 手動做，不在 P0-P4 範圍內。\n\n詳見 `06-開發進程.md`。\n","app-docs/dev-plan/01-索引.md":"---\nversion: \"2.0\"\nupdated: \"2026-02-23\"\nstatus: \"定案\"\ndepends: []\nchangelog:\n  - \"2.0 (2026-02-23): 開發計畫 2.0——00/03/05/06 升版，整合產品方向五項決策\"\n  - \"1.6 (2026-02-22): M06 排版輸出模組 v0.1 草案\"\n  - \"1.5 (2026-02-22): M04 品質閘門模組 v0.1 草案\"\n  - \"1.4 (2026-02-22): M03 戰略分析引擎 v0.1 草案\"\n  - \"1.3 (2026-02-21): 推進 04/06/07/09 到 v1.0 草案，A02 到 v1.0，新增 M07\"\n  - \"1.2 (2026-02-20): 同步 00/03/05/08/A01/M01 版號到 v1.1，新增 A02\"\n  - \"1.1 (2026-02-18): 新增暫存/寫入計畫指令規範\"\n  - \"1.0 (2026-02-18): 初版建立\"\n---\n\n# 01 索引 — 開發計畫文件清單\n\n## 文件管理規則\n\n1. **每份文件開頭有 YAML frontmatter**（version, updated, status, depends, changelog）\n2. **討論有結論 → 主動問使用者是否更新對應文件**\n3. **修改時 show diff** — 列出「舊內容 → 新內容」對比，使用者確認才寫入\n4. **版號規則**：`v1.0` → `v1.1`（小改）→ `v2.0`（結構性大改）\n5. **整合校正**：修改任何一本後，檢查本索引是否需同步更新\n6. **狀態值**：`定案` | `草案` | `待寫` | `修訂中`\n\n## 暫存與寫入指令\n\n### `/暫存`\n\n將本次討論的結論整理成暫存檔，存到 `docs/dev-plan/_staging/`。\n\n- **檔名格式**：`{目標文件編號}-{主題關鍵詞}.md`（如 `03-Agent成本方案.md`、`M01-快取改IndexedDB.md`）\n- **每份暫存檔必須包含**：\n  - 目標文件（對應哪份正式文件）\n  - 操作類型（新增 / 修改 / 刪除）\n  - 具體內容（要寫入的文字）\n- **不修改任何正式文件**\n\n### `/修改計畫`\n\n將暫存區的結論正式寫入開發計畫文件。詳見 `.claude/commands/修改計畫.md`。\n\n## 全域文件\n\n| 編號 | 文件名 | 版號 | 狀態 | 修改日 | 說明 |\n|------|--------|------|------|--------|------|\n| 00 | 00-總論.md | 2.0 | 定案 | 2026-02-23 | 系統定位、商業目標、6大能力、產品方向、P0-P4 優先序 |\n| 01 | 01-索引.md | 2.0 | 定案 | 2026-02-23 | 本文件 |\n| 02 | 02-核心架構.md | 0.1 | 草案 | 2026-02-18 | SSOT、模組規範、介面契約、統編優先原則 |\n| 03 | 03-技術選型.md | 2.0 | 定案 | 2026-02-23 | 每個技術決策的理由 + 否決選項 + ADR-11/12 |\n| 04 | 04-數據架構.md | 1.0 | 草案 | 2026-02-21 | Notion/PCC/localStorage/檔案系統的數據流 |\n| 05 | 05-工作流程.md | 2.0 | 定案 | 2026-02-23 | 真實工作流程 + 上游漏斗 + PCC→L1 + AI 連接方式 |\n| 06 | 06-開發進程.md | 2.0 | 定案 | 2026-02-23 | P0-P4 路線、模組對照、凍結清單、依賴阻塞 |\n| 07 | 07-部署與成本.md | 1.0 | 草案 | 2026-02-21 | Vercel 部署、月費彙整、Phase 1/2 成本比較 |\n| 08 | 08-風險與待決.md | 1.1 | 定案 | 2026-02-20 | 未解決問題、已知風險、業務背景、決策待辦 |\n| 09 | 09-Prompt管理策略.md | 1.0 | 草案 | 2026-02-21 | L1-L8/P/T/00 系列的版控與演進策略 |\n\n## 功能模組文件\n\n| 編號 | 文件名 | 版號 | 狀態 | 修改日 | 對應能力 |\n|------|--------|------|------|--------|---------|\n| M01 | M01-情報模組.md | 1.1 | 定案 | 2026-02-20 | 能力 1 前置 |\n| M02 | M02-知識庫模組.md | 0.1 | 草案 | 2026-02-27 | 能力 2 |\n| M03 | M03-戰略分析引擎.md | 0.1 | 草案 | 2026-02-22 | 能力 1 |\n| M04 | M04-品質閘門模組.md | 0.1 | 草案 | 2026-02-22 | 能力 4 |\n| M05 | M05-Discord-Bot.md | — | 待寫 | — | 能力 3（SaaS 網頁取代） |\n| M06 | M06-排版輸出模組.md | 0.1 | 草案 | 2026-02-22 | 能力 6 |\n| M07 | M07-SmugMug-MCP規格.md | 1.0 | 定案 | 2026-02-21 | 照片存取 MCP |\n\n## 工作流程文件\n\n| 編號 | 文件名 | 版號 | 狀態 | 修改日 | 說明 |\n|------|--------|------|------|--------|------|\n| W01 | W01-巡標自動化.md | 0.1 | 草案 | 2026-02-27 | P0 行政巡標自動化（PCC → 篩選 → Notion 建案） |\n\n## 附錄\n\n| 編號 | 文件名 | 版號 | 狀態 | 修改日 | 說明 |\n|------|--------|------|------|--------|------|\n| A01 | A01-PCC-API-參考.md | 1.1 | 定案 | 2026-02-20 | API 端點、資料結構、分析能力矩陣、已知限制 |\n| A02 | A02-投標廠商分析流程.md | 1.0 | 草案 | 2026-02-21 | 分析流程（v1.0 含 5 新增步驟）、教訓根因、降級策略 |\n","app-docs/dev-plan/02-核心架構.md":"---\nversion: \"0.1\"\nupdated: \"2026-02-18\"\nstatus: \"草案\"\ndepends: [\"00-總論\"]\nchangelog:\n  - \"0.1 (2026-02-18): 草案建立，從 CLAUDE.md 提煉核心原則\"\n---\n\n# 02 核心架構\n\n## SSOT（Single Source of Truth）原則\n\n所有常數、狀態值、欄位名稱**只在一個地方定義**，其他地方一律透過 import 使用。\n\n| 資料類型 | 唯一定義位置 |\n|----------|-------------|\n| 標案狀態值 | `src/lib/constants/bid-status.ts` |\n| Notion 欄位名稱 | `src/lib/constants/field-mapping.ts` |\n| 功能模組定義 | `src/lib/modules/feature-registry.ts` |\n| AI 階段定義 | `src/data/config/stages.ts` |\n| 應用程式設定 | `src/lib/settings/types.ts` + `defaults.ts` |\n\n## 模組結構規範\n\n```\nsrc/lib/{feature}/\n  types.ts        ← 介面與型別定義（必要）\n  index.ts        ← 匯出彙整（選用）\n  constants.ts    ← 功能專屬常數（選用）\n  helpers.ts      ← 純函式（選用）\n  use{Feature}.ts ← React Hook（選用）\n  __tests__/      ← 測試檔案（必要）\n\nsrc/components/{feature}/\n  {Component}.tsx  ← UI 元件（只透過 props 接收資料）\n```\n\n## 三層分離\n\n```\nsrc/lib/          ← 資料層（商業邏輯、Hook、工具函式、型別）\nsrc/components/   ← 展示層（UI 元件，只負責渲染）\nsrc/app/          ← 頁面層（串接資料層和展示層）\n```\n\n## Feature Registry 模式\n\n所有可開關功能在 `FEATURE_REGISTRY` 中註冊，側欄、路由守衛、設定頁面統一讀取。\n\n## 統編優先原則\n\n所有公司識別以統編（8 位數字）為 key，名稱僅供顯示。詳見 ADR-05（03-技術選型）。\n\n## 介面契約\n\n（待補充：各模組之間的輸入/輸出介面定義）\n\n## 閉環原則\n\n閉環有兩層，缺一不可：做對了（正確性）+ 有效（目的性）。\n測試全過是做對了，功能真的解決問題才是有效。兩層都通過，閉環才算完成。\n詳見 CLAUDE.md §6。\n","app-docs/dev-plan/03-技術選型.md":"---\nversion: \"2.0\"\nupdated: \"2026-02-23\"\nstatus: \"定案\"\ndepends: [\"00-總論\"]\nchangelog:\n  - \"2.0 (2026-02-23): 新增 ADR-11 資料儲存（Notion 主庫+抽象層）、ADR-12 產品策略（自用優先）；ADR-04 對齊「一鍵發射」模式\"\n  - \"1.1 (2026-02-20): 整合 Agent 編制、工具生態系、插件盤點；Discord Bot 改為 SaaS 網頁（保留未來擴充）；解決 Agent SDK 計費待決；ADR-03 加觸發條件\"\n  - \"1.0 (2026-02-18): 初版建立，整合 2/17-2/18 討論成果\"\n---\n\n# 03 技術選型決策紀錄\n\n每個決策記錄：背景、選項、決定、理由、否決原因。\n\n---\n\n## ADR-01：前端框架 — Next.js 16\n\n- **決定**：Next.js 16 + App Router + React 19 + TypeScript + Tailwind CSS 4\n- **理由**：已有完整專案基礎（560 tests, 10 features, 23 routes），無理由換框架\n- **否決**：Remix（生態系小）、Nuxt（Vue 學習成本）、純 React SPA（失去 SSR 和 API Routes）\n\n## ADR-02：AI 連接方式 — 全走現有訂閱\n\n**原則：額外成本 = $0**\n\n| 工具 | 方案 | 月費 | 串接方式 | 系統角色 |\n|------|------|------|---------|---------|\n| Claude | Max 20x | $200 | CLI + MCP | 主力 AI（寫作/分析/品質檢查） |\n| OpenAI | Pro | $200 | CLI + MCP | 備援 AI（寫作/創意） |\n| Gemini | Ultra | ~$22 | CLI + MCP | 備援 AI（研究/長上下文） |\n| Perplexity | Max | ~$20 | 網頁版（手動） | 深度網路研究（$5 credit） |\n| Notion | 商業版+AI | ~$28/人 | MCP 已連 | 資料庫/知識管理 |\n| Canva AI | 含在訂閱 | — | MCP 已連 | 設計/排版/簡報 |\n\n- 合計月費 ~$470+\n- ~~Gamma~~ 已退訂（難用）\n- Perplexity MCP 不裝，手動網頁版已夠用\n\n## ADR-03：向量資料庫 — 現階段不需要\n\n- **決定**：暫不建向量資料庫\n- **理由**：\n  - 知識庫（00A-00E）預估 ~72,000 tokens = 1M context 的 7%，直接塞進 context 即可\n  - Notion 資料庫有 10,000+ 筆，但查詢用 Notion API structured filter，不需要向量搜尋\n  - 「找相似歷史案件」目前無意義（0 得標，無 00E 檢討回饋）\n- **觸發條件**：知識庫超過 200K tokens 塞不進 context，或 00E 累積 20+ 案需要相似案件比對時，重新評估\n- **否決（當下）**：Pinecone / pgvector / Chroma — 架構過度複雜，收益不明\n\n## ADR-04：Agent 架構 — 雙層策略\n\n| 層 | 用途 | 技術 | 誰用 |\n|----|------|------|------|\n| **施工層** | 開發系統時多 agent 並行寫程式 | Claude Code Agent Team | 開發者 |\n| **產品層** | SaaS 網頁背後的 AI 編制 | Claude Code SDK (TypeScript) | 企劃團隊（透過 SaaS 網頁） |\n\n> 目前以 SaaS 網頁為主介面。Discord Bot 未來可作為輕量操作入口擴充（如快速查詢、通知推播）。\n\n### 產品層 Agent 編制\n\n| Agent | 角色 | 負責 | 使用的 prompt |\n|-------|------|------|-------------|\n| 戰略官 | 分析與決策 | L1 戰略分析、投標決策、案件拆解 | L1 v2.3 + P 報告 |\n| 企劃官 | 規劃與撰寫 | L2 備標規劃、L3 章節撰寫 | L2 + L3 + 撰寫規範 |\n| 品管官 | 品質把關 | 三道閘門、L4 審查 | L4 + 品質規則 |\n| 知識官 | 知識管理 | 知識庫檢索、注入、回流 | T1 + 00A-00E |\n| 簡報官 | 表達與演練 | L5-L8 | L5-L8 |\n\n### 操作模式：一鍵發射（2026-02-22 定版）\n\n系統不做嵌入式 AI 聊天介面，做「一鍵發射」按鈕：\n1. 系統組裝提示詞 + 知識庫（00A-00E）+ 本案情報 + 過去交付物\n2. 打包好送給 Claude Code SDK 執行\n3. Claude Code 背景完成 L2-L4，結果回到案件頁\n\n好處：不花額外 API 費用（走現有 Max 訂閱），Claude Code 有完整工具能力（讀寫檔案、搜尋、MCP）。\n\n### 成本控制\n\n- **已決**：產品層用 Claude Code SDK，走 Max 訂閱（不走 API 計費），額外成本 = $0，與 ADR-02 一致\n- 必須實作用量監控（token 數 + 回應時間 + 限速事件）\n- 限速主動報告（偵測到 rate limit 時通知管理者）\n- 輕量查詢不啟動 Agent，直接查資料庫\n\n## ADR-05：公司識別方式 — 統編優先\n\n- **決定**：所有交叉比對、統計、分組以統編（8位數字）為 key\n- **理由**：PCC API 中公司名稱有多種寫法（如有/無英文名、空白差異），但統編永遠不變\n- **否決**：模糊名稱比對（不可靠、需維護同義詞表）\n- **名稱正規化**：僅用於 UI 顯示和搜尋，不用於身份判斷\n\n## ADR-06：情報資料來源 — g0v PCC API\n\n- **決定**：使用 g0v PCC API (`https://pcc-api.openfun.app`) 作為核心情報來源\n- **理由**：免費、無認證、開放 CORS、資料涵蓋完整（得標者、未得標者、評委、金額）\n- **否決**：直接爬政府電子採購網（違反 ToS、維護成本高、反爬機制）\n- **補充**：API 可取代 P 偵察報告 ~80% 的人工搜尋，Perplexity 只需補軟情報\n\n## ADR-07：操作介面定位 — SaaS 網頁\n\n- **決定**：SaaS 網頁 = 主要產品介面（提案寫作駕駛艙），Web app = 管理後台\n- **理由**：SaaS 網頁整合度更高、操作體驗更完整，能承載完整的 L1-L8 流程\n- **暫不採用**：Discord Bot — 整合受限於 API 彈性不足（15 分鐘逾時、25MB 上傳限制），但保留未來作為輕量入口的擴充可能（快速查詢、通知推播）\n- **否決**：LINE Bot（API 限制多）、Slack（額外訂閱費）\n\n## ADR-08：CLI/MCP 工具生態系\n\n各 AI 工具的 CLI 和 MCP 安裝評估（2026-02-20 更新）。\n\n### 安裝狀態\n\n| 工具 | 狀態 | 說明 |\n|------|------|------|\n| Notion MCP | 已連接 | Claude.ai 內建，完整 CRUD |\n| Canva MCP | 已連接 | Claude.ai 內建，設計/排版/簡報 |\n| Gemini CLI | 已安裝 | v0.29.3，Ultra 帳號，每日 2,000 次免費 API quota |\n| Codex CLI | 已安裝 | v0.104.0，Pro 帳號 |\n| NotebookLM MCP | 已配置 | .mcp.json，npx 自動拉，PDF 精準檢索 |\n| Perplexity MCP | 不裝 | 手動網頁版已夠用 |\n| Google Drive MCP | 待確認 | 需求未明 |\n\n### 決策脈絡\n\n原本評估時 Gemini CLI 和 Codex CLI 都標「不裝」，後來改為全部裝齊。決策原則：**既然都有現有訂閱，CLI 安裝零成本、零維護（npm install -g），沒理由不裝。** 多一個備援 AI 永遠比少一個好。\n\n### 完整工具生態系\n\n```\nP（Perplexity 網頁版）→ 外部情報（P 偵察報告）\nC（Claude Code, Opus 4.6, 1M）→ 文件分析 + 策略推理 + L1-L8\nGemini CLI（Ultra, 1M）→ 備援 AI（研究/長上下文）\nCodex CLI（Pro）→ 備援 AI（寫作/創意）\nNapkin AI（網頁版）→ 資訊圖表\nNano Banana（Gemini 網頁版）→ 視覺概念圖/插畫\nNotion MCP（Claude.ai 內建）→ 案件資料庫 + 知識庫\nCanva MCP（Claude.ai 內建）→ 設計/排版/簡報\nNotebookLM MCP（.mcp.json，npx 自動拉）→ PDF 精準檢索\n```\n\n額外安裝的 CLI/MCP = 2（Gemini CLI + Codex CLI），額外費用 = $0（走現有訂閱）。\n\n### 待辦\n\n- Gemini CLI 和 Codex CLI 尚未首次登入（需要互動式認證）\n- Google Drive MCP 待確認是否有需求\n\n## ADR-09：Claude Code 插件策略\n\n專案安裝了 54 個 Claude Code 插件（全部來自官方市集），加上 Claude.ai 端內建的 Notion、Canva、Gamma MCP。盤點結論如下（2026-02-20）。\n\n### 目前有用的（7 個）\n\n| 插件 | 做什麼 | 怎麼用 |\n|------|--------|--------|\n| Notion（內建 MCP） | 讀寫 Notion 工作區 | 直接操作案件資料庫、知識庫 |\n| context7 | 查套件最新文件 | 開發時查 Next.js / React / Tailwind 等 API |\n| superpowers | 開發工作流（brainstorming、TDD、debugging 等） | 已融入日常，自動觸發 |\n| commit-commands | `/commit` 一鍵提交 | 三台機器頻繁推送，省去手動 git 操作 |\n| feature-dev | 引導式功能開發（先看架構再寫碼） | 下一個功能（情報模組 M01）開發時用 |\n| plugin-dev | 維護自訂 skill 和 hook | 專案有 8 個自訂指令 + 2 個 hook |\n| explanatory-output-style | 回覆附帶教學說明 | 目前已啟用 |\n\n### 以後看情況的（7 個）\n\n| 插件 | 什麼時候需要 | 前提條件 |\n|------|------------|---------|\n| playwright | 自動操作瀏覽器，E2E 測試或抓政府網站資料 | Web App 功能夠多值得 E2E 時 |\n| firecrawl | 爬網頁轉 markdown，抓招標公告 | 需要批量抓取政府公開資訊時 |\n| frontend-design | 介面設計指導 | 做新頁面、改 UI 時 |\n| pinecone | 向量搜尋（知識庫的第三個儲存選項） | 知識庫儲存方案定案時一併評估 |\n| vercel | 一鍵部署 | SaaS 部署方案決定用 Vercel 時 |\n| sentry | 錯誤監控 | Web App 上線後 |\n| posthog | 使用者行為分析 | Web App 上線後 |\n\n### 不需要的（40 個）\n\n10 個其他語言 LSP + 30 個不相關服務（asana、slack、stripe、firebase 等），與技術棧（TypeScript + Next.js + Notion）無關。\n\n## ADR-10：自建 Notion MCP — 暫緩\n\n- **決定**：暫時不自建 Notion MCP server\n- **理由**：Claude.ai 內建的 Notion MCP 已涵蓋完整 CRUD（搜尋、讀寫頁面、建資料庫、查詢 view），目前只有 Claude 在用 Notion\n- **觸發條件**：當 GPT / Gemini agent 也需要存取 Notion 時，再建本地版 Notion MCP\n- **否決（當下）**：立即自建 — 功能重複、維護成本不值得\n\n## ADR-11：資料儲存方案 — Notion 主庫 + 抽象層（2026-02-22 定版）\n\n- **決定**：Notion 當主要資料庫，程式碼加一層資料抽象層\n- **理由**：\n  - 大員洛川現在已經在用 Notion 管理所有案件（企劃協作及備標、評估工作流、投標監控、設計需求單），不遷移\n  - Notion API 讀寫是核心能力，不是過渡方案\n  - 抽象層讓未來換自己的資料庫時不用重寫業務邏輯\n- **否決（當下）**：Supabase 自建（增加成本和維護，不符合先自用的策略）\n- **否決（當下）**：直接硬綁 Notion API（未來換庫要全部重寫）\n\n## ADR-12：產品策略 — 先自用再產品化（2026-02-22 定版）\n\n- **決定**：先幫大員洛川跑通整套流程，再產品化賣給其他公司\n- **影響**：\n  - 先不做多租戶架構\n  - 先不做通用化的配置系統\n  - 直接針對大員洛川的 Notion 工作區開發\n- **觸發條件**：大員洛川得標率明顯提升，且有其他公司詢問時，再做產品化\n","app-docs/dev-plan/04-數據架構.md":"---\nversion: \"1.0\"\nupdated: \"2026-02-21\"\nstatus: \"草案\"\ndepends: [\"02-核心架構\", \"03-技術選型\"]\nchangelog:\n  - \"1.0 (2026-02-21): 初版建立，彙整 Notion/PCC/localStorage/檔案系統資料流\"\n  - \"0.0 (2026-02-18): 佔位建立\"\n---\n\n# 04 數據架構\n\n## 一、資料來源與角色\n\n| 來源 | 角色 | 讀/寫 | 對應模組 |\n|------|------|-------|---------|\n| Notion API | 標案資料庫（主資料） | 讀+寫 | 指揮部、績效、案件看板 |\n| PCC API（政府採購網） | 標案公告搜尋 | 唯讀 | 偵察報告（P 系列） |\n| localStorage | 應用程式設定 + 快取 | 讀+寫 | 全域設定、儀表板佈局 |\n| 檔案系統（`public/prompts/`） | Prompt 模板 | 唯讀 | AI 階段（L1-L8）、工具（T1） |\n| SmugMug API | 專案照片 | 唯讀 | 實績展示 |\n\n## 二、Notion API 資料流\n\n### 欄位對照機制\n\n系統用內部 key 操作資料，透過欄位對照表映射到 Notion 實際欄位名稱：\n\n```\n系統內部 key（FIELD_KEYS）\n  → DEFAULT_FIELD_MAP（預設對照）\n  → resolveFieldMap()（合併使用者自訂覆蓋）\n  → 實際 Notion API 欄位名稱\n```\n\n- 定義：`src/lib/constants/field-mapping.ts`（21 個欄位）\n- 使用者可在設定頁覆蓋欄位名稱（`AppSettings.fieldMapping`），不改程式碼\n- 覆蓋值存 localStorage，空時用預設\n\n### 查詢最佳化\n\n每個頁面只查需要的欄位（`filter_properties`），加速回應：\n\n| 頁面 | 欄位數 | 定義 |\n|------|--------|------|\n| 指揮部 | 17 | `FIELDS_DASHBOARD` |\n| 績效中心 | 13 | `FIELDS_PERFORMANCE` |\n| KPI 統計 | 5 | `FIELDS_DASHBOARD_KPI` |\n\n定義位置：`src/lib/constants/notion-fields.ts`\n\n### API Route 架構\n\n所有 Notion 操作透過 `/api/notion` 代理（避免前端暴露 token）：\n\n| action | 用途 | 回傳 |\n|--------|------|------|\n| `schema_and_query` | 首次載入（schema + 資料） | schema + pages + cursor |\n| `continue_query` | 背景續抓（分頁） | pages + cursor |\n| `query` | 一般查詢 | pages |\n| `update` | 更新案件屬性 | success |\n| `schema` | 純 schema（設定用） | schema |\n\n載入策略：`quickLoad` 模式先回傳第一批（100 筆），前端背景續抓剩餘分頁。\n分頁上限：每次 API call 最多串接 20 頁（防止 Serverless timeout）。\n\n### Notion 資料解析\n\n`parsePage()` 統一處理 Notion 的 12 種屬性類型（title、rich_text、number、select、multi_select、date、checkbox、url、status、people、unique_id、formula、rollup），輸出為簡化的 key-value。前端不直接處理 Notion 原始格式。\n\n## 三、localStorage 儲存策略\n\n### 設定存取\n\n| key | 內容 | 大小估計 |\n|-----|------|---------|\n| `bidding-assistant-settings` | 全部 `AppSettings`（JSON） | ~5-15 KB |\n\n- 存取方式：`useSettings()` Hook → `SettingsProvider` context\n- Hydration 安全：SSR 時回傳 `DEFAULT_SETTINGS`，client 端 mount 後從 localStorage 載入\n- 合併策略：`{ ...DEFAULT_SETTINGS, ...JSON.parse(saved) }`（新增欄位自動 fallback）\n\n### 其他 localStorage 使用\n\n| key | 模組 | 用途 |\n|-----|------|------|\n| 知識庫自訂選項 | `useCustomOptions` | 團隊成員、機關等自訂下拉選項 |\n| 知識庫內容 | `useKnowledgeBase` | 00A-00E 知識庫本地存放 |\n| 日誌 | `logger` | 操作日誌暫存 |\n| 儀表板佈局 | `useCardLayout` | 卡片排列偏好 |\n| 側欄狀態 | `Sidebar` | 展開/收合 |\n\n### 快取策略（Phase 1）\n\nPhase 1 不做獨立快取層。Notion 資料每次載入即時查詢，localStorage 只存設定不存資料快取。\n\n原因：\n- 自用階段資料量小（<500 筆），Notion API 回應快（~1-3 秒）\n- 快取失效邏輯的複雜度不值得在 Phase 1 引入\n\nPhase 2 考慮方向：\n- 短期快取（5 分鐘 TTL）避免重複查詢\n- SWR 模式（stale-while-revalidate）改善感知效能\n\n## 四、PCC API 資料流\n\n透過 PCC MCP Server（`pcc-api-mcp/`）存取，6 個工具：\n\n| 工具 | 輸入 | 輸出 |\n|------|------|------|\n| search_tender | 標題關鍵字 | 標案清單 |\n| search_company | 公司名稱 | 公司投標紀錄 |\n| list_agency_tenders | 機關 ID | 機關所有標案 |\n| get_tender_detail | unit_id + job_number | 標案完整資訊（含評委） |\n| list_agencies | — | 機關列表 |\n| get_api_info | — | 系統資訊 |\n\n資料流向：\n```\nPCC 政府採購網 API\n  → PCC MCP Server（轉譯）\n  → Claude / AI Agent（分析 + 產出 P 偵察報告）\n  → 使用者（透過 SaaS 網頁或 chat 介面）\n```\n\nPCC 資料不存入 Notion，僅作為 AI 分析的輸入素材。分析結果（P 偵察報告）是一次性產出，隨案件走。\n\n## 五、檔案系統\n\n### Prompt 模板（`public/prompts/`）\n\n```\npublic/prompts/\n  stages/\n    01.md          ← L1 戰略分析（生產版，v2.3）\n    02.md ~ 08.md  ← L2-L8（待寫）\n  tools/\n    T1.md          ← T1 知識庫精靈（v2.0，914 行）\n    P-template.md  ← P 偵察報告模板（待建）\n  knowledge/\n    00A.md ~ 00E.md  ← 知識庫（由 T1 產出，Phase 1 存本地檔案）\n```\n\n透過 `/api/prompts` route 讀取（安全檢查：只允許 `.md`、禁止路徑穿越）。\n\n### Prompt 組裝\n\n每個 L 階段的實際 prompt = 基礎模板 + 知識庫片段 + 案件上下文：\n- 知識庫注入矩陣：`src/data/config/kb-matrix.ts`（8 階段 × 5 知識庫，三種需求等級）\n- 撰寫規則：L3、L4 額外套用撰寫規範（`WRITING_RULES_STAGES`）\n\n## 六、資料流向圖\n\n```\n┌─────────────┐     ┌──────────────┐     ┌─────────────────┐\n│ Notion API  │────→│ /api/notion  │────→│ React 前端      │\n│（標案資料庫）│←────│ （proxy）     │     │ useSettings()   │\n└─────────────┘     └──────────────┘     │ useDashboard()  │\n                                          │ usePerformance()│\n┌─────────────┐     ┌──────────────┐     └────────┬────────┘\n│ PCC API     │────→│ PCC MCP      │              │\n│（政府採購網）│     │ Server       │              │ 讀/寫\n└─────────────┘     └──────┬───────┘              ↓\n                           │              ┌─────────────────┐\n                           │              │ localStorage    │\n┌─────────────┐            │              │ ‧AppSettings    │\n│ SmugMug API │────→ SmugMug MCP          │ ‧知識庫內容     │\n│（專案照片）  │     Server                │ ‧佈局偏好      │\n└─────────────┘                           └─────────────────┘\n                                                  │\n┌─────────────┐     ┌──────────────┐              │\n│ 檔案系統    │────→│ /api/prompts │              │\n│ public/     │     │ /api/kb-md   │──────────────┘\n│ prompts/    │     └──────────────┘\n└─────────────┘\n```\n\n## 七、設定型別全貌\n\n`AppSettings` 包含 6 個主區塊 + 4 個頂層選項：\n\n| 區塊 | 型別 | 內容 |\n|------|------|------|\n| `document` | `DocumentSettings` | 文件字型/字級/版面/頁首頁尾 |\n| `connections` | `ConnectionSettings` | Notion/Google Drive/SmugMug 連線資訊 |\n| `company` | `CompanySettings` | 公司名稱/統編/品牌 |\n| `modules` | `ModuleSettings` | 知識庫矩陣/品質規則/計價 |\n| `workflow` | `WorkflowSettings` | 階段設定/自動狀態規則/視圖 |\n| `featureToggles` | `Record<string, boolean>` | 功能模組開關 |\n| `fieldMapping` | `Partial<Record<...>>` | Notion 欄位名稱覆蓋 |\n| `dashboardLayout` | `DashboardLayout` | 儀表板卡片佈局 |\n| `yearlyGoal` | `number` | 年度目標金額 |\n| `monthlyBidTarget` / `weeklyBidTarget` | `number` | 投標件數目標 |\n\n所有設定都有預設值（`DEFAULT_SETTINGS`），新增欄位用 `?` optional，向後相容。\n\n## 八、已知限制與 Phase 2 方向\n\n| 限制 | 影響 | Phase 2 方向 |\n|------|------|-------------|\n| 知識庫存 localStorage | 換瀏覽器/清快取就不見 | Notion 或 Supabase（待決） |\n| 無資料快取層 | 每次載入都打 Notion API | SWR 短期快取 |\n| Token 存 localStorage | 安全性不足（XSS 風險） | 環境變數 + 後端 session |\n| 單一 Notion database | 表格愈長效能愈差 | 考慮分庫（歷史案件歸檔） |\n| Prompt 檔案在 `public/` | 部署後不可修改 | Phase 2 移至資料庫或 CMS |\n","app-docs/dev-plan/05-工作流程.md":"---\nversion: \"2.0\"\nupdated: \"2026-02-23\"\nstatus: \"定案\"\ndepends: [\"00-總論\", \"03-技術選型\"]\nchangelog:\n  - \"2.0 (2026-02-23): 新增真實工作流程（大員洛川日常 + Notion 四區塊），策略對焦改為 P0 優先\"\n  - \"1.1 (2026-02-20): 補上游漏斗（案件發現→行政篩選→企劃選入）、行政四動作、自動化分析、策略對焦；Canva MCP 狀態修正\"\n  - \"1.0 (2026-02-18): 初版建立，含 PCC→P偵察→L1 完整流程\"\n---\n\n# 05 工作流程\n\n## 案件發現漏斗\n\n```\npcc 瀏覽（多帳號 200*N）\n    ↓ 行政初篩（標準：案名 vs 公司業務範圍）\n600-1200 件/月 通過初篩\n    ↓ 行政第一輪（每件都做）：貼表 + 貼檔\n    ↓ 企劃初選（看 Notion 摘要）\n~200 件/月 選入\n    ↓ 行政第二輪（開 Drive 資料夾 + 貼備標評估文件）\n    ↓ 企劃 + AI 深度分析（L1 快速分析 + A/B/C/D 分級，詳見 08）\n~4 件/月 決定投標 → L2-L8\n```\n\n## 行政每日四動作（600-1200 件/月）\n\n1. **貼表** — 案件資訊填入 Notion\n2. **貼檔** — 下載→清理→轉 PDF→嵌入 Notion\n3. **摘要** — Notion AI 生成（格式不穩定）\n4. **情蒐**\n   - 決標記錄查詢（PCC API 可自動化）\n   - 投標地址行車資訊（手動，僅限進入決策流程的案件）\n\n人力：約 5 位助理分工，每人每月 120-240 件\n\n## 自動化分析\n\n| # | 步驟 | 可自動化？ | 改善方式 |\n|---|------|:---------:|---------|\n| ① | pcc 初篩 | ✅ | pcc-api + AI 自動篩選 |\n| ② | 貼表（填 Notion） | ✅ | AI 提取 + Notion MCP 寫入 |\n| ③ | 辨識備標文件 | ✅ | AI 讀內容分類 |\n| ④ | 清理非備標內容 | ✅ | AI 識別輸出清潔版 |\n| ⑤ | 轉 PDF | ✅ | LibreOffice 批次 |\n| ⑥ | Notion AI 摘要 | ✅ | L1 v2.3 取代 |\n\n以上均技術可行，但行政端目前穩定運作、不構成瓶頸，暫不列入開發優先序（Batch H 維持 Phase 3），待企劃端基礎建好後再評估。\n\n## 真實工作流程（Jin 描述 2026-02-22）\n\n### 角色\n\n- **行政人員**：每天上午巡標（上 PCC 抓新公告進 Notion）\n- **企劃人員（Jin/鹿淵）**：篩選、評估、寫企劃\n- **設計師**：接設計需求單做視覺\n\n### 每日節奏\n\n| 時間 | 誰 | 做什麼 | 工具 |\n|------|-----|--------|------|\n| 上午 | 行政 | 上 PCC 抓新公告，貼進 Notion | PCC 網站 → Notion |\n| 上午 | 企劃 | 打開「企劃協作及備標」表，處理已篩選的案子 | Notion |\n| 下午 | 企劃 | 跑「評估工作流」，篩選當天新案子 | Notion |\n| 需要時 | 企劃 | 開設計需求單給設計師 | Notion |\n| 隨時 | 企劃 | 監看「投標進度監控處」 | Notion |\n\n### Notion 企劃作業區（四個區塊）\n\n1. **評估工作流**\n   - 關鍵字初篩，分四類：\n     - 絕對可以：食農教育/藝術/服務採購/100萬以下/影片製作/行銷計畫/春聯\n     - 需要讀細節：主燈設計/各種節慶（燈節、藝術節等）/舞台/布置/晚會演唱會\n     - 先不要：課後服務\n     - 剩下的留給其他有經驗的人\n   - 註：此關鍵字清單是「代理人簡化版」，Jin 本人判斷更細\n   - 兩關篩選：初級（消極汰除）→ 二級（積極挑選）\n\n2. **企劃協作及備標**（主工作區）\n   - 欄位：優先序（第一/二/三順位）、完成進度、負責人、截止日期、案號、機關、預算、工作說明\n\n3. **投標進度監控處**\n   - 競標中控臺，按狀態分類：著手領/備標、競標階段、已出席簡報、逾期未參與、領標後未參與、資格不符、未獲青睞\n   - 投標排程\n\n4. **設計需求單**\n   - 欄位：需求名稱（綁案號）、需求人、初稿交件時間、完稿期限、狀態\n\n## 策略對焦\n\n- ~~行政端流程成熟穩定，不動~~ → P0 行政巡標自動化已完成\n- 企劃端是 0% 得標率根因，P1 起集中在企劃端\n- 開發按用戶操作順序（巡標→選案→情報→寫作→輸出→監控）推進\n\n## 完整投標流程\n\n```\n招標文件\n  → Step 0: PCC API 自動擷取（系統，1-2 分鐘）\n  → Step 1: 系統組裝 P 偵察 prompt（系統，幾秒）\n  → Step 2: Perplexity Deep Research（人貼，3-5 分鐘）\n  → Step 3: P 偵察報告 + 招標文件 → L1 戰略分析（Claude）\n  → Step 4: 團隊決策會議（投 or 不投）\n  → L2 備標規劃\n  → L3 企劃草稿\n  → L4 定稿撰寫\n  → L5 評選分析\n  → L6 簡報規劃\n  → L7 講稿腳本\n  → L8 模擬演練\n  → 投標\n  → 結果回收 → 知識庫更新\n```\n\n## PCC API → P 偵察 → L1 整合（核心工作流）\n\n### Step 0：使用者指定案件\n輸入：案名 / 案號 / 機關名\n\n### Step 1：PCC API 自動擷取（系統，1-2 分鐘）\n\n```\nsearchbytitle(案名關鍵詞)\n  → 同類型標案一覽\n  → 每案用 tender() 取決標詳情\n    → 得標者、未得標者、評委、金額\n\nsearchbycompanyname(\"大員洛川\")\n  → 我方投標歷史（139 筆）\n\nsearchbycompanyname(各競爭者名稱)\n  → 對手投標歷史\n```\n\n產出：**預填數據包**（結構化表格）\n\n### Step 2：組裝 P 偵察 prompt（系統，幾秒）\n\n將預填數據包塞入 P 偵察報告模板：\n- 「機關歷史標案一覽」已填 → Perplexity 只補政策脈絡\n- 「競爭者名單」已填 → Perplexity 精準搜各家公司背景\n- 「評委名單」已填 → Perplexity 搜各評委背景\n- 「我方紀錄」已填 → Perplexity 只查相關新聞\n\n產出：一份可直接貼的 prompt\n\n### Step 3：Perplexity Deep Research（人，3-5 分鐘）\n\n使用者複製 prompt → 貼入 Perplexity → 等待 → 匯出 .md\n\n### Step 4：L1 戰略分析（Claude，10-15 分鐘）\n\n輸入：招標文件 + P 偵察報告.md\n使用 prompt：`01_戰略分析_v2.3.md`\n\nL1 中依賴 P 偵察報告的步驟：\n- Step 3 潛台詞分析 → 交叉比對政策脈絡\n- Step 5 競爭格局 → 用真實得標者/投標者（非假想敵）\n- Step 6 SWOT → 至少各一項引用 P 報告外部數據\n- Step 7 投標決策 → 至少一個理由基於外部情報\n\n### Step 5：團隊決策會議（人，30 分鐘）\n\n基於 L1 報告做出：投 / 謹慎評估 / 放棄\n\n## 使用者全程操作次數\n\n| 步驟 | 操作 | 時間 |\n|------|------|------|\n| 指定案件 | 輸入關鍵詞 | 10 秒 |\n| 貼 Perplexity | 複製 → 貼上 | 30 秒 |\n| 等 Perplexity | 等待 | 3-5 分鐘 |\n| 帶回 P 報告 | 複製 → 貼回 | 30 秒 |\n| 餵招標文件 | 上傳/貼上 | 1 分鐘 |\n\n**人只動手 3 次**：拿 prompt 出去、把結果帶回來、餵招標文件。\n\n## AI 連接方式\n\n| 工具 | 串接 | 角色 |\n|------|------|------|\n| Claude CLI + MCP | 主力 | 寫作/分析/品質檢查 |\n| OpenAI CLI + MCP | 備援 | 寫作/創意 |\n| Gemini CLI + MCP | 備援 | 研究/長上下文 |\n| Perplexity MCP | 手動 | P 偵察報告（Deep Research） |\n| Notion MCP | 已連 | 資料庫/知識管理 |\n| Canva MCP | 已連 | 設計/排版/簡報 |\n\n## L1-L8 階段定義\n\n| 階段 | 名稱 | 觸發指令 | 階段 | 輸入 | 產出 |\n|------|------|---------|------|------|------|\n| L1 | 戰略分析 | /分析 | 投標 | 招標文件 + P 報告 | 戰略分析報告 + 提問清單 |\n| L2 | 備標規劃 | /規劃 | 投標 | L1 報告 | 規劃書 |\n| L3 | 企劃草稿 | /企劃 | 投標 | L2 規劃 | 企劃稿 + 預算表 |\n| L4 | 定稿撰寫 | /撰寫 | 投標 | L3 企劃 | 各章初稿 |\n| L5 | 評選分析 | /評選分析 | 評選 | L4 定稿 | 評選戰略 |\n| L6 | 簡報規劃 | /簡報規劃 | 評選 | L5 分析 | 簡報架構 + 時間分配 |\n| L7 | 講稿腳本 | /講稿腳本 | 評選 | L6 簡報 | 逐頁講稿 + Q&A |\n| L8 | 模擬演練 | /模擬演練 | 評選 | L7 講稿 | 演練診斷報告 |\n","app-docs/dev-plan/06-開發進程.md":"---\nversion: \"2.0\"\nupdated: \"2026-02-23\"\nstatus: \"定案\"\ndepends: [\"00-總論\", \"03-技術選型\"]\nchangelog:\n  - \"2.0 (2026-02-23): 全面重整——四層路線改為 P0-P4（依實際工作流程排序），整合 stash-product-direction-0222 五項決策\"\n  - \"0.1 (2026-02-21): 初版草案——四層路線 + Layer 0 現況 + PCC 戰略分析 + Layer 1 三階段\"\n  - \"0.0 (2026-02-18): 佔位建立\"\n---\n\n# 06 開發進程\n\n## 策略前提（Jin 確認 2026-02-22）\n\n三個決定，影響所有後續開發：\n\n1. **先自用，再產品化** — 先幫大員洛川跑通整套流程，先不做多租戶\n2. **Notion 當主庫，加抽象層** — 現有 Notion 繼續用，程式碼加資料抽象層，未來換庫不重寫業務邏輯\n3. **Claude Code SDK 當發射台** — 系統組裝提示詞+知識庫+交付物，一鍵送 Claude Code 執行。不做嵌入式 AI 聊天，不花額外 API 費用\n\n## P0-P4 開發路線\n\n按實際工作流程排序（打開→選案子→看資料→看情報→寫企劃→輸出→監控），不按技術層級。\n\n| 階段 | 目標 | 對應能力 | 狀態 |\n|------|------|---------|------|\n| P0 | 行政巡標自動化 | PCC API 搜尋 + Notion 建案 | ✅ 完成 |\n| P1 | 案件工作頁 | 能力 1（戰略）+ 能力 2（知識庫）+ PCC 情報 | 待開始 |\n| P2 | Claude Code SDK 寫作發射台 | 能力 3（調度）+ 能力 4（品質）| 待開始 |\n| P3 | 輸出管理 | 能力 6（排版 + 設計需求單） | 待開始 |\n| P4 | 投標監控自動化 | PCC 狀態追蹤 + 推送通知 | 待開始 |\n\n### 為什麼這個順序\n\n舊計畫按技術依賴排（基礎設施→核心→效率→錦上添花），但實際使用流程是：\n\n```\n行政巡標（發現機會）\n  → 企劃選案（看資料、看情報）\n    → 寫企劃（AI 撰寫 + 品質檢查）\n      → 輸出（排版、設計）\n        → 監控（狀態追蹤、結果回收）\n```\n\n每一步做完，用戶就能用到那一步。不需要等整個系統蓋好。\n\n## P0：行政巡標自動化 ✅\n\n已完成。PCC API 用預設關鍵字搜尋 → 擷取公告清單 → 巡標人點「要」→ 全自動建案（Notion + Google Drive）。\n\n| 元件 | 狀態 | 說明 |\n|------|------|------|\n| PCC MCP Server | ✅ | 6 個工具，免費 API |\n| PCC Monitor | ✅ | GAS 每小時監控 API 延遲 |\n| W01 巡標自動化 | ✅ | 全鏈路（搜尋→篩選→接受→建案） |\n| Notion 寫入 | ✅ | 建案到「企劃協作及備標」表 |\n| Google Drive 整合 | ✅ | OAuth + 自動建資料夾 |\n\n待 Jin 驗收。\n\n## P1：案件工作頁\n\n選了案子之後，所有相關資料在一頁看完。\n\n### 做什麼\n\n- 案件詳情頁：基本資料 + 招標文件 + 情報 + 戰略分析，一頁看完\n- M03 戰略分析嵌入案件頁（已有 82 測試，需改成案件頁內的功能）\n- PCC 情報搜尋嵌入案件頁（已有 1132 測試，需加 Notion 回寫）\n- 知識庫搜尋 + 自動注入相關資料\n\n### 已有的彈藥\n\n| 模組 | 現況 | 需要做什麼 |\n|------|------|-----------|\n| M03 戰略分析 | A44T 完成，82 測試全過 | 嵌入案件詳情頁 |\n| PCC 情報搜尋 | ITEJ 完成，1132 測試全過 | 加 Notion 回寫、嵌入案件頁 |\n| T1 知識庫精靈 | prompt v2.0 就緒 | 整合到案件脈絡注入 |\n\n### 待釐清（P1 細節待展開）\n\nJin 想先走一遍真實流程再定具體規格，以下待討論：\n- 案件頁的 UI 佈局\n- 戰略分析的觸發方式（自動 vs 手動）\n- 情報搜尋結果的呈現格式\n- 知識庫注入的範圍和時機\n\n## P2：Claude Code SDK 寫作發射台\n\n系統組裝好材料，一鍵送 Claude Code 寫企劃。\n\n### 做什麼\n\n- 組裝提示詞（L2 備標規劃 + L3 章節撰寫）\n- 注入知識庫（00A-00E）+ 本案情報 + 過去交付物\n- 「發射」按鈕：打包送 Claude Code SDK 執行\n- M04 品質閘門檢查輸出（已有 114 測試）\n\n### 架構重點\n\n```\nSaaS 網頁（UI）\n  → 選案件、確認材料\n  → 一鍵「發射」\n    → Claude Code SDK（背景執行）\n      → L2 備標規劃\n      → L3 章節撰寫\n      → L4 定稿\n    → 品質閘門自動檢查\n  → 結果回到案件頁\n```\n\n不做嵌入式聊天。系統的價值在「組裝正確的輸入」，不在「即時對話」。\n\n## P3：輸出管理\n\n寫完之後的最後一哩路。\n\n- M06 文件排版輸出（部分已做）\n- 建議書匯出（套用公司模板）\n- 設計需求單整合（綁案號→設計師）\n- 評選簡報生成（L5-L8 系列）\n\n## P4：投標監控自動化\n\n案件投出去之後的追蹤。\n\n- 從 PCC API 自動更新案件狀態（開標、決標、流標）\n- 推送通知（截標日提醒、開標結果）\n- 落標資料自動回收 → 知識庫更新（飛輪回饋）\n\n## 模組對照\n\n### 活躍模組\n\n| 模組 | 嵌入位置 | 現況 |\n|------|---------|------|\n| PCC MCP Server | P0 巡標 + P1 案件頁 | ✅ 完成（6 工具，1132 測試） |\n| W01 巡標自動化 | P0 | ✅ 完成（全鏈路） |\n| M03 戰略分析 | P1 案件頁 | 完成（82 測試），待嵌入 |\n| M04 品質閘門 | P2 寫作檢查 | 完成（114 測試），待嵌入 |\n| M06 排版輸出 | P3 輸出 | 部分完成 |\n| T1 知識庫精靈 | P1/P2 知識注入 | prompt v2.0 就緒 |\n\n### 凍結模組（Jin 確認 2026-02-22）\n\n以下模組程式碼保留、測試繼續跑，但不投入新開發：\n\n- dashboard（儀表板）\n- custom-dashboard（自訂儀表板）\n- pricing（報價分析）\n- assembly（文件組裝）\n- performance（績效分析）\n\n## PCC API 的戰略價值\n\nPCC API 不只在 P0 用，它貫穿整個流程：\n\n| 階段 | PCC API 做什麼 | 價值 |\n|------|---------------|------|\n| P0 巡標 | 自動搜尋新公告 | 發現更多機會 |\n| P1 案件頁 | 競爭對手分析、機關偏好、評委背景 | 投標決策更準 |\n| P2 寫作 | 評委背景→調整寫作策略 | 得標率更高 |\n| P4 監控 | 開標結果、決標資訊 | 自動追蹤、回饋學習 |\n\n### 收入公式衝擊\n\n```\n收入 = 得標案件數 × 平均案件金額 × 毛利率\n```\n\n| 公式變數 | PCC API 的作用 | 影響 |\n|---------|---------------|------|\n| 發現機會數 ↑ | P0 自動監控新標案 | 中 |\n| 投標決策通過率 ↑ | P1 競爭對手分析、機關偏好 | **高** |\n| 得標率 ↑ | P1/P2 評委背景→寫作策略、價格分析 | **高** |\n| 平均案件金額 ↑ | P0/P1 篩選高價值案件 | 中 |\n\n## 依賴與阻塞\n\n| 阻塞項 | 影響 | 狀態 |\n|--------|------|------|\n| P0 驗收 | P1 開工前提 | 待 Jin 驗收 |\n| P1 規格（真實流程走一遍） | P1 UI 設計 | 待 Jin 定義 |\n| 00A-00E 知識庫內容 | P1/P2（AI 沒彈藥就空轉）| 待建立 |\n| Notion 資料抽象層設計 | P1 資料讀寫 | 待設計 |\n","app-docs/dev-plan/07-部署與成本.md":"---\nversion: \"1.0\"\nupdated: \"2026-02-21\"\nstatus: \"草案\"\ndepends: [\"00-總論\", \"03-技術選型\", \"08-風險與待決\"]\nchangelog:\n  - \"1.0 (2026-02-21): 初版建立，彙整 ADR-02 成本數據 + 部署架構\"\n  - \"0.0 (2026-02-18): 佔位建立\"\n---\n\n# 07 部署與成本\n\n## 一、部署架構\n\n### Phase 1（自用開發階段）\n\n```\nbidding-assistant/（Next.js 16 App Router）\n  ├── 前端：React 19 + Tailwind CSS 4\n  ├── API Routes：/api/*（Notion proxy、PCC proxy）\n  ├── 開發：npm run dev（localhost:3000）\n  └── 部署：Vercel Hobby（免費）\n```\n\n- **主機**：Vercel Hobby plan（$0）\n  - 100GB/月頻寬（自用綽綽有餘）\n  - Serverless Function timeout：10 秒\n  - 每次部署上限 250MB\n  - 自動 HTTPS + CDN\n- **域名**：暫用 Vercel 提供的 `.vercel.app` 子域名\n- **資料庫**：不自建，用 Notion API + localStorage\n\n### Phase 2（團隊使用階段）\n\n| 變更 | 原因 | 成本影響 |\n|------|------|---------|\n| Vercel Hobby → Pro | 多人使用可能超出免費額度 | +$20/月 |\n| 自訂域名 | 正式對外使用 | ~$15/年 |\n| Serverless timeout 60s | L1 分析等長時間操作 | 含在 Pro |\n| 檔案上傳方案 | 招標文件 PDF 5-30MB 超過 4.5MB body limit | Vercel Blob 或 Presigned URL |\n\n### 已知限制與對策\n\n| 限制 | 影響 | 對策 |\n|------|------|------|\n| Serverless 10s timeout（Hobby） | PCC 批次搜尋、Notion 全量抓取跑不完 | 前端分段請求，每次查一頁 |\n| 4.5MB body size（硬限制） | 招標 PDF 上傳 | Phase 1 手動處理，Phase 2 Presigned URL |\n| 冷啟動 500ms-2s | 首次請求延遲 | 可接受（非即時性應用） |\n| Hobby→Pro 費用跳變 | $0→$20/月 | Phase 1 在免費額度內，Phase 2 前評估 |\n\n## 二、月度成本\n\n### AI 工具訂閱（已有，非新增）\n\n| 工具 | 方案 | 月費 | 用途 |\n|------|------|------|------|\n| Claude | Max 20x | $200 | 主力 AI |\n| OpenAI | Pro | $200 | 備援 AI |\n| Gemini | Ultra | ~$22 | 備援 AI / 長上下文 |\n| Perplexity | Max | ~$20 | P 偵察報告 |\n| Notion | 商業版+AI | ~$28/人 | 資料庫 |\n| Canva AI | 含在訂閱 | — | 設計排版 |\n| **合計** | | **~$470+** | |\n\n> 以上全部是現有訂閱，開發此系統的額外 AI 成本 = $0（ADR-02 原則）。\n\n### 基礎設施新增成本\n\n| 項目 | Phase 1 | Phase 2 | 說明 |\n|------|---------|---------|------|\n| Vercel 主機 | $0 | $20/月 | Hobby → Pro |\n| 域名 | $0 | ~$1.25/月 | 自訂域名年繳 |\n| 檔案儲存 | $0 | 待定 | Vercel Blob / S3 |\n| 資料庫 | $0 | $0 | 用 Notion，不自建 |\n| **小計** | **$0** | **~$21+** | |\n\n### 成本總結\n\n```\nPhase 1 新增成本：$0（全走現有訂閱 + 免費主機）\nPhase 2 新增成本：~$21/月（Vercel Pro + 域名）\n```\n\n## 三、開發成本\n\n| 項目 | 方式 | 成本 |\n|------|------|------|\n| 開發人力 | Claude Code Agent Team | $0（走 Max 訂閱） |\n| CI/CD | Vercel 自動部署（git push 觸發） | $0 |\n| 測試 | Vitest + Testing Library | $0 |\n| 監控 | 待定（Phase 2 考慮 Sentry/PostHog） | Phase 1 $0 |\n\n## 四、預算上限與警戒線\n\n| 指標 | 警戒線 | 動作 |\n|------|--------|------|\n| Vercel 頻寬 | 80GB/月（80%） | 考慮升 Pro |\n| Serverless 執行時間 | 接近上限 | 考慮升 Pro |\n| AI 訂閱 rate limit | 頻繁觸發 | 調整 Agent 呼叫頻率 |\n| 總月度成本 | $500（現有訂閱外的新增） | 重新評估架構 |\n","app-docs/dev-plan/08-風險與待決.md":"---\nversion: \"1.1\"\nupdated: \"2026-02-20\"\nstatus: \"定案\"\ndepends: [\"00-總論\", \"03-技術選型\"]\nchangelog:\n  - \"1.1 (2026-02-20): Discord→SaaS 更新（#2 措辭、#3/#4 風險轉變、#5 Vercel 限制）；新增業務背景（#8-#10）；#6 移至歷史區\"\n  - \"1.0 (2026-02-18): 初版建立，7 個已知缺口\"\n---\n\n# 08 風險與待決事項\n\n## 必須先決定（阻塞開發）\n\n### #1 Agent SDK = API 計費，不是 $0\n\n**問題**：開發計畫假設「全走訂閱，額外成本 = $0」，但 Agent SDK 走 API 計費。\n5 個 Agent（戰略官/企劃官/品管官/知識官/簡報官）每次呼叫都要付 API 費用。\n\n**可能方案**：\n- A) 接受 API 成本（估算月費？）\n- B) 包裝 CLI 呼叫（走訂閱但開發複雜度高）\n- C) 簡化為單一 Agent + 不同 system prompt（降低成本但功能退化）\n\n**狀態**：待決定\n\n### #2 團隊採用風險\n\n**問題**：15 人公司，目前工作流是 Perplexity+Gemini+Claude+Nanobanana 跳來跳去。\n新系統（SaaS 提案駕駛艙）需要團隊改變習慣。\n\n**風險**：\n- 建好了沒人用\n- 學習曲線太陡\n- 只有老闆在用，其他人回到舊方法\n\n**對策建議**：\n- 先做最痛的點（L1 戰略分析 + P 偵察自動化）\n- 一個人先用，證明有效再推廣\n- 系統設計要比現有流程更簡單，不是更複雜\n\n**狀態**：需持續關注\n\n## 需要討論但不阻塞\n\n### #3 Vercel 部署限制\n\n**原問題**：Discord Bot 主機（24/7 運行跑在哪？）\n**風險轉變**：改為 SaaS 後不需自管主機，但 Vercel 有自己的限制：\n\n- Hobby plan：每月 100GB 頻寬、Serverless 執行時間上限、每次部署 250MB\n- 冷啟動：Serverless Function 閒置後首次請求有 500ms-2s 延遲\n- 費用跳變：Hobby → Pro 是 $0 → $20/月，非平滑增長\n\nPhase 1 自用大概率在免費額度內。Phase 2 多人使用時需評估是否升 Pro。\n\n**狀態**：Phase 1 不阻塞，Phase 2 前需評估\n\n### #4 Vercel Serverless 逾時\n\n**原問題**：Discord 15 分鐘逾時（L1 可能跑 10-15 分鐘）\n**風險轉變**：SaaS 環境下限制更嚴格，不是更寬鬆：\n\n- Vercel Hobby：Serverless Function timeout = 10 秒\n- Vercel Pro：最多 60 秒（部分 region 300 秒）\n- Discord Interaction timeout 是 15 分鐘，反而更寬裕\n\nPCC 批次搜尋、Notion 全量抓取等長時間操作在 Route Handler 跑不完。與 M01 模型委員會審查盲區 5 同一問題。\n\n**可能方案**：\n- 前端分段請求（每次只查一頁/一家廠商）\n- 背景 Job 架構（Web Worker / requestIdleCallback）\n- 部分成功可存、中斷可繼續\n\n**狀態**：待設計，與 M01 v2.0 合併處理\n\n### #5 招標文件上傳\n\n**原問題**：Discord 25MB 檔案上傳限制\n**風險轉變**：Vercel body size 限制比 Discord 更嚴格：\n\n- Vercel Serverless Function body size：4.5MB（硬限制，Hobby 和 Pro 相同）\n- 招標文件 PDF 通常 5-30MB，超過限制\n- 走 API Route 上傳行不通\n\n**可能方案**：\n- Presigned URL 直傳雲端儲存（S3 / GCS / Supabase Storage）\n- Vercel Blob Storage\n- Phase 1 不需上傳（手動處理），Phase 2 再設計方案\n\n**狀態**：Phase 1 不阻塞，Phase 2 前需設計\n\n### #7 開發資源與時程\n\n**問題**：誰來開發？時程多長？\n- 純靠 Claude Code Agent Team？\n- 需要外部開發者？\n- 能否在下一輪投標季前完成核心功能？\n\n**狀態**：待討論\n\n## 業務背景與待決策略\n\n### #8 企劃端根因\n\n**現況**：\n- 完全跳過 L1-L8，直接把文件丟 AI「寫完整建議書」\n- 沒有審稿、沒有品質閘門\n- 46 案 0 得標\n\n**根因**：\n\n```\n量衝不起來 ← 每案手工作業太重\n質提不上去 ← 跳過分析直接寫\n兩頭卡住 ← 流程不支援任何一種策略\n```\n\n**狀態**：系統核心要解決的問題，驅動整體開發優先序\n\n### #9 案件分級策略\n\n```\n200 件/月（企劃選入）\n    ↓ L1 快速分析（每案 30 min）\n├── A 類（高勝算）→ 全力 L1-L8 → 精\n├── B 類（中勝算）→ 精簡流程 → 量\n├── C 類（可能獨家）→ 最低限度 → 撿漏\n└── D 類（低勝算）→ 放棄 → 省時間\n```\n\n**狀態**：策略方向明確，分級標準待定義\n\n### #10 三端全貌與人力共用\n\n| 端 | 設計 | 落地 | 產出 |\n|----|:----:|:----:|------|\n| 行政端 | ✅ | ✅ 貫徹 | 穩定（600-1200 件/月） |\n| 企劃端 | ✅ L1-L8 | ❌ 未部署 | 46 案 0 得標 |\n| 執行端 | ✅ 30 節點 | ❌ 未貫徹 | 差強人意 |\n\n**根因**：同一批人扛企劃+執行，哪邊著火救哪邊。\n\n**關鍵洞察**：\n1. 設計能力不缺（三端都有完整設計）\n2. 落地能力是瓶頸（只有行政端成功）\n3. 行政端成功因素：專職人力、可切割、可量化\n4. 企劃+執行失敗因素：人力共用、互搶資源、救火模式\n\n**狀態**：需要討論人力配置策略\n\n## 歷史（已解決）\n\n### #6 Web App 定位（已解決）\n\n**原問題**：Discord Bot 成為主介面後，Web App 角色是什麼？\n**解決**：ADR-07 決定放棄 Discord Bot，改為 SaaS 網頁。Web App 就是主產品介面。\n","app-docs/dev-plan/09-Prompt管理策略.md":"---\nversion: \"1.0\"\nupdated: \"2026-02-21\"\nstatus: \"草案\"\ndepends: [\"00-總論\", \"05-工作流程\"]\nchangelog:\n  - \"1.0 (2026-02-21): 初版建立，彙整 L1-L8/T1/P/00 系列現況與版控策略\"\n  - \"0.0 (2026-02-18): 佔位建立\"\n---\n\n# 09 Prompt 管理策略\n\n## 一、Prompt 清單與現況\n\n### 投標流程 prompt（L 系列）\n\n| ID | 名稱 | 版本 | 位置 | 狀態 |\n|----|------|------|------|------|\n| L1 | 戰略分析 | v2.3 | `public/prompts/stages/01.md` | 已驗證可用 |\n| L2 | 備標規劃 | — | 待寫 | 只有 stages.ts 定義 |\n| L3 | 企劃草稿 | — | 待寫 | 只有 stages.ts 定義 |\n| L4 | 定稿撰寫 | — | 待寫 | 只有 stages.ts 定義 |\n| L5 | 評選分析 | — | 待寫 | 只有 stages.ts 定義 |\n| L6 | 簡報規劃 | — | 待寫 | 只有 stages.ts 定義 |\n| L7 | 講稿腳本 | — | 待寫 | 只有 stages.ts 定義 |\n| L8 | 模擬演練 | — | 待寫 | 只有 stages.ts 定義 |\n\n### 工具 prompt（T/P 系列）\n\n| ID | 名稱 | 版本 | 位置 | 狀態 |\n|----|------|------|------|------|\n| T1 | 知識庫維護精靈 | v2.0 | `public/prompts/T1_知識庫維護精靈_v2.0.md` | 914 行，已驗證 |\n| P | 偵察報告模板 | — | 未建檔 | 目前手動組裝 |\n\n### 知識庫 prompt（00 系列）\n\n| ID | 名稱 | 狀態 |\n|----|------|------|\n| 00A | 團隊能力 | 未建 |\n| 00B | 實績案例 | 未建 |\n| 00C | 時程範本 | 未建 |\n| 00D | 應變方案 | 未建 |\n| 00E | 檢討回饋 | 未建 |\n\n## 二、版控策略\n\n### 版號規則\n\n```\n{major}.{minor}\nmajor：結構性大改（新增/刪除章節、改變輸出格式）\nminor：措辭微調、修正、補充\n```\n\n範例：L1 v2.3 = 第 2 次結構改版 + 第 3 次微調\n\n### 儲存結構\n\n```\npublic/prompts/\n  stages/\n    01.md          ← L1 戰略分析（生產版）\n    02.md          ← L2 備標規劃\n    ...\n  tools/\n    T1.md          ← T1 知識庫精靈\n    P-template.md  ← P 偵察報告模板\n  knowledge/\n    00A.md ~ 00E.md  ← 知識庫內容（由 T1 產出）\n```\n\n### 版本歷史記錄\n\n每份 prompt 檔案開頭包含：\n\n```markdown\n---\nid: L1\nversion: \"2.3\"\nupdated: \"2026-02-21\"\nchangelog:\n  - \"2.3: 加入 PCC API 數據交叉比對步驟\"\n  - \"2.2: 評委分析段落重寫\"\n  - \"2.0: 結構改版，從 5 步改為 8 步\"\n---\n```\n\n## 三、演進流程\n\n```\n觀察問題（AI 產出品質不佳、用戶反饋、結案檢討）\n  → 定位到哪個 prompt 的哪個步驟\n  → 修改 prompt（版號 +0.1）\n  → 用下一個案件實測\n  → 有效 → 保留（版號確認）\n  → 無效 → 回滾到上一版\n```\n\n### 測試方式\n\n| 階段 | 測試方法 | 判斷標準 |\n|------|---------|---------|\n| Phase 1（自用） | 每個新案件是一次實測 | 用戶主觀判斷 + 結案回饋 |\n| Phase 2（團隊） | A/B 測試（新舊版同時跑） | 品質評分 + 使用者滿意度 |\n\nPhase 1 不需要複雜的 A/B 框架。用戶只有一個人，每個案件手動對比即可。\n\n## 四、Prompt 組裝機制\n\n`src/data/config/prompt-assembly.ts` 管理 prompt 組裝：\n- 每個 L 階段 prompt = 基礎指令 + 知識庫片段 + 案件上下文\n- 知識庫注入量由 `kb-matrix.ts` 定義（哪個階段需要哪些 00 系列）\n\n```\nL1 prompt = stages/01.md + 00A（團隊） + 00B（實績） + 案件招標文件 + P 報告\nL3 prompt = stages/03.md + 00C（時程） + 00D（應變） + L2 規劃書\n```\n\n## 五、優先序\n\n1. **P 偵察報告模板建檔**：目前手動組裝，應建成 `tools/P-template.md` 讓系統自動組裝\n2. **L2-L8 撰寫**：按投標流程順序，每個案件實際走到才寫（不預寫）\n3. **00A-00E 建立**：靠 T1 精靈引導，Layer 0 任務\n4. **版控自動化**：Phase 2 再考慮（Phase 1 手動管理版號即可）\n","app-docs/dev-plan/A01-PCC-API-參考.md":"---\nversion: \"1.1\"\nupdated: \"2026-02-20\"\nstatus: \"定案\"\ndepends: []\nchangelog:\n  - \"1.1 (2026-02-20): 補完整端點、tender 詳情範例、評委資料、分析能力矩陣、API 分工定位、PCC MCP 已建工具、A02 技術備忘歸位\"\n  - \"1.0 (2026-02-18): 初版建立，基於實際 API 測試\"\n---\n\n# A01 PCC API 參考\n\n## 基本資訊\n\n- **API Base**: `https://pcc-api.openfun.app`\n- **資料量**：1,422 萬筆公告（1999/01 ~ 2026/02/13）\n- **來源**：g0v 社群，資料來自政府電子採購網 (web.pcc.gov.tw)\n- **授權**：免費、無需認證、開放 CORS\n- **後端**：PHP 7.4（Pix Framework）\n- **維護者**：ronnywang (GitHub: ronnywang/pcc.g0v.ronny.tw)\n- **前端 Viewer**：openfunltd/pcc-viewer\n\n## 端點一覽\n\n| 端點 | Method | 說明 | 參數 |\n|------|--------|------|------|\n| `/api/getinfo` | GET | 系統資訊（資料時間範圍、總數） | 無 |\n| `/api/` | GET | API 端點列表 | 無 |\n| `/api/searchbytitle?query=X&page=N` | GET | 按案名關鍵詞搜尋 | `query`, `page` |\n| `/api/searchbycompanyname?query=X&page=N` | GET | 按廠商名搜尋所有投/得標紀錄 | `query`, `page` |\n| `/api/listbydate?date=YYYYMMDD` | GET | 按日期列出 | `date` |\n| `/api/listbyunit?unit_id=X` | GET | 按機關列出 | `unit_id` |\n| `/api/unit` | GET | 列出機關列表 | 無 |\n| `/api/tender?unit_id=X&job_number=Y` | GET | 單筆標案完整詳情 | `unit_id`, `job_number` |\n| `/api/searchallspecialbudget` | GET | 列出所有特別預算 | 無 |\n| `/api/searchbyspecialbudget?query=X` | GET | 搜尋特別預算標案 | `query` |\n\n**注意**：`searchbycompany` 不存在（會回 200 + HTML 錯誤頁），正確是 `searchbycompanyname`。\n\n## 搜尋回應結構\n\n```json\n{\n  \"query\": \"大員洛川\",\n  \"page\": 1,\n  \"total_records\": 139,\n  \"total_pages\": 2,\n  \"took\": 0.40,\n  \"records\": [\n    {\n      \"date\": 20260211,\n      \"filename\": \"...\",\n      \"brief\": {\n        \"type\": \"決標公告\",\n        \"title\": \"114學年度榕城舞會\",\n        \"companies\": {\n          \"ids\": [\"45135067\", \"89170941\"],\n          \"names\": [\"杳桓有限公司\", \"大員洛川股份有限公司 (Tailok-Coop Co., Ltd.)\"],\n          \"id_key\": {\n            \"45135067\": [\"投標廠商:投標廠商1:廠商代碼\"],\n            \"89170941\": [\"投標廠商:投標廠商2:廠商代碼\"]\n          },\n          \"name_key\": {\n            \"杳桓有限公司\": [\n              \"投標廠商:投標廠商1:廠商名稱\",\n              \"決標品項:第1品項:得標廠商1:得標廠商\"\n            ],\n            \"大員洛川股份有限公司 (Tailok-Coop Co., Ltd.)\": [\n              \"投標廠商:投標廠商2:廠商名稱\",\n              \"決標品項:第1品項:未得標廠商1:未得標廠商\"\n            ]\n          }\n        }\n      },\n      \"job_number\": \"11503\",\n      \"unit_id\": \"3.76.62\",\n      \"unit_name\": \"臺北市立大同高級中學\",\n      \"unit_api_url\": \"https://pcc-api.openfun.app/api/listbyunit?unit_id=3.76.62\",\n      \"tender_api_url\": \"https://pcc-api.openfun.app/api/tender?unit_id=3.76.62&job_number=11503\",\n      \"unit_url\": \"https://web.pcc.gov.tw/prkms/prms-viewTenderDetailClient.do?...\",\n      \"url\": \"https://web.pcc.gov.tw/...\"\n    }\n  ]\n}\n```\n\n## 公司角色解析\n\n`name_key` 的值陣列描述公司在該案的角色：\n\n| 角色字串模式 | 意義 |\n|---|---|\n| `投標廠商:投標廠商N:廠商名稱` | 投標者（只知道投了標） |\n| `決標品項:第N品項:得標廠商M:得標廠商` | **得標者** |\n| `決標品項:第N品項:未得標廠商M:未得標廠商` | **未得標者** |\n\n同一公司可能同時出現在多個角色（如既是投標廠商又是未得標廠商）。\n\n## 標案詳情（tender）\n\n`/api/tender` 回傳結構為動態 key-value `detail` 物件，欄位名稱因案件類型不同而有差異。以下為實測範例：\n\n```json\n{\n  \"detail\": {\n    \"採購資料:預算金額\": \"318,600元\",\n    \"決標資料:底價金額\": \"308,100元\",\n    \"決標資料:總決標金額\": \"308,100元\",\n    \"投標廠商:投標廠商家數\": \"4\",\n    \"投標廠商:投標廠商1\": {\n      \"廠商代碼\": \"...\",\n      \"廠商名稱\": \"...\",\n      \"是否得標\": \"是/否\",\n      \"決標金額\": \"308,100元\",\n      \"廠商地址\": \"...\",\n      \"是否為中小企業\": \"是\"\n    },\n    \"決標品項:第1品項\": {\n      \"得標廠商原始投標金額\": \"316,000元\",\n      \"決標金額\": \"308,100元\",\n      \"底價金額\": \"308,100元\",\n      \"未得標廠商1標價\": \"318,600元\",\n      \"未得標廠商1未得標原因\": \"資格、規格合於招標文件但非最有利標或最優勝廠商\"\n    }\n  }\n}\n```\n\n主要資料區塊：\n- **機關資料**：名稱、地址、聯絡人\n- **招標資料**：案號、案名、預算、截止日、決標方式\n- **決標資料**：得標者、得標金額、底價、投標家數\n- **未得標者資料**：公司名、投標金額、評分排名、總分、落選原因\n- **評委名單**（僅公開評選案件，詳見下節）\n\n**欄位比對技巧**：因為欄位名稱不固定，預算金額應用 `:預算金額` 結尾匹配，而非完整 key 比對。其他金額欄位同理。\n\n## 評委資料\n\n**僅限「經公開評選/公開徵求之限制性招標」的決標公告**才有評委資料。最低標案件沒有（無評選委員會），招標中案件也沒有（尚未評選）。\n\n### 實測範例（新北閱讀節 NTCLS114-002）\n\n```json\n{\n  \"evaluation_committee\": [\n    {\n      \"name\": \"陳雪菱\",\n      \"status\": \"已退休\",\n      \"sequence\": \"1\",\n      \"attendance\": \"是\",\n      \"experience\": \"國立台灣大學圖書資訊系教授\"\n    },\n    {\n      \"name\": \"林昱美\",\n      \"status\": \"已退休\",\n      \"sequence\": \"2\",\n      \"attendance\": \"是\",\n      \"experience\": \"台大圖書館閱覽組主任兼副館長\"\n    }\n  ]\n}\n```\n\n### 欄位說明\n\n| 欄位 | 說明 |\n|------|------|\n| name | 姓名 |\n| status | 身份（已退休/公務人員/學者等） |\n| sequence | 委員序號 |\n| attendance | 是否出席 |\n| experience | 經歷（服務機關、職稱、所任工作） |\n\n## 分析能力矩陣\n\n| 分析類型 | 可行性 | 使用端點 | 備註 |\n|---------|--------|----------|------|\n| 競爭對手得標率 | 可做 | searchbycompanyname | 大員洛川 139 筆 |\n| 機關-廠商偏好 | 可做 | listbyunit + tender | |\n| 價格競爭力 | 可做 | tender detail | 含每家投標金額 |\n| 類別市場分析 | 可做 | searchbytitle | 食農教育 847 筆 |\n| 評委交叉比對 | 可做 | searchbytitle + tender | 需逐筆爬詳情 |\n| 評委-廠商相關性 | 可做 | 同上 | 需建三維矩陣 |\n| 評委個別評分 | 不可做 | — | API 只有最終結果 |\n| 非公開評選的評委 | 不可做 | — | 最低標案件無評委 |\n\n### 評委交叉比對實作流程\n\n```\n1. searchbytitle(\"食農教育\") → 847 筆\n2. 篩選「決標公告」→ ~300-400 筆\n3. 逐筆 tender detail → 擷取評委名單（需節流，每秒 1-2 次）\n4. 建立 評委-機關-得標廠商 三維矩陣\n5. 分析維度：\n   a. 某評委出現在哪些機關（機關偏好）\n   b. 某評委在場時哪家公司得標率高（廠商相關性）\n   c. 某機關是否固定用同一批評委（評委班底）\n```\n\n預估時間：300 筆 × 0.5 秒 ≈ 3 分鐘/類別\n\n## PCC API 在系統中的定位\n\nPCC API 負責硬數據（數字、名單、投標紀錄），Perplexity 負責軟情報（政策脈絡、新聞、產業分析）。兩者互補：\n\n| 要查的東西 | Perplexity 盲搜 | PCC API 直接給 |\n|---|---|---|\n| 機關近 3 年同類標案 | 不完整、可能遺漏 | searchbytitle + 篩機關 |\n| 得標者/金額/投標家數 | 只查得到部分 | tender 決標資料，精確到元 |\n| 未得標者名單 | 幾乎查不到 | API 直接提供（含金額、排名、原因） |\n| 評委名單 | 查不到 | API 有（如案件有公佈） |\n| 競爭對手全部投標紀錄 | 只能一家一家搜 | searchbycompanyname 一次拉完 |\n| 大員洛川自身紀錄 | 手動拼湊 | searchbycompanyname → 139 筆 |\n| 機關政策脈絡/新聞 | 擅長 | 無此資料 |\n| 競爭者公司背景 | 擅長 | 只有投標紀錄 |\n| 地方政治/產業脈絡 | 擅長 | 無此資料 |\n\n## PCC MCP Server（已建成）\n\n位置：`pcc-api-mcp/`，6 個工具：\n\n| 工具名 | 說明 |\n|--------|------|\n| search_tender | 按標題搜尋標案 |\n| search_company | 搜尋公司投標紀錄 |\n| list_agency_tenders | 列出機關標案 |\n| get_tender_detail | 取得標案詳情（含評委） |\n| list_agencies | 列出機關代碼 |\n| get_api_info | 取得 API 系統資訊 |\n\n原碎片建議的 `analyze_competitor` 和 `analyze_evaluators` 屬於高階分析工具，規劃在情報模組（M01）的 analysis 層實作，不放在 MCP。\n\n## 分頁\n\n- 每頁 100 筆（`page` 從 1 開始）\n- `total_records` / `total_pages` 提供分頁資訊\n- 大員洛川：139 筆 = 2 頁\n\n## 大員洛川相關\n\n- **統一編號**：`89170941`\n- **名稱變體**：\n  - `大員洛川股份有限公司`\n  - `大員洛川股份有限公司 (Tailok-Coop Co., Ltd.)`\n- **搜尋方式**：`searchbycompanyname?query=大員洛川`\n- **紀錄數**：139 筆（截至 2026-02-18）\n- **實測分布**：page 2 樣本中得標 1 筆（唯一投標者）、未得標 39 筆\n- **常見機關**：屏東縣政府、苗栗縣政府、花蓮縣政府、桃園市政府文化局、國立故宮博物院\n- **常見類別**：食農教育、文化展覽、教育推廣\n\n## 已知限制\n\n1. **Rate limit**：短時間密集呼叫會被 429，建議每次請求間隔 300ms\n2. **雲端 IP 被封**：GitHub Actions 等雲端 IP 會被 403，只能從本地或自有 server 呼叫\n3. **HTTP 200 回 HTML 錯誤頁 = 端點不存在**（伺服器不回 404 status code）\n4. **部分端點不穩定**：`/searchbyaward` 和 `/searchbyunit` 偶爾回 HTML 而非 JSON，需做錯誤處理\n5. **資料有時間差**：來自政府電子採購網，非即時同步（已建立 `pcc-monitor/` 用 GAS 每小時監控更新延遲）\n6. **標案詳情結構不固定**：不同案件的欄位名稱可能不同，需用結尾匹配方式找 key\n7. **Python urllib 預設 User-Agent 會被 403**：用 curl 或加自訂 User-Agent\n8. **搜尋

只吃名稱不吃統編**：無法用統編直接搜尋，但搜尋結果中包含統編\n9. **不同資料源記錄數不一致**：openfun API 與 mlwmlw.org 的同一家公司記錄數可能不同。金額分析用 mlwmlw，行為分析用 openfun\n","app-docs/dev-plan/A02-投標廠商分析流程.md":"---\nversion: \"1.0\"\nupdated: \"2026-02-21\"\nstatus: \"草案\"\ndepends: [\"A01-PCC-API-參考\"]\nchangelog:\n  - \"1.0 (2026-02-21): 整合模型委員會審查——教訓根因分類、5 個新增流程步驟、報告使用指引、降級策略\"\n  - \"0.1 (2026-02-20): 初版建立，含分析流程、11 章結構、史多禮教訓、與 M01 關係\"\n---\n\n# A02 投標廠商分析流程\n\n## 分析流程\n\n1. **使用者指定分析對象**（公司名稱 + 統編）\n2. **Claude 產出 Perplexity 提示詞模板**\n3. **使用者跑 Perplexity 深度搜尋**，回傳結果\n4. **Perplexity 結果品質評估**（v1.0 新增）：核心維度有沒有回答到？競爭者附了幾家統編？缺失維度標記\n5. **名稱變體處理**（v1.0 新增）：從 Perplexity 和商工登記收集所有歷史名稱，分別搜尋 PCC，用統編去重\n6. **Claude 拉 PCC 數據**（searchbycompanyname）+ 整合產出 11 章報告\n7. **數據覆蓋度自檢**（v1.0 新增）：逐章列出結論依賴的數據來源，只有 PCC 的標記「證據強度：弱」\n8. **盲區清單**（v1.0 新增）：每次分析必須明確寫出「沒能覆蓋的面向」\n9. **定性反事實測試**（v1.0 新增）：遮掉公司名字只看數據，能否推出同樣的定性結論？\n\n詳細執行指示見：`bidding-assistant/docs/投標廠商分析-指示.md`\n\n## 報告架構（11 章）\n\n| 章 | 名稱 | 核心產出 |\n|----|------|---------|\n| 1 | 公司定性 | 一句話定性 + 維度表（本質、品牌、商業模式、護城河） |\n| 2 | 團隊結構 | 創辦人背景、核心成員、運作模式、關鍵人物依賴度 |\n| 3 | 營收與商業模式 | 年度標案營收表、非標案收入盤點、營收結構 |\n| 4 | 品質實證 | 獎項、出版品、展覽成果、品牌影響力、外部評價 |\n| 5 | 利基市場定位 | 核心市場表、產業結構、政府預算趨勢 |\n| 6 | 競爭力評估 | SWOT（含數據佐證，必須用表格呈現） |\n| 7 | 競爭者比較 | 競爭者名冊、能力對比、標案交叉比對、威脅排序 |\n| 8 | 關聯企業分析 | 關聯圖譜、資源共享、聯合投標紀錄（無關聯企業則省略） |\n| 9 | 競爭策略研判 | 差異化切入點、老客戶滲透路徑 |\n| 10 | 風險訊號 | 履約爭議、訴訟、政策風險、AI 衝擊等 |\n| 11 | 關鍵數字速查 | 單一彙總表（供快速決策） |\n\n各章完整子項目和格式要求見指示文件。\n\n### 報告使用指引（v1.0 新增）\n\n| 決策場景 | 最關鍵章節 | 用法 |\n|---------|-----------|------|\n| 投不投？ | 5（市場）+ 6（SWOT）+ 9（策略） | 三章交叉判斷勝算 |\n| 怎麼投？ | 9（策略）+ 7（競爭者） | 找差異化切入點 |\n| 報價多少？ | 3（營收）+ 7（競爭者） | 參考歷年決標金額 |\n\n### 報告有效期\n\n建議 3-6 個月。觸發重新執行條件：\n- 重大政策變動（如政府預算大幅調整）\n- 目標市場結構變化（新進大型競爭者）\n- 超過 6 個月未更新\n\n## 報告自檢清單（v1.0 新增）\n\n每個分析錯誤對應一條檢查項：\n\n| # | 檢查項 | 防止的錯誤 |\n|---|--------|-----------|\n| 1 | 定性結論有 Perplexity 佐證？ | 定性判斷錯誤（史多禮教訓 #1） |\n| 2 | 營收有列出非標案收入？ | 營收低估（教訓 #2） |\n| 3 | 品質欄位有硬證據（獎項/出版品）？ | 品質用猜的（教訓 #3） |\n| 4 | 有查商工登記的代表人？ | 遺漏關聯企業（教訓 #4） |\n| 5 | 有查主要客戶機關的預算趨勢？ | 遺漏政策風險（教訓 #5） |\n| 6 | 全樣本分析（不切年度小片段）？ | 洞見自相矛盾 |\n| 7 | SWOT 用表格呈現？ | 文字變多資訊變少 |\n\n## 降級策略（v1.0 新增）\n\nPerplexity 搜不到或 PCC 資料不足時，各章的處理方式：\n\n| 章 | 資料不足時 | 處理 |\n|----|-----------|------|\n| 1 公司定性 | 無 Perplexity 結果 | 只用 PCC 數據做「標案行為側寫」，明確標註「非完整定性」 |\n| 3 營收 | 無非標案資訊 | 只列標案營收，備註「實際營收可能更高」 |\n| 4 品質實證 | 搜不到獎項 | 跳過，不捏造 |\n| 7 競爭者 | 競爭者也查不到資料 | 只列 PCC 撞單次數，不做深度比較 |\n| 8 關聯企業 | 商工登記查不到 | 跳過，備註「未確認」 |\n| 全局 | 多章數據不足 | 報告開頭加「數據覆蓋度：低」警告 |\n\n## 教訓根因分類（v1.0 新增）\n\n史多禮五個錯誤背後有三個結構性根因：\n\n1. **資訊不足 + 判斷偏誤**（錯誤 1、3）：只有 PCC 數據時，AI 會用不充分的數據硬下定性結論\n2. **PCC 覆蓋範圍有結構性盲區**（錯誤 2、4）：不含非政府收入、不含關聯企業圖譜\n3. **分析框架缺宏觀環境掃描**（錯誤 5）：沒有政策預算趨勢檢查步驟\n\n流程中的 5 個新增步驟（品質評估、名稱變體、覆蓋度自檢、盲區清單、反事實測試）就是針對這三個根因的防護。\n\n## 與 M01 情報模組的關係\n\n| | A02 深度分析 | M01 對手側寫（規劃中） |\n|---|---|---|\n| 觸發方式 | 人工指定 + Perplexity 介入 | 全自動（純 PCC 數據） |\n| 耗時 | 30-60 分鐘 | 秒級回應 |\n| 產出 | 11 章完整報告 | 撞單次數、機關勝率等速查 |\n| 適用時機 | 決定投標前的深度研究 | 瀏覽案件時快速了解對手 |\n\n對手側寫的數據是深度分析的子集（僅 PCC 部分）。兩者互補，不重疊。\n\n## 史多禮案例教訓（首次驗證，統編 42666702）\n\n> **適用範圍**：以下教訓來自文化/媒體類廠商（網上資料豐富）。分析資料稀少的廠商（如工程、IT 外包）時，可能遇到不同類型的盲區——Perplexity 找不到資料時，以下第 1-4 條教訓無法以同樣方式驗證。\n\n### 分析錯誤\n\n1. **定性判斷錯誤**：沒有 Perplexity 時，把史多禮定性為「工作室」，實際上是「故事 StoryStudio」媒體品牌公司（33.9 萬粉絲）\n2. **營收低估**：只算標案收入（7,271 萬），忽略媒體/出版/教育等非標案收入（推估佔 30-50%）\n3. **品質用猜的**：從「回頭客多」推論品質好，實際上有金鼎獎兩屆得獎的硬證據\n4. **遺漏關聯企業**：完全沒發現臺灣吧（臺灣各種吧股份有限公司）的關聯，同一代表人蕭宇辰\n5. **遺漏政策風險**：114 年文化預算大砍（刪 11 億凍 34 億），主要客戶機關全部受影響\n\n### 方法論準則\n\n- 洞見分析不能年度小切片（2-5 筆/格）→ 結論自相矛盾 → 全樣本才有意義\n- 禁用戲劇化用語（被批「打選戰」）\n- 人稱統一用公司名或「他們」，不要你/他交替\n- SWOT 表格不能丟，「文字變多資訊變少」= 退步\n\n## 技術備忘\n\n- 大量數據處理寫 .mjs 腳本跑，不用 `node -e`（escape 問題）\n- PCC API 技術細節見 A01\n","app-docs/dev-plan/M01-情報模組.md":"---\nversion: \"1.1\"\nupdated: \"2026-02-20\"\nstatus: \"定案\"\ndepends: [\"02-核心架構\", \"03-技術選型\", \"A01-PCC-API-參考\"]\nchangelog:\n  - \"1.1 (2026-02-20): 新增 Notion 整合規劃（暫緩）、Notion 資料結構附錄、自建 Notion MCP 規格附錄（暫緩）\"\n  - \"1.0 (2026-02-18): 初版建立，完整技術規格\"\n---\n\n# M01 情報模組（Intelligence Module）\n\n## 定位\n\n情報模組 = **戰略分析的數據引擎**，供給 L1 所需的所有硬數據。\n系統的「眼睛」——看不清對手就打不準。\n\n## 資料來源\n\n| 來源 | 狀態 | 用途 |\n|------|------|------|\n| g0v PCC API（詳見 A01） | 已就緒 | 標案搜尋、競爭分析、評委比對 |\n| Notion 案件資料庫 | **暫緩整合** | 案件管理、知識庫查詢（目前用 Claude 內建 Notion MCP 即可） |\n\n暫緩原因：Claude.ai 內建的 Notion MCP 已能滿足目前需求，自建版本延後到多 agent 協作（GPT/Gemini 也需要存取 Notion）的階段再啟動。\n\n## 資料夾結構\n\n```\nsrc/\n├── app/\n│   ├── api/pcc/route.ts                    ← PCC API 代理（中間層）\n│   └── intelligence/page.tsx               ← 情報模組主頁面\n├── lib/intelligence/\n│   ├── types.ts                            ← 型別定義\n│   ├── constants.ts                        ← 常數（API URL、統編、快取 TTL）\n│   ├── pcc-client.ts                       ← 前端 → /api/pcc 封裝\n│   ├── helpers.ts                          ← 純函式（統編比對、角色解析、關鍵詞提取）\n│   ├── cache.ts                            ← localStorage 快取（TTL 自動清理）\n│   ├── analysis/\n│   │   ├── competitor-analysis.ts          ← 競爭對手頻率/勝率/擅長領域\n│   │   ├── agency-analysis.ts              ← 機關偏好/在位者護城河\n│   │   ├── market-analysis.ts              ← 預算趨勢/投標家數/紅海藍海\n│   │   ├── self-analysis.ts                ← 大員洛川自我分析\n│   │   ├── committee-analysis.ts           ← 評委人脈網路\n│   │   └── index.ts\n│   ├── scout-report.ts                     ← P 偵察報告 prompt 自動產生\n│   ├── useIntelligence.ts                  ← 搜尋 Hook\n│   ├── useCompetitorReport.ts              ← 競爭分析 Hook（含進度追蹤）\n│   ├── useSelfAnalysis.ts                  ← 自我分析 Hook\n│   ├── index.ts\n│   └── __tests__/\n├── components/intelligence/\n│   ├── IntelligenceDashboard.tsx            ← 主面板（Tab 切換）\n│   ├── SearchPanel.tsx                     ← 搜尋（案名/機關/廠商）\n│   ├── TenderTable.tsx                     ← 標案列表表格\n│   ├── TenderDetail.tsx                    ← 單筆詳情\n│   ├── CompetitorReport.tsx                ← 競爭對手報告\n│   ├── AgencyReport.tsx                    ← 機關分析\n│   ├── MarketTrends.tsx                    ← 趨勢圖表（recharts）\n│   ├── SelfAnalysis.tsx                    ← 自我分析\n│   ├── CommitteeNetwork.tsx                ← 評委網路\n│   ├── ScoutReportGenerator.tsx            ← P 偵察 prompt 產生器\n│   └── ProgressIndicator.tsx               ← 多步驟進度條\n```\n\n## 需修改的現有檔案\n\n| 檔案 | 修改內容 |\n|------|---------|\n| `src/lib/modules/feature-registry.ts` | 新增 `intelligence` feature |\n| `src/lib/settings/types.ts` | 新增 `IntelligenceSettings` + `AppSettings.intelligence?` |\n| `src/lib/settings/defaults.ts` | 新增 `intelligence` 預設值 |\n\n## 核心設計\n\n### 1. API Route（/api/pcc）\n\nPOST method，body 中 `action` 分流：\n- `searchByTitle` / `searchByCompany` / `listByUnit` / `tenderDetail` — 單次查詢\n- `fetchAllPages` — 伺服器端自動翻頁到底（交叉比對基礎）\n- `batchCompanySearch` — 批次查多家廠商\n\n翻頁間 300ms 延遲，上限 20 頁。\n\n### 2. 統編優先原則\n\n- **主要識別**：統編（8位數字）→ 所有交叉比對、統計、分組用統編做 key\n- **輔助顯示**：名稱正規化（去英文括號、空白）→ 只用於 UI 顯示\n- 大員洛川統編：`89170941`\n- `companyId → displayName` 映射表在分析過程中自動累積\n\n### 3. 角色解析\n\n從 `brief.companies.name_key` 和 `id_key` 解析：\n- `得標廠商N:得標廠商` → winner\n- `未得標廠商N:未得標廠商` → loser\n- `投標廠商:投標廠商N` → bidder\n\n### 4. 五大交叉比對分析\n\n#### 4a. 競爭對手分析\n- 輸入：大員洛川所有紀錄（139 筆）\n- 處理：遍歷決標公告 → 以統編為 key 統計\n- 產出：對手排行（撞案次數、勝率、擅長領域、偏好機關）\n- 門檻：撞案 >= 2 次\n\n#### 4b. 機關偏好分析\n- 輸入：指定機關歷史標案\n- 產出：在位者（連續得標 >= 2 次）、平均投標家數、我方紀錄\n\n#### 4c. 市場趨勢分析\n- 輸入：同類標案搜尋結果\n- 產出：按年度彙整案件數、投標家數趨勢、紅海/藍海判斷\n\n#### 4d. 自我分析\n- 輸入：大員洛川所有紀錄\n- 產出：按機關/年度/領域分類、勝率、對手排行、落選原因統計\n\n#### 4e. 評委分析\n- 輸入：逐案 tenderDetail（按需查詢）\n- 產出：評委出現頻率、關聯機關、專長\n\n### 5. P 偵察報告整合\n\n輸入案件資訊 + 分析結果 → 輸出可直接貼入 Perplexity 的 prompt：\n- 硬數據已預填\n- Perplexity 只需補軟情報\n\n### 6. 快取策略\n\n| 資料類型 | TTL | 理由 |\n|---------|-----|------|\n| 搜尋結果 | 4 小時 | 每天有新案 |\n| 自家紀錄 | 24 小時 | 更新頻率低 |\n| 標案詳情 | 7 天 | 決標後不變 |\n| 分析報告 | 12 小時 | 衍生計算 |\n\n儲存：localStorage + 自動清理過期 + 手動清除按鈕。\n\n### 7. Feature Registry\n\n```typescript\n{\n  id: \"intelligence\",\n  name: \"標案情報\",\n  description: \"政府標案情報蒐集與競爭分析\",\n  icon: \"🔍\",\n  routes: [\"/intelligence\"],\n  section: \"core\",\n  defaultEnabled: true,\n}\n```\n\n### 8. Settings\n\n```typescript\nintelligence?: {\n  companyTaxId: string;          // \"89170941\"\n  companySearchName: string;     // \"大員洛川\"\n  minEncounterThreshold: number; // 2\n  requestDelayMs: number;        // 300\n}\n```\n\n## UI 設計（6 個 Tab）\n\n| Tab | 功能 |\n|-----|------|\n| 搜尋 | 案名/機關/廠商搜尋 → 結果列表 → 詳情 |\n| 競爭分析 | 對手排行榜 → 展開交手紀錄 |\n| 機關分析 | 在位者護城河、投標家數、我方紀錄 |\n| 市場趨勢 | recharts 圖表 |\n| 自我分析 | 大員洛川全景 |\n| P 偵察 | 一鍵產出預填 prompt |\n\n## 實作分期\n\n### Phase 1：基礎建設\ntypes.ts, constants.ts, /api/pcc/route.ts, pcc-client.ts, helpers.ts + test, cache.ts + test, feature-registry + settings\n\n### Phase 2：搜尋功能 + 頁面\nuseIntelligence.ts, SearchPanel, TenderTable, TenderDetail, page.tsx, IntelligenceDashboard\n\n### Phase 3：交叉比對分析\n5 個 analysis 模組 + test, hooks, UI 元件, ProgressIndicator\n\n### Phase 4：P 偵察整合 + 進階\ncommittee-analysis, scout-report, ScoutReportGenerator, CommitteeNetwork\n\n### Phase 5：Notion 整合（暫緩）\n\n> 暫緩原因：Claude.ai 內建 Notion MCP 已能滿足目前的案件查詢和知識庫搜尋需求。等到產品層多 agent 協作（GPT/Gemini 也需要存取 Notion）啟動時再開發。\n\n預定內容：\n- 案件資料庫整合（案件狀態同步、截標日提醒）\n- 知識庫查詢介面（團隊資料、實績、SOP）\n- 案件產物存取（L1-L8 產出的讀寫）\n\n詳細規格見附錄 B。\n\n---\n\n## 附錄 A：Notion 案件資料庫結構\n\n> 來源：Notion API 回應解析，供未來 Notion 整合參考。\n\n**Collection ID**: `14cc71c7-7278-81cf-8521-000b97d017d1`\n\n### 資料庫架構\n\n| 資料庫 | Views 數量 | 用途 |\n|--------|-----------|------|\n| 主資料庫（Main DB） | 2 | 資料檢查表、全欄位瀏覽 |\n| 子資料庫 DB1 | 5 | 備標中/第二順位/第三順位/時間軸/待確認協作 |\n| 子資料庫 DB2 | 4 | 看板/行事曆（應啟動日/備標期限/截標時間） |\n\n### 主要 View 功能摘要\n\n- **資料檢查表**：找出資料不完整的案件（空欄位或標記「有問題」）\n- **備標中案件**：截標日未到 + 第一順位 + 確定協作 + 未完稿\n- **看板**：按備標決策分組的卡片（入選→領標→封標→各順位）\n- **三個行事曆**：分別按應啟動日、備標期限、截標時間顯示\n\n### 已知欄位清單\n\n**核心欄位**：標案名稱(title)、招標機關(text)、案號(text)、案件唯一碼、歸檔號、預算金額(number)\n\n**時間欄位**：截標時間(date)、備標期限、公告日、應啟動日\n\n**狀態欄位**：\n- 標案進程(status): To-do / In progress / Complete / 競標階段 / 已出席簡報 / 已投標\n- 備標決策(select): 入選 / 第一順位案件 / 第二順位案件 / 第三順位案件 / 請行政人員領標填印 / 請行政人員封標交寄\n- 決標公告(select): 決標歸檔 / ...\n- 備標進度(multi_select): 建議書完稿 / ...\n\n**分類欄位**：標案類型(multi_select)、檔案型態(select)、評審方式、決標方式、電子投標\n\n**人員/協作欄位**：企劃主筆、企劃註記(select)、確定協作(checkbox)、檢新人員、資料有問題(checkbox)\n\n**標記欄位**：逾期、不參與投標、第一/二/三順位、企劃完成、標單已交遞、分析作業完成、投標地址\n\n共 89 個欄位，以上為從 views 的 filter/display 中提取的部分。完整欄位需從 Notion API 的 `retrieve database` 端點取得。\n\n---\n\n## 附錄 B：自建 Notion MCP Server 規格（暫緩）\n\n> **狀態：暫緩**。Claude.ai 內建的 Notion MCP 已能滿足現階段需求。此規格保留供未來啟動參考。\n>\n> **啟動條件**：產品層多 agent 協作上線，GPT/Gemini 也需要存取 Notion 資料時。\n\n### 為什麼要建\n\n- 雲端 Notion MCP（Claude.ai 連結）只有 Claude 能用\n- Agent Team 的品管官（GPT）、知識官（Gemini）也需要存取 Notion\n- 本地 MCP 走標準協議，三家 CLI 都能用\n- 封裝標案業務邏輯，agent 不需要懂 Notion schema\n\n### 技術規格\n\n```\nnotion-mcp/\n  src/index.ts     ← MCP server（@modelcontextprotocol/sdk + @notionhq/client）\n  dist/index.js    ← 編譯後\n  package.json\n  tsconfig.json\n```\n\n結構同 smugmug-mcp，認證用 env vars（NOTION_TOKEN + 各 database ID），註冊到 `.mcp.json`。\n\n### Notion 資料結構\n\n```\nNotion\n├── 案件資料庫（主庫）\n│   ├── 案號、案名、機關、預算、截標日\n│   ├── 狀態（追蹤中/分析中/寫作中/已投標/結案）\n│   ├── 企劃認領人\n│   ├── L1-L8 進度\n│   └── 備標評估文件（PDF 嵌入）\n│\n├── 知識庫\n│   ├── 00A 團隊資料庫\n│   ├── 00B 實績資料庫\n│   ├── 00C 時程範本庫\n│   ├── 00D 應變 SOP 庫\n│   ├── 00E 案後檢討庫\n│   └── 00F 創意庫\n│\n└── 執行企劃作業流程工作手冊（30 節點）\n```\n\n### 工具清單（15 個）\n\n**一、案件管理（5 個）**：list_cases、get_case、create_case、update_case、list_deadlines\n\n**二、知識庫讀取（5 個）**：kb_search、kb_get_team、kb_get_portfolio、kb_get_sop、kb_get_review\n\n**三、知識庫寫入（2 個）**：kb_add_entry、kb_update_entry\n\n**四、案件上下文存取（3 個）**：save_artifact、get_artifact、list_artifacts\n\n### 與雲端 Notion MCP 的關係\n\n| | 雲端 Notion MCP | 本地 Notion MCP |\n|---|---|---|\n| 定位 | 通用 Notion 操作 | 標案系統專用 |\n| 可用 provider | 只有 Claude | Claude / GPT / Gemini |\n| 業務邏輯 | 無（通用 CRUD） | 有（案件管理、KB 分類、產物存取） |\n| 使用時機 | 開發/除錯時直接操作 Notion | 產品層 agent 日常使用 |\n\n兩者並存不衝突。雲端版用於臨時操作，本地版用於系統自動化。\n\n### 需要的環境變數\n\n```\nNOTION_TOKEN=ntn_xxxxx\nNOTION_CASE_DB_ID=xxx          # 案件資料庫\nNOTION_KB_TEAM_DB_ID=xxx       # 00A 團隊\nNOTION_KB_PORTFOLIO_DB_ID=xxx  # 00B 實績\nNOTION_KB_SCHEDULE_DB_ID=xxx   # 00C 時程\nNOTION_KB_SOP_DB_ID=xxx        # 00D 應變\nNOTION_KB_REVIEW_DB_ID=xxx     # 00E 檢討\nNOTION_KB_CREATIVE_DB_ID=xxx   # 00F 創意\n```\n\n### 開發優先序\n\n1. 案件管理 5 個工具（Phase 5a）\n2. 知識庫讀取 5 個工具（Phase 5b）\n3. 案件上下文 3 個工具（Phase 5b）\n4. 知識庫寫入 2 個工具（Phase 5c，落標學習需要）\n\n### 待確認\n\n- [ ] 各 Notion database 的實際 ID\n- [ ] 案件資料庫的 property schema（欄位名稱、類型）\n- [ ] 知識庫各庫的 property schema\n- [ ] 案件產物要存在 Notion page blocks 裡還是另開 database\n- [ ] 是否需要快取機制（KB 不常變，可減少 API 呼叫）\n","app-docs/dev-plan/M02-知識庫模組.md":"---\nversion: \"0.1\"\nupdated: \"2026-02-27\"\nstatus: \"草案\"\ndepends: [\"02-核心架構\", \"03-技術選型\"]\nchangelog:\n  - \"0.1 (2026-02-27): 初版規格（ITEJ），基於 0226 Jin 儲存決策 + AINL 初始化評估\"\n  - \"0.0 (2026-02-18): 佔位建立\"\n---\n\n# M02 知識庫模組（Knowledge Base Module）\n\n## 定位\n\n知識庫 = **提案寫作的彈藥庫**。沒有知識庫，AI 只能寫空話；有了知識庫，AI 能寫出有公司實績、團隊經歷、具體數據的建議書。\n\n五大知識庫（00A-00E）是提案寫作駕駛艙的核心資產，從 L1 選案到 L8 檢討，每個階段都要從中提取不同內容。\n\n## 現況與遷移\n\n### 已有的（v1 localStorage 版）\n\n| 項目 | 狀態 | 檔案 |\n|------|------|------|\n| 五大類別型別定義 | ✅ 完整 | `src/lib/knowledge-base/types.ts` |\n| 常數 + 分類 | ✅ 完整 | `src/lib/knowledge-base/constants.ts` |\n| CRUD Hook | ✅ 完整 | `src/lib/knowledge-base/useKnowledgeBase.ts` |\n| 純函式（ID 生成、Markdown 渲染、搜尋、統計） | ✅ 完整 | `src/lib/knowledge-base/helpers.ts` |\n| 自訂選項管理 | ✅ 完整 | `src/lib/knowledge-base/useCustomOptions.ts` |\n| KB 頁面 UI | ✅ 完整 | `src/app/knowledge-base/page.tsx` |\n| 測試 | ✅ 有 | `src/lib/knowledge-base/__tests__/` |\n| Feature Registry 註冊 | ✅ 已註冊 | `feature-registry.ts` |\n\n### 要做的（v2 Supabase 版）\n\n將儲存後端從 localStorage 搬到 Supabase，同時保留：\n- 所有型別定義（不動）\n- 純函式（Markdown 渲染、搜尋、統計——不動）\n- UI 元件和頁面（幾乎不動，只改 Hook 引用）\n\n要新增的：\n- Supabase 資料表 schema\n- API routes（CRUD + 搜尋 + 匯入匯出）\n- 後端 Hook（取代 localStorage 的 useKnowledgeBase）\n- 檔案上傳（原始文件存 Supabase Storage）\n- 資料匯入管線（H: 資料夾 33,447 個檔案）\n\n## 儲存決策\n\n> 0226 Jin 直接指示：Notion（現有標案追蹤）+ Supabase（KB + SaaS 認證）+ Web App\n\n| 系統 | 負責什麼 | 為什麼 |\n|------|---------|--------|\n| **Notion** | 案件資料庫（標案追蹤、狀態管理、截標日） | 用戶已在用，數據在那裡 |\n| **Supabase** | 知識庫 00A-00E + SaaS 多租戶認證 | 結構化存取 + Row Level Security + 未來多用戶 |\n| **Web App** | 統一介面層 | 用戶操作入口 |\n| **localStorage** | 降級為離線快取 | 離線時仍可瀏覽，但不再是 SSOT |\n\n## 資料來源\n\n| 來源 | 用途 | 狀態 |\n|------|------|------|\n| H: 共用雲端硬碟（33,447 檔） | 歷史標案文件 → 00A/00B/00C/00E 初始化 | AINL 已完成評估，待 Jin 授權 |\n| 用戶手動輸入 | 團隊資料、SOP 等即時新增 | v1 已支援 |\n| 案後檢討自動回流 | L8 產出 → 00E 自動新增 | 待實作 |\n| SmugMug | 實績照片 → 00B | v1 已有型別定義 |\n\n## Supabase Schema\n\n### 資料表設計\n\n採「一表 + 類別欄位」模式（不拆 5 張表），理由：\n- 跨類別搜尋不需 UNION\n- 類別結構已穩定（00A-00E 不會頻繁增減）\n- 各類別的差異用 JSON `data` 欄位吸收\n\n```sql\n-- 知識庫主表\nCREATE TABLE kb_entries (\n  id          UUID DEFAULT gen_random_uuid() PRIMARY KEY,\n  tenant_id   UUID NOT NULL REFERENCES auth.users(id),    -- 多租戶隔離\n  category    TEXT NOT NULL CHECK (category IN ('00A','00B','00C','00D','00E')),\n  entry_id    TEXT NOT NULL,       -- 人類可讀 ID（M-001, P-2025-001, T-EXH 等）\n  status      TEXT NOT NULL DEFAULT 'active' CHECK (status IN ('active','draft','archived')),\n  data        JSONB NOT NULL,      -- 各類別的完整欄位（結構由 TypeScript types 保證）\n  search_text TEXT GENERATED ALWAYS AS (\n    COALESCE(data->>'name','') || ' ' ||\n    COALESCE(data->>'projectName','') || ' ' ||\n    COALESCE(data->>'templateName','') || ' ' ||\n    COALESCE(data->>'riskName','') || ' ' ||\n    COALESCE(data->>'title','') || ' ' ||\n    COALESCE(data->>'client','')\n  ) STORED,                        -- 全文搜尋用\n  created_at  TIMESTAMPTZ DEFAULT now(),\n  updated_at  TIMESTAMPTZ DEFAULT now(),\n  UNIQUE (tenant_id, category, entry_id)\n);\n\n-- 索引\nCREATE INDEX idx_kb_tenant_category ON kb_entries(tenant_id, category);\nCREATE INDEX idx_kb_search ON kb_entries USING gin(to_tsvector('simple', search_text));\n\n-- RLS\nALTER TABLE kb_entries ENABLE ROW LEVEL SECURITY;\nCREATE POLICY \"Users can only access own entries\"\n  ON kb_entries FOR ALL\n  USING (tenant_id = auth.uid());\n```\n\n### 知識庫元資料表\n\n```sql\n-- 各租戶的 KB 設定與統計\nCREATE TABLE kb_metadata (\n  tenant_id   UUID PRIMARY KEY REFERENCES auth.users(id),\n  version     INT NOT NULL DEFAULT 1,\n  last_synced TIMESTAMPTZ,\n  settings    JSONB DEFAULT '{}'::jsonb,  -- 自訂選項等\n  created_at  TIMESTAMPTZ DEFAULT now(),\n  updated_at  TIMESTAMPTZ DEFAULT now()\n);\n\nALTER TABLE kb_metadata ENABLE ROW LEVEL SECURITY;\nCREATE POLICY \"Users can only access own metadata\"\n  ON kb_metadata FOR ALL\n  USING (tenant_id = auth.uid());\n```\n\n### 附件儲存\n\n```sql\n-- 原始文件（Word/PDF/Excel）的索引\nCREATE TABLE kb_attachments (\n  id          UUID DEFAULT gen_random_uuid() PRIMARY KEY,\n  tenant_id   UUID NOT NULL REFERENCES auth.users(id),\n  entry_id    UUID REFERENCES kb_entries(id) ON DELETE SET NULL,\n  filename    TEXT NOT NULL,\n  storage_path TEXT NOT NULL,      -- Supabase Storage path\n  mime_type   TEXT NOT NULL,\n  size_bytes  BIGINT NOT NULL,\n  created_at  TIMESTAMPTZ DEFAULT now()\n);\n\nALTER TABLE kb_attachments ENABLE ROW LEVEL SECURITY;\nCREATE POLICY \"Users can only access own attachments\"\n  ON kb_attachments FOR ALL\n  USING (tenant_id = auth.uid());\n```\n\nSupabase Storage bucket: `kb-files`，按 `{tenant_id}/{category}/{filename}` 組織。\n\n## 資料夾結構\n\n```\nsrc/\n├── app/\n│   ├── api/kb/\n│   │   ├── route.ts                    ← KB CRUD API（POST/GET/PATCH/DELETE）\n│   │   ├── search/route.ts             ← 全文搜尋\n│   │   ├── import/route.ts             ← 批量匯入\n│   │   ├── export/route.ts             ← 匯出（JSON/Markdown）\n│   │   └── __tests__/\n│   │       ├── route.test.ts\n│   │       ├── search.test.ts\n│   │       ├── import.test.ts\n│   │       └── export.test.ts\n│   └── knowledge-base/\n│       └── page.tsx                    ← 既有頁面（改用新 Hook）\n├── lib/\n│   ├── knowledge-base/\n│   │   ├── types.ts                    ← 不動\n│   │   ├── constants.ts                ← 不動\n│   │   ├── helpers.ts                  ← 不動\n│   │   ├── useKnowledgeBase.ts         ← 重寫：localStorage → Supabase API\n│   │   ├── useCustomOptions.ts         ← 重寫：localStorage → Supabase\n│   │   ├── kb-client.ts               ← 新增：前端 → /api/kb 封裝\n│   │   ├── offline-cache.ts            ← 新增：離線快取（降級用）\n│   │   └── __tests__/\n│   └── supabase/\n│       ├── client.ts                   ← Supabase client 初始化\n│       ├── types.ts                    ← Supabase 型別（由 CLI 生成）\n│       └── middleware.ts               ← Auth middleware\n```\n\n### 需修改的現有檔案\n\n| 檔案 | 修改內容 |\n|------|---------|\n| `src/lib/settings/types.ts` | 新增 `SupabaseSettings`（URL + anon key） |\n| `src/lib/settings/defaults.ts` | 新增 Supabase 預設值（空字串，需設定） |\n| `.env.local` | 新增 `NEXT_PUBLIC_SUPABASE_URL` + `NEXT_PUBLIC_SUPABASE_ANON_KEY` |\n| `package.json` | 新增 `@supabase/supabase-js` |\n\n## 核心設計\n\n### 1. API Routes（/api/kb）\n\nPOST method，body 中 `action` 分流：\n\n| action | 用途 | 輸入 | 輸出 |\n|--------|------|------|------|\n| `list` | 列出某類別所有條目 | `{ category, status? }` | `KBEntry[]` |\n| `get` | 取得單一條目 | `{ category, entryId }` | `KBEntry` |\n| `create` | 新增條目 | `{ category, data }` | `{ id, entryId }` |\n| `update` | 更新條目 | `{ category, entryId, data }` | `{ ok }` |\n| `delete` | 刪除條目 | `{ category, entryId }` | `{ ok }` |\n| `updateStatus` | 變更狀態 | `{ category, entryId, status }` | `{ ok }` |\n| `stats` | 統計數量 | `{}` | `Record<KBId, { total, active, draft, archived }>` |\n\n### 2. 搜尋 API（/api/kb/search）\n\n```typescript\nPOST /api/kb/search\n{\n  query: string;         // 搜尋關鍵字\n  categories?: KBId[];   // 限定類別（不傳=全部）\n  status?: KBEntryStatus; // 限定狀態\n  limit?: number;        // 預設 50\n  offset?: number;\n}\n→ { results: KBEntry[], total: number }\n```\n\n搜尋使用 PostgreSQL `to_tsvector` 全文搜尋 + `ILIKE` 模糊匹配 fallback。\n\n### 3. 批量匯入 API（/api/kb/import）\n\n```typescript\nPOST /api/kb/import\n{\n  entries: Array<{\n    category: KBId;\n    data: object;        // 對應類別的完整欄位\n  }>;\n  mode: \"append\" | \"replace\";  // append=追加, replace=清空再匯入\n}\n→ { imported: number, errors: Array<{ index: number, error: string }> }\n```\n\n單次上限 500 筆，超過用分頁。replace 模式需額外確認。\n\n### 4. 匯出 API（/api/kb/export）\n\n```typescript\nPOST /api/kb/export\n{\n  format: \"json\" | \"markdown\";\n  categories?: KBId[];    // 不傳=全部\n  status?: KBEntryStatus; // 不傳=只 active\n}\n→ json: KnowledgeBaseData\n→ markdown: { text: string, filename: string }\n```\n\nMarkdown 格式用現有 `renderKBToMarkdown()` 生成——這是 KB → AI context 的核心輸出。\n\n### 5. 離線策略\n\n```\n                                  ┌─────────────────┐\n                                  │   Supabase DB    │  ← SSOT\n                                  └────────┬────────┘\n                                           │\n                                  ┌────────▼────────┐\n                                  │   /api/kb/*      │  ← API layer\n                                  └────────┬────────┘\n                                           │\n                     ┌─────────────────────┼─────────────────────┐\n                     │ online              │ offline              │\n                     ▼                     ▼                     │\n              直接打 API           localStorage cache             │\n              回寫 cache           (readonly, stale ok)          │\n                     │                     │                     │\n                     └─────────────────────┼─────────────────────┘\n                                           ▼\n                                    useKnowledgeBase()\n                                    (統一介面，對 UI 透明)\n```\n\n- 上線時：每次操作都走 API，API 回應後更新 localStorage 快取\n- 離線時：讀快取（唯讀），寫入操作排隊等上線後同步\n- 快取 key：`bidding-assistant-kb-cache`（與 v1 的 `bidding-assistant-knowledge-base` 不同，避免衝突）\n- 快取內容：完整 `KnowledgeBaseData`，TTL 24 小時\n\n### 6. 遷移路徑（v1 → v2）\n\n```\nv1 localStorage 資料  ──→  匯出 JSON  ──→  /api/kb/import  ──→  Supabase\n                                                    ↑\n                                            自動偵測：\n                                            首次登入 Supabase 且\n                                            localStorage 有 v1 資料\n                                            → 提示一鍵遷移\n```\n\n遷移完成後：\n1. localStorage 的 v1 key 標記為 `migrated`\n2. 新的 cache key 接手\n3. UI 完全不變（Hook 介面相同）\n\n### 7. 與其他模組的整合\n\n| 消費者 | 怎麼用 KB | 目前狀態 |\n|--------|----------|---------|\n| **提案組裝（assembly）** | `computeFileList()` 查詢各階段需要哪些 KB → Markdown 注入 prompt | ✅ 已透過 `kb-matrix.ts` 定義 |\n| **排版輸出（output/M06）** | `kb-injector.ts` 解析文件中的 `{{kb:00B:實績}}` 佔位符 → 注入實際內容 | ✅ 已實作 |\n| **品質閘門（M04）** | 檢查建議書引用的實績是否存在於 00B | ⏳ 待整合 |\n| **戰略分析（M03）** | 自我分析時參考 00A 團隊 + 00B 實績 | ⏳ 待整合 |\n| **案後檢討** | L8 產出 → 自動寫入 00E | ⏳ 待實作 |\n\n遷移後這些消費者不需改動——它們讀的是 `KnowledgeBaseData` 型別，不管資料從哪來。\n\n### 8. Feature Registry\n\n已註冊，不需改動：\n\n```typescript\n{\n  id: \"knowledge-base\",\n  name: \"知識庫管理\",\n  routes: [\"/knowledge-base\"],\n  section: \"tools\",\n  defaultEnabled: true,\n}\n```\n\n### 9. Settings 擴充\n\n```typescript\n// src/lib/settings/types.ts\nsupabase?: {\n  url: string;        // NEXT_PUBLIC_SUPABASE_URL\n  anonKey: string;    // NEXT_PUBLIC_SUPABASE_ANON_KEY\n  // 以上兩個走 env vars，settings 裡不存\n}\n\nknowledgeBase?: {\n  syncEnabled: boolean;      // 是否啟用 Supabase 同步（預設 false）\n  cacheMaxAge: number;       // 離線快取 TTL（ms, 預設 86400000）\n  autoMigrate: boolean;      // 是否自動提示 v1→v2 遷移\n}\n```\n\n## UI 設計\n\n### 現有頁面（保留）\n\n知識庫管理頁面已完整：5 個 Tab（00A-00E）、CRUD、搜尋、統計、匯入匯出、Markdown 預覽。\n\n### 新增 UI\n\n| 元件 | 功能 |\n|------|------|\n| 同步狀態指示器 | 右上角顯示 Supabase 連線狀態（🟢 已連線 / 🟡 離線 / 🔴 錯誤） |\n| 遷移精靈 | 首次連線 Supabase 時，檢測 localStorage 資料，引導一鍵遷移 |\n| 設定面板 | 在系統設定頁面新增「知識庫同步」區塊（Supabase URL、啟停同步） |\n\n## 資料匯入管線\n\n基於 AINL 初始化評估（`docs/records/KB-initialization-assessment.md`）：\n\n### 來源數據\n\n```\nH:\\共用雲端硬碟\\專案執行中心\\\n├─ D. 驗收請款期間 ← Phase 1（1 檔，優先）\n├─ E. 案件歸檔     ← Phase 2（2,560 檔）\n├─ C. 執行期間     ← Phase 3（119 檔，可平行）\n├─ B. 備標集中區   ← Phase 4（30,389 檔，分批）\n├─ F. 績效管理     ← 不入庫（公司內部文件）\n└─ G. 展業中心     ← 候選（待用戶審查）\n```\n\n### 匯入流程\n\n```\n原始檔案（Word/PDF/Excel）\n        │\n        ▼\n  ┌──────────────┐\n  │ 1. 去重過濾   │ ← Layer 1: 檔名標記（-複製），Layer 2: 案件編號\n  └──────┬───────┘\n         ▼\n  ┌──────────────┐\n  │ 2. 分類判定   │ ← 根據檔案路徑、案件年度、文件類型判斷歸入哪個 KB\n  └──────┬───────┘\n         ▼\n  ┌──────────────┐\n  │ 3. 內容提取   │ ← Word/PDF → 文字提取 → 結構化欄位\n  └──────┬───────┘\n         ▼\n  ┌──────────────┐\n  │ 4. 寫入 KB    │ ← /api/kb/import（批量，500 筆/次）\n  └──────┬───────┘\n         ▼\n  ┌──────────────┐\n  │ 5. 原始檔存檔 │ ← Supabase Storage（原始 Word/PDF）\n  └──────────────┘\n```\n\n### 匯入腳本位置\n\n`bidding-assistant/scripts/kb-import.ts`（Node.js CLI 工具），不進入 Web App bundle。\n\n### 安全閘\n\n- 匯入前必須確認 Jin 授權（硬性要求，見 CLAUDE.md 資料庫安全規則）\n- 只讀不改原始檔案（H: 資料夾）\n- 每批匯入後驗證：筆數對、無遺漏、結構正確\n- 支援回滾：記錄匯入 batch ID，可一鍵刪除整批\n\n## 實作分期\n\n### Phase 1：Supabase 基礎建設\n\n**產出**：Supabase 專案 + schema + 環境變數 + client\n\n- 建立 Supabase 專案（或用既有的 SaaS 專案）\n- 執行 SQL migration（kb_entries + kb_metadata + kb_attachments + RLS）\n- 安裝 `@supabase/supabase-js`\n- 建立 `src/lib/supabase/client.ts`（Browser + Server client）\n- 設定 `.env.local` 環境變數\n- 測試：連線 + 基本 CRUD\n\n**前置條件**：Jin 確認使用哪個 Supabase 專案（新建 or 既有）\n\n### Phase 2：API Routes + kb-client\n\n**產出**：完整 CRUD API + 前端封裝\n\n- `/api/kb/route.ts`（list / get / create / update / delete / updateStatus / stats）\n- `/api/kb/search/route.ts`（全文搜尋）\n- `/api/kb/import/route.ts`（批量匯入）\n- `/api/kb/export/route.ts`（JSON / Markdown 匯出）\n- `kb-client.ts`（前端封裝，error handling）\n- 測試：每個 action 都有 happy path + error case\n\n### Phase 3：Hook 重寫 + 離線快取\n\n**產出**：useKnowledgeBase v2 + offline-cache\n\n- 重寫 `useKnowledgeBase.ts`：localStorage → kb-client → Supabase\n- 新增 `offline-cache.ts`：API 回應 → localStorage 快取、離線 fallback\n- 重寫 `useCustomOptions.ts`：自訂選項存 kb_metadata\n- UI 不需改（Hook 介面相同）\n- 測試：在線/離線兩種模式\n\n### Phase 4：v1 遷移 + 同步狀態 UI\n\n**產出**：一鍵遷移 + 狀態指示器\n\n- 遷移邏輯：偵測 v1 localStorage → 提示 → 匯入 Supabase → 標記完成\n- 同步狀態指示器元件\n- 設定面板「知識庫同步」區塊\n- 測試：遷移 happy path + 遷移後 v1 資料不再被讀取\n\n### Phase 5：資料匯入管線\n\n**產出**：CLI 匯入工具 + 去重 + 分類\n\n- `scripts/kb-import.ts`（Node.js CLI）\n- 去重邏輯（檔名 + 案件編號 + 可選 hash）\n- 分類邏輯（路徑 → KB 類別）\n- 內容提取（Word → text，PDF → text，Excel → JSON）\n- Supabase Storage 上傳（原始檔案）\n- 測試：用小批量測試資料驗證流程\n\n**前置條件**：Jin 授權存取 H: 資料夾 + Phase 1-2 完成\n\n### Phase 6：跨模組整合\n\n**產出**：M03/M04/案後檢討的 KB 整合\n\n- M04 品質閘門：新增「實績存在性」檢查（引用的 P-xxx 是否在 00B 中存在）\n- M03 戰略分析：讀取 00A 團隊能力 + 00B 實績領域，輔助適配度評分\n- 案後檢討自動回流：L8 結論 → 自動建 00E 條目\n- 測試：每個整合點\n\n## 待確認（需要用戶決定）\n\n| # | 問題 | 影響 | 建議 |\n|---|------|------|------|\n| 1 | Supabase 專案是新建還是共用既有？ | Phase 1 起點 | 新建（KB 專用，未來 SaaS 合併） |\n| 2 | 多租戶認證要現在做還是先 bypass？ | Phase 1 複雜度 | 先用固定 user ID bypass，Phase 4 再接真認證 |\n| 3 | H: 資料夾匯入授權範圍 | Phase 5 進入條件 | 先 Phase 1（D. 驗收），確認流程後再擴 |\n| 4 | 離線模式優先序 | Phase 3 複雜度 | 先不做離線，Phase 3 先做最簡版（無離線 → 有離線） |\n\n## 效益預期\n\n| 指標 | 現況（v1） | 目標（v2） |\n|------|-----------|-----------|\n| 資料持久性 | localStorage（單裝置、易遺失） | Supabase（雲端、有備份） |\n| 多裝置存取 | ✗ | ✓（登入即可） |\n| 資料量上限 | ~5MB（localStorage 限制） | 無實質限制 |\n| 搜尋能力 | 前端字串比對 | PostgreSQL 全文搜尋 |\n| 歷史標案文件 | ✗ | ✓（33K+ 檔案可匯入） |\n| SaaS 就緒 | ✗ | ✓（RLS 多租戶隔離） |\n\n---\n\n## 附錄 A：H: 資料夾匯入評估\n\n詳見 `docs/records/KB-initialization-assessment.md`（AINL，2026-02-26）。\n\n重點：\n- Phase 1（D. 驗收）：1 檔，無風險\n- Phase 2（E. 歸檔）：2,560 檔，中等\n- Phase 3（C. 執行）：119 檔，小\n- Phase 4（B. 備標）：30,389 檔，含 18,710 個 Word（去重後約 17,400）\n\n去重策略詳見 `docs/records/KB-deduplication-strategy.md`（AINL，2026-02-26）。\n\n## 附錄 B：現有 KB 型別結構摘要\n\n```typescript\n// 五大類別\ntype KBId = \"00A\" | \"00B\" | \"00C\" | \"00D\" | \"00E\";\n\n// 00A 團隊：name, title, status, education[], certifications[], experiences[], projects[]\n// 00B 實績：projectName, client, contractAmount, period, entity, role, workItems[], photos[]\n// 00C 時程：templateName, applicableType, budgetRange, durationRange, phases[]\n// 00D SOP：riskName, riskLevel, prevention, responseSteps[]\n// 00E 檢討：projectName, result, bidPhaseReview, executionReview, kbUpdateSuggestions\n\n// 所有類別共有：id, entryStatus, updatedAt\n```\n\n完整定義在 `src/lib/knowledge-base/types.ts`，Supabase 的 `data` JSONB 欄位直接存這些結構。\n\n## 附錄 C：Notion ↔ Supabase 分工\n\n| 需求 | 走 Notion | 走 Supabase |\n|------|-----------|-------------|\n| 案件追蹤（標案進程、截標日、狀態） | ✓ | |\n| 知識庫 CRUD（00A-00E） | | ✓ |\n| 案件 → KB 關聯（某案引用了哪些實績） | | ✓ |\n| 用戶認證 + 多租戶 | | ✓ |\n| 原始文件儲存（Word/PDF） | | ✓（Storage） |\n| 案件備標文件（L1-L8 產出） | 待定 | 待定 |\n\nL1-L8 產出的儲存位置（Notion page blocks vs Supabase）留到 SaaS 架構確定後決定。\n","app-docs/dev-plan/M03-戰略分析引擎.md":"---\nversion: \"0.1\"\nupdated: \"2026-02-22\"\nstatus: \"草案\"\ndepends: [\"00-總論\", \"02-核心架構\", \"03-技術選型\", \"05-工作流程\", \"M01-情報模組\"]\nchangelog:\n  - \"0.1 (2026-02-22): 初版建立——四大功能（適配度評分/決策報告/作戰計畫/組合分析）、資料流、UI 設計、四期分期（ITEJ 策略規劃）\"\n  - \"0.0 (2026-02-18): 佔位建立\"\n---\n\n# M03 戰略分析引擎（Strategic Analysis Engine）\n\n## 定位\n\n戰略分析引擎 = **從標案機會到投標決策的決策中樞**。\n\nM01（情報模組）是眼睛——蒐集硬數據；M03 是大腦——把數據變成判斷。\n\n對應能力 1（00-總論）。解決痛點 7 條：#1 篩案靠感覺、#2 需求沒拆解、#3 沒寫作順序、#19 不懂評委、#20 不了解對手、#21 沒戰略分析、#22 缺企劃架構。\n\n## 核心功能\n\n### 功能 1：案件適配度評分（Fit Scoring）\n\n輸入一筆標案，自動算出「這案子適不適合我們」的分數。\n\n**評分維度**（5 維，各 0-20 分，總分 100）：\n\n| 維度 | 權重 | 資料來源 | 計算邏輯 |\n|------|------|---------|---------|\n| 領域匹配 | 20 | 案名關鍵字 × 00B 實績庫 | 案名關鍵字命中實績數量和相關度 |\n| 機關熟悉度 | 20 | M01 機關情報 × 00B | 在這個機關的投標/得標紀錄 + 在位者分析 |\n| 競爭強度 | 20 | M01 市場趨勢 | 同類案件平均投標家數 + 紅海/藍海判斷 |\n| 規模適合度 | 20 | 預算金額 × 00B 實績規模 | 案件預算 vs 歷史案件金額分布 |\n| 團隊可用性 | 20 | 00A 團隊資料 × 案件需求 | 所需專長是否有人選（人 × 資格 × 經驗） |\n\n**輸出**：\n\n```typescript\ninterface FitScore {\n  total: number;                  // 0-100\n  dimensions: {\n    domain: DimensionScore;       // 領域匹配\n    agency: DimensionScore;       // 機關熟悉度\n    competition: DimensionScore;  // 競爭強度\n    scale: DimensionScore;        // 規模適合度\n    team: DimensionScore;         // 團隊可用性\n  };\n  verdict: \"建議投標\" | \"值得評估\" | \"不建議\" | \"資料不足\";\n  reasons: string[];              // 2-3 句判斷理由\n  redFlags: string[];             // 紅旗警示\n}\n\ninterface DimensionScore {\n  score: number;          // 0-20\n  confidence: \"高\" | \"中\" | \"低\";\n  evidence: string;       // 依據什麼算出來的\n}\n```\n\n**門檻建議**（可調）：\n- ≥ 70 → 建議投標\n- 50-69 → 值得評估\n- < 50 → 不建議\n- 任一維度 confidence = \"低\" 且占比 > 40% → \"資料不足\"\n\n### 功能 2：投標決策報告（Bid Decision Report）\n\n把適配度評分擴展為完整的決策依據文件。\n\n**報告結構**：\n\n```\n一、案件概覽\n  - 基本資訊（案名、機關、預算、截標日、決標方式）\n  - 適配度總分 + 雷達圖\n\n二、競爭態勢\n  - 已知潛在對手（M01 競爭分析）\n  - 各對手的歷史戰績（對手得標率、擅長領域）\n  - 我方 vs 對手的優劣勢比較\n\n三、機關分析\n  - 機關偏好分析（M01 機關情報）\n  - 在位者分析（連續得標者、我方在此機關的紀錄）\n  - 評委分析（如有評委資料：常見評委、偏好風格）\n\n四、風險評估\n  - 紅旗列表（資格不符、實績不足、預算異常、在位者太強）\n  - 每個紅旗的嚴重程度和應對建議\n\n五、決策建議\n  - verdict + 理由\n  - 如果投：勝算評估、建議切入角度\n  - 如果不投：放棄理由、是否值得追蹤\n```\n\n### 功能 3：作戰計畫（Battle Plan）\n\n決定投標後，自動產出結構化的作戰計畫。這是 L1 prompt 的系統輔助——不取代人 + AI 的 L1 對話，而是提前組裝好硬數據讓 L1 更快更準。\n\n**作戰計畫結構**：\n\n```\n一、核心論述（1-2 句）\n  - 我們為什麼是這案子的最佳選擇\n  - 從適配度分析的最強維度推導\n\n二、三大攻略點\n  - 攻略點 1：{從適配度分析推導}\n  - 攻略點 2：{從競爭態勢推導}\n  - 攻略點 3：{從機關偏好推導}\n  - 每個攻略點附上：來源依據 + 可用的知識庫素材\n\n三、評分項目清單（從招標文件拆解）\n  - 自動提取不屬於 M03 範圍（需要讀 PDF = L1 的工作）\n  - M03 提供：該機關過去案件的常見評分模式（M01 數據）\n\n四、團隊配置建議\n  - 從 00A 團隊庫匹配適合人選\n  - 各成員最相關的經歷/實績\n\n五、知識庫調度清單\n  - 00A：需要哪些人的哪些資料\n  - 00B：最相關的實績案例\n  - 00C：適用的時程範本\n  - 00D：需要準備的應變方案\n  - 00E：過去類似案件的檢討\n\n六、P 偵察補充需求\n  - M03 已有的硬數據\n  - 還需要 Perplexity 查的軟情報清單\n  - 自動組裝 P 偵察 prompt（呼叫 M01 的 generateScoutPrompt）\n```\n\n### 功能 4：投標組合分析（Portfolio Optimizer）\n\n同時評估多案時，提供組合建議。\n\n**輸入**：N 筆候選案件（各自已有適配度評分）\n**處理**：\n\n1. 時程衝突偵測（截標日、人力重疊）\n2. 資源負載計算（同時投 M 案需要多少企劃人力）\n3. 期望值排序（適配度分數 × 預算金額 × 歷史得標率近似值）\n4. 人力分配建議（誰負責哪案）\n\n**輸出**：\n\n```typescript\ninterface PortfolioRecommendation {\n  recommended: TenderWithPriority[];    // 建議投的，按優先序\n  conflicts: ConflictPair[];            // 時程/人力衝突\n  dropped: TenderWithReason[];          // 不建議投的\n  totalLoad: number;                    // 預估總人力需求（人天）\n  capacityWarning: string | null;       // 超載警示\n}\n```\n\n## 資料流\n\n```\n                  ┌─────────────────────────────┐\n                  │      M03 戰略分析引擎         │\n                  │                             │\n M01 情報模組 ──→ │  ┌──────────┐               │\n   PCC 搜尋       │  │ 適配度    │               │\n   競爭分析       │  │ 評分引擎  │──→ 決策報告    │\n   機關情報       │  └──────────┘               │\n   市場趨勢       │       ↕                     │\n   評委分析       │  ┌──────────┐               │\n                  │  │ 作戰計畫  │──→ P偵察      │\n 知識庫 ────────→ │  │ 生成器   │    prompt      │\n   00A 團隊       │  └──────────┘               │\n   00B 實績       │       ↕                     │\n   00C 時程       │  ┌──────────┐               │\n   00D 應變       │  │ 組合分析  │──→ 投標組合    │\n   00E 檢討       │  │ 最佳化   │               │\n                  │  └──────────┘               │\n Dashboard ───→  │                             │\n   歷史績效       └─────────────────────────────┘\n```\n\n## 資料夾結構\n\n```\nsrc/lib/strategy/\n  types.ts                    ← 全部型別定義\n  constants.ts                ← 評分權重、門檻、關鍵字詞彙表\n  fit-scoring.ts              ← 適配度評分純函式（5 個維度各一個函式）\n  decision-report.ts          ← 投標決策報告組裝\n  battle-plan.ts              ← 作戰計畫生成\n  portfolio.ts                ← 投標組合最佳化\n  kb-matcher.ts               ← 知識庫匹配（從 KB 找最相關素材）\n  helpers.ts                  ← 共用輔助函式（關鍵字提取、文字比對）\n  useStrategy.ts              ← 主 Hook（串接各功能）\n  useFitScore.ts              ← 適配度評分 Hook\n  useDecisionReport.ts        ← 決策報告 Hook\n  useBattlePlan.ts            ← 作戰計畫 Hook\n  usePortfolio.ts             ← 組合分析 Hook\n  index.ts\n  __tests__/\n    fit-scoring.test.ts\n    decision-report.test.ts\n    battle-plan.test.ts\n    portfolio.test.ts\n    kb-matcher.test.ts\n\nsrc/components/strategy/\n  StrategyDashboard.tsx        ← 主面板\n  FitScoreCard.tsx             ← 適配度分數卡（含雷達圖）\n  FitScoreRadar.tsx            ← 五維雷達圖（recharts RadarChart）\n  DecisionReport.tsx           ← 決策報告面板\n  BattlePlanView.tsx           ← 作戰計畫檢視\n  PortfolioTable.tsx           ← 組合分析表\n  ConflictWarnings.tsx         ← 衝突警示\n  KBMatchList.tsx              ← 知識庫匹配結果\n  TeamSuggestion.tsx           ← 團隊配置建議\n```\n\n## 需修改的現有檔案\n\n| 檔案 | 修改內容 |\n|------|---------|\n| `src/lib/modules/feature-registry.ts` | 新增 `strategy` feature |\n| `src/lib/settings/types.ts` | 新增 `StrategySettings` + `AppSettings.strategy?` |\n| `src/lib/settings/defaults.ts` | 新增 `strategy` 預設值 |\n| `src/app/` | 新增 `strategy/page.tsx` 路由 |\n\n## 核心設計\n\n### 1. Feature Registry\n\n```typescript\n{\n  id: \"strategy\",\n  name: \"戰略分析\",\n  description: \"投標決策支援與作戰計畫\",\n  icon: \"🎯\",\n  routes: [\"/strategy\"],\n  section: \"core\",\n  dependencies: [\"intelligence\"],\n  defaultEnabled: true,\n}\n```\n\n### 2. Settings\n\n```typescript\nstrategy?: {\n  // 適配度權重（5 維各 0-100，歸一化後使用）\n  fitWeights: {\n    domain: number;       // 預設 20\n    agency: number;       // 預設 20\n    competition: number;  // 預設 20\n    scale: number;        // 預設 20\n    team: number;         // 預設 20\n  };\n  // 決策門檻\n  thresholds: {\n    recommend: number;    // 預設 70\n    evaluate: number;     // 預設 50\n  };\n  // 組合分析\n  maxConcurrentBids: number;     // 預設 3（同時投幾案上限）\n  teamCapacityDays: number;      // 預設 60（每月可用企劃人天）\n}\n```\n\n### 3. 適配度評分引擎（核心演算法）\n\n純函式，不碰 API，輸入結構化資料、輸出分數。\n\n#### 3a. 領域匹配（domain）\n\n```typescript\nfunction scoreDomain(\n  tenderTitle: string,\n  tenderKeywords: string[],     // 從案名提取的關鍵字\n  portfolio: KBEntry00B[],       // 實績庫\n): DimensionScore\n```\n\n邏輯：\n1. 從案名提取關鍵字（斷詞：按頓號/逗號/常見分隔 + 業務類型詞彙表）\n2. 對每個關鍵字，在 00B 實績庫搜尋匹配的案件\n3. 匹配數量 + 匹配案件的規模和成果 → 分數\n4. 0 匹配 → 0 分（全新領域）；3+ 匹配且含主要實績 → 滿分\n\n#### 3b. 機關熟悉度（agency）\n\n```typescript\nfunction scoreAgency(\n  agencyIntel: AgencyIntel | null,  // M01 機關情報\n  portfolio: KBEntry00B[],           // 實績庫（機關名稱匹配）\n): DimensionScore\n```\n\n邏輯：\n1. 在此機關有得標紀錄 → 高分\n2. 在此機關有投標紀錄但沒得標 → 中分（至少認識）\n3. 在位者弱（無連續得標者）→ 加分\n4. 在位者強（連續 3+ 次得標）→ 減分\n5. 從未接觸此機關 → 低分但不是 0（新機關也有機會）\n\n#### 3c. 競爭強度（competition）\n\n```typescript\nfunction scoreCompetition(\n  marketTrend: MarketTrend | null,  // M01 市場趨勢\n  bidderCount: number | null,        // 本案已知投標家數\n): DimensionScore\n```\n\n邏輯：\n1. 藍海（平均投標家數 < 3） → 高分\n2. 一般（3-6 家）→ 中分\n3. 紅海（> 6 家）→ 低分\n4. 趨勢減少 → 加分（市場在冷卻）\n5. 實際投標家數優先於市場平均\n\n#### 3d. 規模適合度（scale）\n\n```typescript\nfunction scoreScale(\n  budget: number | null,\n  portfolio: KBEntry00B[],  // 實績庫的金額分布\n): DimensionScore\n```\n\n邏輯：\n1. 計算公司歷史案件金額中位數和 IQR\n2. 預算在 IQR 內 → 滿分\n3. 預算在 1.5×IQR 內 → 中分\n4. 預算超出 2×IQR → 低分（案子太大或太小）\n5. 無預算資料 → confidence = \"低\"\n\n#### 3e. 團隊可用性（team）\n\n```typescript\nfunction scoreTeam(\n  tenderKeywords: string[],\n  team: KBEntry00A[],\n): DimensionScore\n```\n\n邏輯：\n1. 關鍵字匹配團隊成員的專長/認證/經歷\n2. 有 3+ 人匹配 → 滿分\n3. 有 1-2 人匹配 → 中分\n4. 無人匹配 → 低分\n5. 匹配的人中有主管級（計畫主持人資格）→ 加分\n\n### 4. 知識庫匹配器\n\n從五個知識庫中找出與特定標案最相關的素材。\n\n```typescript\nfunction matchKB(\n  tenderTitle: string,\n  tenderKeywords: string[],\n  agencyName: string,\n  kb: KnowledgeBaseData,\n): KBMatchResult\n\ninterface KBMatchResult {\n  team: { entry: KBEntry00A; relevance: string }[];\n  portfolio: { entry: KBEntry00B; relevance: string }[];\n  templates: { entry: KBEntry00C; relevance: string }[];\n  risks: { entry: KBEntry00D; relevance: string }[];\n  reviews: { entry: KBEntry00E; relevance: string }[];\n}\n```\n\n匹配策略（簡單但有效）：\n- 關鍵字匹配：案名關鍵字 vs 各庫 entry 的文字欄位\n- 機關匹配：機關名稱 vs 00B 的 client 欄位\n- 類型匹配：案件類型 vs 00C 的 applicableType\n- 結果匹配：00E 中同機關/同類型案件的檢討\n- 不用向量搜尋（知識庫 < 200 筆，關鍵字就夠）\n\n### 5. 與 M01 的整合介面\n\nM03 不直接呼叫 PCC API。M03 消費 M01 已有的分析結果。\n\n```typescript\n// M03 需要的 M01 資料（由 Hook 在呼叫時組裝）\ninterface IntelligenceInputs {\n  selfAnalysis: SelfAnalysis | null;\n  agencyIntel: AgencyIntel | null;\n  marketTrend: MarketTrend | null;\n  committeeAnalysis: CommitteeAnalysis | null;\n  tenderSummary: TenderSummary | null;\n}\n```\n\n### 6. 與 P 偵察的整合\n\n作戰計畫最後一步呼叫 M01 的 `generateScoutPrompt()`，但補充 M03 分析結果讓查詢更精準。\n\n```typescript\ninterface ScoutEnhancement {\n  fitScore: number;\n  topCompetitors: string[];\n  strategicQuestions: string[];\n  knownStrengths: string[];\n}\n```\n\n## UI 設計\n\n### 主頁面（/strategy）— 兩個視圖\n\n#### 視圖 1：案件評估（預設）\n\n```\n┌──────────────────────────────────────────────┐\n│  [案件選擇器] ← 輸入案名搜尋 or 從 Notion 選  │\n├──────────────┬───────────────────────────────┤\n│              │                               │\n│  適配度雷達圖 │    決策報告                    │\n│  （五維）     │    ├ 競爭態勢                  │\n│              │    ├ 機關分析                   │\n│  verdict:    │    ├ 風險評估                   │\n│  建議投標     │    └ 決策建議                   │\n│              │                               │\n│  [展開作戰   │    作戰計畫（展開後）            │\n│   計畫 →]    │    ├ 核心論述                   │\n│              │    ├ 三大攻略點                  │\n│              │    ├ 團隊配置                   │\n│              │    ├ 知識庫調度                  │\n│              │    └ [產出 P 偵察 prompt →]     │\n├──────────────┴───────────────────────────────┤\n│  底部：知識庫匹配結果（折疊面板）               │\n└──────────────────────────────────────────────┘\n```\n\n#### 視圖 2：組合分析\n\n```\n┌──────────────────────────────────────────────┐\n│  [批次選擇] ← 勾選待評估的案件               │\n├──────────────────────────────────────────────┤\n│  排序表格                                    │\n│  案名 | 適配度 | 預算 | 截標日 | 期望值 | 建議 │\n│  ─────────────────────────────────────────── │\n│  A案   75     120萬  03/15   高     投      │\n│  B案   62     200萬  03/20   中     評估    │\n│  C案   45     80萬   03/22   低     不投    │\n├──────────────────────────────────────────────┤\n│  衝突警示（如有）                             │\n│  ⚠ A案和B案的截標日相隔 5 天，團隊負載偏高    │\n├──────────────────────────────────────────────┤\n│  [儲存組合] [匯出報告]                        │\n└──────────────────────────────────────────────┘\n```\n\n## 實作分期\n\n### Phase 1：適配度評分核心\n\n**產出**：`types.ts` + `constants.ts` + `fit-scoring.ts` + `kb-matcher.ts` + `helpers.ts` + 測試\n\n可獨立測試，不需要 UI。開發機器拿到這個 Phase 就能開始寫。\n\n**驗收標準**：\n- 5 個維度評分函式各自有 ≥ 5 個測試案例\n- KB 匹配器能在空知識庫時正確回傳空結果\n- 總分加權計算正確\n- verdict 門檻判斷正確\n\n### Phase 2：決策報告 + UI 骨架\n\n**產出**：`decision-report.ts` + `useStrategy.ts` + `useFitScore.ts` + `strategy/page.tsx` + FitScoreCard + FitScoreRadar + StrategyDashboard\n\n**依賴**：Phase 1 + M01 已實作的 Hooks\n\n**驗收標準**：\n- 選一筆標案後，雷達圖正確渲染\n- 決策報告結構完整（部分資料為空也不壞）\n- 紅旗自動產生風險警示\n\n### Phase 3：作戰計畫\n\n**產出**：`battle-plan.ts` + `useBattlePlan.ts` + BattlePlanView + TeamSuggestion + KBMatchList\n\n**依賴**：Phase 2 + 知識庫有內容（至少有測試資料）\n\n**驗收標準**：\n- 從決策報告一鍵展開作戰計畫\n- 團隊配置正確匹配 00A 資料\n- P 偵察 prompt 包含 M03 增強資料\n\n### Phase 4：組合分析\n\n**產出**：`portfolio.ts` + `usePortfolio.ts` + PortfolioTable + ConflictWarnings\n\n**依賴**：Phase 2\n\n**驗收標準**：\n- 時程衝突正確偵測\n- 期望值排序正確\n- 人力負載預警正確觸發\n\n## 設計決策\n\n### 為什麼適配度評分用確定性演算法，不用 AI？\n\n1. **可解釋**：每個分數都能說出來源，不是黑箱\n2. **一致性**：同樣的輸入永遠同樣的輸出\n3. **可測試**：純函式 + 單元測試\n4. **速度**：瞬間完成，不需等 API\n5. **成本**：$0\n\nAI 在哪裡？在 L1（戰略分析 prompt）。M03 把硬數據準備好，L1 的 AI 對話負責軟判斷。硬歸硬、軟歸軟。\n\n### 為什麼分數用 0-100 而不是 A/B/C？\n\n- 可以排序、加權、組合計算\n- verdict 標籤（建議投標/值得評估/不建議）是從分數衍生的\n- 使用者可以調整門檻值，不需要改程式\n\n### 為什麼 KB 匹配用關鍵字不用向量搜尋？\n\n- 五個知識庫 entry 總量預估 < 200 筆\n- 關鍵字匹配在此規模已夠準\n- 不增加依賴（無需向量資料庫或 embedding API）\n- 符合設計原則：全部走現有訂閱，額外成本 = $0\n\n### 為什麼 M03 不取代 L1？\n\nM03 是**系統輔助**，L1 是**人 + AI 對話**。兩者互補：\n\n| | M03（系統） | L1（AI 對話） |\n|---|---|---|\n| 輸入 | 結構化數據 | 招標文件 PDF + M03 產出 |\n| 產出 | 數據驅動的評分/報告 | 策略性的分析洞見 |\n| 風格 | 客觀、可重複 | 創意、脈絡感知 |\n| 人參與 | 低（看結果、調權重） | 高（3-5 輪對話） |\n\nM03 做完再進 L1 → L1 不用從頭查數據，直接從策略面切入。\n\n## 技術約束\n\n1. 所有評分邏輯是純函式（`fit-scoring.ts`、`helpers.ts`），不碰 React state\n2. Hook 層負責呼叫 M01 hooks 取得資料，再傳入純函式\n3. 知識庫資料透過 `useKnowledgeBase()` hook 取得\n4. 快取：適配度結果快取在 state 中（非 localStorage），因為依賴即時資料\n5. 評分權重透過 Settings 可調\n6. 所有 UI 文字中文\n7. 遵循 SSOT：常數定義在 `constants.ts`，不硬編碼\n8. Feature Registry 註冊，dependencies 包含 intelligence\n\n## 待確認\n\n- [ ] 知識庫有內容後才能完整測試 domain/team 維度（Phase 1 可用 mock 資料）\n- [ ] 組合分析的「人力需求」估算模型（每案多少人天？目前無歷史資料）\n- [ ] 是否需要將適配度分數回寫到 Notion 案件資料庫（暫緩到 Notion 整合階段）\n- [ ] 評分權重的最佳設定需要投標後的實際結果回饋校準（飛輪第三齒輪）\n- [ ] 關鍵字詞彙表（業務類型對照）需要用戶確認或從歷史案件自動提取\n","app-docs/dev-plan/M04-品質閘門模組.md":"---\nversion: \"0.1\"\nupdated: \"2026-02-22\"\nstatus: \"草案\"\ndepends: [\"00-總論\", \"02-核心架構\", \"M03-戰略分析引擎\"]\nchangelog:\n  - \"0.1 (2026-02-22): 初版建立——三道閘門設計、與現有品質模組關係、需求追溯矩陣、AI 審查整合（ITEJ 策略規劃）\"\n  - \"0.0 (2026-02-18): 佔位建立\"\n---\n\n# M04 品質閘門模組（Quality Gate Module）\n\n## 定位\n\n品質閘門 = **每段 AI 產出經過三道檢查才放行**。\n\n現有的品質檢查模組（`lib/quality/`）是 M04 的**第零道**——文字表面品質。M04 在此基礎上加三道深層檢查，從「有沒有錯字」提升到「有沒有說謊、有沒有回應需求、做不做得到」。\n\n對應能力 4（00-總論）。解決痛點 4 條：#10 AI 幻覺抓不完、#11 AI 不自檢死不認錯、#12 寫完像初稿、#23 AI 創意沒常識。\n\n## 與現有品質模組的關係\n\n```\n現有 lib/quality/         M04 品質閘門（新增）\n─────────────────         ──────────────────\n閘門 0：文字品質           閘門 1：事實查核\n - 禁用詞                  - 知識庫來源追溯\n - 用語修正                - 數據來源驗證\n - 鐵律（數字/日期/預算）   - 幻覺偵測\n - 重複句\n - 承諾風險               閘門 2：需求對照\n - 段落/句子長度            - 評分項目覆蓋率\n - 公司名稱一致性           - 招標條件對應\n                           - 遺漏偵測\n\n                          閘門 3：實務檢驗\n                           - 預算可行性\n                           - 執行能力驗證\n                           - 常識檢查\n```\n\n閘門 0 已實作（`lib/quality/rules.ts`，13 條規則，55 個測試）。M04 專注於閘門 1-3。\n\n## 三道閘門設計\n\n### 閘門 1：事實查核（Fact Check）\n\n> 這段話有來源嗎？數字從哪來的？\n\n**目的**：偵測 AI 幻覺和無來源的宣稱。\n\n**檢查項目**：\n\n| 檢查 | 方法 | 嚴重度 |\n|------|------|--------|\n| 知識庫來源追溯 | 每個事實宣稱必須對應到 00A-00E 的具體 entry | error |\n| 數據來源標記 | 涉及數字的句子必須標記來源（KB/PCC/招標文件） | error |\n| 實績引用驗證 | 提到的實績必須在 00B 中存在 | error |\n| 團隊資歷驗證 | 提到的人員資歷必須與 00A 一致 | error |\n| 虛構偵測 | 模式比對常見 AI 幻覺特徵（見下方） | warning |\n\n**AI 幻覺特徵偵測**（確定性規則，不靠 AI）：\n\n```typescript\nconst HALLUCINATION_PATTERNS = [\n  // 虛構的具體數字（沒有來源但非常具體）\n  { pattern: /提升了?\\s*\\d{2,3}%/, flag: \"具體百分比需要來源\" },\n  // 虛構的調查/研究\n  { pattern: /根據.*調查|研究(指出|顯示|發現)/, flag: \"引用的研究需要具體出處\" },\n  // 過度修飾的無來源主張\n  { pattern: /業界(首創|領先|第一|唯一)/, flag: \"業界定位宣稱需要佐證\" },\n  // 虛構的統計\n  { pattern: /每年(服務|接待|處理).*[萬千百]\\s*(人次?|件|場)/, flag: \"服務量數據需要來源\" },\n];\n```\n\n**知識庫追溯機制**：\n\n```typescript\ninterface SourceAnnotation {\n  sentenceIndex: number;      // 句子序號\n  claim: string;              // 宣稱內容\n  source: KBSourceRef | null; // 來源引用（null = 無來源）\n  confidence: \"verified\" | \"partial\" | \"unverified\";\n}\n\ninterface KBSourceRef {\n  kbId: KBId;         // \"00A\" | \"00B\" | ...\n  entryId: string;    // \"M-001\" | \"P-2025-001\" | ...\n  field: string;      // 哪個欄位\n}\n```\n\n### 閘門 2：需求對照（Requirement Tracing）\n\n> 這段回應了哪個評分項目？有沒有漏掉的？\n\n**目的**：確保建議書覆蓋所有招標需求。\n\n**需求追溯矩陣**：\n\n```typescript\ninterface RequirementMatrix {\n  requirements: Requirement[];         // 從招標文件提取的需求\n  coverage: CoverageResult[];          // 每個需求的覆蓋狀態\n  uncoveredCount: number;              // 未覆蓋數量\n  coverageRate: number;                // 覆蓋率 0-100%\n}\n\ninterface Requirement {\n  id: string;                   // \"R-01\"\n  source: string;               // \"評分項目第3條\" | \"資格條件\"\n  description: string;          // 需求描述\n  weight: number | null;        // 評分權重（如有）\n  category: \"評分\" | \"資格\" | \"交付\" | \"格式\";\n}\n\ninterface CoverageResult {\n  requirementId: string;\n  status: \"covered\" | \"partial\" | \"missing\";\n  coveredBy: string[];          // 哪些章節/段落回應了這個需求\n  gap: string | null;           // 缺口描述\n}\n```\n\n**運作方式**：\n\n1. **需求提取**（半自動）：L1 戰略分析產出需求清單 → 使用者確認/修改 → 存入案件 context\n2. **覆蓋偵測**（自動）：比對建議書各章節與需求清單的關鍵字匹配\n3. **缺口報告**（自動）：列出未覆蓋的需求 + 嚴重程度（評分權重高的優先）\n\n**限制**：需求提取依賴 L1 產出，M04 本身不做招標文件解析。如果沒有需求清單，閘門 2 跳過（不擋人）。\n\n### 閘門 3：實務檢驗（Feasibility Check）\n\n> 預算做得到嗎？時間夠嗎？公司有能力嗎？\n\n**目的**：攔截「聽起來厲害但做不到」的方案。\n\n**檢查項目**：\n\n| 檢查 | 方法 | 嚴重度 |\n|------|------|--------|\n| 預算可行性 | 承諾事項的估算成本 vs 案件預算 | error |\n| 時程可行性 | 承諾時程 vs 合約期間 + 00C 時程範本經驗值 | warning |\n| 團隊能力 | 承諾的人力配置 vs 00A 實際團隊 | warning |\n| 規模合理性 | 承諾規模 vs 00B 歷史實績的規模 | warning |\n| 常識檢查 | 模式比對不合理的方案（見下方） | warning |\n\n**常識檢查規則**（確定性規則）：\n\n```typescript\nconst COMMON_SENSE_RULES = [\n  // AI 常見的不切實際建議\n  { pattern: /AR|VR|元宇宙|區塊鏈/, context: \"budget < 500000\",\n    message: \"預算低於 50 萬的案子不太可能負擔 AR/VR/元宇宙\" },\n  { pattern: /大數據分析/, context: \"participants < 100\",\n    message: \"參與者不到 100 人不需要大數據分析\" },\n  { pattern: /AI\\s*(模型|系統|平台).*開發/, context: \"budget < 1000000\",\n    message: \"自建 AI 系統通常需要百萬以上預算\" },\n  { pattern: /國際(連線|合作|交流)/, context: \"budget < 300000\",\n    message: \"國際合作涉及旅費/翻譯，低預算案件需謹慎\" },\n];\n```\n\n**預算可行性引擎**：\n\n```typescript\ninterface BudgetFeasibility {\n  totalBudget: number;               // 案件預算\n  estimatedCosts: CostItem[];        // 從建議書提取的成本項目\n  totalEstimate: number;             // 估算總成本\n  margin: number;                    // 預算餘裕 %\n  verdict: \"充裕\" | \"合理\" | \"緊繃\" | \"超支\";\n  warnings: string[];\n}\n\ninterface CostItem {\n  description: string;\n  estimatedAmount: number;\n  source: \"explicit\" | \"inferred\";   // 明確寫出 vs 從描述推算\n  confidence: \"高\" | \"中\" | \"低\";\n}\n```\n\n## 整合設計\n\n### 品質報告\n\n三道閘門 + 閘門 0 的結果合併為一份品質報告：\n\n```typescript\ninterface QualityReport {\n  // 閘門 0（現有）\n  textQuality: QualityScore;\n  textIssues: CheckResult[];\n\n  // 閘門 1\n  factCheck: {\n    verifiedClaims: number;\n    unverifiedClaims: number;\n    hallucinations: SourceAnnotation[];\n    score: number;        // 0-100\n  };\n\n  // 閘門 2\n  requirementTrace: {\n    coverageRate: number;\n    uncovered: CoverageResult[];\n    matrix: RequirementMatrix;\n  } | null;               // null = 沒有需求清單\n\n  // 閘門 3\n  feasibility: {\n    budget: BudgetFeasibility | null;\n    timeline: TimelineFeasibility | null;\n    team: TeamFeasibility | null;\n    commonSense: CheckResult[];\n    score: number;\n  };\n\n  // 總評\n  overallScore: number;   // 四道閘門加權平均\n  verdict: \"通過\" | \"有風險\" | \"不建議提交\";\n  criticalIssues: string[];\n}\n```\n\n### 品質報告的使用時機\n\n```\nL1 戰略分析 → 需求清單（閘門 2 的輸入）\n     ↓\nL2 備標規劃 → 預算分配（閘門 3 的輸入）\n     ↓\nL3 企劃草稿 → 【閘門 0+1+2+3 全跑】\n     ↓\n修正 → 再跑 → 通過\n     ↓\nL4 定稿撰寫 → 【閘門 0+1+2+3 全跑】\n     ↓\n提交\n```\n\n每個 L 階段產出後都能跑品質報告，但完整四道閘門在 L3/L4 最有價值。\n\n### 與 M03 的關係\n\n- M03 提供作戰計畫 → 閘門 2 用它作為需求覆蓋的基準\n- M03 的適配度評分中的團隊/規模資料 → 閘門 3 用來驗證可行性\n- 品質報告的結果可以回饋到 M03 的適配度校準（未來飛輪）\n\n## 資料夾結構\n\n```\nsrc/lib/quality-gate/\n  types.ts                    ← 閘門 1-3 型別（不動 lib/quality/ 的型別）\n  constants.ts                ← 幻覺模式、常識規則、閾值\n  fact-check.ts               ← 閘門 1：事實查核純函式\n  requirement-trace.ts        ← 閘門 2：需求追溯純函式\n  feasibility.ts              ← 閘門 3：實務檢驗純函式\n  report.ts                   ← 品質報告組裝（合併 4 道閘門）\n  helpers.ts                  ← 文字提取、句子分割、來源比對\n  useQualityGate.ts           ← 主 Hook\n  index.ts\n  __tests__/\n    fact-check.test.ts\n    requirement-trace.test.ts\n    feasibility.test.ts\n    report.test.ts\n\nsrc/components/quality-gate/\n  QualityGateDashboard.tsx     ← 品質報告主面板\n  GateSummary.tsx              ← 四道閘門摘要卡片\n  FactCheckPanel.tsx           ← 閘門 1 詳細結果\n  RequirementMatrix.tsx        ← 閘門 2 追溯矩陣表\n  FeasibilityPanel.tsx         ← 閘門 3 可行性報告\n  IssueList.tsx                ← 問題清單（統一格式）\n```\n\n**不動現有檔案**：`lib/quality/` 維持原樣（閘門 0），`quality-gate/` 是新增模組。品質報告的 `report.ts` 會 import `lib/quality/` 的函式來整合閘門 0。\n\n## 需修改的現有檔案\n\n| 檔案 | 修改內容 |\n|------|---------|\n| `src/lib/modules/feature-registry.ts` | 新增 `quality-gate` feature |\n| `src/lib/settings/types.ts` | 新增 `QualityGateSettings` + `AppSettings.qualityGate?` |\n| `src/lib/settings/defaults.ts` | 新增 `qualityGate` 預設值 |\n| `src/app/` | 新增 `quality-gate/page.tsx` 路由 |\n\n### Feature Registry\n\n```typescript\n{\n  id: \"quality-gate\",\n  name: \"品質閘門\",\n  description: \"三道品質檢查：事實查核、需求對照、實務檢驗\",\n  icon: \"🛡️\",\n  routes: [\"/quality-gate\"],\n  section: \"tools\",\n  dependencies: [\"quality\"],   // 依賴現有品質模組（閘門 0）\n  defaultEnabled: true,\n}\n```\n\n### Settings\n\n```typescript\nqualityGate?: {\n  // 閘門開關（可個別關閉）\n  gates: {\n    factCheck: boolean;        // 預設 true\n    requirementTrace: boolean; // 預設 true\n    feasibility: boolean;      // 預設 true\n  };\n  // 閾值\n  factCheckThreshold: number;     // 無來源宣稱超過幾個才報 error（預設 3）\n  feasibilityMarginMin: number;   // 預算餘裕低於幾 % 才警告（預設 10）\n  // 總評門檻\n  overallPassThreshold: number;   // 預設 70\n  overallRiskThreshold: number;   // 預設 50\n}\n```\n\n## UI 設計\n\n### 品質閘門頁面（/quality-gate）\n\n```\n┌──────────────────────────────────────────────────┐\n│  品質閘門                                        │\n│  [貼上文字] [選擇案件（載入需求清單）]             │\n├──────────────────────────────────────────────────┤\n│                                                  │\n│  四道閘門摘要                                     │\n│  ┌────────┐ ┌────────┐ ┌────────┐ ┌────────┐    │\n│  │閘門 0  │ │閘門 1  │ │閘門 2  │ │閘門 3  │    │\n│  │文字品質│ │事實查核│ │需求對照│ │實務檢驗│    │\n│  │ 85/100 │ │ 72/100 │ │ 90%   │ │ 68/100 │    │\n│  │ ✅ 通過│ │ ⚠ 風險 │ │ ✅ 通過│ │ ⚠ 風險 │    │\n│  └────────┘ └────────┘ └────────┘ └────────┘    │\n│                                                  │\n│  總評：有風險（2 個關鍵問題需處理）               │\n│                                                  │\n├──────────────────────────────────────────────────┤\n│  [Tab: 事實查核] [Tab: 需求矩陣] [Tab: 可行性]   │\n│                                                  │\n│  事實查核詳細（展開時）                           │\n│  ❌ 第 3 段：「累計服務超過 5000 人次」無來源     │\n│  ❌ 第 7 段：「業界首創的沉浸式體驗」需要佐證     │\n│  ⚠  第 12 段：引用的研究沒有具體出處              │\n│  ✅ 第 15 段：實績 P-2025-001 已驗證              │\n│                                                  │\n│  需求矩陣（展開時）                               │\n│  需求 | 權重 | 狀態 | 覆蓋章節                   │\n│  R-01 | 30%  | ✅   | 第三章第二節               │\n│  R-02 | 20%  | ⚠    | 部分覆蓋（缺時程細節）     │\n│  R-03 | 15%  | ❌   | 未覆蓋                     │\n│                                                  │\n└──────────────────────────────────────────────────┘\n```\n\n## 實作分期\n\n### Phase 1：閘門 1 事實查核\n\n**產出**：`types.ts` + `constants.ts` + `fact-check.ts` + `helpers.ts` + 測試\n\n**驗收標準**：\n- 幻覺模式偵測能正確抓到常見 AI 幻覺（≥ 5 個測試）\n- 知識庫來源比對能匹配到正確的 entry（空 KB 不壞）\n- 來源追溯標記格式正確\n\n### Phase 2：閘門 2 需求追溯 + 閘門 3 可行性\n\n**產出**：`requirement-trace.ts` + `feasibility.ts` + 測試\n\n**驗收標準**：\n- 需求矩陣能正確計算覆蓋率（含 partial）\n- 預算可行性能偵測超支\n- 常識檢查能正確觸發（低預算 + AR = 警告）\n\n### Phase 3：品質報告 + UI\n\n**產出**：`report.ts` + `useQualityGate.ts` + 全部 UI 元件 + 頁面\n\n**依賴**：Phase 1-2 + 現有 lib/quality/\n\n**驗收標準**：\n- 四道閘門結果整合到一份報告\n- 總評分數正確計算\n- 品質不佳時能列出關鍵問題\n\n### Phase 4：與 L 階段整合\n\n**產出**：在 L3/L4 產出流程中嵌入品質閘門觸發點\n\n**依賴**：Phase 3 + L3/L4 prompt 系統\n\n**驗收標準**：\n- L3 產出後能自動觸發品質報告\n- 品質不通過時能引導修正方向\n\n## 設計決策\n\n### 為什麼新建 `lib/quality-gate/` 而不是擴展 `lib/quality/`？\n\n1. **關注點不同**：`lib/quality/` 做文字表面檢查（regex 為主），`quality-gate/` 做語義層檢查（需要知識庫上下文）\n2. **依賴不同**：閘門 0 不依賴任何其他模組，閘門 1-3 依賴知識庫和案件上下文\n3. **可獨立開關**：使用者可能只想用閘門 0（快速文字檢查），不需要載入整個品質閘門\n4. **不破壞現有**：lib/quality/ 已有 55 個測試，不碰它\n\n### 為什麼閘門 1-3 盡量用確定性規則而不是全交給 AI？\n\n同 M03 的理由：可解釋、可測試、$0。AI 做的是 L 階段的產出，品質閘門負責在 AI 產出後做客觀檢查——讓 AI 檢查 AI 會陷入同樣的盲區。\n\n確定性規則能抓到的問題（佔 70-80%）：\n- 無來源的數字宣稱 → regex\n- KB 中不存在的實績引用 → 字串比對\n- 預算超支 → 數學計算\n- 常識違規 → 模式比對\n\n需要 AI 判斷的問題（佔 20-30%），Phase 4 才做：\n- 邏輯不一致（前後矛盾）\n- 策略層的遺漏（有覆蓋但深度不夠）\n- 創意方案的可行性（不在規則庫中的新方案）\n\n### 為什麼閘門 2 允許沒有需求清單時跳過？\n\n需求清單來自 L1，如果使用者只是想快速檢查一段文字（沒有走完整 L1 流程），閘門 2 不應該擋住。品質閘門的原則是**有多少資料做多少檢查**，不因缺少資料而阻止使用。\n\n## 待確認\n\n- [ ] AI 幻覺模式清單需要從實際建議書案例中持續累積（初版先用常見模式）\n- [ ] 需求提取的格式標準（L1 產出需求清單的結構需要跟 M03 對齊）\n- [ ] 預算估算的行業基準數據（不同類型案件的成本結構）\n- [ ] 閘門之間的權重（計算總評分時四道閘門各佔多少）\n","app-docs/dev-plan/M05-Discord-Bot.md":"---\nversion: \"0.0\"\nupdated: \"2026-02-18\"\nstatus: \"待寫\"\ndepends: [\"02-核心架構\", \"03-技術選型\", \"M01-情報模組\", \"M03-戰略分析引擎\"]\nchangelog:\n  - \"0.0 (2026-02-18): 佔位建立\"\n---\n\n# M05 Discord Bot 模組\n\n## 預計涵蓋內容\n\n- Bot 架構設計（discord.js / Agent SDK 整合）\n- 指令系統（/分析、/規劃、/企劃 … /模擬演練）\n- AI Agent 編制（戰略官/企劃官/品管官/知識官/簡報官）\n- 15 分鐘逾時處理方案（見 08-風險 #4）\n- 檔案上傳處理（見 08-風險 #5）\n- 權限管理與頻道設計\n- 部署與主機方案（見 08-風險 #3）\n","app-docs/dev-plan/M06-排版輸出模組.md":"---\nversion: \"0.1\"\nupdated: \"2026-02-22\"\nstatus: \"草案\"\ndepends: [\"00-總論\", \"02-核心架構\", \"03-技術選型\", \"05-工作流程\"]\nchangelog:\n  - \"0.1 (2026-02-22): 初版建立——三大功能（文件組裝管線/範本系統/多格式輸出）、現有 docgen 定位、資料流、UI 設計、四期分期（ITEJ 策略規劃）\"\n  - \"0.0 (2026-02-18): 佔位建立\"\n---\n\n# M06 排版輸出模組（Export & Layout Module）\n\n## 定位\n\n排版輸出模組 = **從 AI 寫作成果到可交件文件的最後一哩路**。\n\nM03 決定要不要投標，L1-L8 產出文字內容，M06 把內容變成客戶看得到的實體交件。\n\n對應能力 6（00-總論）。解決痛點 #15 排版耗時、#16 格式不一致、#17 每次從零開始。\n\n## 現有基礎\n\nM06 **不是從零開始**。已有三個已實作的底層模組：\n\n| 模組 | 位置 | 做什麼 | 狀態 |\n|------|------|--------|------|\n| docgen | `lib/docgen/` | Markdown → DOCX 轉換（封面、目錄、頁首頁尾、表格、列表） | 完成，1026 行測試 |\n| assembly | `lib/assembly/` | 提示詞檔案組裝（token 估算、檔案清單、內容合併） | 完成，31 個測試 |\n| 文件設定 | `lib/settings/` 的 DocumentSettings | 字型、字級、紙張、邊距、行距、頁首頁尾範本 | 完成 |\n\n**M06 的角色**：在這三個底層模組之上，加入「文件組裝管線」——把 L1-L8 的 AI 文字、知識庫資料、公司資訊自動組裝成結構化章節，然後交給 docgen 排版輸出。\n\n```\n現有底層（不動）          M06 新增（本模組）\n─────────────          ──────────────\ndocgen（排版引擎）   ←   文件組裝管線（章節組裝 + 範本套用）\nassembly（提示詞組裝） ←   內容來源橋接（讀取 L1-L8 產出）\nDocumentSettings     ←   範本系統（多套預設 + 品牌規範）\n```\n\n## 核心功能\n\n### 功能 1：文件組裝管線（Document Assembly Pipeline）\n\n把散落在各處的 AI 產出組裝成一份結構化文件。\n\n**問題**：目前用戶必須手動複製 L3/L4 的 AI 文字、貼到文件生成工具、調章節順序。M06 把這個流程自動化。\n\n**輸入來源**（三種，用戶選一）：\n\n| 來源 | 操作方式 | 適用時機 |\n|------|---------|---------|\n| 手動貼入 | 在 UI 逐章輸入/貼上 Markdown 內容 | 現階段主要方式（L3/L4 產出複製過來） |\n| 檔案匯入 | 拖入 .md/.txt 檔案，自動辨識章節 | 有完整 Markdown 檔時 |\n| Notion 拉取 | 從案件資料庫拉對應案件的 L3/L4 產出 | 未來 Notion MCP 建好後（Phase 4） |\n\n**組裝邏輯**：\n\n```typescript\ninterface AssemblySource {\n  type: \"manual\" | \"file\" | \"notion\";\n  chapters: ChapterSource[];\n}\n\ninterface ChapterSource {\n  title: string;              // 章節標題（如「第壹章 專案理解」）\n  content: string;            // Markdown 內容\n  sourceStage?: string;       // 來源階段（L3/L4/manual）\n  kbRefs?: string[];          // 引用的知識庫 ID（00A/00B/...）\n}\n\ninterface AssemblyResult {\n  chapters: ChapterInput[];   // 餵給 docgen 的結構\n  metadata: {\n    projectName: string;\n    totalChars: number;\n    chapterCount: number;\n    kbRefsUsed: string[];\n    assembledAt: string;      // ISO timestamp\n  };\n  warnings: AssemblyWarning[];\n}\n\ninterface AssemblyWarning {\n  type: \"empty_chapter\" | \"missing_kb_ref\" | \"long_chapter\" | \"duplicate_content\";\n  chapter: number;\n  message: string;\n}\n```\n\n**組裝步驟**：\n\n1. **讀取來源** → 取得各章原始內容\n2. **結構驗證** → 檢查空章節、異常長度、重複段落\n3. **知識庫注入**（選用）→ 將 00A-00E 的特定條目嵌入指定位置\n4. **品牌文字替換** → 公司名稱、聯絡資訊等佔位符替換\n5. **產出 ChapterInput[]** → 交給 docgen\n\n### 功能 2：範本系統（Template System）\n\n不同類型的文件有不同的章節結構和格式要求。\n\n**內建範本**：\n\n| 範本 ID | 名稱 | 章節數 | 說明 |\n|---------|------|--------|------|\n| `proposal-standard` | 標準建議書 | 5-10 | 政府採購標案建議書，五章制或依需求書自訂 |\n| `proposal-simplified` | 簡式建議書 | 3-5 | 小型標案/勞務採購，精簡版 |\n| `plan-brief` | 企劃摘要 | 2-3 | L2 備標規劃產出的精簡版 |\n| `custom` | 自訂 | 不限 | 用戶自行定義章節結構 |\n\n**範本定義**：\n\n```typescript\ninterface DocumentTemplate {\n  id: string;\n  name: string;\n  description: string;\n  chapters: TemplateChapter[];\n  defaultSettings: Partial<DocumentSettings>;  // 範本專屬預設（覆蓋全域設定）\n  variables: TemplateVariable[];               // 範本內佔位符\n}\n\ninterface TemplateChapter {\n  defaultTitle: string;       // 預設標題（如「第壹章 專案理解與服務理念」）\n  required: boolean;          // 是否必填\n  suggestedLength: string;    // 建議字數（如「2000-3000」）\n  kbSuggestions: string[];    // 建議引用的知識庫（如 [\"00B\", \"00D\"]）\n  guideText: string;          // 撰寫指引（顯示在 UI 的提示文字）\n}\n\ninterface TemplateVariable {\n  key: string;                // 如 \"projectName\", \"companyName\"\n  label: string;              // 中文標籤\n  source: \"settings\" | \"manual\";  // 從設定自動帶入 or 用戶填\n  defaultValue?: string;\n}\n```\n\n**範本儲存**：\n\n- 內建範本存 `src/data/config/document-templates.ts`（靜態設定，同 stages.ts 模式）\n- 用戶自訂範本存 localStorage（同現有設定系統模式）\n- 不另建資料庫\n\n### 功能 3：多格式輸出（Multi-format Export）\n\n在 DOCX 基礎上擴充其他格式。\n\n| 格式 | 狀態 | 實作方式 | 優先序 |\n|------|------|---------|--------|\n| DOCX | 已實作 | `docgen/generate-docx.ts`（docx 套件） | — |\n| PDF | Phase 3 | 瀏覽器 `window.print()` + CSS print stylesheet | 中 |\n| Markdown 匯出 | Phase 2 | 直接打包原始 Markdown | 高 |\n| 簡報大綱 | Phase 4 | 產出 L6 簡報架構的結構化文字 → Canva MCP | 低 |\n\n**PDF 策略決策**：選擇 CSS print stylesheet + 瀏覽器列印，不引入 puppeteer/headless chrome。理由：\n\n- 零額外依賴（不增加 node_modules）\n- Vercel serverless 不適合跑 headless browser\n- 政府標案以 Word 為主，PDF 是次要需求\n- 用戶可從 DOCX 直接轉 PDF（Word 內建功能）\n\n```typescript\ninterface ExportOptions {\n  format: \"docx\" | \"markdown\" | \"print\";\n  template: string;           // 範本 ID\n  chapters: ChapterInput[];\n  documentSettings: DocumentSettings;\n  companySettings: CompanySettings;\n  coverPage?: boolean;\n  tableOfContents?: boolean;\n  includeMetadata?: boolean;   // Markdown 匯出時是否包含 YAML frontmatter\n}\n\n// 匯出結果\ntype ExportResult =\n  | { format: \"docx\"; blob: Blob; filename: string }\n  | { format: \"markdown\"; text: string; filename: string }\n  | { format: \"print\"; html: string };  // 注入到 iframe 觸發列印\n```\n\n## 資料流\n\n```\n用戶操作（選範本 + 填/匯入內容）\n    ↓\nAssemblyPipeline（組裝 + 驗證 + KB 注入 + 佔位符替換）\n    ↓\nChapterInput[]（結構化章節）\n    ↓\n[選用] 品質檢查（M04 閘門，Phase 3）\n    ↓\nExportEngine（依格式分發）\n    ├── DOCX → generateDocx()（現有 docgen）\n    ├── Markdown → 打包純文字\n    └── Print → 生成 HTML + CSS print stylesheet\n    ↓\ndownloadBlob() / 瀏覽器列印\n```\n\n## 知識庫整合\n\n文件中經常需要嵌入知識庫內容（如團隊簡介、過往實績、時程範本）。\n\n**整合方式**：在章節內容中使用佔位符，組裝管線自動替換。\n\n```markdown\n## 執行團隊\n\n{{kb:00A:PM}}\n\n本團隊具備以下相關實績：\n\n{{kb:00B:recent:3}}\n```\n\n**佔位符語法**：\n\n| 佔位符 | 說明 |\n|--------|------|\n| `{{kb:00A:角色}}` | 插入 00A 團隊資料中指定角色的簡介 |\n| `{{kb:00B:recent:N}}` | 插入 00B 實績庫中最近 N 筆相關實績 |\n| `{{kb:00C:標準}}` | 插入 00C 時程範本庫中指定範本 |\n| `{{kb:00D:類別}}` | 插入 00D 應變 SOP 庫中指定類別 |\n| `{{company:name}}` | 公司名稱（從設定帶入） |\n| `{{company:taxId}}` | 統一編號 |\n| `{{project:name}}` | 案件名稱 |\n| `{{date:roc}}` | 民國年月日 |\n\n**KB 資料讀取**：透過現有 `lib/knowledge-base/` 的型別和載入機制。Phase 1 只支援手動貼入的 KB 內容（localStorage），Phase 4 支援從 Notion 即時拉取。\n\n```typescript\ninterface KBInjector {\n  resolve(placeholder: string, kbData: KnowledgeBaseData): string;\n  findPlaceholders(content: string): KBPlaceholder[];\n  validate(placeholders: KBPlaceholder[], kbData: KnowledgeBaseData): KBValidationResult;\n}\n\ninterface KBPlaceholder {\n  raw: string;              // 原始佔位符文字\n  category: \"00A\" | \"00B\" | \"00C\" | \"00D\" | \"00E\";\n  selector: string;         // 角色/類別/篩選條件\n  params?: Record<string, string>;\n}\n\ninterface KBValidationResult {\n  valid: boolean;\n  unresolved: KBPlaceholder[];  // 找不到對應資料的佔位符\n}\n```\n\n## 資料夾結構\n\n```\nsrc/lib/output/\n  types.ts                    ← 所有型別定義\n  constants.ts                ← 範本 ID、佔位符正則等常數\n  assembly-pipeline.ts        ← 文件組裝管線（核心純函式）\n  kb-injector.ts              ← 知識庫佔位符解析與替換\n  template-manager.ts         ← 範本載入與管理\n  export-engine.ts            ← 多格式匯出分發器\n  markdown-export.ts          ← Markdown 匯出邏輯\n  print-export.ts             ← 列印用 HTML 生成\n  useDocumentAssembly.ts      ← 文件組裝 React Hook\n  useExport.ts                ← 匯出 React Hook\n  __tests__/\n    assembly-pipeline.test.ts\n    kb-injector.test.ts\n    template-manager.test.ts\n    export-engine.test.ts\n    markdown-export.test.ts\n\nsrc/data/config/\n  document-templates.ts       ← 內建範本定義\n\nsrc/components/output/\n  DocumentWorkbench.tsx        ← 主工作台（範本選擇 + 章節編輯 + 預覽）\n  TemplateSelector.tsx         ← 範本選擇器\n  ChapterEditor.tsx            ← 單章節編輯器（Markdown + 預覽）\n  ChapterList.tsx              ← 章節列表（拖曳排序）\n  KBInsertDialog.tsx           ← 知識庫插入對話框\n  ExportPanel.tsx              ← 匯出選項面板\n  DocumentPreview.tsx          ← 即時預覽（簡化版 HTML 渲染）\n  AssemblyWarnings.tsx         ← 組裝警告顯示\n```\n\n## 需修改的現有檔案\n\n| 檔案 | 修改內容 |\n|------|---------|\n| `src/lib/modules/feature-registry.ts` | 更新 `docgen` feature 的 routes（加 `/tools/output`） |\n| `src/lib/settings/types.ts` | 新增 `OutputSettings`（自訂範本儲存） |\n| `src/lib/settings/defaults.ts` | 新增 `output` 預設值 |\n| `src/app/tools/docx/page.tsx` | 加導航連結到新工作台（保留舊頁面作簡易模式） |\n\n**不修改**：`lib/docgen/` 和 `lib/assembly/` 保持不動。M06 透過 import 使用它們的函式，不改動底層邏輯。\n\n## UI 設計\n\n### 主頁面：文件工作台（/tools/output）\n\n```\n┌─────────────────────────────────────────────────┐\n│ 文件工作台                          [匯出 ▾]    │\n├──────────┬──────────────────────────────────────┤\n│ 範本選擇  │                                      │\n│ ○ 標準建議書│  第壹章 專案理解與服務理念            │\n│ ○ 簡式建議書│  ─────────────────────              │\n│ ○ 企劃摘要 │  [Markdown 編輯區]                   │\n│ ○ 自訂    │                                      │\n│          │  字數：2,450 / 建議 2,000-3,000       │\n│ ─────── │  引用：00B 實績（3 筆）               │\n│ 章節列表  │                                      │\n│ ☑ 第壹章  │  [插入知識庫] [預覽]                  │\n│ ☑ 第貳章  │                                      │\n│ ☑ 第參章  │──────────────────────────────────────│\n│ ☑ 第肆章  │  ⚠ 組裝提醒                         │\n│ ☑ 第伍章  │  • 第參章未引用實績（建議加 00B）      │\n│ [+ 新增]  │  • 第伍章字數偏少（800 / 建議 1500+） │\n│          │                                      │\n│ 案件資訊  │                                      │\n│ 案名:___  │                                      │\n│ 機關:___  │                                      │\n└──────────┴──────────────────────────────────────┘\n```\n\n### 匯出面板\n\n```\n┌──────────────────────────┐\n│ 匯出設定                  │\n│                          │\n│ 格式：● DOCX ○ Markdown  │\n│       ○ 列印（PDF）       │\n│                          │\n│ ☑ 封面頁                 │\n│ ☑ 自動目錄               │\n│ ☐ 含知識庫引用來源        │\n│                          │\n│ 格式設定：[使用全域設定]   │\n│          [自訂本次設定]   │\n│                          │\n│ [預覽] [匯出]            │\n└──────────────────────────┘\n```\n\n### 與現有 /tools/docx 的關係\n\n| | 現有 /tools/docx | 新增 /tools/output |\n|---|---|---|\n| 定位 | 簡易模式（手動輸入章節） | 完整模式（範本 + KB + 管線） |\n| 保留 | 是，不刪除 | 新增 |\n| 入口 | 側欄「文件生成」 | 同一功能下的「進階模式」連結 |\n| 底層 | 直接呼叫 `generateDocx()` | 經過 M06 管線再呼叫 `generateDocx()` |\n\n## Settings\n\n```typescript\ninterface OutputSettings {\n  defaultTemplate: string;          // 預設範本 ID\n  customTemplates: DocumentTemplate[];  // 用戶自訂範本\n  recentExports: RecentExport[];    // 最近匯出記錄（最多 10 筆）\n  kbAutoSuggest: boolean;           // 自動建議知識庫引用\n}\n\ninterface RecentExport {\n  projectName: string;\n  template: string;\n  format: \"docx\" | \"markdown\" | \"print\";\n  exportedAt: string;\n  chapterCount: number;\n}\n```\n\n## Feature Registry\n\n```typescript\n// 更新現有 docgen 的定義\n{\n  id: \"docgen\",\n  name: \"文件生成\",\n  description: \"建議書排版與匯出（Word / Markdown / 列印）\",\n  icon: \"📄\",\n  routes: [\"/tools/docx\", \"/tools/output\"],\n  section: \"output\",\n  defaultEnabled: true,\n}\n```\n\n## 設計決策\n\n### 決策 1：新模組 vs 擴充 docgen\n\n**選擇**：新建 `lib/output/`，不改動 `lib/docgen/`。\n\n理由：\n- docgen 是純排版引擎（Markdown → DOCX），職責單一且穩定\n- M06 管線邏輯（範本、KB 注入、驗證）不屬於排版引擎的責任\n- docgen 已有 1026 行測試，改動有破壞風險\n- `lib/output/` 透過 import 使用 docgen，是消費者而非修改者\n\n否決方案：直接在 docgen 加管線邏輯 → 模組膨脹、職責混亂。\n\n### 決策 2：PDF 生成方式\n\n**選擇**：瀏覽器 `window.print()` + CSS print stylesheet（Phase 3）。\n\n理由：\n- 零依賴（不裝 puppeteer、wkhtmltopdf）\n- Vercel serverless 不適合 headless browser\n- 政府標案文件以 Word 為主，PDF 需求次要\n- 用戶可從 Word 另存 PDF（品質更好）\n\n否決方案：\n- puppeteer → 佈署限制 + 500MB+ 依賴\n- react-pdf → 排版引擎完全不同，雙倍維護成本\n- 付費 API（Gotenberg 等）→ 違反 $0 成本原則\n\n### 決策 3：範本儲存方式\n\n**選擇**：內建範本存 `src/data/config/`，自訂範本存 localStorage。\n\n理由：\n- 同 stages.ts、kb-matrix.ts 的模式（靜態設定檔）\n- 自訂範本數量少（預計 < 10 個），localStorage 足夠\n- 不需要另建資料庫或檔案系統\n\n否決方案：\n- Notion 儲存 → 增加外部依賴，離線不可用\n- 本地 JSON 檔案 → Next.js 前端無法直接寫檔\n\n### 決策 4：知識庫佔位符語法\n\n**選擇**：雙大括號 `{{kb:00A:PM}}`。\n\n理由：\n- 不會與 Markdown 語法衝突\n- 可以用正則簡單解析\n- 同頁首頁尾的佔位符風格（`{{案名}}`），使用者學一次就好\n\n### 決策 5：與 M04 品質閘門的整合時機\n\n**選擇**：Phase 3 整合。Phase 1-2 先不加品質檢查。\n\n理由：\n- M04 尚在草案階段，介面未定\n- 文件輸出的核心價值是「快速生成」，不是「品質把關」\n- Phase 3 時 M04 應已有穩定介面，屆時加入「匯出前自動檢查」\n\n## 實作分期\n\n### Phase 1：文件組裝管線（核心）\n\n**目標**：用戶可以選範本、編輯章節、匯出 DOCX——取代手動複製貼上。\n\n**新建檔案**：\n- `lib/output/types.ts` — 所有介面定義\n- `lib/output/constants.ts` — 範本 ID、佔位符正則\n- `lib/output/assembly-pipeline.ts` — 組裝核心（純函式）\n- `lib/output/template-manager.ts` — 範本載入\n- `lib/output/export-engine.ts` — 匯出分發（Phase 1 只有 DOCX）\n- `lib/output/useDocumentAssembly.ts` — React Hook\n- `lib/output/useExport.ts` — React Hook\n- `data/config/document-templates.ts` — 2 個內建範本（標準建議書 + 自訂）\n- `components/output/DocumentWorkbench.tsx` — 主工作台\n- `components/output/TemplateSelector.tsx`\n- `components/output/ChapterEditor.tsx`\n- `components/output/ChapterList.tsx`\n- `components/output/ExportPanel.tsx`\n- `app/tools/output/page.tsx` — 路由頁面\n- 測試：assembly-pipeline + template-manager + export-engine\n\n**修改檔案**：\n- `feature-registry.ts` — 更新 docgen routes\n- `settings/types.ts` — 新增 OutputSettings\n- `settings/defaults.ts` — 新增預設值\n\n**驗收標準**：\n- 選範本 → 按範本結構自動建立章節\n- 各章輸入 Markdown → 匯出 DOCX 格式正確\n- 空章節有警告、字數統計正確\n- 測試覆蓋所有純函式\n\n### Phase 2：知識庫注入 + Markdown 匯出\n\n**目標**：文件中可嵌入知識庫內容，支援 Markdown 格式匯出。\n\n**新建檔案**：\n- `lib/output/kb-injector.ts` — 佔位符解析與替換\n- `lib/output/markdown-export.ts` — Markdown 匯出\n- `components/output/KBInsertDialog.tsx` — KB 插入 UI\n- 測試：kb-injector + markdown-export\n\n**驗收標準**：\n- 輸入 `{{kb:00A:PM}}` → 自動替換為 PM 的團隊簡介\n- 找不到的佔位符 → 警告（不靜默忽略）\n- Markdown 匯出包含完整內容 + 章節結構\n- 品牌佔位符（公司名、統編）自動從設定帶入\n\n### Phase 3：列印/PDF + M04 品質閘門整合\n\n**目標**：支援列印導出（等同 PDF），匯出前自動執行品質檢查。\n\n**新建檔案**：\n- `lib/output/print-export.ts` — HTML 生成 + CSS print stylesheet\n- `components/output/DocumentPreview.tsx` — 預覽元件\n- `components/output/AssemblyWarnings.tsx` — 品質警告\n\n**修改檔案**：\n- `export-engine.ts` — 加入 print 格式\n- 整合 M04 的品質閘門（呼叫 `lib/quality-gate/` 的介面）\n\n**驗收標準**：\n- 列印預覽 → 格式與 DOCX 一致（字型、字級、邊距）\n- 匯出前品質檢查 → 有警告時顯示，用戶可選擇忽略繼續\n- CSS print stylesheet 在 Chrome/Edge 列印正確\n\n### Phase 4：Notion 整合 + 簡報連接\n\n**目標**：從 Notion 自動拉取 L3/L4 產出，簡報大綱串接 Canva。\n\n**前置條件**：Notion MCP 本地版建好（M01 Phase 5）。\n\n**新增功能**：\n- Notion 拉取來源（讀取案件的 L3/L4 artifact）\n- 簡報大綱匯出（結構化文字 → Canva MCP `generate-design`）\n- 更多內建範本（簡式建議書、企劃摘要）\n- 匯出歷史記錄\n\n**驗收標準**：\n- 指定案號 → 自動從 Notion 帶入 L3/L4 內容\n- 簡報大綱 → Canva 可接受的格式\n- 匯出記錄可查詢最近 10 筆\n\n## 與其他模組的關係\n\n```\nM01（情報）→ M03（戰略）→ L1-L8 → M06（輸出）\n                                      ↑\nM04（品質閘門）──── Phase 3 整合 ──────┘\n                                      ↑\nKB（00A-00E）──── 內容注入 ───────────┘\n```\n\n- **M01 → M06**：無直接依賴。M01 的情報餵給 M03 做決策，不直接進文件。\n- **M03 → M06**：間接關係。M03 決定投標後，L2-L4 的產出才需要 M06 排版。\n- **M04 → M06**：Phase 3 整合。M06 匯出前呼叫 M04 做品質檢查（可選）。\n- **KB → M06**：直接依賴。佔位符語法讀取 00A-00E 內容嵌入文件。\n- **docgen → M06**：M06 是 docgen 的消費者，透過 `generateDocx()` 做最終排版。\n","app-docs/dev-plan/M07-SmugMug-MCP規格.md":"---\nversion: \"1.0\"\nupdated: \"2026-02-21\"\nstatus: \"定案\"\ndepends: []\nchangelog:\n  - \"1.0 (2026-02-21): 初版建立，已建成系統的規格記錄\"\n---\n\n# M07 SmugMug MCP Server 規格\n\n## 概述\n\nSmugMug MCP Server 已建置完成，位於 `smugmug-mcp/`。\n用途：讓 Claude Code 可直接存取 SmugMug 相簿（公司作品集/活動照片），供建議書圖片挑選使用。\n\n## 技術規格\n\n- **框架**：TypeScript + @modelcontextprotocol/sdk + oauth-1.0a\n- **認證**：OAuth 1.0a（credentials 存在 `.mcp.json` 環境變數）\n- **API**：SmugMug API v2（`https://api.smugmug.com/api/v2`）\n- **編譯**：`npm run build` → `dist/index.js`\n\n## 7 個工具\n\n| 工具名稱 | 功能 |\n|---------|------|\n| `get_user` | 取得使用者資訊 |\n| `list_albums` | 列出所有相簿 |\n| `get_album_images` | 取得相簿內所有圖片 |\n| `get_album_info` | 取得相簿詳細資訊 |\n| `get_image_urls` | 取得圖片各尺寸 URL |\n| `browse_folders` | 瀏覽資料夾結構 |\n| `search_images` | 搜尋圖片（關鍵字） |\n\n## 注意事項\n\n- `.mcp.json` 中的 SmugMug 路徑是**絕對路徑**，換機器必須修改\n- OAuth credentials 在 `.mcp.json` 明文存放，換機器需手動帶過去\n- `.mcp.json` 不入 git（已在 .gitignore）\n","app-docs/dev-plan/W01-巡標自動化.md":"---\nversion: \"0.1\"\nupdated: \"2026-02-27\"\nstatus: \"草案\"\ndepends: [\"M01-情報模組\", \"A01-PCC-API-參考\"]\nchangelog:\n  - \"0.1 (2026-02-27): 初版規格（ITEJ），基於 0222 Jin 確認的產品方向 P0 定義\"\n---\n\n# W01 行政巡標自動化（Daily Bid Scanning Automation）\n\n## 定位\n\nP0 優先——Jin 親定的第一件事（0222 確認，見 `docs/records/stash-product-direction-0222.md`）。\n\n每天上午，行政人員上 PCC 抓新公告 → 貼進 Notion。這是目前完全手動的流程。\n自動化後：系統用關鍵字搜 PCC → 呈現候選清單 → 巡標人點「要」→ 全自動建案。\n\n## 現況與差距\n\n### 已有的\n\n| 能力 | 來源 | 狀態 |\n|------|------|------|\n| PCC 搜尋 API | `pcc-api-mcp/`（6 工具）+ `/api/pcc/route.ts` | ✅ 完整 |\n| 搜尋 + 競爭分析 + 機關情報 | `src/lib/intelligence/` | ✅ 完整（1132 tests） |\n| PCC 資料解析（標案、廠商、機關） | `src/lib/intelligence/helpers.ts` | ✅ 完整 |\n| Notion 讀取 | `/api/notion/debug/route.ts`（debug 用） | ✅ 基本 |\n| Notion 資料庫 schema | M01 附錄 A（89 欄位） | ✅ 已記錄 |\n\n### 要新做的\n\n| 能力 | 說明 | 複雜度 |\n|------|------|--------|\n| **關鍵字篩選引擎** | 比對 Jin 的四類關鍵字清單 | 低 |\n| **Notion 頁面建立** | 從 PCC 資料 → Notion 案件資料庫建檔 | 中 |\n| **巡標 UI** | 候選清單 + 要/不要決策 + 一鍵建案 | 中 |\n| **Notion 欄位映射** | PCC 欄位 → Notion 89 欄位的對應表 | 中（需確認 schema） |\n| **情報自動觸發** | 建案後自動跑競爭分析 + 機關情報 → 回寫 Notion | 高 |\n| **Google Drive 資料夾** | 建案後自動建 Drive 資料夾 | 中（需 API） |\n| **排程機制** | 每日定時或手動觸發 | 低 |\n\n## 用戶工作流程（Jin 定義）\n\n```\n每日排程（或手動觸發）\n→ PCC API 用預設關鍵字搜尋\n→ 擷取公告清單（標題、預算、機關、截標日）\n→ 關鍵字初篩（四類分類）\n→ 巡標人看清單，點「要」或「不要」\n→ 點「要」後全自動：\n  → 從公告 URL 擷取所有欄位\n  → Notion 建檔（進「企劃協作及備標」表）\n  → Google Drive 建資料夾\n  → 產生案件摘要\n  → 跑情報蒐集\n  → 結果回寫 Notion\n```\n\n## 關鍵字篩選引擎\n\n### 四類清單（來源：Jin 0222 定義）\n\n| 類別 | 關鍵字 | 動作 |\n|------|--------|------|\n| **絕對可以** | 食農教育、藝術、服務採購、100萬以下、影片製作、行銷計畫、春聯 | 自動推薦 ⭐ |\n| **需要讀細節** | 主燈設計、各種節慶（燈節/藝術節等）、舞台、布置、晚會、演唱會 | 標記 🔍 |\n| **先不要** | 課後服務 | 自動排除 ❌ |\n| **其他** | 不符合以上任何類別 | 標記 ❓（留給有經驗的人） |\n\n### 篩選邏輯\n\n```typescript\ninterface KeywordRule {\n  category: \"must\" | \"review\" | \"exclude\" | \"other\";\n  keywords: string[];        // 比對標案名稱\n  budgetMax?: number;        // 預算上限（如「100萬以下」）\n  label: string;             // UI 顯示標籤\n}\n\n// 篩選優先序：排除 → 絕對可以 → 需要讀 → 其他\nfunction classifyTender(title: string, budget: number, rules: KeywordRule[]): Classification {\n  // 1. 先檢查排除\n  if (matchesAny(title, excludeRules)) return { category: \"exclude\", reason: \"...\" };\n  // 2. 絕對可以（含預算條件）\n  if (matchesAny(title, mustRules) || budget <= 1_000_000) return { category: \"must\", reason: \"...\" };\n  // 3. 需要讀細節\n  if (matchesAny(title, reviewRules)) return { category: \"review\", reason: \"...\" };\n  // 4. 其他\n  return { category: \"other\", reason: \"不符合已知類別\" };\n}\n```\n\n### 關鍵字管理\n\n- 關鍵字清單存在設定中（Settings），用戶可在 UI 編輯\n- Jin 說此清單是「代理人簡化版」，Jin 本人判斷更細\n- 支援正則表達式匹配（如「.*節」匹配各種節慶）\n- 兩關篩選：初級（消極汰除）→ 二級（積極挑選）\n\n## Notion 整合\n\n### 寫入 API\n\n```typescript\n// /api/notion/create-case/route.ts\nPOST /api/notion/create-case\n{\n  token: string;                    // Notion Integration Token\n  databaseId: string;               // 目標資料庫 ID\n  fields: {\n    標案名稱: string;               // title property\n    招標機關: string;               // text\n    案號: string;                    // text\n    預算金額: number;               // number\n    截標時間: string;               // date (ISO format)\n    公告日: string;                  // date\n    標案類型: string[];              // multi_select\n    評審方式: string;               // select\n    決標方式: string;               // select\n    // ... 更多欄位\n  };\n  autoFields?: {\n    標案進程: \"To-do\";             // 預設狀態\n    備標決策: \"入選\";              // 預設決策\n  };\n}\n→ { pageId: string, url: string }\n```\n\n### PCC → Notion 欄位映射\n\n| PCC API 欄位 | Notion 欄位 | 型別 | 說明 |\n|-------------|-------------|------|------|\n| `brief.title` | 標案名稱 | title | 直接對應 |\n| `brief.unit_name` | 招標機關 | text | 直接對應 |\n| `brief.job_number` | 案號 | text | 直接對應 |\n| `brief.budget` | 預算金額 | number | 解析數字 |\n| `detail.deadline` | 截標時間 | date | 解析日期 |\n| `brief.publish_date` | 公告日 | date | 解析日期 |\n| `brief.category` | 標案類型 | multi_select | 對應到預設選項 |\n| `detail.award_method` | 評審方式 | select | 對應到預設選項 |\n| `detail.tender_method` | 決標方式 | select | 對應到預設選項 |\n| 自動產生 | 案件唯一碼 | text | `PCC-{案號}` |\n| 預設值 | 標案進程 | status | `To-do` |\n| 預設值 | 備標決策 | select | `入選` |\n\n**注意**：Notion 的 89 個欄位中，建案時只填有資料的，其餘留空由企劃後續補齊。\n\n### Notion API 呼叫\n\n```typescript\n// Notion REST API: Create a page\nasync function createNotionCase(token: string, databaseId: string, properties: object) {\n  const res = await fetch(\"https://api.notion.com/v1/pages\", {\n    method: \"POST\",\n    headers: {\n      \"Authorization\": `Bearer ${token}`,\n      \"Notion-Version\": \"2022-06-28\",\n      \"Content-Type\": \"application/json\",\n    },\n    body: JSON.stringify({\n      parent: { database_id: databaseId },\n      properties,\n    }),\n  });\n  if (!res.ok) throw new Error(`Notion API ${res.status}`);\n  return res.json();\n}\n```\n\n## 資料夾結構\n\n```\nsrc/\n├── app/\n│   ├── api/\n│   │   ├── notion/\n│   │   │   ├── debug/route.ts            ← 既有（debug）\n│   │   │   ├── create-case/route.ts      ← 新增：建案\n│   │   │   ├── update-case/route.ts      ← 新增：回寫情報結果\n│   │   │   └── __tests__/\n│   │   └── scan/\n│   │       ├── route.ts                  ← 新增：執行一次巡標掃描\n│   │       └── __tests__/\n│   └── scan/\n│       └── page.tsx                      ← 新增：巡標 UI 主頁\n├── lib/\n│   ├── scan/\n│   │   ├── types.ts                      ← 巡標相關型別\n│   │   ├── constants.ts                  ← 預設關鍵字清單\n│   │   ├── keyword-engine.ts             ← 關鍵字篩選引擎\n│   │   ├── notion-mapper.ts              ← PCC → Notion 欄位映射\n│   │   ├── useScanResults.ts             ← 巡標結果管理 Hook\n│   │   └── __tests__/\n│   └── notion/\n│       ├── client.ts                     ← Notion API 封裝\n│       ├── types.ts                      ← Notion 型別定義\n│       └── __tests__/\n├── components/\n│   └── scan/\n│       ├── ScanDashboard.tsx             ← 巡標主面板\n│       ├── TenderCard.tsx                ← 單筆候選卡片（要/不要/稍後）\n│       ├── KeywordManager.tsx            ← 關鍵字清單管理\n│       ├── ScanHistory.tsx               ← 掃描歷史\n│       └── CreateCaseDialog.tsx          ← 建案確認對話框\n```\n\n### 需修改的現有檔案\n\n| 檔案 | 修改內容 |\n|------|---------|\n| `src/lib/modules/feature-registry.ts` | 新增 `scan` feature |\n| `src/lib/settings/types.ts` | 新增 `ScanSettings`（關鍵字清單、Notion token/DB ID） |\n| `src/lib/settings/defaults.ts` | 新增預設關鍵字清單 |\n| `src/lib/intelligence/pcc-client.ts` | 可能需要新增 `searchByKeywords` 批次搜尋 |\n\n## UI 設計\n\n### 巡標主頁面（/scan）\n\n```\n┌─────────────────────────────────────────────────┐\n│ 🔍 行政巡標                    [手動掃描] [設定] │\n├─────────────────────────────────────────────────┤\n│                                                  │\n│  今日掃描結果（2026-02-27）                       │\n│  共 47 筆新公告，推薦 8 筆，待審 12 筆            │\n│                                                  │\n│  ⭐ 推薦（8）                                     │\n│  ┌──────────────────────────────────────────┐   │\n│  │ 113年度食農教育推廣計畫                    │   │\n│  │ 新北市教育局 ｜ 85萬 ｜ 截標 3/15         │   │\n│  │ 匹配：食農教育                             │   │\n│  │                        [✅ 建案] [❌ 跳過] │   │\n│  └──────────────────────────────────────────┘   │\n│                                                  │\n│  🔍 需要看（12）                                  │\n│  ┌──────────────────────────────────────────┐   │\n│  │ 114年度城市藝術節策展服務                   │   │\n│  │ 臺北市文化局 ｜ 350萬 ｜ 截標 3/20        │   │\n│  │ 匹配：藝術節                               │   │\n│  │                [✅ 建案] [🔍 詳情] [❌ 跳過]│   │\n│  └──────────────────────────────────────────┘   │\n│                                                  │\n│  ❌ 已排除（15）  ❓ 其他（12）  [展開]          │\n│                                                  │\n├─────────────────────────────────────────────────┤\n│  📋 最近建案（3 筆）                              │\n│  • 食農教育推廣計畫 → Notion ✅ Drive ✅ 情報 ⏳  │\n│  • 燈節策展服務 → Notion ✅ Drive ❌ 情報 ❌      │\n│  • ...                                           │\n└─────────────────────────────────────────────────┘\n```\n\n### 建案確認對話框\n\n點「建案」後顯示：\n- PCC 擷取到的欄位（預覽）\n- Notion 資料庫目標（哪個 DB）\n- 額外操作（Google Drive、情報蒐集）的勾選\n\n### 設定面板\n\n在系統設定新增「巡標設定」區塊：\n- Notion Integration Token（加密存 env vars，不存 localStorage）\n- Notion 案件資料庫 ID\n- 關鍵字清單管理（四類 + 自訂）\n- 排程設定（每日幾點 / 僅手動）\n\n## 實作分期\n\n### Phase 1：關鍵字篩選引擎 + 巡標 API\n\n**產出**：`/api/scan` + 關鍵字引擎 + 型別\n\n- `src/lib/scan/types.ts`（ScanResult、Classification、KeywordRule）\n- `src/lib/scan/constants.ts`（Jin 的四類預設關鍵字）\n- `src/lib/scan/keyword-engine.ts`（分類邏輯 + 兩關篩選）\n- `/api/scan/route.ts`（呼叫 PCC API → 篩選 → 回傳分類結果）\n- 測試：每個分類的 happy path + 邊界\n- Feature Registry 註冊 `scan`\n\n**前置條件**：無（PCC API 已就緒）\n\n### Phase 2：Notion 建案 API\n\n**產出**：`/api/notion/create-case` + 欄位映射\n\n- `src/lib/notion/client.ts`（Notion API 封裝：create page）\n- `src/lib/notion/types.ts`（Notion property 型別）\n- `src/lib/scan/notion-mapper.ts`（PCC → Notion 欄位對應）\n- `/api/notion/create-case/route.ts`\n- 測試：建案 + 欄位映射 + 錯誤處理\n- Settings 擴充：Notion token + DB ID\n\n**前置條件**：確認 Notion 資料庫 ID + Integration 權限\n\n### Phase 3：巡標 UI\n\n**產出**：`/scan` 頁面 + 元件\n\n- `src/app/scan/page.tsx`\n- `src/components/scan/`（ScanDashboard、TenderCard、CreateCaseDialog）\n- `src/lib/scan/useScanResults.ts`（結果管理 Hook）\n- 設定面板：關鍵字管理 + Notion 設定\n- 整合測試\n\n**前置條件**：Phase 1 + Phase 2\n\n### Phase 4：情報自動觸發 + 回寫\n\n**產出**：建案後自動跑情報 → 回寫 Notion\n\n- `/api/notion/update-case/route.ts`（回寫用）\n- 建案後自動觸發：競爭分析、機關情報、市場趨勢\n- 情報結果存入 Notion 頁面 blocks（或自定義欄位）\n- 案件摘要自動產生\n\n**前置條件**：Phase 3 + 確認情報結果存在 Notion 的哪裡\n\n### Phase 5：排程 + Google Drive（可選）\n\n**產出**：定時自動掃描 + Drive 整合\n\n- 排程選項：\n  - 方案 A：Vercel Cron Jobs（簡單，免費額度內）\n  - 方案 B：用戶自行設定 cron（彈性）\n  - 方案 C：先手動觸發（Phase 1 已支援），排程後做\n- Google Drive 資料夾建立（需 Google API 金鑰）\n\n**前置條件**：Phase 3 跑通，用戶確認排程方案\n\n## 效益預期\n\n| 指標 | 現況 | Phase 3 完成後 |\n|------|------|---------------|\n| 巡標時間 | 30-60 分鐘/天（手動上 PCC 逐筆看） | 5-10 分鐘/天（看推薦清單點按鈕） |\n| 漏看新案 | 常見（關鍵字不同時搜不到） | 系統掃所有關鍵字，不漏 |\n| Notion 建檔 | 手動複製貼上 10+ 欄位 | 一鍵自動填入 |\n| 情報蒐集 | 手動開情報模組逐案搜尋 | 建案後自動跑（Phase 4） |\n\n## 待確認\n\n| # | 問題 | 影響 | 建議 |\n|---|------|------|------|\n| 1 | Notion Integration Token 從哪來？ | Phase 2 前置 | 用戶在 Notion Settings → Integrations 建立 |\n| 2 | 目標 Notion 資料庫 ID | Phase 2 前置 | 用 debug route 確認 |\n| 3 | Google Drive 是否保留？ | Phase 5 範圍 | 先跳過，Phase 3 就能跑通核心流程 |\n| 4 | 排程方案選哪個？ | Phase 5 | 先手動，後排程 |\n| 5 | 情報結果存 Notion 的哪裡？ | Phase 4 | 頁面 blocks（文字段落）or 自定義欄位 |\n| 6 | 「100 萬以下」判斷用 PCC 的哪個欄位？ | Phase 1 | `brief.budget` 欄位（已有解析邏輯） |\n\n## 與其他模組的關係\n\n| 模組 | 關係 | 時機 |\n|------|------|------|\n| M01 情報（已完成） | P0 Phase 1 用 PCC client 搜尋；Phase 4 用情報分析自動產出 | 直接依賴 |\n| M03 戰略分析 | P1 案件頁整合（不在 P0 範圍） | 未來 |\n| M04 品質閘門 | P2 寫作流程整合（不在 P0 範圍） | 未來 |\n| Notion API | P0 的核心新能力 | Phase 2 |\n","app-docs/dev-plan/_staging/08-風險清單深度審查.md":"# 暫存：08 風險清單深度審查（模型委員會）\n\n- **目標文件**：08-風險與待決.md\n- **操作**：重大修訂（v2.0）\n- **來源**：模型委員會三人審查（2026-02-20）\n- **委員組成**：用戶代表（非技術老闆）、產品經理、系統架構師（全 Opus 4.6）\n\n## 審查結論摘要\n\nv1.1 已處理 Discord→SaaS 基本清理和業務背景補充。以下是委員會認為 v2.0 應處理的議題。\n\n### 一、既有項目需深化\n\n1. **#1 更新為 SaaS 情境**：Agent SDK 在 Vercel 的運作方式（timeout 限制）、補概估月費金額讓老闆能做決策\n2. **#2 重寫 SaaS 採用障礙**：SaaS 學習曲線比 Discord Bot 更陡（新介面 vs 大家已會用的 Discord），對策需具體化（誰先用、用什麼、花多久上手）\n3. **#7 更新為現實**：開發力已證明可行（Agent Team 確實在產出），瓶頸是用戶審閱和驗收頻寬\n4. **#8 補處方**：從診斷延伸到系統介入機制（強制走 L1-L8？還是輔助？）\n5. **#9 補分級執行者**：AI 自動建議 + 人確認？200 件 × 30 分鐘 = 每月 100 小時的人力成本\n6. **#10 補預期效果**：系統介入後企劃端效率提升多少？是否需要加人？\n\n### 二、遺漏的新風險項\n\n7. **M01 審查阻塞風險**：模型委員會要求核心設計重新思考 + 4 項開工前驗證，阻塞 Layer 1 全部模組\n8. **SaaS 產品介面形態未定**：Discord Bot 已放棄，替代方案細節未定案，阻塞產品層 Agent 架構\n9. **認證與授權**：所有 API Route 無認證、Notion token 存 localStorage、next-auth 已安裝但未設定。Phase 2 前必須完成\n10. **客戶端儲存策略**：設定和憑證存 localStorage，多裝置/多人場景不適用（5MB 上限、換裝置消失）。Phase 2 前需遷移到伺服器端\n11. **時程風險**：46 案 0 得標，從開發到見效的時間軸未知，過渡期怎麼辦\n\n### 三、結構性建議\n\n12. **#8/#9/#10 的歸屬問題**（產品經理）：這些是需求/診斷不是風險，考慮移到 00-總論或 05-工作流程。05 的漏斗引用 08 的分級策略作為 SSOT 不太對\n13. **#3/#4 與 M01 盲區 5 合併追蹤**：Vercel timeout 問題在多處出現，需統一管理\n","app-docs/dev-plan/_staging/db-sandbox-方案.md":"---\ntype: plan\ntarget: 08-風險與待決.md\nstatus: 待決\ncreated: 2026-02-22\nauthor: A44T\n---\n\n# 資料庫沙盒方案\n\n## 背景\n\nC

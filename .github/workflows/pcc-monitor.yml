name: PCC API Update Monitor

on:
  schedule:
    # 每 4 小時跑一次（UTC 時間）
    - cron: '0 */4 * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run monitor
        run: node pcc-monitor/monitor.mjs --once

      - name: Show current state
        run: |
          echo "=== state.json ==="
          cat pcc-monitor/state.json
          echo ""
          echo "=== Last 10 log entries ==="
          tail -10 pcc-monitor/update-log.jsonl

      - name: Run analysis (if enough data)
        run: node pcc-monitor/analyze.mjs || true

      - name: Commit log updates
        run: |
          git config user.name "PCC Monitor Bot"
          git config user.email "bot@github.actions"
          git add pcc-monitor/state.json pcc-monitor/update-log.jsonl
          git diff --staged --quiet || git commit -m "pcc-monitor: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
